    function aplicarEnargasDocumentacion() {
      const textarea = root.querySelector('#enargas-paste-text');
      if (!textarea || !textarea.value.trim()) return;
      const parsed = parseEnargasText(textarea.value || '');
      const aplicados = parsed.found.slice();

      // Todo se aplica sobre el borrador (nunca directo a los <input> ni al
      // cliente guardado) para no pisar lo que ya se tipeó y todavía no se
      // guardó — se persiste recién cuando se toca "Guardar cambios".
      syncClienteDraftFromDOM();
      if (!clienteDraft) clienteDraft = blankClienteBase();

      // Control de coherencia: si ya había datos del vehículo cargados (por
      // la lectura de los documentos o a mano) y ENARGAS informa otra cosa,
      // avisar — suele significar que la patente consultada no es la del
      // vehículo que se está cargando.
      const difiere = (a, b) => a && b && String(a).trim().toLowerCase() !== String(b).trim().toLowerCase();
      const diferencias = [];
      if (difiere(clienteDraft.marca, parsed.marca)) diferencias.push(`la marca cargada es "${clienteDraft.marca}" pero ENARGAS informa "${parsed.marca}"`);
      if (difiere((clienteDraft.patente || '').replace(/\s|-/g, ''), parsed.patente ? String(parsed.patente).replace(/\s|-/g, '') : null)) diferencias.push(`la patente cargada es "${clienteDraft.patente}" pero el resultado pegado es de la patente "${parsed.patente}"`);
      if (diferencias.length) {
        customAlert(`Los datos no coinciden: ${diferencias.join('; y ')}. Revisá que el resultado pegado sea el del vehículo correcto antes de guardar.`, 'Datos que no coinciden');
      }

      const campos = {
        patente: parsed.patente ? String(parsed.patente).toUpperCase() : null,
        marca: parsed.marca, modelo: parsed.modelo, uso: parsed.uso,
        fecha_oblea: parsed.fecha_oblea, anio: parsed.anio,
      };
      Object.entries(campos).forEach(([key, val]) => { if (val) clienteDraft[key] = val; });

      if (!tramiteDraftEquipo) tramiteDraftEquipo = blankEquipo();
      if (!tramiteDraftCampos) tramiteDraftCampos = blankTramiteCampos(null);
      if (parsed.obleaActual) {
        tramiteDraftCampos.obleaAnterior = parsed.obleaActual;
        aplicados.push('N° Oblea anterior');
      }
      if (parsed.equipo) {
        // Se aplica directo al equipo del trámite que se está armando (paso
        // 2) — la consulta al SIC se hace una sola vez acá, en el paso 1.
        if (parsed.equipo.regulador.codigo || parsed.equipo.regulador.serie) {
          Object.assign(tramiteDraftEquipo.regulador, parsed.equipo.regulador);
          aplicados.push('Regulador');
        }
        // Cilindros: se cargan TODOS los que trae el SIC (uno o dos). Si el
        // trámite tenía menos filas de cilindro que las que informa el SIC,
        // se agregan las que falten.
        const cilsSic = (parsed.equipo.cilindros && parsed.equipo.cilindros.length)
          ? parsed.equipo.cilindros
          : (parsed.equipo.cilindro && (parsed.equipo.cilindro.codigo || parsed.equipo.cilindro.serie) ? [parsed.equipo.cilindro] : []);
        cilsSic.forEach((cil, i) => {
          if (!(cil.codigo || cil.serie)) return;
          if (!tramiteDraftEquipo.cilindros[i]) tramiteDraftEquipo.cilindros[i] = blankEquipo().cilindros[0];
          Object.assign(tramiteDraftEquipo.cilindros[i], cil);
          aplicados.push(cilsSic.length > 1 ? `Cilindro ${i + 1}` : 'Cilindro');
        });
        // Válvulas: idem, una por cada cilindro que trae el SIC.
        const valsSic = (parsed.equipo.valvulas && parsed.equipo.valvulas.length)
          ? parsed.equipo.valvulas
          : (parsed.equipo.valvula && (parsed.equipo.valvula.codigo || parsed.equipo.valvula.serie) ? [parsed.equipo.valvula] : []);
        const tipoParaValv = tramiteDraftCampos && tramiteDraftCampos.tipo;
        const valsReales = valsSic.filter(v => v.codigo || v.serie);
        if (tipoParaValv === 'prueba_hidraulica') {
          // En prueba hidráulica cada válvula del vehículo se reemplaza: la
          // actual va de "Baja" y se agrega una nueva de "Montaje". Se
          // reconstruye SIEMPRE desde el SIC (no desde la lista ya modificada),
          // así al pegar de nuevo no se duplica ninguna válvula.
          if (valsReales.length) {
            const nuevas = [];
            valsReales.forEach(v => {
              nuevas.push({ codigo: v.codigo, serie: v.serie, msb: 'baja' });
              nuevas.push({ codigo: '', serie: '', msb: 'montaje' });
            });
            tramiteDraftEquipo.valvulas = nuevas;
            aplicados.push(valsReales.length > 1 ? 'Válvulas' : 'Válvula');
          }
        } else {
          valsSic.forEach((val, i) => {
            if (!(val.codigo || val.serie)) return;
            if (!tramiteDraftEquipo.valvulas[i]) tramiteDraftEquipo.valvulas[i] = blankEquipo().valvulas[0];
            Object.assign(tramiteDraftEquipo.valvulas[i], val);
            aplicados.push(valsSic.length > 1 ? `Válvula ${i + 1}` : 'Válvula');
          });
        }
        // También se cachea en el cliente para que la próxima vez que se le
        // inicie un trámite, el equipo ya venga precargado sin pegar de nuevo.
        clienteDraft.ultimoEquipoConocido = {
          regulador: { ...tramiteDraftEquipo.regulador },
          cilindros: tramiteDraftEquipo.cilindros.map(c => ({ ...c })),
          valvulas: tramiteDraftEquipo.valvulas.map(v => ({ ...v })),
          otros: JSON.parse(JSON.stringify(tramiteDraftEquipo.otros)),
        };
      }

      // Operación por defecto según el tipo de trámite para las filas recién
      // cargadas del SIC (sobre todo el 2° cilindro/válvula, que si no
      // quedaba con la operación en blanco). En una REVISIÓN el cilindro y la
      // válvula no se cambian → "Sin Cambios" (SC). En una PRUEBA HIDRÁULICA
      // el cilindro también queda SC (las válvulas de la PH se resuelven con
      // sus reglas propias, abajo). Sólo se completan las que estén vacías,
      // nunca se pisa una operación ya elegida a mano.
      const tipoTr = tramiteDraftCampos && tramiteDraftCampos.tipo;
      if (tipoTr === 'revision_anual' || tipoTr === 'prueba_hidraulica') {
        (tramiteDraftEquipo.cilindros || []).forEach(c => { if (!c.msdb) c.msdb = 'sigue'; });
      }
      if (tipoTr === 'revision_anual') {
        (tramiteDraftEquipo.valvulas || []).forEach(v => { if (!v.msb) v.msb = 'sigue'; });
      }

      // En una PRUEBA HIDRÁULICA la revisión del cilindro se hace AHORA: el
      // "revisado" queda con el mes/año en curso (pisa lo que traía el SIC) y
      // el CRPC con el primer centro de reprueba del taller.
      if (tramiteDraftCampos && tramiteDraftCampos.tipo === 'prueba_hidraulica') {
        const hoy = new Date();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const anio = String(hoy.getFullYear());
        const crpcDefault = centrosReprueba()[0] || '';
        (tramiteDraftEquipo.cilindros || []).forEach(c => {
          c.revisadoMes = mes; c.revisadoAnio = anio;
          if (crpcDefault) c.crpc = crpcDefault;
          // En prueba hidráulica el cilindro no se cambia: "Sin Cambios" (SC)
          // por defecto, también para el segundo cilindro traído del SIC.
          if (!c.msdb) c.msdb = 'sigue';
        });
        // (Las válvulas de la prueba hidráulica ya se arman arriba, al cargar
        // las del SIC: baja + montaje por cada una, reconstruidas desde el SIC.)
      }

      // Aviso: entre la renovación de la oblea (hoy) y el vencimiento de la
      // prueba hidráulica del cilindro no puede haber menos de 7 meses. Se
      // calcula con la fecha de revisión del cilindro + 5 años.
      const cilAviso = tramiteDraftEquipo.cilindros[0];
      if (cilAviso && cilAviso.revisadoMes && cilAviso.revisadoAnio) {
        const vencMesTotal = (Number(cilAviso.revisadoAnio) + 5) * 12 + (Number(cilAviso.revisadoMes) - 1);
        const hoy = new Date();
        const meses = vencMesTotal - (hoy.getFullYear() * 12 + hoy.getMonth());
        if (meses < 7) {
          const detalle = meses < 0
            ? `la prueba hidráulica del cilindro está VENCIDA hace ${Math.abs(meses)} mes(es)`
            : `faltan ${meses} mes(es) para el vencimiento de la prueba hidráulica del cilindro`;
          customAlert(`Atención: ${detalle}. Entre la renovación de la oblea y el vencimiento del cilindro no puede haber menos de 7 meses — revisalo antes de continuar.`, 'Atención — prueba hidráulica');
        }
      }

      if (aplicados.length > 0) {
        // Se reconoció algo: la caja ya cumplió su función, se cierra sola
        // en vez de esperar a que la cierren a mano. El borrador persistido
        // se actualiza con los datos recién aplicados, así una recarga o un
        // cierre de la app no los pierde antes de guardar.
        enargasPasteOpen = false;
        guardarSnapshotWizard();
        render();
      } else {
        render();
        const nuevoResultBox = root.querySelector('#enargas-paste-result');
        if (nuevoResultBox) {
          nuevoResultBox.className = 'agent-result err';
          nuevoResultBox.textContent = 'No reconocí datos con formato conocido en ese texto — completá a mano lo que falte.';
        }
      }
    }
    const textareaEnargasDoc = root.querySelector('#enargas-paste-text');
    // Pegar ya alcanza para cargar los datos — no hace falta tocar
    // "Aplicar" aparte. El setTimeout espera a que el navegador termine de
    // insertar el texto pegado en el campo antes de leer su valor.
    if (textareaEnargasDoc) textareaEnargasDoc.addEventListener('paste', () => setTimeout(aplicarEnargasDocumentacion, 0));

    // Botón grande "PEGAR LO COPIADO": lee el portapapeles directamente
    // (el navegador pide permiso la primera vez), así no hay que mantener
    // apretado el campo de texto para pegar.
    const btnPegarEnargas = root.querySelector('#btn-pegar-enargas');
    if (btnPegarEnargas) btnPegarEnargas.addEventListener('click', async () => {
      const estado = await estadoPermisoPortapapeles();
      // La primera vez, avisar ANTES de que Chrome muestre su pregunta de
      // permiso, para que el usuario sepa que hay que tocar "Permitir".
      if (estado === 'prompt' && !localStorage.getItem('gnc_aviso_pegado_rapido_v1')) {
        localStorage.setItem('gnc_aviso_pegado_rapido_v1', '1');
        await customAlert('Chrome te va a preguntar si Estelita puede ver el portapapeles. Tocá "Permitir" — es una sola vez y deja activado el pegado rápido para siempre.', 'Activar pegado rápido');
      }
      // Intento 1: leer el portapapeles directo. Si Chrome no lo permite,
      // plan B: recuadro enfocado + instrucción clara para pegar a mano
      // (el pegado manual dispara la carga automática igual).
      let texto = '';
      if (navigator.clipboard && navigator.clipboard.readText) {
        try { texto = await navigator.clipboard.readText(); } catch (e) { /* denegado, vamos al plan B */ }
      }
      if (texto && texto.trim()) {
        const ta = root.querySelector('#enargas-paste-text');
        if (ta) { ta.value = texto; aplicarEnargasDocumentacion(); }
        return;
      }
      const ta = root.querySelector('#enargas-paste-text');
      const box = root.querySelector('#enargas-paste-result');
      const necesitaPegadoManual = estado !== 'granted';
      if (box) {
        box.className = 'agent-result err';
        box.textContent = estado === 'denied'
          ? PORTAPAPELES_AYUDA_BLOQUEADO
          : (estado === 'granted'
            ? 'No había nada copiado — copiá el resultado en la página de ENARGAS y volvé a tocar el botón.'
            : 'Chrome no nos dejó leer lo copiado. Hacelo así: tocá el recuadro de acá abajo, mantené apretado y elegí "Pegar" — se carga solo igual.');
      }
      // Recién acá se muestra el recuadro de pegado manual (plan B) —
      // mientras el botón funciona solo, el recuadro no existe en pantalla.
      if (ta && necesitaPegadoManual) { ta.style.display = 'block'; ta.focus(); }
    });

    // Indicador del estado del pegado rápido dentro de la caja de ENARGAS:
    // muestra si el permiso está activado, sin activar (con botón para
    // activarlo con un toque) o bloqueado (con la ayuda para destrabarlo).
    if (root.querySelector('#pegado-rapido-estado')) {
      estadoPermisoPortapapeles().then(estado => {
        const el = root.querySelector('#pegado-rapido-estado');
        if (!el) return;
        if (estado === 'granted') {
          el.textContent = 'Pegado rápido: ✅ activado';
        } else if (estado === 'denied') {
          el.innerHTML = 'Pegado rápido: 🚫 bloqueado — <button type="button" class="license-link" id="btn-ayuda-portapapeles">ver cómo activarlo</button>';
          const b = el.querySelector('#btn-ayuda-portapapeles');
          if (b) b.addEventListener('click', () => customAlert(PORTAPAPELES_AYUDA_BLOQUEADO, 'Activar pegado rápido'));
        } else if (estado === 'prompt') {
          el.innerHTML = 'Pegado rápido: ⚠️ sin activar — <button type="button" class="license-link" id="btn-activar-portapapeles">tocá acá para activarlo</button>';
          const b = el.querySelector('#btn-activar-portapapeles');
          if (b) b.addEventListener('click', async () => {
            try { await navigator.clipboard.readText(); } catch (e) { /* eligió bloquear: el re-render lo mostrará */ }
            syncClienteDraftFromDOM();
            render();
          });
        } else {
          el.textContent = '';
        }
      });
    }


    // Reemplazo de regulador (Modificación): el actual pasa al bloque de
    // BAJA y el principal queda listo para cargar el regulador nuevo.
    const btnReemplazarRegulador = root.querySelector('#btn-reemplazar-regulador');
    if (btnReemplazarRegulador) btnReemplazarRegulador.addEventListener('click', () => {
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      tramiteDraftEquipo.reguladorBaja = {
        codigo: tramiteDraftEquipo.regulador.codigo,
        serie: tramiteDraftEquipo.regulador.serie,
        operacion: 'baja',
      };
      tramiteDraftEquipo.regulador = { codigo: '', serie: '', nuevoUsado: 'nuevo', operacion: 'montaje' };
      render();
    });

    const btnQuitarReguladorBaja = root.querySelector('#btn-quitar-regulador-baja');
    if (btnQuitarReguladorBaja) btnQuitarReguladorBaja.addEventListener('click', () => {
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      // Si todavía no se cargó el regulador nuevo, se restaura el que estaba.
      if (!tramiteDraftEquipo.regulador.codigo && !tramiteDraftEquipo.regulador.serie) {
        tramiteDraftEquipo.regulador = {
          codigo: tramiteDraftEquipo.reguladorBaja.codigo,
          serie: tramiteDraftEquipo.reguladorBaja.serie,
          nuevoUsado: 'usado', operacion: '',
        };
      }
      tramiteDraftEquipo.reguladorBaja = null;
      render();
    });

    const btnAddCilindro = root.querySelector('#btn-add-cilindro');
    if (btnAddCilindro) btnAddCilindro.addEventListener('click', () => {
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      // En una prueba hidráulica, el cilindro nuevo también arranca con el
      // revisado en curso y el CRPC del taller (la revisión los abarca a todos).
      const esPH = tramiteDraftCampos && tramiteDraftCampos.tipo === 'prueba_hidraulica';
      const hoy = new Date();
      tramiteDraftEquipo.cilindros.push({
        codigo: '', serie: '', periodicidad: '5', nuevoUsado: 'usado', fabricadoMes: '', fabricadoAnio: '',
        revisadoMes: esPH ? String(hoy.getMonth() + 1).padStart(2, '0') : '',
        revisadoAnio: esPH ? String(hoy.getFullYear()) : '',
        crpc: esPH ? (centrosReprueba()[0] || '') : '',
        msdb: esPH ? 'sigue' : '',
      });
      render();
    });

    root.querySelectorAll('[data-remove-cilindro]').forEach(btn => {
      btn.addEventListener('click', () => {
        syncEquipoFromDOM();
        syncTramiteCamposFromDOM();
        const i = Number(btn.getAttribute('data-remove-cilindro'));
        if (tramiteDraftEquipo.cilindros.length > 1) tramiteDraftEquipo.cilindros.splice(i, 1);
        render();
      });
    });

    const btnAddValvula = root.querySelector('#btn-add-valvula');
    if (btnAddValvula) btnAddValvula.addEventListener('click', () => {
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      tramiteDraftEquipo.valvulas.push({ codigo: '', serie: '', msb: '' });
      render();
    });

    root.querySelectorAll('[data-remove-valvula]').forEach(btn => {
      btn.addEventListener('click', () => {
        syncEquipoFromDOM();
        syncTramiteCamposFromDOM();
        const i = Number(btn.getAttribute('data-remove-valvula'));
        if (tramiteDraftEquipo.valvulas.length > 1) tramiteDraftEquipo.valvulas.splice(i, 1);
        render();
      });
    });

    // Guarda de una sola vez los datos del cliente (pasos 1 y 2 del
    // asistente) y el trámite (paso 3) — antes eran dos guardados separados
    // (Documentación y Trámite); ahora es un único paso final.
    async function guardarClienteYTramite(estadoForzado) {
      if (!clienteDraft) return;
      syncClienteDraftFromDOM();
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();

      const nombre = (clienteDraft.nombre || '').trim();
      if (!nombre) { await customAlert('Poné al menos el nombre del cliente.'); wizardStep = 1; render(); return; }
      const telefono = (clienteDraft.telefono || '').trim();
      if (!telefono) { await customAlert('El teléfono es obligatorio para poder guardar.'); wizardStep = 1; render(); return; }
      const patente = (clienteDraft.patente || '').trim().toUpperCase();
      if (!patente) { await customAlert('La patente es obligatoria para poder guardar.'); wizardStep = 1; render(); return; }

      const tipo = tramiteDraftCampos.tipo;
      const fecha = tramiteDraftCampos.fecha;
      if (!fecha) { await customAlert('Poné una fecha para el trámite.'); return; }

      // Una MODIFICACIÓN es un reemplazo: exige un componente dado de BAJA
      // y su reemplazo en MONTAJE, del mismo tipo (cilindro por cilindro,
      // regulador por regulador). Sin eso no se puede guardar ni enviar.
      if (tipo === 'modificacion') {
        const eq = tramiteDraftEquipo;
        const parRegulador = !!eq.reguladorBaja && eq.regulador.operacion === 'montaje';
        const parCilindro = eq.cilindros.some(c => c.msdb === 'baja') && eq.cilindros.some(c => c.msdb === 'montaje');
        if (!parRegulador && !parCilindro) {
          const eleccion = await mostrarModal({
            titulo: 'Modificación incompleta',
            mensaje: 'Una Modificación es un reemplazo: necesita un componente dado de BAJA y su reemplazo en MONTAJE, del mismo tipo (cilindro por cilindro, regulador por regulador). Para el regulador, usá el botón "Reemplazar regulador" del paso 2; para el cilindro, marcá el viejo en Baja y agregá el nuevo en Montaje. Si en realidad no es una modificación, cambiá el tipo de trámite.',
            danger: true,
            botones: [
              { label: 'Cambiar tipo de trámite', value: 'tipo', variant: 'ghost' },
              { label: 'Corregir el equipo', value: 'corregir', variant: 'primary' },
            ],
          });
          if (eleccion === 'tipo') {
            const elegido = await mostrarModalTipoFecha({ tipo, fecha, pecIndex: tramiteDraftCampos.pecIndex });
            if (elegido) {
              tramiteDraftCampos.tipo = elegido.tipo;
              tramiteDraftCampos.fecha = elegido.fecha;
              if (Number.isInteger(elegido.pecIndex)) tramiteDraftCampos.pecIndex = elegido.pecIndex;
              render();
            }
          } else if (eleccion === 'corregir') {
            wizardStep = 2;
            render();
          }
          return;
        }
      }

      if (equipoTieneBaja(tramiteDraftEquipo)) {
        const partes = [];
        if (tramiteDraftEquipo.regulador.operacion === 'baja') partes.push('Regulador');
        if (tramiteDraftEquipo.reguladorBaja) partes.push(`Regulador ${[tramiteDraftEquipo.reguladorBaja.codigo, tramiteDraftEquipo.reguladorBaja.serie].filter(Boolean).join(' ') || '(reemplazado)'}`);
        tramiteDraftEquipo.cilindros.forEach((c, i) => { if (c.msdb === 'baja') partes.push(`Cilindro ${i + 1}`); });
        tramiteDraftEquipo.valvulas.forEach((v, i) => { if (v.msb === 'baja') partes.push(`Válvula ${i + 1}`); });
        const ok = await customConfirm(`Atención TDM: vas a dar de BAJA — ${partes.join(', ')}. ¿Confirmás que querés continuar con el trámite?`, { titulo: 'Confirmar baja', danger: true, okLabel: 'Continuar' });
        if (!ok) return;
      }

      const data = {
        nombre, telefono, patente,
        titular: (clienteDraft.titular || '').trim(),
        dni: (clienteDraft.dni || '').trim(),
        tipo_documento: clienteDraft.tipo_documento,
        domicilio: (clienteDraft.domicilio || '').trim(),
        cpa: (clienteDraft.cpa || '').trim() || cpaDeCiudad(clienteDraft.ciudad),
        provincia: (clienteDraft.provincia || '').trim(),
        ciudad: (clienteDraft.ciudad || '').trim(),
        marca: (clienteDraft.marca || '').trim(),
        modelo: (clienteDraft.modelo || '').trim(),
        anio: (clienteDraft.anio || '').trim(),
        inyeccion: clienteDraft.inyeccion,
        uso: clienteDraft.uso,
      };

      // Un trámite en curso puede haberse autoguardado ya como Pendiente
      // (opción b): en ese caso reusamos ese mismo cliente y trámite en vez
      // de crear duplicados.
      const efectivoClienteId = editingId || autosaveClienteId;
      let clientId;
      const idxEf = efectivoClienteId ? clientes.findIndex(c => c.id === efectivoClienteId) : -1;
      if (idxEf !== -1) {
        clientId = efectivoClienteId;
        clientes[idxEf] = { ...clientes[idxEf], ...data };
      } else {
        // Anti-duplicado: si ya existe un cliente con esta patente, se le suma
        // el trámite en vez de crear uno repetido (conserva sus turnos/datos).
        const existente = clientePorPatente(data.patente);
        if (existente) {
          clientId = existente.id;
          const iEx = clientes.findIndex(c => c.id === clientId);
          clientes[iEx] = fusionarClienteData(clientes[iEx], data);
        } else {
          clientId = 'c' + Date.now() + Math.random().toString(36).slice(2, 7);
          clientes.push({ id: clientId, ...blankClienteBase(), ...data, tramites: [], ultimoAvisoMes: {}, notas: '' });
        }
      }

      try {
        // Solo se toca la documentación guardada si el usuario cambió las
        // fotos en este trámite. Si arrancó en blanco y no las tocó, se
        // dejan intactas las que ya tenía el cliente.
        if (fotosEditadas) {
          const anyPhoto = Object.values(scanFiles).some(v => v);
          if (anyPhoto) {
            await window.storage.set(`fotos:${clientId}`, JSON.stringify(scanFiles), false);
            clientesConFotos.add(clientId);
            // Marca de tiempo de las fotos: la sincronización la usa para
            // saber qué dispositivo tiene la versión más nueva.
            const cFoto = clientes.find(x => x.id === clientId);
            if (cFoto) cFoto.fotosTs = new Date().toISOString();
          } else {
            try { await window.storage.delete(`fotos:${clientId}`, false); } catch (e) { /* no existía, ok */ }
            clientesConFotos.delete(clientId);
          }
        }
      } catch (e) {
        console.error('Error guardando fotos', e);
        await customAlert('Los datos se guardaron, pero hubo un problema guardando las fotos (puede que sean muy pesadas). Probá sacándolas de nuevo.');
      }

      const idx = clientes.findIndex(c => c.id === clientId);
      // El estado lo define la acción, no un selector: "Enviar al PEC" fuerza
      // 'enviado'; guardar (o "Guardar y salir") lo deja en 'pendiente'.
      const estadoPec = estadoForzado || 'pendiente';
      const detalle = (tramiteDraftCampos.detalle || '').trim();
      const motivoIncompleto = '';
      const obleaAnterior = (tramiteDraftCampos.obleaAnterior || '').trim();
      const obleaNueva = (tramiteDraftCampos.obleaNueva || '').trim();

      const efectivoTramiteId = editingTramiteId || autosaveTramiteId;
      let savedTramiteId;
      if (efectivoTramiteId && clientes[idx].tramites.some(t => t.id === efectivoTramiteId)) {
        const tIdx = clientes[idx].tramites.findIndex(t => t.id === efectivoTramiteId);
        if (tIdx !== -1) {
          const prev = clientes[idx].tramites[tIdx];
          clientes[idx].tramites[tIdx] = {
            ...prev,
            tipo, fecha, equipo: tramiteDraftEquipo, detalle, estadoPec, motivoIncompleto,
            obleaAnterior, obleaNueva,
            pecIndex: (tramiteDraftCampos && Number.isInteger(tramiteDraftCampos.pecIndex)) ? tramiteDraftCampos.pecIndex : (prev.pecIndex || 0),
            revisionId: (tramiteDraftCampos && tramiteDraftCampos.revisionId) || prev.revisionId || null,
            revisionEstado: (tramiteDraftCampos && tramiteDraftCampos.revisionEstado) || prev.revisionEstado || null,
            revisionObs: (tramiteDraftCampos && tramiteDraftCampos.revisionObs) || '',
            revisionOverride: !!(tramiteDraftCampos && tramiteDraftCampos.revisionOverride),
            revisionLog: (tramiteDraftCampos && tramiteDraftCampos.revisionLog && tramiteDraftCampos.revisionLog.length) ? tramiteDraftCampos.revisionLog : (prev.revisionLog || []),
            firma: currentSignature || prev.firma,
          };
          savedTramiteId = prev.id;
        }
      } else {
        savedTramiteId = 't' + Date.now() + Math.random().toString(36).slice(2, 7);
        clientes[idx].tramites.push({
          id: savedTramiteId,
          tipo, fecha, equipo: tramiteDraftEquipo, detalle, estadoPec, motivoIncompleto,
          obleaAnterior, obleaNueva,
          pecIndex: (tramiteDraftCampos && Number.isInteger(tramiteDraftCampos.pecIndex)) ? tramiteDraftCampos.pecIndex : 0,
          revisionId: (tramiteDraftCampos && tramiteDraftCampos.revisionId) || null,
          revisionEstado: (tramiteDraftCampos && tramiteDraftCampos.revisionEstado) || null,
          revisionObs: (tramiteDraftCampos && tramiteDraftCampos.revisionObs) || '',
          revisionOverride: !!(tramiteDraftCampos && tramiteDraftCampos.revisionOverride),
          revisionLog: (tramiteDraftCampos && tramiteDraftCampos.revisionLog) || [],
          firma: currentSignature,
          creadoEn: new Date().toISOString(),
        });
      }
      const primerCilindro = tramiteDraftEquipo.cilindros[0];
      if (tipo === 'prueba_hidraulica') {
        clientes[idx].fecha_crpc = fecha.slice(0, 7);
      } else if (primerCilindro && primerCilindro.revisadoMes && primerCilindro.revisadoAnio) {
        // Si el equipo se cargó por ENARGAS y ya trae una fecha de revisión
        // del cilindro, la usamos para mantener la Prueba Hidráulica al día
        // aunque el trámite de hoy sea de otro tipo.
        clientes[idx].fecha_crpc = `${primerCilindro.revisadoAnio}-${String(primerCilindro.revisadoMes).padStart(2, '0')}`;
      }
      // La Revisión Anual (y una Conversión, que también entrega oblea nueva)
      // renuevan la habilitación por 1 año — antes esto no se reflejaba en la
      // tarjeta del cliente y la fecha de vencimiento de Oblea quedaba vieja.
      if (tipo === 'revision_anual' || tipo === 'conversion') clientes[idx].fecha_oblea = pecFechaMasUnAnio(fecha);
      if (primerCilindro && primerCilindro.periodicidad) clientes[idx].tipo_cilindro = primerCilindro.periodicidad;
      clientes[idx].ultimoEquipoConocido = {
        regulador: { ...tramiteDraftEquipo.regulador },
        cilindros: tramiteDraftEquipo.cilindros.map(c => ({ ...c })),
        valvulas: tramiteDraftEquipo.valvulas.map(v => ({ ...v })),
        otros: JSON.parse(JSON.stringify(tramiteDraftEquipo.otros)),
      };

      await saveClientes();
      cerrarWizard();
      render();
      return { clienteId: clientId, tramiteId: savedTramiteId };
    }

    const btnSaveTramite = root.querySelector('#btn-save-tramite');
    if (btnSaveTramite) btnSaveTramite.addEventListener('click', () => guardarClienteYTramite(null));

    // --- Revisión del técnico (paso 1) ---
    async function enviarRevisionAlTecnico() {
      syncClienteDraftFromDOM();
      syncEquipoFromDOM();
      const rev = armarRevision();
      if (!rev.patente) { await customAlert('Cargá la patente antes de enviar la revisión al técnico.'); return; }
      if (!rev.componentes.length) { await customAlert('Todavía no hay componentes cargados (regulador, cilindro, válvula). Cargalos con la consulta a ENARGAS o a mano antes de enviar al técnico.'); return; }
      try {
        const r = await apiTecnicoTaller({ accion: 'revision-crear', revision: rev });
        tramiteDraftCampos.revisionId = rev.id;
        tramiteDraftCampos.revisionEstado = 'pendiente';
        tramiteDraftCampos.revisionObs = '';
        tramiteDraftCampos.revisionOverride = false;
        pushRevisionLog(tramiteDraftCampos, 'enviada', '');
        syncTramiteCamposFromDOM();
        render();
        if (!r.notificados) {
          await customAlert('La revisión se envió, pero ningún celular de técnico tiene las notificaciones activas — avisale que abra la app Estelita Técnico.', 'Revisión enviada');
        }
      } catch (e) {
        await customAlert('No se pudo enviar la revisión: ' + (e.message || e));
      }
    }
    const btnEnviarTecnico = root.querySelector('#btn-enviar-tecnico');
    if (btnEnviarTecnico) btnEnviarTecnico.addEventListener('click', enviarRevisionAlTecnico);
    const btnReenviarTecnico = root.querySelector('#btn-reenviar-tecnico');
    if (btnReenviarTecnico) btnReenviarTecnico.addEventListener('click', enviarRevisionAlTecnico);
    const btnRevisionOverride = root.querySelector('#btn-revision-override');
    if (btnRevisionOverride) btnRevisionOverride.addEventListener('click', async () => {
      const ok = await customConfirm('¿Marcar este trámite como revisado en el taller, sin esperar la respuesta del técnico?', { titulo: 'Revisado en el taller', okLabel: 'Marcar revisado' });
      if (!ok) return;
      syncClienteDraftFromDOM();
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      tramiteDraftCampos.revisionOverride = true;
      render();
    });

    // Imprimir "solo los datos" sobre la planilla preimpresa — usa los
    // borradores actuales, no hace falta guardar antes.
    const btnImprimirDatos = root.querySelector('#btn-imprimir-datos');
    if (btnImprimirDatos) btnImprimirDatos.addEventListener('click', async () => {
      syncClienteDraftFromDOM();
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      const t = tramiteDraftCampos || {};
      const clienteTmp = { ...blankClienteBase(), ...(clienteDraft || {}) };
      const tramiteTmp = {
        tipo: t.tipo, fecha: t.fecha, detalle: t.detalle || '',
        obleaAnterior: t.obleaAnterior || '', obleaNueva: t.obleaNueva || '',
        pecIndex: Number.isInteger(t.pecIndex) ? t.pecIndex : 0,
        equipo: tramiteDraftEquipo || blankEquipo(null),
      };
      try {
        if (!localStorage.getItem('gnc_hint_imprimir_v1')) {
          localStorage.setItem('gnc_hint_imprimir_v1', '1');
          await customAlert('Se abre un PDF con SOLO los datos, ubicados donde caen los casilleros de la planilla. Poné la planilla ya impresa en la impresora e imprimí al 100% (tamaño real, sin "ajustar a la página"). La firma del cliente va a mano sobre el papel. Si los datos salen corridos, en "Configurar datos del taller" está el ajuste de impresión en milímetros.', 'Imprimir solo los datos');
        }
        btnImprimirDatos.disabled = true;
        const blob = await generarPecPdfSoloDatos(clienteTmp, tramiteTmp);
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      } catch (e) {
        console.error(e);
        await customAlert('No se pudo generar el PDF de impresión: ' + (e.message || e));
      } finally {
        btnImprimirDatos.disabled = false;
      }
    });

    // Imprimir la planilla del centro de reprueba (GNC Segurgas), solo en
    // prueba hidráulica, con todos los cilindros.
    const btnImprimirCrpc = root.querySelector('#btn-imprimir-crpc');
    if (btnImprimirCrpc) btnImprimirCrpc.addEventListener('click', async () => {
      syncClienteDraftFromDOM();
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      const t = tramiteDraftCampos || {};
      const clienteTmp = { ...blankClienteBase(), ...(clienteDraft || {}) };
      const tramiteTmp = {
        tipo: t.tipo, fecha: t.fecha, obleaAnterior: t.obleaAnterior || '', obleaNueva: t.obleaNueva || '',
        pecIndex: Number.isInteger(t.pecIndex) ? t.pecIndex : 0,
        equipo: tramiteDraftEquipo || blankEquipo(null),
      };
      try {
        if (!localStorage.getItem('gnc_hint_crpc_v1')) {
          localStorage.setItem('gnc_hint_crpc_v1', '1');
          await customAlert('Se abre la planilla del centro de reprueba con SOLO los datos, para imprimir sobre el formulario preimpreso (al 100%, tamaño real). Marca, Capacidad y Observación del cilindro van a mano. Esta primera versión hay que calibrarla: imprimila, sacale una foto y me la pasás para ajustar dónde cae cada dato.', 'Planilla del centro de reprueba');
        }
        btnImprimirCrpc.disabled = true;
        const blob = await generarCrpcPdfSoloDatos(clienteTmp, tramiteTmp);
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      } catch (e) {
        console.error(e);
        await customAlert('No se pudo generar la planilla de reprueba: ' + (e.message || e));
      } finally {
        btnImprimirCrpc.disabled = false;
      }
    });

    const btnSendPecTramite = root.querySelector('#btn-send-pec-tramite');
    if (btnSendPecTramite) btnSendPecTramite.addEventListener('click', async () => {
      if (!(await confirmarTitularBaja(tramiteDraftCampos && tramiteDraftCampos.tipo))) return;
      // Si la revisión del técnico está en camino y no fue aprobada, avisar
      // antes de enviar (se puede destrabar a mano acá mismo).
      const rc = tramiteDraftCampos || {};
      if (rc.revisionId && rc.revisionEstado !== 'aprobada' && !rc.revisionOverride) {
        const motivo = rc.revisionEstado === 'observada'
          ? `El técnico informó un problema: ${rc.revisionObs || 'sin detalle'}.`
          : 'El técnico todavía no respondió la revisión.';
        const ok = await customConfirm(`${motivo} ¿Enviar al PEC igual, marcándolo como revisado en el taller?`, { titulo: 'Revisión del técnico', danger: true, okLabel: 'Enviar igual' });
        if (!ok) return;
        rc.revisionOverride = true;
      }
      const resultado = await guardarClienteYTramite('enviado');
      if (!resultado) return;
      const cliente = clientes.find(c => c.id === resultado.clienteId);
      const tramite = cliente && cliente.tramites.find(t => t.id === resultado.tramiteId);
      if (!cliente || !tramite) return;
      try {
        // Al PEC va el "solo datos" (para su planilla preimpresa) + las fotos
        // de documentación adjuntas; la firma va en papel, no en el PDF.
        const blob = await generarPecPdfSoloDatos(cliente, tramite, { conFotos: true });
        const filename = `PEC_${(cliente.patente || cliente.nombre || 'tramite').replace(/\s+/g, '_')}_${tramite.fecha || ''}.pdf`;
        const fotosIncluidas = clientesConFotos.has(cliente.id) ? 1 : 0;
        await compartirPecPdf(blob, filename, cliente, fotosIncluidas, pecDeTramite(tramite));
        cerrarRevisionTecnico(tramite);
      } catch (e) {
        console.error(e);
        await customAlert('El trámite se guardó y se marcó como enviado, pero no se pudo generar el PDF: ' + (e && e.message ? e.message : e));
      }
    });

    root.querySelectorAll('[data-tramite-status]').forEach(sel => {
      sel.addEventListener('change', async () => {
        const clienteId = sel.getAttribute('data-tramite-status');
        const tramiteId = sel.getAttribute('data-tramite-id');
        const c = clientes.find(x => x.id === clienteId);
        if (!c) return;
        const t = c.tramites.find(x => x.id === tramiteId);
        if (!t) return;
        t.estadoPec = sel.value;
        if (sel.value === 'enviado' && !t.enviadoEn) t.enviadoEn = new Date().toISOString();
        t.motivoIncompleto = '';
        await saveClientes();
        render();
      });
    });

    // Check "Oblea lista para retirar": marca cuando la oblea volvió del PEC.
    // Queda registrado en el trámite (con fecha) para poder consultarlo desde
    // afuera (integración con el CRM de WhatsApp) y avisarle al cliente.
    root.querySelectorAll('[data-oblea-lista]').forEach(chk => {
      chk.addEventListener('change', async () => {
        const clienteId = chk.getAttribute('data-oblea-lista');
        const tramiteId = chk.getAttribute('data-oblea-tramite');
        const c = clientes.find(x => x.id === clienteId);
        if (!c) return;
        const t = (c.tramites || []).find(x => x.id === tramiteId);
        if (!t) return;
        t.obleaLista = chk.checked;
        t.obleaListaEn = chk.checked ? new Date().toISOString() : null;
        await saveClientes();
        render();
      });
    });

  }

  boot();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
</body>
</html>

    const ta = root.querySelector('#enargas-paste-text');
    if (ta) {
      ta.value = texto;
      // Dispara el mismo camino que un pegado manual (el listener de
      // "paste" de la caja aplica los datos y cierra la caja solo).
      ta.dispatchEvent(new Event('paste'));
    }
    return true;
  }

  // Al volver de la pestaña de ENARGAS: si el portapapeles tiene algo que
  // parece un resultado de la consulta, se carga solo. El navegador puede
  // pedir permiso de lectura del portapapeles la primera vez.
  window.addEventListener('focus', async () => {
    if (!esperandoEnargas) return;
    if (!showForm && !editingId) { esperandoEnargas = false; return; }
    if (!navigator.clipboard || !navigator.clipboard.readText) return;
    // Solo intentar la lectura automática si el permiso ya está concedido —
    // pedir permiso sin un toque del usuario falla siempre y puede dejar el
    // permiso bloqueado para el sitio (rompería también el botón de pegar).
    try {
      const perm = await navigator.permissions.query({ name: 'clipboard-read' });
      if (perm.state !== 'granted') return;
    } catch (e) { /* navegador sin permissions API para clipboard: probamos igual */ }
    let texto = '';
    try { texto = await navigator.clipboard.readText(); } catch (e) { return; }
    cargarTextoEnargas(texto);
  });

  // Si se intenta cerrar la ventana/pestaña con un trámite a medias, el
  // navegador pregunta antes de salir — y pase lo que pase, el borrador ya
  // quedó persistido para retomarlo al volver.
  window.addEventListener('beforeunload', (e) => {
    if (showForm || editingId) {
      guardarSnapshotWizard();
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // Borrador del asistente en localStorage: se guarda al salir hacia
  // ENARGAS, para que el trámite sobreviva si Android mata la app mientras
  // el usuario está en la otra pestaña, o si vuelve vía "Compartir" (el
  // share target relanza la app y el estado en memoria se pierde).
  const WIZARD_SNAPSHOT_KEY = 'gnc_wizard_snapshot_v1';
  function guardarSnapshotWizard() {
    try {
      localStorage.setItem(WIZARD_SNAPSHOT_KEY, JSON.stringify({
        ts: Date.now(),
        editingId, showForm, wizardStep, editingTramiteId, modoSoloDatos,
        clienteDraft, tramiteDraftEquipo, tramiteDraftCampos, currentSignature,
        // Ids del autoguardado: si la app se reabre tras un corte, el trámite
        // restaurado sigue apuntando al mismo pendiente (no se duplica).
        autosaveClienteId, autosaveTramiteId, autosaveClienteCreado,
        // Las fotos también viajan en el borrador — eran lo primero que se
        // perdía si Android mataba la app o se cerraba la pestaña.
        scanFiles: { ...scanFiles }, fotosEditadas,
      }));
    } catch (e) { /* localStorage lleno: seguimos sin snapshot */ }
  }
  function limpiarSnapshotWizard() {
    try { localStorage.removeItem(WIZARD_SNAPSHOT_KEY); } catch (e) { /* ok */ }
  }

  // Autoguardado del trámite en curso como Pendiente. Corre cada pocos
  // segundos mientras el asistente está abierto: así, si el celular se apaga
  // o Android mata la app, el trámite ya figura en Pendientes con todo lo
  // cargado. Reusa el mismo cliente/trámite en cada pasada (no duplica) y
  // NO toca los datos de un cliente ya existente hasta que se guarde a
  // propósito.
  // Fusiona datos nuevos sobre un cliente que ya existe, sin borrar lo que ya
  // tenía: solo pisa un campo si el valor nuevo no está vacío. Conserva
  // trámites, turnos, fecha_oblea, etc. (que no vienen en `data`).
  function fusionarClienteData(existing, data) {
    const merged = { ...existing };
    Object.entries(data).forEach(([k, v]) => {
      if (v !== undefined && v !== null && v !== '') merged[k] = v;
    });
    return merged;
  }
  // Busca un cliente ya cargado con la misma patente (ignorando mayúsculas,
  // espacios y guiones). Sirve para no duplicar cuando el cliente ya existía
  // (por ejemplo, creado al agendar un turno).
  function clientePorPatente(patente) {
    const n = (patente || '').toUpperCase().replace(/[\s-]/g, '');
    if (!n) return null;
    return clientes.find(c => (c.patente || '').toUpperCase().replace(/[\s-]/g, '') === n) || null;
  }
  async function autoguardarBorradorTramite() {
    if (!clienteDraft || !tramiteDraftEquipo || !tramiteDraftCampos) return;
    if (modoSoloDatos) return;    // "Actualizar datos" no genera trámite
    if (editingTramiteId) return; // editar un trámite ya existente: ya está guardado
    syncClienteDraftFromDOM();
    syncEquipoFromDOM();
    syncTramiteCamposFromDOM();
    const nombre = (clienteDraft.nombre || '').trim();
    const telefono = (clienteDraft.telefono || '').trim();
    const patente = (clienteDraft.patente || '').trim().toUpperCase();
    if (!nombre || !telefono || !patente) return; // todavía no hay lo mínimo para guardar

    const data = {
      nombre, telefono, patente,
      dni: (clienteDraft.dni || '').trim(),
      tipo_documento: clienteDraft.tipo_documento,
      domicilio: (clienteDraft.domicilio || '').trim(),
      cpa: (clienteDraft.cpa || '').trim() || cpaDeCiudad(clienteDraft.ciudad),
      provincia: (clienteDraft.provincia || '').trim(),
      ciudad: (clienteDraft.ciudad || '').trim(),
      marca: (clienteDraft.marca || '').trim(),
      modelo: (clienteDraft.modelo || '').trim(),
      anio: (clienteDraft.anio || '').trim(),
      inyeccion: clienteDraft.inyeccion,
      uso: clienteDraft.uso,
    };
    const tramiteData = {
      tipo: tramiteDraftCampos.tipo,
      fecha: tramiteDraftCampos.fecha,
      equipo: tramiteDraftEquipo,
      detalle: (tramiteDraftCampos.detalle || '').trim(),
      estadoPec: 'pendiente',
      motivoIncompleto: '',
      obleaAnterior: (tramiteDraftCampos.obleaAnterior || '').trim(),
      obleaNueva: (tramiteDraftCampos.obleaNueva || '').trim(),
      pecIndex: Number.isInteger(tramiteDraftCampos.pecIndex) ? tramiteDraftCampos.pecIndex : 0,
      firma: currentSignature || null,
      autoguardado: true,
    };

    // Si nada cambió desde el último autoguardado, no reescribir (evita subir
    // la copia cifrada a la nube en cada tecla).
    const hash = JSON.stringify([data, tramiteData]);
    if (hash === autosaveHash) return;

    let clientId;
    if (editingId && clientes.some(c => c.id === editingId)) {
      // Cliente ya existente: solo le sumamos el trámite pendiente, sin pisar
      // sus datos hasta que se guarde a propósito.
      clientId = editingId;
      autosaveClienteCreado = false;
    } else if (autosaveClienteId && clientes.some(c => c.id === autosaveClienteId)) {
      clientId = autosaveClienteId;
      const i0 = clientes.findIndex(c => c.id === clientId);
      clientes[i0] = { ...clientes[i0], ...data };
    } else {
      // Anti-duplicado: si ya hay un cliente con esta patente (ej. creado al
      // agendar un turno), se le suma el trámite en vez de crear uno repetido.
      // autosaveClienteCreado queda en false para que, si se cancela, NO se
      // borre ese cliente que ya existía.
      const existente = clientePorPatente(data.patente);
      if (existente) {
        clientId = existente.id;
        const i0 = clientes.findIndex(c => c.id === clientId);
        clientes[i0] = fusionarClienteData(clientes[i0], data);
        autosaveClienteCreado = false;
      } else {
        clientId = 'c' + Date.now() + Math.random().toString(36).slice(2, 7);
        clientes.push({ id: clientId, ...blankClienteBase(), ...data, tramites: [], ultimoAvisoMes: {}, notas: '' });
        autosaveClienteCreado = true;
      }
    }
    autosaveClienteId = clientId;

    const idx = clientes.findIndex(c => c.id === clientId);
    if (idx === -1) return;
    if (autosaveTramiteId && clientes[idx].tramites.some(t => t.id === autosaveTramiteId)) {
      const ti = clientes[idx].tramites.findIndex(t => t.id === autosaveTramiteId);
      clientes[idx].tramites[ti] = { ...clientes[idx].tramites[ti], ...tramiteData };
    } else {
      autosaveTramiteId = 't' + Date.now() + Math.random().toString(36).slice(2, 7);
      clientes[idx].tramites.push({ id: autosaveTramiteId, ...tramiteData, creadoEn: new Date().toISOString() });
    }

    // Fotos: solo si el usuario las cambió; nunca borra las ya guardadas.
    try {
      if (fotosEditadas && Object.values(scanFiles).some(v => v)) {
        await window.storage.set(`fotos:${clientId}`, JSON.stringify(scanFiles), false);
        clientesConFotos.add(clientId);
      }
    } catch (e) { /* fotos pesadas: sigue; el guardado real reintenta */ }

    autosaveHash = hash;
    await saveClientes(false); // persiste local sin forzar subida a la nube en cada tick
  }

  // "Salir sin guardar": borra lo que el autoguardado hubiera dejado.
  async function descartarBorradorAutoguardado() {
    if (autosaveClienteId) {
      const idx = clientes.findIndex(c => c.id === autosaveClienteId);
      if (idx !== -1) {
        const cli = clientes[idx];
        if (autosaveTramiteId) cli.tramites = (cli.tramites || []).filter(t => t.id !== autosaveTramiteId);
        // Si el cliente lo creó el autoguardado y quedó sin trámites, lo
        // sacamos (no dejamos un cliente fantasma).
        if (autosaveClienteCreado && (cli.tramites || []).length === 0) {
          clientes.splice(idx, 1);
          try { await window.storage.delete(`fotos:${autosaveClienteId}`, false); } catch (e) { /* no existía */ }
          clientesConFotos.delete(autosaveClienteId);
        }
        await saveClientes(false);
      }
    }
    autosaveClienteId = null; autosaveTramiteId = null; autosaveClienteCreado = false; autosaveHash = null;
  }

  // Al abrir la app: si venimos de un "Compartir" de Android (query
  // ?compartido=...) o el asistente quedó a medias yendo a ENARGAS,
  // restaurar el borrador y cargar el texto compartido.
  async function procesarCompartidoORestaurar() {
    const params = new URLSearchParams(window.location.search);
    const compartido = params.get('compartido') || '';
    if (params.has('compartido') || params.has('compartido_titulo') || params.has('compartido_url')) {
      // Limpiar la URL para que un reload no re-aplique lo mismo.
      try { history.replaceState(null, '', window.location.pathname); } catch (e) { /* ok */ }
    }

    let snap = null;
    try { snap = JSON.parse(localStorage.getItem(WIZARD_SNAPSHOT_KEY) || 'null'); } catch (e) { /* ok */ }
    // 12 horas de vida: un trámite empezado a la mañana se retoma a la
    // tarde con todo lo cargado (el usuario pidió que no se pierda nada
    // al salir de la app).
    const snapFresco = snap && snap.ts && (Date.now() - snap.ts) < 12 * 60 * 60 * 1000;

    // Restaurar el asistente si no hay uno abierto y el borrador es reciente.
    if (snapFresco && !showForm && !editingId && (snap.showForm || snap.editingId)) {
      editingId = snap.editingId || null;
      showForm = !!snap.showForm;
      wizardStep = snap.wizardStep || 1;
      editingTramiteId = snap.editingTramiteId || null;
      modoSoloDatos = !!snap.modoSoloDatos;
      clienteDraft = snap.clienteDraft || null;
      tramiteDraftEquipo = snap.tramiteDraftEquipo || null;
      tramiteDraftCampos = snap.tramiteDraftCampos || null;
      currentSignature = snap.currentSignature || null;
      autosaveClienteId = snap.autosaveClienteId || null;
      autosaveTramiteId = snap.autosaveTramiteId || null;
      autosaveClienteCreado = !!snap.autosaveClienteCreado;
      if (snap.scanFiles) Object.assign(scanFiles, snap.scanFiles);
      fotosEditadas = !!snap.fotosEditadas;
      esperandoEnargas = !compartido; // si ya llegó texto compartido, no hay que esperar el portapapeles
      render();
    }

    if (compartido) {
      if (showForm || editingId) {
        const cargado = cargarTextoEnargas(compartido);
        if (!cargado) await customAlert('Recibimos lo que compartiste, pero no parece un resultado de la consulta de ENARGAS. Fijate de seleccionar todo el texto del detalle antes de compartir.');
      } else {
        await customAlert('Recibimos el resultado de ENARGAS, pero no hay ningún trámite abierto. Abrí el trámite del cliente y volvé a compartirlo, o pegalo con el botón "Pegar resultado".');
      }
    }
  }
  let reminderBannerOpen = false;
  const scanFiles = { 'foto1': null, 'foto2': null };
  // true en cuanto el usuario saca, quita o carga (documentación guardada)
  // una foto en este trámite. Solo si es true el guardado sincroniza las
  // fotos del cliente — así "Inicio de trámite" puede arrancar sin fotos en
  // pantalla SIN borrar la documentación ya guardada del cliente.
  let fotosEditadas = false;
  let currentSignature = null;
  let tramiteDraftEquipo = null;
  // Borrador de los campos "sueltos" del trámite (tipo/fecha/observaciones/
  // estado/motivo/oblea) que no viven en tramiteDraftEquipo — mismo problema
  // y misma solución que clienteDraft: sin esto, cualquier render() a mitad
  // de carga (ej. al abrir o aplicar la caja de pegado de ENARGAS) borraba
  // lo que ya se había tipeado, porque wizardPaso3() se reconstruye desde
  // el trámite GUARDADO (o en blanco si es nuevo), no desde el DOM.
  let tramiteDraftCampos = null;
  function blankTramiteCampos(t) {
    return {
      tipo: (t && t.tipo) || TRAMITE_TIPOS[0].value,
      fecha: (t && t.fecha) || new Date().toISOString().slice(0, 10),
      detalle: (t && t.detalle) || '',
      estado: (t && t.estadoPec) || 'pendiente',
      motivo: (t && t.motivoIncompleto) || '',
      obleaAnterior: (t && t.obleaAnterior) || '',
      obleaNueva: (t && t.obleaNueva) || '',
      pecIndex: (t && Number.isInteger(t.pecIndex)) ? t.pecIndex : 0,
      revisionId: (t && t.revisionId) || null,
      revisionEstado: (t && t.revisionEstado) || null,
      revisionObs: (t && t.revisionObs) || '',
      revisionOverride: !!(t && t.revisionOverride),
      revisionLog: (t && Array.isArray(t.revisionLog)) ? t.revisionLog.map(e => ({ ...e })) : [],
    };
  }
  // Bitácora de la revisión del técnico, guardada en el propio trámite:
  // "enviada" al mandarla, y "observada"/"aprobada" cuando el técnico responde.
  // No repite el último evento si es igual (evita duplicados del sondeo).
  function pushRevisionLog(obj, estado, obs) {
    if (!obj) return;
    if (!Array.isArray(obj.revisionLog)) obj.revisionLog = [];
    const ult = obj.revisionLog[obj.revisionLog.length - 1];
    if (ult && ult.estado === estado && (ult.obs || '') === (obs || '')) return;
    obj.revisionLog.push({ estado, obs: obs || '', ts: new Date().toISOString() });
  }
  // Fecha+hora corta para la bitácora ("07/07 15:40"). Con nombre propio para
  // no pisar la fmtFechaHora existente (que incluye el año).
  function fmtFechaHoraCorta(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    const p = (n) => String(n).padStart(2, '0');
    return `${p(d.getDate())}/${p(d.getMonth() + 1)} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  // Solo la hora (HH:MM) de una marca de tiempo ISO.
  function fmtHora(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    const p = (n) => String(n).padStart(2, '0');
    return `${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  // Marca de tiempo de un trámite para ordenar cronológicamente y mostrar la
  // hora: prioriza el envío al PEC, luego la carga; si no hay, cae a la fecha.
  function tiempoTramite(t) {
    return (t && (t.enviadoEn || t.creadoEn)) || ((t && t.fecha) ? t.fecha + 'T00:00:00' : '');
  }
  // Bloque HTML de la bitácora, reutilizado en "Último trámite" y en el Historial.
  function revisionBitacoraHtml(t) {
    if (!t || !Array.isArray(t.revisionLog) || !t.revisionLog.length) return '';
    const linea = (e) => {
      const cuando = fmtFechaHoraCorta(e.ts);
      const txt = e.estado === 'enviada' ? 'Enviada al técnico'
        : e.estado === 'observada' ? '🔴 Observó: ' + escapeHtml(e.obs || 'sin detalle')
        : e.estado === 'aprobada' ? '🟢 Resuelto y aprobado'
        : escapeHtml(e.estado || '');
      return `<div class="rev-bitacora-item">${cuando ? `<span class="rev-bitacora-fecha">${cuando}</span> — ` : ''}${txt}</div>`;
    };
    return `<div class="rev-bitacora"><div class="rev-bitacora-tit">Revisión del técnico</div>${t.revisionLog.map(linea).join('')}</div>`;
  }
  // Registro de todos los autos que pasaron por el técnico (tienen bitácora),
  // del más nuevo al más viejo — para el registro en "Mi taller".
  function revisionesDelTecnico() {
    const items = [];
    clientes.forEach(c => (c.tramites || []).forEach(t => {
      if (Array.isArray(t.revisionLog) && t.revisionLog.length) {
        const ult = t.revisionLog[t.revisionLog.length - 1];
        items.push({ patente: c.patente || 's/patente', cliente: c.nombre || '', fecha: t.fecha || '', estado: ult.estado, ts: ult.ts });
      }
    }));
    items.sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
    return items;
  }
  function estadoRevTexto(e) {
    return e === 'aprobada' ? '🟢 Aprobada' : e === 'observada' ? '🔴 Observada' : e === 'enviada' ? '⏳ Enviada, sin responder' : (e || '');
  }
  const TRAMITE_DRAFT_CAMPOS_IDS = {
    tipo: 't-tipo', fecha: 't-fecha', detalle: 't-detalle',
    obleaAnterior: 't-oblea-anterior', obleaNueva: 't-oblea-nueva',
  };
  function syncTramiteCamposFromDOM() {
    if (!tramiteDraftCampos) return;
    Object.entries(TRAMITE_DRAFT_CAMPOS_IDS).forEach(([key, id]) => {
      const el = root.querySelector('#' + id);
      if (el) tramiteDraftCampos[key] = el.value;
    });
  }
  // Borrador del cliente que se está dando de alta/editando en Documentación.
  // Sin esto, cualquier render() a mitad de carga (ej. al aplicar un pegado
  // de ENARGAS) reconstruía el formulario desde el último cliente GUARDADO,
  // y lo tipeado todavía no guardado (nombre, DNI, domicilio...) desaparecía.
  let clienteDraft = null;
  const CLIENTE_DRAFT_CAMPOS = {
    nombre: 'f-nombre', dni: 'f-dni', tipo_documento: 'f-tipo-documento', telefono: 'f-telefono',
    domicilio: 'f-domicilio', cpa: 'f-cpa',
    provincia: 'f-provincia', ciudad: 'f-ciudad', patente: 'f-patente',
    marca: 'f-marca', modelo: 'f-modelo', anio: 'f-anio', inyeccion: 'f-inyeccion', uso: 'f-uso',
  };
  function syncClienteDraftFromDOM() {
    if (!clienteDraft) return;
    Object.entries(CLIENTE_DRAFT_CAMPOS).forEach(([key, id]) => {
      const el = root.querySelector('#' + id);
      if (el) clienteDraft[key] = el.value;
    });
  }

  const OTROS_EQUIPOS_CAMPOS = [
    { key: 'dispSujecionCilindro', label: 'Disp. sujeción cilindro' },
    { key: 'manometro', label: 'Manómetro' },
    { key: 'accesorioTuberia', label: 'Accesorio P/Tubería' },
    { key: 'tuberiaAltaPresion', label: 'Tubería alta presión' },
    { key: 'electrovalvulaNafta', label: 'Electroválvula Nafta' },
    { key: 'electrovalvulaGnc', label: 'Electroválvula GNC' },
    { key: 'dosifMezclador', label: 'Dosif./mezclador' },
    { key: 'sistemaVenteo', label: 'Sistema de venteo' },
    { key: 'llaveConmutadora', label: 'Llave conmutadora' },
    { key: 'valCargaInterna', label: 'Val. carga interna' },
    { key: 'valCargaExterna', label: 'Val. carga externa' },
    { key: 'mangueraBajaPresion', label: 'Manguera baja presión' },
  ];

  // Un trámite guardado antes de agregar un accesorio nuevo a la lista de
  // arriba (ej. "Disp. sujeción cilindro") no tiene esa clave en su
  // `equipo.otros` — sin esto, reabrirlo para editar rompería al leer
  // `eq.otros[esaClave].codigo`.
  function normalizarEquipoOtros(eq) {
    if (!eq.otros) eq.otros = {};
    OTROS_EQUIPOS_CAMPOS.forEach(o => {
      if (!eq.otros[o.key]) eq.otros[o.key] = { codigo: '', serie: '' };
    });
    return eq;
  }

  // Si se pasa `seed` (el último equipo conocido del cliente, cargado por
  // ENARGAS alguna vez), arranca el trámite con esos códigos/series ya
  // completos — así con una sola consulta al SIC alcanza. La Operación
  // (Montaje/Sigue/Desmontaje/Baja) nunca se hereda: es específica de cada
  // trámite y hay que elegirla sí o sí cada vez.
  function blankEquipo(seed) {
    const otros = {};
    OTROS_EQUIPOS_CAMPOS.forEach(o => {
      const s = seed && seed.otros && seed.otros[o.key];
      otros[o.key] = { codigo: (s && s.codigo) || '', serie: (s && s.serie) || '' };
    });
    const reg = seed && seed.regulador;
    const cils = (seed && seed.cilindros && seed.cilindros.length) ? seed.cilindros : [{}];
    const vals = (seed && seed.valvulas && seed.valvulas.length) ? seed.valvulas : [{}];
    return {
      regulador: { codigo: (reg && reg.codigo) || '', serie: (reg && reg.serie) || '', nuevoUsado: (reg && reg.nuevoUsado) || 'usado', operacion: '' },
      // Regulador que se retira del vehículo en un reemplazo (Modificación).
      // null = no hay reemplazo de regulador en este trámite.
      reguladorBaja: null,
      cilindros: cils.map(c => ({
        codigo: c.codigo || '', serie: c.serie || '', periodicidad: c.periodicidad || '5',
        nuevoUsado: c.nuevoUsado || 'usado', fabricadoMes: c.fabricadoMes || '', fabricadoAnio: c.fabricadoAnio || '',
        revisadoMes: c.revisadoMes || '', revisadoAnio: c.revisadoAnio || '', crpc: c.crpc || '', msdb: '',
      })),
      valvulas: vals.map(v => ({ codigo: v.codigo || '', serie: v.serie || '', msb: '' })),
      otros,
    };
  }

  // Devuelve true si algún componente del equipo quedó marcado como "Baja".
  function equipoTieneBaja(eq) {
    if (!eq) return false;
    if (eq.regulador.operacion === 'baja') return true;
    if (eq.reguladorBaja) return true;
    if (eq.cilindros.some(c => c.msdb === 'baja')) return true;
    if (eq.valvulas.some(v => v.msb === 'baja')) return true;
    return false;
  }

  // Lee del DOM los valores actuales del equipo antes de agregar/quitar una
  // fila o de guardar el trámite, para no perder lo ya tipeado cuando se
  // vuelve a dibujar todo con render().
  function syncEquipoFromDOM() {
    if (!tramiteDraftEquipo) return;
    // Si los campos del equipo no están en pantalla (ej. ya se avanzó al
    // paso 3 del asistente), no hay nada que leer — sin este corte se
    // pisaba lo ya cargado con valores vacíos.
    if (!root.querySelector('#eq-regulador-codigo')) return;
    const val = (sel) => { const el = root.querySelector(sel); return el ? el.value : ''; };
    tramiteDraftEquipo.regulador = {
      codigo: val('#eq-regulador-codigo'), serie: val('#eq-regulador-serie'), nuevoUsado: val('#eq-regulador-nuevousado') || 'usado',
      operacion: val('#eq-regulador-operacion'),
    };
    if (tramiteDraftEquipo.reguladorBaja && root.querySelector('#eq-regbaja-codigo')) {
      tramiteDraftEquipo.reguladorBaja = {
        codigo: val('#eq-regbaja-codigo'), serie: val('#eq-regbaja-serie'), operacion: 'baja',
      };
    }
    tramiteDraftEquipo.cilindros = tramiteDraftEquipo.cilindros.map((_, i) => ({
      codigo: val(`#eq-cil-codigo-${i}`), serie: val(`#eq-cil-serie-${i}`), periodicidad: val(`#eq-cil-periodicidad-${i}`) || '5',
      nuevoUsado: val(`#eq-cil-nuevousado-${i}`) || 'usado',
      fabricadoMes: val(`#eq-cil-fabmes-${i}`), fabricadoAnio: val(`#eq-cil-fabanio-${i}`),
      revisadoMes: val(`#eq-cil-revmes-${i}`), revisadoAnio: val(`#eq-cil-revanio-${i}`),
      crpc: val(`#eq-cil-crpc-${i}`), msdb: val(`#eq-cil-msdb-${i}`),
    }));
    tramiteDraftEquipo.valvulas = tramiteDraftEquipo.valvulas.map((_, i) => ({
      codigo: val(`#eq-val-codigo-${i}`), serie: val(`#eq-val-serie-${i}`), msb: val(`#eq-val-msb-${i}`),
    }));
    OTROS_EQUIPOS_CAMPOS.forEach(o => {
      tramiteDraftEquipo.otros[o.key] = { codigo: val(`#eq-otro-${o.key}-codigo`), serie: val(`#eq-otro-${o.key}-serie`) };
    });
  }

  // Comprime y redimensiona la foto en el navegador antes de guardarla,
  // para que no pese demasiado (las fotos de celular sin comprimir son
  // varios MB y no entran cómodas en el almacenamiento del navegador).
  // 1568 px es el máximo que aprovecha el modelo de visión; con 0.85 de
  // calidad la letra chica (cédulas verdes viejas) se lee bastante mejor,
  // y el peso del archivo sigue siendo razonable.
  function compressImageFile(file, maxDim = 1568, quality = 0.85) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
      reader.readAsDataURL(file);
    });
  }

  function cargarImagenDeFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('No se pudo procesar una imagen'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('No se pudo leer un archivo'));
      reader.readAsDataURL(file);
    });
  }

  // Une varias fotos en una sola imagen (una debajo de la otra), para cuando el
  // cliente manda la documentación en fotos separadas. Todo en el dispositivo.
  async function unirFotosEnUna(files, maxDim = 1568, quality = 0.85) {
    const imgs = [];
    for (const f of files) imgs.push(await cargarImagenDeFile(f));
    const sep = 8; // separación entre fotos
    const ancho = Math.min(maxDim, Math.max(...imgs.map(i => i.width)));
    const escaladas = imgs.map(i => ({ img: i, w: ancho, h: Math.round(i.height * ancho / i.width) }));
    let alto = escaladas.reduce((s, e) => s + e.h, 0) + sep * (escaladas.length - 1);
    // Si el total queda enorme, se achica todo para no pasar un límite razonable.
    const ALTO_MAX = 4200;
    const factor = alto > ALTO_MAX ? ALTO_MAX / alto : 1;
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(ancho * factor);
    canvas.height = Math.round(alto * factor);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let y = 0;
    for (const e of escaladas) {
      const w = Math.round(e.w * factor), h = Math.round(e.h * factor);
      ctx.drawImage(e.img, 0, y, w, h);
      y += h + Math.round(sep * factor);
    }
    return canvas.toDataURL('image/jpeg', quality);
  }

  // ---- Respaldo cifrado en la nube ----
  // Todo se cifra EN ESTE DISPOSITIVO (AES-GCM, clave derivada con PBKDF2 de
  // una frase que solo el taller conoce) antes de subirse. El servidor y el
  // storage solo ven paquetes cifrados.

  function bufAB64(buf) {
    const bytes = new Uint8Array(buf);
    let out = '';
    // En bloques: btoa(String.fromCharCode(...bytesGrandes)) revienta la
    // pila con las fotos (cientos de KB).
    for (let i = 0; i < bytes.length; i += 0x8000) {
      out += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(out);
  }
  function b64ABuf(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  async function claveRespaldo(frase, salt) {
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(frase), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' },
      base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
    );
  }

  async function cifrarParaRespaldo(obj, frase) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await claveRespaldo(frase, salt);
    const datos = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(obj)));
    return { v: 1, salt: bufAB64(salt), iv: bufAB64(iv), datos: bufAB64(datos) };
  }

  async function descifrarRespaldo(paquete, frase) {
    const key = await claveRespaldo(frase, new Uint8Array(b64ABuf(paquete.salt)));
    const plano = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(b64ABuf(paquete.iv)) }, key, b64ABuf(paquete.datos));
    return JSON.parse(new TextDecoder().decode(plano));
  }

  async function apiRespaldo(body) {
    const r = await fetch('/api/respaldo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license: localStorage.getItem(LICENSE_KEY), ...body }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || ('Error ' + r.status + ' del servidor de respaldo'));
    return data;
  }

  function fmtFechaHora(iso) {
    try { return new Date(iso).toLocaleString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch (e) { return iso || ''; }
  }

  // ---- Sincronización automática entre dispositivos ----
  // Usa la misma nube cifrada del respaldo. La clave se recuerda en cada
  // dispositivo (se ingresa una sola vez al activar); el servidor sigue
  // viendo únicamente paquetes cifrados. El merge es por cliente: gana la
  // versión con fecha de modificación más nueva, y los eliminados se
  // propagan con lápidas para que no "resuciten" en el otro equipo.
  const SYNC_CLAVE_KEY = 'gnc_respaldo_clave_v1';
  const SYNC_ON_KEY = 'gnc_sync_on_v1';
  const SYNC_ULTIMA_KEY = 'gnc_sync_ultima_v1';
  let syncUltima = null;
  let syncEstado = '';
  let sincronizando = false;
  let syncTimer = null;

  function syncActiva() {
    return localStorage.getItem(SYNC_ON_KEY) === '1' && !!localStorage.getItem(SYNC_CLAVE_KEY);
  }

  // Debounce: varios guardados seguidos disparan UNA sincronización.
  function programarSync(motivo) {
    if (!syncActiva()) return;
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => sincronizar(motivo), 8000);
  }

  function textoEstadoSync() {
    if (!syncActiva()) return 'Sincronización automática: desactivada. Activala acá y en tus otros dispositivos (mismo código de licencia y misma clave) para que los datos se emparejen solos.';
    if (sincronizando) return 'Sincronizando...';
    if (syncEstado) return syncEstado;
    return syncUltima ? 'Sincronizado por última vez: ' + fmtFechaHora(syncUltima) : 'Sincronización activada.';
  }
  function actualizarEstadoSyncUI() {
    const el = root.querySelector('#sync-estado');
    if (el) el.textContent = textoEstadoSync();
  }

  async function sincronizar(motivo) {
    if (!syncActiva() || sincronizando || !ready) return;
    sincronizando = true;
    syncEstado = '';
    actualizarEstadoSyncUI();
    const clave = localStorage.getItem(SYNC_CLAVE_KEY);
    try {
      // 1) Bajar el estado remoto (si existe) y descifrarlo.
      let bajada = null;
      try {
        bajada = await apiRespaldo({ accion: 'bajar', nombre: 'datos.json' });
      } catch (e) {
        if (!/ninguna copia/i.test(e.message || '')) throw e;
      }
      let remoto = null;
      if (bajada) {
        try { remoto = await descifrarRespaldo(bajada.contenido, clave); }
        catch (e) { throw new Error('CLAVE'); }
      }

      // 2) Combinar lápidas de eliminados de ambos lados.
      const tumbas = {};
      leerTombstones().concat((remoto && remoto.eliminados) || []).forEach(t => {
        if (t && t.id && (!tumbas[t.id] || tumbas[t.id] < t.en)) tumbas[t.id] = t.en;
      });

      // 3) Merge por cliente: gana la fecha de modificación más nueva.
      const ts = c => (c && (c.actualizadoEn || c.creadoEn)) || '';
      const porId = {};
      clientes.forEach(c => { porId[c.id] = { local: c }; });
      ((remoto && remoto.clientes) || []).forEach(c => { (porId[c.id] = porId[c.id] || {}).remoto = c; });

      const fusionados = [];
      const bajarFotosDe = [];
      const subirFotosDe = [];
      let cambioLocal = false;
      let cambioRemoto = !remoto;
      Object.entries(porId).forEach(([id, par]) => {
        const mejor = !par.remoto ? par.local : (!par.local ? par.remoto : (ts(par.remoto) > ts(par.local) ? par.remoto : par.local));
        if (tumbas[id] && tumbas[id] >= ts(mejor)) {
          if (par.local) cambioLocal = true;
          if (par.remoto) cambioRemoto = true;
          return;
        }
        fusionados.push(mejor);
        if (mejor !== par.local) cambioLocal = true;
        if (mejor !== par.remoto) cambioRemoto = true;
        const fL = (par.local && par.local.fotosTs) || '';
        const fR = (par.remoto && par.remoto.fotosTs) || '';
        if (fR > fL) bajarFotosDe.push(id);
        else if (fL > fR) subirFotosDe.push(id);
      });

      // 4) Configuración del taller: gana la más nueva.
      const tsCfgLocal = tallerConfig.actualizadoEn || '';
      const tsCfgRemoto = (remoto && remoto.tallerConfig && remoto.tallerConfig.actualizadoEn) || '';
      if (tsCfgRemoto > tsCfgLocal) {
        tallerConfig = migrarPecsConfig({ ...TALLER_CONFIG_DEFAULT, ...remoto.tallerConfig });
        if (remoto.tallerNombre) { tallerNombre = remoto.tallerNombre; await saveTaller(); }
        await saveTallerConfig(false);
        cambioLocal = true;
      } else if (tsCfgLocal > tsCfgRemoto) {
        cambioRemoto = true;
      }

      // 5) Aplicar el resultado local.
      if (cambioLocal) {
        clientes = fusionados;
        await saveClientes(false);
      }

      // 6) Fotos: bajar las más nuevas del otro equipo, subir las nuestras.
      for (const id of bajarFotosDe) {
        try {
          const b = await apiRespaldo({ accion: 'bajar', nombre: `fotos-${id}.json` });
          const fotos = await descifrarRespaldo(b.contenido, clave);
          await window.storage.set(`fotos:${id}`, JSON.stringify(fotos), false);
          clientesConFotos.add(id);
        } catch (e) { /* puede no haberse subido todavía: la próxima pasada la trae */ }
      }
      for (const id of subirFotosDe) {
        const fotos = await fotosGuardadas(id);
        if (fotos.foto1 || fotos.foto2) {
          await apiRespaldo({ accion: 'subir', nombre: `fotos-${id}.json`, contenido: await cifrarParaRespaldo(fotos, clave) });
        }
      }

      // 7) Subir el estado combinado si el remoto quedó desactualizado.
      const tumbasLista = Object.entries(tumbas).map(([id, en]) => ({ id, en }))
        .filter(t => (Date.now() - new Date(t.en).getTime()) < 90 * 24 * 3600 * 1000);
      if (cambioRemoto) {
        const datos = { v: 2, guardadoEn: new Date().toISOString(), tallerNombre, tallerConfig, clientes, eliminados: tumbasLista };
        await apiRespaldo({ accion: 'subir', nombre: 'datos.json', contenido: await cifrarParaRespaldo(datos, clave) });
      }
      try { localStorage.setItem(TOMBSTONES_KEY, JSON.stringify(tumbasLista)); } catch (e) { /* ok */ }

      syncUltima = new Date().toISOString();
      try { localStorage.setItem(SYNC_ULTIMA_KEY, syncUltima); } catch (e) { /* ok */ }
      // Redibujar solo si cambió algo y no hay un trámite a medias en pantalla.
      if (cambioLocal && !showForm && !editingId) render();
      else actualizarEstadoSyncUI();
    } catch (e) {
      if (e && e.message === 'CLAVE') {
        syncEstado = 'La clave guardada en este equipo no abre la copia de la nube. Desactivá la sincronización y activala de nuevo con la clave correcta.';
      } else {
        syncEstado = 'Sin conexión con la nube — se vuelve a intentar solo.';
      }
      actualizarEstadoSyncUI();
    } finally {
      sincronizando = false;
      actualizarEstadoSyncUI();
    }
  }

  // Pasadas periódicas y al volver a la app (con el debounce de guardados
  // esto mantiene los dispositivos emparejados sin que nadie toque nada).
  setInterval(() => { if (ready && syncActiva()) sincronizar('periodico'); }, 5 * 60 * 1000);
  // Autoguardado del trámite en curso: si el celular se apaga o se cierra la
  // app a la mitad, el trámite ya queda listado en Pendientes sin perder nada.
  setInterval(() => { if (ready && showForm && clienteDraft) autoguardarBorradorTramite().catch(() => {}); }, 8000);
  let ultimoSyncPorFoco = 0;
  window.addEventListener('focus', () => {
    if (!ready || !syncActiva()) return;
    if (Date.now() - ultimoSyncPorFoco < 60 * 1000) return;
    ultimoSyncPorFoco = Date.now();
    sincronizar('foco');
  });

  // ---- App del técnico (revisión previa al envío al PEC) ----
  // Checklist de normativa que ve el técnico (definido acá: se manda dentro
  // de cada revisión, así la app del técnico no necesita actualizarse si
  // esta lista cambia).
  const CHECKLIST_TECNICO = [
    'Sujeción y soportes del cilindro firmes',
    'Tubería de alta presión sin daños',
    'Estado de mangueras en condiciones',
    'Sistema de venteo conectado y libre',
    'Sin pérdidas (prueba con espuma)',
    'Electroválvulas de nafta y GNC funcionando',
    'Manómetro y llave conmutadora en condiciones',
    'CRPC del cilindro vigente',
  ];
  // null = todavía no se consultó; número = técnicos vinculados.
  let tecnicosVinculados = null;

  async function apiTecnicoTaller(body) {
    const r = await fetch('/api/tecnico', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license: localStorage.getItem(LICENSE_KEY), ...body }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || ('Error ' + r.status));
    return data;
  }

  async function consultarTecnicosVinculados() {
    try {
      const r = await apiTecnicoTaller({ accion: 'tecnicos-estado' });
      tecnicosVinculados = r.vinculados || 0;
    } catch (e) { /* sin conexión: se reintenta la próxima vez */ }
  }

  // Al enviar el trámite al PEC se cierra la revisión: desaparece de la app
  // del técnico. Fire-and-forget (no bloquea el envío si falla).
  function cerrarRevisionTecnico(t) {
    if (t && t.revisionId) apiTecnicoTaller({ accion: 'revision-cerrar', id: t.revisionId }).catch(() => {});
  }

  // Bloque del paso 1: botón "Enviar al técnico" + estado de la revisión.
  // Solo aparece si el taller tiene al menos un técnico vinculado.
  function revisionTecnicoBloque() {
    if (!tecnicosVinculados) return '';
    // En una conversión no se manda al técnico (el equipo es nuevo, no hay
    // nada que comparar contra el SIC).
    if (tramiteDraftCampos && tramiteDraftCampos.tipo === 'conversion') return '';
    const rc = tramiteDraftCampos || {};
    let estadoHtml = '';
    if (rc.revisionId && rc.revisionEstado === 'pendiente') {
      estadoHtml = `<div class="agent-hint" style="background:#FDF0E1; border:1px solid #F3D9B7; color:#854F0B; border-radius:10px; padding:8px 12px;">Esperando la revisión del técnico... <button type="button" class="license-link" id="btn-revision-override">marcar revisado en el taller</button></div>`;
    } else if (rc.revisionId && rc.revisionEstado === 'aprobada') {
      estadoHtml = `<div class="agent-hint" style="background:#E1F5EE; border:1px solid #9FE1CB; color:#085041; border-radius:10px; padding:8px 12px;">Revisado por el técnico: todo en condiciones.</div>`;
    } else if (rc.revisionId && rc.revisionEstado === 'observada') {
      estadoHtml = `<div class="agent-hint" style="background:#FDE8E5; border:1px solid #F0999B; color:#C0281A; border-radius:10px; padding:8px 12px;">El técnico encontró un problema: ${escapeHtml(rc.revisionObs || '')} <button type="button" class="license-link" id="btn-reenviar-tecnico">reenviar corregido</button> · <button type="button" class="license-link" id="btn-revision-override">marcar revisado igual</button></div>`;
    } else if (rc.revisionOverride) {
      estadoHtml = `<div class="agent-hint" style="background:#E1F5EE; border:1px solid #9FE1CB; color:#085041; border-radius:10px; padding:8px 12px;">Marcado como revisado en el taller.</div>`;
    }
    return `<div style="grid-column: 1/-1;">
      ${!rc.revisionId ? `<button type="button" class="btn btn-primary" id="btn-enviar-tecnico" style="width:100%; font-size:14px;">Enviar al técnico para revisar</button>` : ''}
      ${estadoHtml}
    </div>`;
  }

  // Arma la orden de revisión desde los borradores actuales del asistente.
  function armarRevision() {
    const eq = tramiteDraftEquipo || blankEquipo(null);
    const c = clienteDraft || {};
    const componentes = [];
    if (eq.regulador && (eq.regulador.codigo || eq.regulador.serie)) {
      componentes.push({ nombre: 'Regulador ' + (eq.regulador.codigo || ''), detalle: 'Serie ' + (eq.regulador.serie || 's/d') });
    }
    if (eq.reguladorBaja && (eq.reguladorBaja.codigo || eq.reguladorBaja.serie)) {
      componentes.push({ nombre: 'Regulador dado de BAJA ' + (eq.reguladorBaja.codigo || ''), detalle: 'Serie ' + (eq.reguladorBaja.serie || 's/d') + ' (verificar que se retira)' });
    }
    (eq.cilindros || []).forEach((cil, i) => {
      if (cil.codigo || cil.serie) componentes.push({ nombre: `Cilindro ${i + 1} ${cil.codigo || ''}`, detalle: `Serie ${cil.serie || 's/d'}${cil.crpc ? ' · CRPC ' + cil.crpc : ''}` });
    });
    (eq.valvulas || []).forEach((v, i) => {
      if (v.codigo || v.serie) componentes.push({ nombre: `Válvula ${i + 1} ${v.codigo || ''}`, detalle: 'Serie ' + (v.serie || 's/d') });
    });
    const tipoLabel = tramiteDraftCampos ? tramiteTipoLabel(tramiteDraftCampos.tipo) : '';
    return {
      id: 'r' + Date.now() + Math.random().toString(36).slice(2, 7),
      patente: (c.patente || '').toUpperCase(),
      vehiculo: [c.marca, c.modelo, c.anio].filter(Boolean).join(' '),
      tipoTramite: tipoLabel,
      componentes,
      checklist: CHECKLIST_TECNICO.slice(),
    };
  }

  // Mientras el asistente esté abierto con una revisión pendiente, se
  // consulta el estado cada 20 segundos y se refleja solo en pantalla.
  setInterval(async () => {
    const rc = tramiteDraftCampos;
    if (!ready || !rc || !rc.revisionId || rc.revisionEstado !== 'pendiente') return;
    if (!showForm && !editingId) return;
    try {
      const r = await apiTecnicoTaller({ accion: 'revision-estado', id: rc.revisionId });
      if (r.revision && r.revision.estado !== 'pendiente') {
        rc.revisionEstado = r.revision.estado;
        rc.revisionObs = r.revision.observaciones || '';
        pushRevisionLog(rc, r.revision.estado, r.revision.observaciones || '');
        syncClienteDraftFromDOM();
        syncEquipoFromDOM();
        syncTramiteCamposFromDOM();
        render();
      }
    } catch (e) { /* sin conexión: se reintenta */ }
  }, 10000);

  // Los trámites que quedaron en Pendientes esperando al técnico también

  // observación), se refleja solo en el cuadrante.
  let chequeandoRevPend = false;
  async function revisarEstadoTecnicoPendientes() {
    if (chequeandoRevPend || !ready) return;
    const items = pendientesItems().filter(({ tramite }) => tramite.revisionId && tramite.revisionEstado && tramite.revisionEstado !== 'aprobada');
    if (!items.length) return;
    chequeandoRevPend = true;
    let cambio = false;
    for (const { tramite } of items) {
      try {
        const r = await apiTecnicoTaller({ accion: 'revision-estado', id: tramite.revisionId });
        if (r.revision && r.revision.estado && r.revision.estado !== tramite.revisionEstado) {
          tramite.revisionEstado = r.revision.estado;
          tramite.revisionObs = r.revision.observaciones || '';
          pushRevisionLog(tramite, r.revision.estado, r.revision.observaciones || '');
          cambio = true;
        }
      } catch (e) { /* sin conexión: se reintenta */ }
    }
    chequeandoRevPend = false;
    if (cambio) { await saveClientes(); render(); }
  }

  function dataUrlParts(dataUrl) {
    const m = dataUrl.match(/^data:(.+);base64,(.*)$/);
    return m ? { mediaType: m[1], base64: m[2] } : null;
  }

  // Firma electrónica: canvas con soporte mouse y touch. Como render()
  // reconstruye todo el DOM, el trazo se guarda en `currentSignature` en
  // cada fin de trazo y se restaura acá mismo si ya había algo dibujado.
  function attachSignaturePad(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#1A2333';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    let drawing = false, last = null;

    if (currentSignature) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = currentSignature;
    }

    function posFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
      const point = e.touches ? e.touches[0] : e;
      return { x: (point.clientX - rect.left) * scaleX, y: (point.clientY - rect.top) * scaleY };
    }
    function start(e) { e.preventDefault(); drawing = true; last = posFromEvent(e); }
    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = posFromEvent(e);
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      last = p;
    }
    function end() {
      if (!drawing) return;
      drawing = false;
      currentSignature = canvas.toDataURL('image/png');
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
    canvas.addEventListener('touchcancel', end);
  }

  async function runScan() {
    const btnScan = root.querySelector('#btn-scan');
    const statusEl = root.querySelector('#scan-status');
    btnScan.disabled = true;
    statusEl.className = 'scan-status';
    statusEl.innerHTML = '<span class="gnc-loading-row"><span class="gnc-spinner"></span> Leyendo documentos...</span>';

    try {
      const content = [];
      const readableSlots = ['foto1', 'foto2'];
      for (const slot of readableSlots) {
        const dataUrl = scanFiles[slot];
        if (!dataUrl) continue;
        const parts = dataUrlParts(dataUrl);
        if (!parts) continue;
        content.push({
          type: 'image',
          source: { type: 'base64', media_type: parts.mediaType, data: parts.base64 }
        });
      }
      content.push({
        type: 'text',
        text: `Estas imágenes muestran varios documentos argentinos fotografiados juntos sobre una mesa (probablemente Cédula Verde del automotor, DNI, y a veces una Tarjeta de Identificación de Equipo de GNC), una foto de un lado y otra del lado opuesto. Los DATOS PERSONALES (nombre y apellido, documento, domicilio, ciudad y provincia) extraelos del TITULAR que figura en la CÉDULA VERDE del automotor. IMPORTANTE: NO uses el DNI para los datos personales, aunque aparezca en la foto — puede ser de otra persona; los datos personales SIEMPRE son los del titular de la Cédula Verde. De la misma Cédula Verde extraé también la patente/dominio del vehículo, pero NO extraigas marca, modelo, tipo ni uso, esos datos se completan después con una consulta aparte. Si aparece una Tarjeta de GNC, ignorala por completo — no extraigas nada de ella. Respondé SOLO con un objeto JSON válido, sin texto adicional, sin markdown, con esta forma exacta:
{"nombre": "nombre y apellido del titular o null", "dni": "numero de documento del titular sin puntos o null", "domicilio": "calle y numero del titular o null", "provincia": "provincia o null", "ciudad": "ciudad o localidad o null", "patente": "dominio/patente del vehiculo o null"}
El domicilio del titular puede venir junto con la localidad y la provincia; separalos en los campos correspondientes. Si algún dato no aparece en las imágenes o no se puede leer con confianza, poné null en ese campo. No inventes datos.`
      });

      const response = await fetch('/api/read-docs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          // Sonnet para leer documentos: las cédulas verdes viejas (letra
          // chica y gastada) las lee mucho mejor que Haiku. El costo por
          // lectura sigue siendo insignificante (~US$0,015).
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content }],
          license: localStorage.getItem(LICENSE_KEY)
        })
      });

      if (response.status === 403) {
        throw new Error('El código de licencia no es válido. Tocá "Cambiar código de licencia" arriba para corregirlo.');
      }
      if (response.status === 429) {
        const d429 = await response.json().catch(() => ({}));
        throw new Error(d429.error || 'Se alcanzó el límite diario de lecturas para este código.');
      }

      const data = await response.json();

      if (!response.ok || data.type === 'error') {
        const msg = (data.error && data.error.message) ? data.error.message : JSON.stringify(data).slice(0, 300);
        throw new Error(`API (${response.status}): ${msg}`);
      }

      const textBlock = (data.content || []).find(b => b.type === 'text');
      if (!textBlock) throw new Error('La respuesta no trajo texto: ' + JSON.stringify(data).slice(0, 300));
      const clean = textBlock.text.replace(/```json|```/g, '').trim();
      let parsed;
      try {
        parsed = JSON.parse(clean);
      } catch (e2) {
        throw new Error('No pude interpretar la respuesta como JSON: ' + clean.slice(0, 200));
      }

      // La IA escribe en el BORRADOR, no en los inputs: en este momento los
      // campos del Paso 1 todavía están ocultos, así que escribir en el DOM se
      // perdería. Antes se sincroniza lo que ya hubiera cargado (ej. teléfono).
      syncClienteDraftFromDOM();
      if (clienteDraft) {
        ['nombre', 'dni', 'domicilio', 'provincia', 'ciudad', 'patente'].forEach(key => {
          if (parsed[key]) clienteDraft[key] = key === 'patente' ? String(parsed[key]).toUpperCase() : parsed[key];
        });
        // Completar el CPA solo según la localidad, si está vacío.
        if (parsed.ciudad && !String(clienteDraft.cpa || '').trim()) {
          const cpa = cpaDeCiudad(parsed.ciudad);
          if (cpa) clienteDraft.cpa = cpa;
        }
      }

      // Desplegar el resto del Paso 1 (datos, domicilio, vehículo/SIC) ya
      // completado, para revisarlo y seguir con la consulta a ENARGAS.
      paso1Desplegado = true;
      render();
      const stOk = root.querySelector('#scan-status');
      if (stOk) {
        stOk.className = 'scan-status ok';
        stOk.textContent = 'Listo — revisá los datos y seguí con la consulta a ENARGAS.';
      }
    } catch (e) {
      console.error(e);
      // Aunque falle la lectura, se despliega el formulario para cargar a mano.
      syncClienteDraftFromDOM();
      paso1Desplegado = true;
      render();
      const stErr = root.querySelector('#scan-status');
      if (stErr) {
        stErr.className = 'scan-status err';
        stErr.textContent = 'No se pudo leer con IA — cargá los datos a mano.';
      }
    } finally {
      btnScan.disabled = false;
    }
  }

  // Técnica FLIP (First-Last-Invert-Play): como el render reconstruye toda
  // la lista de cero, no hay animación de reacomodo "gratis" como con un
  // diffing con claves — se mide la posición de cada tarjeta ANTES de
  // reescribir el HTML, y después de reescribirlo se calcula cuánto se
  // movió cada una (por id) y se anima desde la posición vieja a la nueva.
  function medirRectsClientes() {
    const rects = {};
    root.querySelectorAll('.client-card-wrap[data-client-id]').forEach(el => {
      rects[el.getAttribute('data-client-id')] = el.getBoundingClientRect();
    });
    return rects;
  }
  function animarReacomodoClientes(oldRects) {
    root.querySelectorAll('.client-card-wrap[data-client-id]').forEach(el => {
      const oldRect = oldRects[el.getAttribute('data-client-id')];
      if (!oldRect) return;
      const newRect = el.getBoundingClientRect();
      const dx = oldRect.left - newRect.left;
      const dy = oldRect.top - newRect.top;
      if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(() => {
        el.style.transition = 'transform 220ms ease';
        el.style.transform = '';
      });
    });
  }

    function bindFormatoHint(inputId, hintId, validador, upper) {
      const inp = root.querySelector('#' + inputId);
      const hint = root.querySelector('#' + hintId);
      if (!inp || !hint) return;
      const check = () => {
        if (upper) {
          const pos = inp.selectionStart;
          const nuevo = inp.value.toUpperCase();
          if (nuevo !== inp.value) { inp.value = nuevo; try { inp.setSelectionRange(pos, pos); } catch (e) { /* ok */ } }
        }
        const v = inp.value.trim();
        hint.style.display = (v && !validador(v)) ? 'block' : 'none';
      };
      inp.addEventListener('input', check);
      check();
    }

      respaldoBotones(true);
      try {
        respaldoStatus('', 'Cifrando y subiendo los datos del taller...');
        const datos = { v: 2, guardadoEn: new Date().toISOString(), tallerNombre, tallerConfig, clientes, eliminados: leerTombstones() };
        await apiRespaldo({ accion: 'subir', nombre: 'datos.json', contenido: await cifrarParaRespaldo(datos, clave) });

    // Reimprimir la ficha (solo datos sobre planilla preimpresa) de cualquier

    function applyBulkParsedRows(rows) {

        // Excel de verdad: se convierte la primera hoja a CSV y sigue por
        // el mismo camino que un archivo de texto.
        try {
          await cargarXlsxLib();
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf);
          const hoja = wb.Sheets[wb.SheetNames[0]];
          applyBulkParsedRows(parseBulkImportText(XLSX.utils.sheet_to_csv(hoja)));
        } catch (e) {
          console.error(e);
          await customAlert('No se pudo leer ese Excel: ' + (e.message || 'archivo inválido'));
        }
      } else {
        const reader = new FileReader();
        reader.onload = (e) => applyBulkParsedRows(parseBulkImportText(e.target.result));
        reader.readAsText(file);

    // Lectura con IA de fotos del cuaderno/fichas del taller: cada foto se
    // comprime y se manda al mismo endpoint con licencia que la lectura de
    // documentos. La IA devuelve los renglones como JSON, que se convierte
    // a texto tabulado y entra por el MISMO camino que un Excel pegado
    // (normalización de patente/teléfono/fecha, dedupe y previsualización).
    // Las fotos del cuaderno pueden venir de la cámara (una por toma) o de
    // la galería (varias juntas) — el mismo lector sirve para ambas.
    async function leerFotosCuaderno(input) {
        const files = Array.from(input.files).slice(0, 6);
        if (!files.length) return;
        const status = root.querySelector('#cuaderno-ia-status');
        if (status) { status.className = 'agent-result'; status.innerHTML = '<span class="gnc-loading-row"><span class="gnc-spinner"></span> Leyendo las fotos...</span>'; }
        try {
          const content = [];
          for (const f of files) {
            const dataUrl = await compressImageFile(f);
            const parts = dataUrlParts(dataUrl);
            if (parts) content.push({ type: 'image', source: { type: 'base64', media_type: parts.mediaType, data: parts.base64 } });
          }
          content.push({ type: 'text', text: `Estas fotos muestran páginas del registro de clientes de un taller de GNC argentino (cuaderno manuscrito, fichas de papel o una planilla impresa). Cada renglón es un cliente/vehículo. Extraé TODOS los renglones legibles y respondé SOLO con un array JSON válido, sin texto adicional ni markdown:
[{"patente":"dominio del vehiculo","telefono":"solo dígitos o null","nombre":"nombre del cliente o null","fecha_vencimiento":"dd/mm/aaaa o mm/aaaa o null"}]
Un objeto por renglón. Las patentes argentinas tienen formato AAA111 (viejas) o AA111BB (nuevas) — usá ese formato para corregir confusiones obvias de lectura (letra O por número 0, I por 1). Si un renglón no tiene patente legible, omitilo. No inventes datos ni completes lo que no se ve.` });

          const response = await fetch('/api/read-docs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4000, messages: [{ role: 'user', content }], license: localStorage.getItem(LICENSE_KEY) })
          });
          if (response.status === 403) throw new Error('El código de licencia no es válido. Tocá "Cambiar código de licencia" arriba para corregirlo.');
          if (response.status === 429) { const d = await response.json().catch(() => ({})); throw new Error(d.error || 'Se alcanzó el límite diario de lecturas para este código.'); }
          const data = await response.json();
          if (!response.ok || data.type === 'error') {
            const msg = (data.error && data.error.message) ? data.error.message : JSON.stringify(data).slice(0, 300);
            throw new Error(`API (${response.status}): ${msg}`);
          }
          const textBlock = (data.content || []).find(b => b.type === 'text');
          if (!textBlock) throw new Error('La respuesta no trajo texto.');
          let filas;
          try { filas = JSON.parse(textBlock.text.replace(/```json|```/g, '').trim()); }
          catch (e2) { throw new Error('No pude interpretar la lectura — probá con fotos más nítidas o de menos páginas por vez.'); }
          if (!Array.isArray(filas) || !filas.length) throw new Error('La IA no encontró renglones con patente en esas fotos.');

          const tsv = 'patente\ttelefono\tfecha\tnombre\n' + filas.map(r => [r.patente || '', r.telefono || '', r.fecha_vencimiento || '', r.nombre || '']
            .map(v => String(v).replace(/[\t\n]/g, ' ')).join('\t')).join('\n');
          applyBulkParsedRows(parseBulkImportText(tsv));
        } catch (e) {
          console.error(e);
          const st = root.querySelector('#cuaderno-ia-status');
          if (st) { st.className = 'agent-result err'; st.textContent = 'Error: ' + (e.message || 'no se pudieron leer las fotos'); }

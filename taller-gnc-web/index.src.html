<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Estelita</title>
<meta name="theme-color" content="#1D5BD8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  html, body { margin:0; padding:0; background:#F4F6FA; }
</style>
</head>
<body>
<script>
// window.storage: misma interfaz (get/set/delete/list) que usa toda la app.
// Todo va a localStorage, MENOS las fotos ("fotos:<id>"), que se guardan en
// IndexedDB: una base de datos del navegador con muchísima más capacidad que
// localStorage (que se llena con pocas fotos) y que el navegador no borra solo
// (con almacenamiento persistente). Las fotos siguen dentro del dispositivo.
(function () {
  const DB_NAME = 'estelita';
  const STORE = 'fotos';
  let dbPromise = null;
  function abrirDB() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      let req;
      try { req = indexedDB.open(DB_NAME, 1); } catch (e) { reject(e); return; }
      req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }
  function idbGet(key) { return abrirDB().then(db => new Promise((res, rej) => { const r = db.transaction(STORE, 'readonly').objectStore(STORE).get(key); r.onsuccess = () => res(r.result === undefined ? null : r.result); r.onerror = () => rej(r.error); })); }
  function idbSet(key, value) { return abrirDB().then(db => new Promise((res, rej) => { const tx = db.transaction(STORE, 'readwrite'); tx.objectStore(STORE).put(value, key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); })); }
  function idbDelete(key) { return abrirDB().then(db => new Promise((res, rej) => { const tx = db.transaction(STORE, 'readwrite'); tx.objectStore(STORE).delete(key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); })); }
  function idbKeys() { return abrirDB().then(db => new Promise((res, rej) => { const r = db.transaction(STORE, 'readonly').objectStore(STORE).getAllKeys(); r.onsuccess = () => res((r.result || []).map(String)); r.onerror = () => rej(r.error); })); }
  const esFoto = (key) => typeof key === 'string' && key.indexOf('fotos:') === 0;

  window.storage = {
    async get(key) {
      if (esFoto(key)) {
        try { const v = await idbGet(key); if (v !== null) return { key, value: v, shared: false }; } catch (e) { /* fallback abajo */ }
        // Puede seguir en localStorage (migración en curso o dato viejo).
        const raw = localStorage.getItem(key);
        return raw === null ? null : { key, value: raw, shared: false };
      }
      const raw = localStorage.getItem(key);
      return raw === null ? null : { key, value: raw, shared: false };
    },
    async set(key, value) {
      if (esFoto(key)) { await idbSet(key, value); try { localStorage.removeItem(key); } catch (e) { /* ok */ } return { key, value, shared: false }; }
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    async delete(key) {
      if (esFoto(key)) {
        let existed = false;
        try { existed = (await idbGet(key)) !== null; } catch (e) { /* ok */ }
        try { await idbDelete(key); } catch (e) { /* ok */ }
        try { if (localStorage.getItem(key) !== null) { existed = true; localStorage.removeItem(key); } } catch (e) { /* ok */ }
        return existed ? { key, deleted: true, shared: false } : null;
      }
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return existed ? { key, deleted: true, shared: false } : null;
    },
    async list(prefix) {
      let keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      // Si el prefijo pisa el espacio de fotos, sumamos también las de IndexedDB.
      const tocaFotos = !prefix || prefix.indexOf('fotos:') === 0 || 'fotos:'.indexOf(prefix) === 0;
      if (tocaFotos) {
        try { const idbk = (await idbKeys()).filter(k => !prefix || k.startsWith(prefix)); keys = Array.from(new Set(keys.concat(idbk))); } catch (e) { /* ok */ }
      }
      return { keys, prefix, shared: false };
    },
  };

  // Migración única: pasar las fotos que hoy están en localStorage a IndexedDB
  // (libera lugar), y pedir almacenamiento persistente para que el navegador no
  // las borre solo. Fire-and-forget: las lecturas ya caen a localStorage si algo
  // todavía no migró.
  (async function () {
    try {
      const claves = Object.keys(localStorage).filter(k => k.indexOf('fotos:') === 0);
      for (const k of claves) { const v = localStorage.getItem(k); if (v !== null) { try { await idbSet(k, v); localStorage.removeItem(k); } catch (e) { /* se reintenta la próxima */ } } }
    } catch (e) { /* ok */ }
    try { if (navigator.storage && navigator.storage.persist) await navigator.storage.persist(); } catch (e) { /* ok */ }
  })();
})();
</script>
<div id="gnc-app"></div>
<style>
#gnc-app {
  --bg: #F4F6FA;
  --surface: #FFFFFF;
  --surface-alt: #EEF2F9;
  --line: #E3E8F0;
  --flame: #1D5BD8;
  --flame-dim: #7FA3E8;
  --warn: #DF8B00;
  --danger: #D93B2B;
  --ok: #1E9E5A;
  --text: #1A2333;
  --text-muted: #6B7688;
  --sombra: 0 2px 10px rgba(20,40,90,0.07);
  --mono: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  --sans: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  --display: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;

  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  padding: 0;
  box-sizing: border-box;
  line-height: 1.5;
}
#gnc-app[data-theme="dark"] {
  --bg: #12151C;
  --surface: #1B2029;
  --surface-alt: #232B39;
  --line: #313A4B;
  --flame: #5A8DF2;
  --flame-dim: #3A567F;
  --warn: #E5A93B;
  --danger: #E5584A;
  --ok: #40C07E;
  --text: #E7ECF3;
  --text-muted: #9AA6B8;
  --sombra: 0 2px 10px rgba(0,0,0,0.45);
}
#gnc-app *, #gnc-app *::before, #gnc-app *::after { box-sizing: border-box; }

#gnc-app .wrap { max-width: 980px; margin: 0 auto; padding: 24px 20px 60px; }

/* HEADER — banner azul con puntas redondeadas (estilo La Caja) */
#gnc-app .topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  background: var(--flame); color: #fff;
  margin: -24px -20px 0; padding: 14px 20px 44px;
  border-radius: 0 0 28px 28px;
}
#gnc-app .brand { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; min-width: 0; }
#gnc-app .menu-wrap { position: relative; align-self: center; }
#gnc-app .menu-dropdown {
  position: absolute; top: 100%; left: 0; margin-top: 6px; z-index: 20;
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  padding: 8px; display: flex; flex-direction: column; gap: 6px; min-width: 190px;
  box-shadow: 0 8px 24px rgba(20,40,90,0.18);
}
#gnc-app .menu-dropdown .btn { width: 100%; text-align: left; justify-content: flex-start; color: var(--text); border-color: transparent; }
#gnc-app .menu-group-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
  color: var(--text-muted); padding: 8px 10px 3px;
}
#gnc-app .menu-sep { height: 1px; background: var(--line); margin: 6px 6px 2px; }
#gnc-app .menu-ico { width: 17px; height: 17px; color: var(--text-muted); flex-shrink: 0; }
#gnc-app .menu-badge {
  position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff;
  border-radius: 999px; font-size: 10px; line-height: 1; padding: 3px 5px; font-weight: 700;
  min-width: 15px; text-align: center;
}
#gnc-app .menu-badge-inline {
  background: var(--danger); color: #fff; border-radius: 999px; font-size: 10px;
  padding: 1px 6px; font-weight: 700; margin-left: 4px;
}
#gnc-app .brand .tag {
  font-family: var(--sans); font-size: 11px; letter-spacing: 3px; font-weight: 700;
  color: #fff; border: none; background: rgba(255,255,255,0.18);
  padding: 4px 12px; border-radius: 999px; text-transform: uppercase;
}
#gnc-app h1 {
  font-family: var(--display); font-weight: 700; font-size: 24px;
  letter-spacing: 0.2px; margin: 0;
}
#gnc-app .taller-name-top {
  color: #fff; font-family: var(--display); font-weight: 700; font-size: 24px;
  letter-spacing: 0.2px; padding: 2px 0; max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
@media (max-width: 480px) {
  #gnc-app .taller-name-top { font-size: 20px; }
}
/* Encabezado con botón "Volver" en cada panel abierto desde el menú. Queda
   FIJO arriba (sticky) mientras deslizás, así siempre podés salir con un toque
   sin tener que volver hasta arriba de todo. */
#gnc-app .panel-head {
  position: sticky; top: 0; z-index: 6;
  background: var(--surface);
  margin: -20px -20px 10px; padding: 6px 20px;
  border-bottom: 1px solid var(--line);
  border-radius: 18px 18px 0 0;
}
#gnc-app .btn-volver {
  background: transparent; border: none; color: var(--flame); cursor: pointer;
  font-family: var(--sans); font-weight: 700; font-size: 14px; padding: 6px 2px;
  display: inline-flex; align-items: center; gap: 4px;
}
#gnc-app .btn-volver:hover { text-decoration: underline; }
/* Configuración por ítems (acordeón): se abre una sección a la vez */
#gnc-app .config-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; overflow: hidden; background: var(--surface); }
#gnc-app .config-item.abierta { border-color: var(--flame-dim); }
#gnc-app .config-item-head {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: transparent; border: none; cursor: pointer; text-align: left;
  padding: 14px; font-family: var(--sans); font-weight: 700; font-size: 15px; color: var(--text);
}
#gnc-app .config-item.abierta .config-item-head { border-bottom: 1px solid var(--line); }
#gnc-app .config-item-head:hover { background: var(--surface-alt); }
#gnc-app .config-item-caret { color: var(--flame); font-size: 13px; margin-left: 10px; }
#gnc-app .config-item-body { padding: 12px 14px 16px; }
/* Botones y links dentro del banner azul, en blanco */
#gnc-app .topbar .btn-ghost { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.4); }
#gnc-app .topbar .btn-ghost:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.12); }
#gnc-app .topbar .menu-dropdown .btn-ghost { color: var(--text); border-color: transparent; }
#gnc-app .topbar .menu-dropdown .btn-ghost:hover { color: var(--flame); background: var(--surface-alt); }
#gnc-app .topbar .license-link { color: rgba(255,255,255,0.75); }
#gnc-app .topbar .license-link:hover { color: #fff; }

/* RESUMEN — tarjetas flotantes que pisan el banner azul */
#gnc-app .resumen-chips {
  display: flex; gap: 10px; margin: -32px 0 18px; position: relative; z-index: 2;
  cursor: pointer;
}
#gnc-app .hoy-sub { margin: 10px 0 4px; font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--text-muted); }
#gnc-app .formato-hint { display: block; margin-top: 3px; font-size: 11px; color: var(--warn); }
#gnc-app .hist-filtros { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
#gnc-app .hist-filtros input, #gnc-app .hist-filtros select {
  flex: 1 1 140px; min-width: 120px; padding: 8px 10px;
  border: 1px solid var(--line); border-radius: 10px; font-size: 14px;
  background: var(--surface); color: var(--text);
}
/* Estadísticas */
#gnc-app .stat-cards { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
#gnc-app .stat-card { flex: 1 1 70px; background: var(--surface-alt); border-radius: 12px; padding: 10px 6px; text-align: center; }
#gnc-app .stat-num { font-family: var(--display); font-weight: 700; font-size: 22px; color: var(--flame); }
#gnc-app .stat-cap { font-size: 11px; color: var(--text-muted); }
#gnc-app .stat-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
#gnc-app .stat-label { flex: 0 0 42%; font-size: 13px; }
#gnc-app .stat-track { flex: 1; height: 10px; background: var(--surface-alt); border-radius: 999px; overflow: hidden; }
#gnc-app .stat-fill { height: 100%; background: var(--flame); border-radius: 999px; }
#gnc-app .stat-val { flex: 0 0 auto; font-size: 13px; font-weight: 700; min-width: 28px; text-align: right; }
#gnc-app .stat-total { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); font-size: 15px; }
#gnc-app .chip {
  flex: 1; background: var(--surface); border-radius: 16px; padding: 12px 8px;
  text-align: center; box-shadow: 0 4px 14px rgba(20,40,90,0.10);
}
#gnc-app .chip .chip-num { font-size: 22px; font-weight: 800; line-height: 1.2; }
#gnc-app .chip .chip-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
#gnc-app .chip-danger .chip-num { color: var(--danger); }
#gnc-app .chip-warn .chip-num { color: var(--warn); }
#gnc-app .chip-ok .chip-num { color: var(--ok); }

/* CONTROLS */
#gnc-app .controls {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  /* Fija arriba: al bajar por la lista de clientes, la barra de búsqueda
     (y sus botones) te sigue, así podés buscar o limpiar desde cualquier
     punto sin volver hasta arriba. */
  position: sticky; top: 0; z-index: 8;
  background: var(--bg); padding: 8px 0; margin-bottom: 10px;
}
#gnc-app input[type="text"], #gnc-app input[type="tel"], #gnc-app input[type="date"],
#gnc-app input[type="month"], #gnc-app select, #gnc-app textarea {
  background: var(--surface); border: 1px solid var(--line); color: var(--text);
  border-radius: 12px; padding: 9px 13px; font-family: var(--sans); font-size: 14px;
  outline: none; transition: border-color .15s ease, box-shadow .15s ease;
}
#gnc-app textarea { width: 100%; resize: vertical; min-height: 90px; font-family: var(--mono); font-size: 12.5px; }
#gnc-app input:focus, #gnc-app select:focus, #gnc-app textarea:focus {
  border-color: var(--flame); box-shadow: 0 0 0 3px rgba(29,91,216,0.15);
}
#gnc-app .search-wrap { position: relative; flex: 1; min-width: 180px; display: flex; }
#gnc-app .search-wrap .search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
#gnc-app .search-wrap .search-input { width: 100%; padding-left: 40px; padding-right: 40px; border-radius: 14px; box-shadow: 0 2px 8px rgba(20,40,90,0.06); }
#gnc-app .search-wrap .search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 999px; padding: 0; cursor: pointer;
  background: var(--surface-alt); border: none; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center; font-size: 15px; line-height: 1;
}
#gnc-app .search-wrap .search-clear:hover { color: var(--flame); background: var(--line); }
#gnc-app .btn {
  font-family: var(--sans); font-weight: 700; font-size: 13px; letter-spacing: 0.2px;
  border-radius: 12px; padding: 10px 16px; border: 1px solid transparent; cursor: pointer;
  min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: transform .08s ease, filter .12s ease, background-color .15s ease, border-color .15s ease;
}
#gnc-app .btn:active { transform: scale(0.96); filter: brightness(0.9); }
#gnc-app .btn-primary { background: var(--flame); color: #fff; box-shadow: 0 4px 12px rgba(29,91,216,0.30); }
#gnc-app .btn-primary:hover { filter: brightness(1.08); }
#gnc-app .btn-primary:active { filter: brightness(0.9); }
/* Botón secundario de contorno: fondo blanco, borde e ícono/texto en cobalto */
#gnc-app .btn-outline { background: var(--surface); border-color: var(--flame); color: var(--flame); }
#gnc-app .btn-outline:hover { background: rgba(29,91,216,0.06); }
#gnc-app .btn-outline:active { background: rgba(29,91,216,0.12); }
#gnc-app .btn-ghost { background: transparent; border-color: var(--line); color: var(--text-muted); }
#gnc-app .btn-ghost:hover { color: var(--flame); border-color: var(--flame-dim); background: rgba(29,91,216,0.06); }
#gnc-app .btn-ghost:active { background: rgba(29,91,216,0.12); }
#gnc-app .btn-wa { background: #E1F5EA; color: #157A44; border-color: transparent; font-size: 12px; padding: 7px 10px; }
#gnc-app .btn-wa:hover { filter: brightness(0.97); }
#gnc-app .btn-danger-outline { background: #FDE8E5; color: #C0281A; border-color: transparent; font-size: 12px; padding: 7px 10px; }
#gnc-app .btn-danger-solid { background: var(--danger); color: #fff; border-color: var(--danger); font-size: 13px; }
#gnc-app .btn-danger-solid:hover { filter: brightness(1.1); }
#gnc-app .btn-danger-solid:active { filter: brightness(0.9); }
#gnc-app .btn-agent { background: var(--flame); color: #fff; border-color: transparent; font-size: 12px; padding: 7px 10px; }
#gnc-app .btn-agent:hover { filter: brightness(1.08); }
#gnc-app .btn-sm { font-size: 12px; padding: 7px 10px; }
#gnc-app #btn-toggle-menu { min-width: 44px; }
#gnc-app input[type="text"], #gnc-app input[type="tel"],
#gnc-app input[type="date"], #gnc-app input[type="month"],
#gnc-app select { min-height: 44px; }
/* Sin esto, un <select> con una opción de texto largo (ej. "Prueba
   Hidráulica", "Operación (M/S/D/B)") no se achica por debajo de su ancho
   de contenido — ni él ni el <label> que lo envuelve, aunque estén en un
   grid de columnas angostas — y termina saliéndose del recuadro en
   pantallas chicas en vez de ajustarse. */
#gnc-app input, #gnc-app select { min-width: 0; width: 100%; box-sizing: border-box; }
#gnc-app input[type="checkbox"] { width: 20px; height: 20px; }

/* FORM PANEL */
#gnc-app .panel {
  background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
  padding: 20px; margin-bottom: 20px; box-shadow: var(--sombra);
}
#gnc-app .panel h2 {
  font-family: var(--display); font-size: 16px; font-weight: 800;
  letter-spacing: 0.3px; margin: 0 0 14px; color: var(--flame);
}
#gnc-app .panel h2.panel-h2-sticky {
  position: sticky; top: 0; z-index: 5; background: var(--surface);
  margin: -20px -20px 14px; padding: 16px 20px 10px; border-bottom: 1px solid var(--line);
}
#gnc-app .wizard-pasos {
  font-family: var(--mono); font-size: 11px; text-transform: none; letter-spacing: normal;
  color: var(--text-muted); margin-top: 4px;
}
#gnc-app .panel h3 {
  font-family: var(--display); font-size: 13px; text-transform: uppercase; font-weight: 700;
  letter-spacing: 1px; margin: 18px 0 10px; color: var(--text-muted);
  border-top: 1px solid var(--line); padding-top: 14px;
}
#gnc-app .panel h3.vehiculo-heading {
  font-size: 16px; color: var(--flame); border-top: 2px solid var(--flame-dim);
}
#gnc-app .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
#gnc-app .form-grid label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--text-muted); font-family: var(--mono); min-width: 0; }
#gnc-app .form-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
@media (max-width: 640px) { #gnc-app .form-grid { grid-template-columns: 1fr; } }

/* AGENT PASTE BOX */
#gnc-app .agent-box {
  background: var(--surface-alt); border: 1px dashed var(--flame-dim); border-radius: 8px;
  padding: 14px; margin-top: 14px;
}
#gnc-app .agent-box label { display: block; font-family: var(--mono); font-size: 11px; color: var(--flame); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#gnc-app .agent-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
#gnc-app .agent-result { font-family: var(--mono); font-size: 12px; margin-top: 10px; padding: 10px; border-radius: 12px; background: rgba(29,91,216,0.06); border: 1px solid var(--flame-dim); }
#gnc-app .agent-result.err { background: #FDE8E5; border-color: #F0B4AB; color: #C0281A; }

/* SCAN BOX (fotos DNI / Cedula) */
#gnc-app .scan-box {
  background: var(--surface-alt); border: 1px dashed var(--flame-dim); border-radius: 8px;
  padding: 16px; margin-bottom: 18px;
}
#gnc-app .scan-box h3 { margin: 0 0 4px; border: none; padding: 0; }
#gnc-app .scan-sub { font-size: 12px; color: var(--text-muted); margin: 0 0 12px; }
#gnc-app .scan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (max-width: 640px) { #gnc-app .scan-grid { grid-template-columns: 1fr; } }
/* Variante de 2 columnas (Frente/Dorso): en el celular se apilan (1 columna)
   para que los botones Cámara/Fotos entren cómodos y alineados. */
#gnc-app .scan-grid-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 640px) { #gnc-app .scan-grid-2 { grid-template-columns: 1fr; } }
#gnc-app .scan-slot { display: flex; flex-direction: column; gap: 6px; }
#gnc-app .scan-slot label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
#gnc-app .scan-slot input[type="file"] {
  font-size: 11px; color: var(--text-muted); background: var(--surface);
  border: 1px solid var(--line); border-radius: 6px; padding: 8px; width: 100%;
}
#gnc-app .scan-thumb { width: 100%; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid var(--line); display: none; }
#gnc-app .scan-slot-buttons { display: flex; gap: 6px; }
#gnc-app .scan-slot-buttons label.btn {
  flex: 1; min-width: 0; text-align: center; justify-content: center; cursor: pointer;
  padding-left: 8px; padding-right: 8px; gap: 4px;
  font-family: inherit; font-size: 12px; text-transform: none; letter-spacing: normal; color: inherit;
}
#gnc-app .scan-actions { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
#gnc-app .scan-status { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
#gnc-app .scan-status.ok { color: var(--ok); }
#gnc-app .scan-status.err { color: var(--danger); }
#gnc-app .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

/* LIST */
#gnc-app .empty {
  text-align: center; padding: 50px 20px; color: var(--text-muted);
  border: 1px dashed var(--line); border-radius: 10px; font-family: var(--mono); font-size: 13px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
#gnc-app .empty svg { opacity: 0.55; }

/* ANIMACION DE ENTRADA — solo se aplica cuando un panel recién se abre (ver
   prevPanelState en render()), no en cada re-render mientras sigue abierto,
   para no repetir la animación por cambios chicos adentro. */
@keyframes gncPanelIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
#gnc-app .panel-entrando { animation: gncPanelIn 190ms ease-out; }

/* CARGA */
@keyframes gncSpin { to { transform: rotate(360deg); } }
#gnc-app .gnc-spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 3px solid var(--line); border-top-color: var(--flame);
  animation: gncSpin 0.8s linear infinite; flex-shrink: 0;
}
#gnc-app .gnc-loading-row { display: flex; align-items: center; gap: 10px; }

/* MODAL PROPIO (reemplaza alert/confirm nativos) */
@keyframes gncModalFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes gncModalPop { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.gnc-modal-overlay {
  position: fixed; inset: 0; background: rgba(20,35,60,0.45); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: gncModalFade 150ms ease-out; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
}
.gnc-modal-overlay.closing { animation: gncModalFade 150ms ease-in reverse; }
.gnc-modal-box {
  width: 100%; max-width: 320px; background: #FFFFFF;
  border: 1px solid #E3E8F0; border-radius: 18px; padding: 18px;
  box-shadow: 0 12px 32px rgba(20,40,90,0.22); animation: gncModalPop 180ms ease-out;
  color: #1A2333;
}
.gnc-modal-overlay.closing .gnc-modal-box { animation: gncModalPop 150ms ease-in reverse; }
.gnc-modal-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
.gnc-modal-icon {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; font-size: 15px; font-weight: 700;
  background: rgba(29,91,216,0.12); color: #1D5BD8;
}
.gnc-modal-box.danger .gnc-modal-icon { background: #FDE8E5; color: #C0281A; }
.gnc-modal-title {
  font-family: inherit; font-size: 14px; font-weight: 800;
  letter-spacing: 0.2px; margin-bottom: 4px;
}
.gnc-modal-msg { font-size: 12.5px; color: #6B7688; line-height: 1.5; }
.gnc-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
/* Los modales viven fuera de #gnc-app, así que sus botones necesitan
   estilos propios (si no, quedan con el look gris nativo del navegador). */
.gnc-modal-box .btn {
  font-family: inherit; font-weight: 700; font-size: 13px; letter-spacing: 0.2px;
  border-radius: 12px; padding: 9px 16px; border: 1px solid transparent;
  cursor: pointer; min-height: 40px; background: transparent;
}
.gnc-modal-box .btn:active { transform: scale(0.96); }
.gnc-modal-box .btn-primary { background: #1D5BD8; color: #fff; }
.gnc-modal-box .btn-danger-solid { background: #D93B2B; color: #fff; }
.gnc-modal-box .btn-ghost { border-color: #E3E8F0; color: #6B7688; }
.gnc-modal-box .btn-ghost:hover { color: #1D5BD8; border-color: #7FA3E8; }
.gnc-modal-box select, .gnc-modal-box input {
  background: #fff; border: 1px solid #E3E8F0; color: #1A2333;
  border-radius: 12px; padding: 9px 13px; font-family: inherit; font-size: 14px;
  width: 100%; min-height: 44px; box-sizing: border-box; outline: none;
}
.gnc-modal-box select:focus, .gnc-modal-box input:focus {
  border-color: #1D5BD8; box-shadow: 0 0 0 3px rgba(29,91,216,0.15);
}
/* Modales en modo oscuro (viven fuera de #gnc-app) */
body.gnc-dark .gnc-modal-box { background: #1B2029; border-color: #313A4B; color: #E7ECF3; }
body.gnc-dark .gnc-modal-msg { color: #9AA6B8; }
body.gnc-dark .gnc-modal-box .btn-ghost { border-color: #313A4B; color: #9AA6B8; }
body.gnc-dark .gnc-modal-box select, body.gnc-dark .gnc-modal-box input { background: #232B39; border-color: #313A4B; color: #E7ECF3; }
.gnc-modal-box .form-grid { display: grid; gap: 12px; }
.gnc-modal-box .form-grid label {
  display: flex; flex-direction: column; gap: 5px;
  font-size: 12px; color: #6B7688; font-weight: 600;
}

/* BOTON FLOTANTE (FAB) — la puerta de entrada a los trámites nuevos,
   visible en mobile y en compu */
#gnc-app .fab-nuevo-tramite {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  position: fixed; bottom: 20px; right: 20px; min-height: 54px; padding: 0 22px;
  border-radius: 999px; background: var(--flame); color: #fff; font-size: 15px;
  font-weight: 700; border: none; box-shadow: 0 6px 18px rgba(29,91,216,0.40);
  z-index: 40; cursor: pointer; line-height: 1;
}
#gnc-app .fab-nuevo-tramite:active { transform: scale(0.92); filter: brightness(0.85); }

/* BARRA DE NAVEGACION INFERIOR — solo en mobile (estilo app) */
#gnc-app .bottom-nav { display: none; }
@media (max-width: 720px) {
  #gnc-app .bottom-nav {
    display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 45;
    background: var(--surface); border-top: 1px solid var(--line);
    padding: 6px 0 max(10px, env(safe-area-inset-bottom));
    box-shadow: 0 -2px 10px rgba(20,40,90,0.06);
  }
  #gnc-app .bottom-nav .bn-item {
    flex: 1; background: none; border: none; cursor: pointer; padding: 4px 0;
    font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 2px; position: relative;
  }
  #gnc-app .bottom-nav .bn-item.activo { color: var(--flame); }
  #gnc-app .bottom-nav .bn-ico { font-size: 19px; line-height: 1.2; }
  #gnc-app .bottom-nav .bn-badge {
    position: absolute; top: -2px; right: calc(50% - 24px);
    background: var(--danger); color: #fff; font-size: 10px; font-weight: 800;
    border-radius: 999px; padding: 1px 6px;
  }
  #gnc-app .wrap { padding-bottom: 120px; }
  #gnc-app .fab-nuevo-tramite { bottom: 86px; }
}
#gnc-app .client-card-wrap { position: relative; margin-bottom: 14px; border-radius: 18px; overflow: hidden; }
#gnc-app .client-card {
  background: var(--surface); border: 1px solid var(--line); border-left: 5px solid var(--line);
  border-radius: 18px; padding: 16px 18px; position: relative; z-index: 1;
  box-shadow: var(--sombra); transition: box-shadow .15s ease;
  touch-action: pan-y;
}
#gnc-app .client-card:hover { box-shadow: 0 6px 18px rgba(20,40,90,0.13); }
#gnc-app .client-swipe-delete {
  position: absolute; inset: 0; z-index: 0; border: none; border-radius: 18px;
  background: var(--danger); color: #fff; font-family: var(--sans); font-weight: 700; font-size: 13px;
  display: flex; align-items: center; justify-content: flex-end; padding-right: 24px; cursor: pointer;
}
#gnc-app .client-card.st-danger { border-left-color: var(--danger); }
#gnc-app .client-card.st-warn { border-left-color: var(--warn); }
#gnc-app .client-card.st-ok { border-left-color: var(--ok); }
#gnc-app .client-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
#gnc-app .client-patente { font-family: var(--display); font-weight: 800; font-size: 21px; letter-spacing: 1px; }
#gnc-app .client-modelo { font-family: var(--sans); font-size: 13px; color: var(--text-muted); margin-top: 2px; }
#gnc-app .client-name { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text); margin-top: 4px; }
#gnc-app .client-actions { display: flex; gap: 8px; flex-wrap: wrap; }
#gnc-app .client-detalle { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
/* Tarjeta con el detalle desplegado: se resalta para que se distinga
   claramente de las tarjetas de abajo y no se mezcle visualmente. */
#gnc-app .client-card-wrap.expandido { z-index: 2; overflow: visible; }
#gnc-app .client-card.expandida { box-shadow: 0 14px 36px rgba(20,40,90,0.22); border-color: var(--flame-dim); }
/* Ícono de información unificado de toda la app: circulito con "i" que
   despliega/oculta el texto de ayuda que le sigue. */
#gnc-app .info-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; min-height: 22px; padding: 0; margin-left: 8px;
  border-radius: 50%; border: 1.5px solid var(--flame); background: var(--surface);
  color: var(--flame); font-weight: 800; font-size: 13px; font-family: Georgia, serif; font-style: italic;
  cursor: pointer; vertical-align: middle; flex-shrink: 0;
}
#gnc-app .ayuda-desplegable {
  background: var(--surface-alt); border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 14px; font-size: 13px; color: var(--text-muted); line-height: 1.55; margin: 8px 0 12px;
}
#gnc-app .btn:disabled, #gnc-app .btn[disabled] { opacity: .45; filter: grayscale(1); cursor: not-allowed; pointer-events: none; }
/* Tachito de eliminar: lejos de los botones de acción principales. */
#gnc-app .btn-trash { margin-left: auto; background: #FDE8E5; color: #C0281A; border: none; padding: 8px 10px; }
#gnc-app .btn-trash svg { display: block; }
#gnc-app .search-lupa { flex-shrink: 0; border-radius: 14px; padding: 0 16px; }
#gnc-app .search-lupa svg { display: block; }
/* Historial: patente protagonista, tipo de trámite segundo, nombre chico. */
#gnc-app .hist-dia { font-size: 12.5px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
#gnc-app .hist-dia-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 9px 10px; margin: 14px 0 8px; background: var(--surface-alt); border: 1px solid var(--line); border-radius: 10px; }
#gnc-app .hist-dia-toggle.abierto { color: var(--flame); border-color: var(--flame-dim); }
#gnc-app .hist-dia-count { font-weight: 700; opacity: .7; letter-spacing: normal; }
#gnc-app .hist-dia-caret { color: var(--flame); font-size: 12px; }
#gnc-app .hist-hora { color: var(--flame); font-weight: 700; }
#gnc-app .hist-patente { font-family: var(--display); font-weight: 800; font-size: 18px; letter-spacing: 1px; }
#gnc-app .hist-tipo { font-size: 13.5px; font-weight: 700; margin-top: 1px; }
#gnc-app .hist-nombre { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
#gnc-app .turno-confirmar { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
#gnc-app .hist-modelo { font-family: var(--sans); font-size: 13px; font-weight: 600; letter-spacing: 0; color: var(--text-muted); }
/* Zona tocable de la fila del historial: al tocarla se despliega el
   detalle del cliente hacia abajo (los botones de la derecha quedan aparte). */
#gnc-app .hist-tocable { cursor: pointer; flex: 1; min-width: 0; }
#gnc-app .hist-tocable:hover .hist-patente { color: var(--flame); }
#gnc-app .hist-row-abierto { background: var(--surface-alt); border-radius: 12px 12px 0 0; }
#gnc-app .hist-detalle { background: var(--surface-alt); border-radius: 0 0 12px 12px; padding: 4px 12px 12px; margin: -6px 0 8px; }
/* Bloques de PEC en la configuración del taller (puede haber varios). */
#gnc-app .pec-bloque { border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; background: var(--surface); }
#gnc-app .pec-bloque-titulo { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 800; margin-bottom: 8px; color: var(--flame); }
#gnc-app .pec-bloque-titulo .btn-trash { margin-left: 8px; }
#gnc-app .client-detalle-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 16px; font-size: 12px; margin-bottom: 10px;
}
@media (max-width: 640px) { #gnc-app .client-detalle-grid { grid-template-columns: 1fr; } }
#gnc-app .client-detalle-grid .doc-label { display: block; margin-bottom: 2px; }
#gnc-app .docs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
@media (max-width: 640px) { #gnc-app .docs { grid-template-columns: 1fr; } }
#gnc-app .doc-row {
  background: var(--surface-alt); border-radius: 12px; padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
  transition: background-color .15s ease;
}
#gnc-app .doc-row:hover { background: #E4EBF7; }
#gnc-app .doc-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
#gnc-app .doc-date { font-family: var(--mono); font-size: 13px; }
#gnc-app .doc-sub { font-family: var(--mono); font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
#gnc-app .badge {
  font-family: var(--sans); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 3px 9px; border-radius: 999px; font-weight: 700;
}
#gnc-app .badge-danger { background: #FDE8E5; color: #C0281A; }
#gnc-app .badge-warn { background: #FCF1DC; color: #B36F00; }
#gnc-app .badge-ok { background: #E1F5EA; color: #157A44; }

#gnc-app .hidden { display: none !important; }
#gnc-app .loading {
  text-align: center; padding: 40px; color: var(--text-muted); font-family: var(--mono); font-size: 12px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

/* ACTIVATION SCREEN */
#gnc-app .activation-wrap { max-width: 420px; padding-top: 80px; }
#gnc-app .activation-panel #activation-input { width: 100%; margin-bottom: 4px; }
#gnc-app .activation-hint { font-size: 13px; color: var(--text-muted); margin: 0 0 16px; line-height: 1.5; }
#gnc-app .activation-terminos { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--text-muted); margin: 10px 0 4px; line-height: 1.5; }
#gnc-app .activation-terminos input[type="checkbox"] { width: 18px; height: 18px; min-height: 18px; margin-top: 2px; flex-shrink: 0; }
#gnc-app .activation-terminos a { color: var(--flame); font-weight: 600; }
#gnc-app .activation-error { color: #C0392B; font-size: 13px; margin-top: 8px; line-height: 1.4; }
#gnc-app .activation-registro { border-top: 1px solid var(--line); margin-top: 20px; padding-top: 16px; }
#gnc-app .activation-registro input { width: 100%; margin-bottom: 8px; }
#gnc-app .activation-copyright { font-size: 11px; color: var(--text-muted); opacity: .8; margin: 20px 0 0; line-height: 1.4; text-align: center; }
#gnc-app .license-link {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0;
}
#gnc-app .license-link:hover { color: var(--flame); }

/* TRAMITES */
#gnc-app .tramites-list { display: flex; flex-direction: column; gap: 8px; }
#gnc-app .tramite-row {
  background: var(--surface-alt); border-radius: 12px; padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
}
#gnc-app .tramite-row select { font-size: 11px; padding: 5px 7px; }
#gnc-app .tramite-row-info { flex: 1; min-width: 150px; }
#gnc-app .tramite-row-acciones { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
#gnc-app .rev-estado { font-size: 12px; margin-top: 3px; font-weight: 600; }
#gnc-app .rev-estado.pend { color: var(--warn); }
#gnc-app .rev-estado.obs { color: var(--danger); }
#gnc-app .rev-estado.ok { color: var(--ok); }
#gnc-app .rev-bitacora { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 8px; }
#gnc-app .rev-bitacora-tit { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
#gnc-app .rev-bitacora-item { font-size: 12.5px; margin-bottom: 3px; }
#gnc-app .rev-bitacora-fecha { color: var(--text-muted); font-family: var(--mono); font-size: 11px; }
#gnc-app .tramite-motivo { font-family: var(--mono); font-size: 11px; color: var(--danger); margin-top: 2px; width: 100%; }

/* FIRMA ELECTRONICA */
#gnc-app .signature-box canvas {
  width: 100%; height: 160px; touch-action: none; display: block;
  background: var(--surface-alt); border: 1px solid var(--line); border-radius: 8px;
}
#gnc-app .firma-details { margin-top: 12px; }
#gnc-app .firma-details > summary { cursor: pointer; font-family: var(--mono); font-size: 11px; color: var(--text-muted); padding: 6px 0; }
#gnc-app .firma-details > summary:hover { color: var(--flame); }

/* IMPORTACION MASIVA */
#gnc-app .import-preview { max-height: 320px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; margin: 12px 0; }
#gnc-app .import-preview table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11.5px; }
#gnc-app .import-preview th, #gnc-app .import-preview td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--line); }
#gnc-app .import-preview th { position: sticky; top: 0; background: var(--surface); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; }
#gnc-app .import-summary { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-top: 8px; }

/* BANNERS */
#gnc-app .reminder-banner, #gnc-app .incompletos-banner { border-color: var(--flame-dim); }
#gnc-app .reminder-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

/* EQUIPO (grilla del tramite) */
#gnc-app .equipo-fila { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; align-items: end; }
#gnc-app .equipo-fila label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); display: flex; flex-direction: column; gap: 4px; min-width: 0; }
@media (max-width: 900px) { #gnc-app .equipo-fila { grid-template-columns: 1fr 1fr; } }
@media (max-width: 480px) { #gnc-app .equipo-fila { grid-template-columns: 1fr; } }
#gnc-app .equipo-grupo { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px dashed var(--line); }
#gnc-app .equipo-grupo:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
#gnc-app .equipo-operacion { color: var(--warn) !important; }
#gnc-app .equipo-operacion select {
  border-color: var(--warn); background: rgba(242,169,59,0.1); color: var(--warn); font-weight: 600;
}
#gnc-app .campo-obligatorio { color: var(--warn) !important; }
#gnc-app .campo-obligatorio input {
  border-color: var(--warn); background: rgba(242,169,59,0.08);
}
#gnc-app details.otros-equipos { margin-top: 14px; border: 1px dashed var(--line); border-radius: 8px; padding: 10px 14px; }
#gnc-app details.otros-equipos summary { cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--flame); text-transform: uppercase; letter-spacing: 1px; }
#gnc-app details.otros-equipos .form-grid { margin-top: 12px; }
</style>

<script>
(function(){
  const root = document.getElementById('gnc-app');
  const WARN_DAYS = 5;
  const STORAGE_KEY = 'gnc_clientes_v2';
  const TALLER_KEY = 'gnc_taller_nombre_v1';
  const LICENSE_KEY = 'gnc_license_code';
  const TALLER_CONFIG_KEY = 'gnc_taller_config_v1';
  // Fecha en que el taller aceptó Términos y Privacidad (constancia local).
  const TERMS_KEY = 'gnc_terms_accepted_v1';
  // WhatsApp comercial al que llegan las solicitudes de registro de talleres.
  const REGISTRO_WHATSAPP = '5492236009347';

  // Chrome/Android dispara este evento cuando la app cumple los requisitos
  // para instalarse (manifest + service worker ya están OK) — lo guardamos
  // para poder mostrar un botón propio "Instalar app" en vez de depender de
  // que el usuario encuentre la opción en el menú del navegador. En iPhone
  // Safari no existe este evento — ahí instalar es siempre manual (Compartir
  // → Agregar a pantalla de inicio).
  let deferredInstallPrompt = null;
  let showInstallButton = false;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    showInstallButton = true;
    if (typeof render === 'function' && ready) render();
  });

  // Tocar en cualquier lado fuera de la tarjeta deslizada (swipe para
  // eliminar) la cierra — mismo patrón que las apps de mail en el celular.
  // Se registra una sola vez acá (no en cada render) para no acumular
  // listeners iguales.
  document.addEventListener('click', (e) => {
    if (swipeAbiertoId === null) return;
    const abierta = root.querySelector(`.client-card-wrap[data-client-id="${swipeAbiertoId}"]`);
    if (abierta && abierta.contains(e.target)) return;
    swipeAbiertoId = null;
    if (typeof render === 'function' && ready) render();
  });

  // Lo mismo para el menú desplegable (☰): tocar en cualquier lado fuera
  // del menú lo cierra. OJO: hay que mirar los ancestros del elemento
  // tocado (closest), no el .menu-wrap actual del DOM — el click que abre
  // el menú re-renderiza la pantalla antes de llegar acá, y el botón
  // tocado ya quedó fuera del DOM nuevo (compararlo contra el wrap nuevo
  // cerraba el menú en el mismo toque que lo abría).
  document.addEventListener('click', (e) => {
    if (!menuOpen) return;
    if (e.target && e.target.closest && e.target.closest('.menu-wrap')) return;
    menuOpen = false;
    if (typeof render === 'function' && ready) render();
  });

  const TALLER_CONFIG_DEFAULT = {
    razonSocial: '', direccion: '', horario: '', cuit: '',
    tecnicoNombre: '', tecnicoMatricula: '',
    codigoPec: '', codigoTaller: '',
    pecRazonSocial: '', pecDireccion: '', pecTelefono: '', pecIngeniero: '', pecMatriculaCipba: '',
    // Corrimiento en milímetros para "Imprimir solo los datos" sobre una
    // planilla preimpresa que no salió de Estelita.
    impresionAjusteX: 0, impresionAjusteY: 0,
    // Precio por tipo de trámite (solo para la estimación de ingresos en
    // Estadísticas). { conversion: 50000, ... }
    precios: {},
    // Centros de reprueba (CRPC) que trabaja el taller, siglas separadas por
    // coma. Alimentan el desplegable del cilindro y la prueba hidráulica.
    centrosReprueba: 'GNSE, MMDP',
    // Con cuántos meses de anticipación se avisan los vencimientos (oblea /
    // prueba hidráulica). 1 = solo el mes en curso; 2 = este mes y el próximo
    // (por defecto); 3 = hasta 3 meses adelante.
    avisoAnticipacionMeses: 2,
    // Lista de PECs del taller (algunos talleres trabajan con más de uno).
    // Los campos pec* planos de arriba quedan como espejo del primer PEC
    // por compatibilidad con datos ya guardados.
    pecs: []
  };

  function blankPec() {
    return { codigoPec: '', razonSocial: '', direccion: '', telefono: '', ingeniero: '', matriculaCipba: '' };
  }

  // Migra la config vieja (un solo PEC en campos planos) a la lista pecs.
  function migrarPecsConfig(tc) {
    if (!Array.isArray(tc.pecs)) tc.pecs = [];
    if (!tc.pecs.length && (tc.pecRazonSocial || tc.codigoPec || tc.pecTelefono || tc.pecIngeniero || tc.pecDireccion)) {
      tc.pecs.push({
        codigoPec: tc.codigoPec || '', razonSocial: tc.pecRazonSocial || '',
        direccion: tc.pecDireccion || '', telefono: tc.pecTelefono || '',
        ingeniero: tc.pecIngeniero || '', matriculaCipba: tc.pecMatriculaCipba || '',
      });
    }
    if (!tc.pecs.length) tc.pecs.push(blankPec());
    return tc;
  }

  // PEC al que corresponde un trámite (elegido al iniciarlo). Si el trámite
  // es viejo y no tiene pecIndex, se usa el primero.
  function pecDeTramite(tramite) {
    const pecs = (tallerConfig.pecs && tallerConfig.pecs.length) ? tallerConfig.pecs : [blankPec()];
    const i = tramite && Number.isInteger(tramite.pecIndex) ? tramite.pecIndex : 0;
    return pecs[i] || pecs[0];
  }

  let clientes = [];
  let tallerNombre = 'Mi Taller GNC';
  let tallerConfig = { ...TALLER_CONFIG_DEFAULT };
  let showTallerConfig = false;
  // Sección de la configuración abierta (acordeón): null = todas cerradas.
  let tallerConfigSeccion = null;
  // Desplegable del registro de autos revisados por el técnico.
  let registroTecnicoAbierto = false;
  // Id del cliente para el que está abierto el asistente "Inicio de trámite"
  // (null = todavía no se abrió ninguno, o se está dando de alta uno nuevo
  // vía showForm).
  let editingId = null;
  let ready = false;
  // Ids de clientes cuya tarjeta tiene el detalle (datos + historial de
  // trámites) desplegado — no hace falta entrar a editar solo para mirar.
  const clientesExpandidos = new Set();
  // Ids de clientes que tienen fotos de documentación guardadas — para
  // mostrar el botón "Documentación" habilitado solo cuando hay algo que ver.
  let clientesConFotos = new Set();
  // Snapshot del estado de los paneles en el render anterior — se usa para
  // saber si un panel "recién se abrió" (y animarlo) o si sigue abierto
  // desde antes (y no repetir la animación).
  let prevPanelState = {};
  // Id del cliente cuya tarjeta quedó deslizada (swipe para eliminar) en
  // mobile — null si ninguna está abierta.
  let swipeAbiertoId = null;

  root.innerHTML = '<div class="loading"><span class="gnc-spinner"></span> Cargando datos del taller...</div>';

  function showActivationScreen() {
    root.innerHTML = `
      <div class="wrap activation-wrap">
        <div class="panel activation-panel">
          <h2>Activar Estelita</h2>
          <p class="activation-hint">Ingresá el código de licencia de tu taller.</p>
          <form id="activation-form">
            <input type="text" id="activation-input" placeholder="Ej: GNC-0001" autocomplete="off">
            <label class="activation-terminos">
              <input type="checkbox" id="activation-terminos-check">
              <span>Leí y acepto los <a href="terminos.html" target="_blank" rel="noopener">Términos y Condiciones</a> y la <a href="privacidad.html" target="_blank" rel="noopener">Política de Privacidad</a>.</span>
            </label>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Activar</button>
            </div>
            <div class="activation-error" id="activation-error"></div>
          </form>
          <div class="activation-registro">
            <p class="activation-hint" style="margin-bottom:8px;">¿Todavía no tenés tu código?</p>
            <button type="button" class="btn btn-ghost" id="btn-mostrar-registro">Registrá tu taller</button>
            <form id="registro-form" style="display:none; margin-top:12px;">
              <input type="text" id="reg-taller" placeholder="Nombre del taller" autocomplete="off">
              <input type="text" id="reg-localidad" placeholder="Localidad" autocomplete="off">
              <input type="text" id="reg-nombre" placeholder="Tu nombre" autocomplete="off">
              <div class="form-actions">
                <button type="submit" class="btn btn-agent">Enviar solicitud por WhatsApp</button>
              </div>
              <p class="activation-hint">Se abre un chat de WhatsApp con nosotros, con tus datos ya escritos. Te contestamos con el código de licencia y cómo activar la suscripción.</p>
            </form>
          </div>
          <p class="activation-copyright">© Estelita — Matías Agustín Casimir. Software propietario. Todos los derechos reservados. Prohibida su reproducción o distribución total o parcial.</p>
        </div>
      </div>
    `;
    const form = root.querySelector('#activation-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = root.querySelector('#activation-input');
      const errorEl = root.querySelector('#activation-error');
      const botonActivar = form.querySelector('button[type=submit]');
      const code = input.value.trim();
      if (!code) return;
      if (!root.querySelector('#activation-terminos-check').checked) {
        errorEl.textContent = 'Para activar, marcá la casilla de aceptación de los Términos y la Política de Privacidad.';
        return;
      }
      // El código de vinculación del técnico (6 números) no es una licencia
      // de Estelita — redirigir a la app correcta antes de molestar al server.
      if (/^\d{6}$/.test(code)) {
        errorEl.textContent = 'Ese parece el código de vinculación del técnico. La app del técnico es otra: abrí taller-gnc.vercel.app/tecnico.html y ponelo ahí.';
        return;
      }
      // Validación REAL contra el servidor: sin esto, cualquier texto
      // "activaba" la app (la licencia solo se controlaba al usar la IA).
      errorEl.textContent = '';
      botonActivar.disabled = true;
      botonActivar.textContent = 'Verificando...';
      try {
        const r = await fetch('/api/licencia', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license: code }),
        });
        if (r.status === 403) {
          errorEl.textContent = 'Ese código de licencia no es válido. Revisalo, o registrá tu taller acá abajo para conseguir el tuyo.';
          return;
        }
        if (!r.ok) throw new Error('Error ' + r.status);
      } catch (e2) {
        errorEl.textContent = 'No pudimos verificar el código (¿hay conexión a internet?). Probá de nuevo en un momento.';
        return;
      } finally {
        botonActivar.disabled = false;
        botonActivar.textContent = 'Activar';
      }
      localStorage.setItem(TERMS_KEY, new Date().toISOString());
      localStorage.setItem(LICENSE_KEY, code);
      boot();
    });
    root.querySelector('#btn-mostrar-registro').addEventListener('click', () => {
      const f = root.querySelector('#registro-form');
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
    });
    root.querySelector('#registro-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const taller = root.querySelector('#reg-taller').value.trim();
      const localidad = root.querySelector('#reg-localidad').value.trim();
      const nombre = root.querySelector('#reg-nombre').value.trim();
      const msg = `Hola! Quiero registrar mi taller en Estelita.\nTaller: ${taller || '-'}\nLocalidad: ${localidad || '-'}\nMi nombre: ${nombre || '-'}`;
      window.open(`https://wa.me/${REGISTRO_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
    });
  }

  const THEME_KEY = 'gnc_theme';
  function temaOscuroActivo() { return localStorage.getItem(THEME_KEY) === 'dark'; }
  function aplicarTema() {
    const dark = temaOscuroActivo();
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    // Los modales viven fuera de #gnc-app: se tematizan con una clase en body.
    document.body.classList.toggle('gnc-dark', dark);
  }
  function toggleTema() {
    localStorage.setItem(THEME_KEY, temaOscuroActivo() ? 'light' : 'dark');
    aplicarTema();
  }

  function boot() {
    aplicarTema();
    cargarCodigosPostales(); // en segundo plano; completa el CPA por localidad
    if (!localStorage.getItem(LICENSE_KEY)) {
      showActivationScreen();
    } else {
      loadData();
    }
  }

  async function revalidarLicencia() {
    try {
      const r = await fetch('/api/licencia', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ license: localStorage.getItem(LICENSE_KEY) }),
      });
      if (r.status === 403) {
        localStorage.removeItem(LICENSE_KEY);
        await customAlert('El código de licencia de este equipo ya no es válido. Ingresá un código vigente para seguir usando Estelita (los datos guardados no se borran).', 'Licencia');
        boot();
      }
    } catch (e) { /* sin conexión: la app sigue funcionando offline */ }
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function fmtMonthYear(ym) {
    if (!ym) return '—';
    const [y,m] = ym.split('-');
    return `${m}/${y}`;
  }

  function daysUntil(iso) {
    if (!iso) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(iso + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function statusOf(iso) {
    const d = daysUntil(iso);
    if (d === null) return { level: 'none', label: 'Sin fecha', days: null };
    if (d < 0) return { level: 'danger', label: `Vencido hace ${Math.abs(d)}d`, days: d };
    if (d <= WARN_DAYS) return { level: 'warn', label: d === 0 ? 'Vence hoy' : `Vence en ${d}d`, days: d };
    return { level: 'ok', label: `Vence en ${d}d`, days: d };
  }

  // Deriva el vencimiento de la Prueba Hidráulica (CRPC) a partir de la fecha
  // de revisión (mes/año) + la periodicidad del cilindro (3 o 5 años).
  // Se aproxima al primer día del mes de vencimiento, ya que ENARGAS solo
  // informa mes/año, no el día exacto.
  function phVencimientoISO(fecha_crpc, tipo_cilindro) {
    if (!fecha_crpc) return null;
    const [y, m] = fecha_crpc.split('-').map(Number);
    const years = tipo_cilindro === '3' ? 3 : 5;
    const vencY = y + years;
    return `${vencY}-${String(m).padStart(2,'0')}-01`;
  }

  function worstStatus(cliente) {
    const a = statusOf(cliente.fecha_oblea);
    const phIso = phVencimientoISO(cliente.fecha_crpc, cliente.tipo_cilindro);
    const b = statusOf(phIso);
    const order = { danger: 0, warn: 1, ok: 2, none: 3 };
    return order[a.level] <= order[b.level] ? a : b;
  }

  function cleanPhone(p) { return (p || '').replace(/\D/g, ''); }

  // Validaciones de formato (no bloquean: solo muestran un aviso suave).
  function patenteValida(p) {
    const s = (p || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    return /^[A-Z]{3}\d{3}$/.test(s)        // auto viejo: ABC123
      || /^[A-Z]{2}\d{3}[A-Z]{2}$/.test(s)  // auto Mercosur: AB123CD
      || /^\d{3}[A-Z]{3}$/.test(s)          // moto vieja: 123ABC
      || /^[A-Z]\d{3}[A-Z]{3}$/.test(s);    // moto Mercosur: A123BCD
  }
  function cuitValido(c) { return (c || '').replace(/\D/g, '').length === 11; }

  // --- Mensajes de WhatsApp editables por el taller ---
  // Cada taller puede reescribir estos textos en la configuración para
  // ponerle su impronta. Las {etiquetas} se reemplazan al enviar. Para
  // sumar un mensaje nuevo en el futuro, alcanza con agregarlo acá.
  const MENSAJES_DEFAULT = {
    vencimiento: {
      label: 'Aviso de vencimiento (oblea / prueba hidráulica)',
      etiquetas: ['nombre', 'patente', 'estado', 'que', 'taller', 'direccion', 'horario'],
      texto: `¡Buen día! 😊
Te recordamos que {estado} {que} de tu vehículo (patente {patente}).

Documentación para realizar la renovación:
✅ Cédula del gas
✅ Cédula verde
✅ DNI

📅 Podés venir a renovarla de {horario}
📍 {taller} – {direccion}

¡Te esperamos! 😊`,
    },
    obleaLista: {
      label: 'Aviso "llegó tu oblea"',
      etiquetas: ['nombre', 'patente', 'taller', 'direccion', 'horario'],
      texto: `Hola {nombre}! Queríamos avisarte que llegó tu oblea. Podés pasar a retirarla por {taller}, {direccion}, {horario}. ¡Te esperamos!`,
    },
    turno: {
      label: 'Recordatorio de turno',
      etiquetas: ['nombre', 'patente', 'fecha', 'hora', 'motivo', 'taller', 'direccion', 'horario'],
      texto: `Hola {nombre}! Te recordamos tu turno para {fecha}{hora}{motivo} en {taller}, {direccion}. ¡Te esperamos!`,
    },
    saludo: {
      label: 'Saludo general (botón WhatsApp de la tarjeta)',
      etiquetas: ['nombre', 'patente', 'taller'],
      texto: `Hola {nombre}! Te escribimos de {taller}.`,
    },
  };

  function plantillaMensaje(key) {
    const custom = tallerConfig.mensajes && tallerConfig.mensajes[key];
    return (typeof custom === 'string' && custom.trim()) ? custom : MENSAJES_DEFAULT[key].texto;
  }
  // Reemplaza {etiquetas} por sus valores; las que no vengan se borran.
  function renderMensaje(key, vars) {
    let t = plantillaMensaje(key);
    Object.entries(vars || {}).forEach(([k, v]) => { t = t.split('{' + k + '}').join(v == null ? '' : String(v)); });
    return t.replace(/\{[a-zA-Z]+\}/g, '').replace(/[ \t]{2,}/g, ' ');
  }
  function varsTaller() {
    return {
      taller: tallerNombre || '',
      direccion: tallerConfig.direccion || '',
      horario: tallerConfig.horario || 'lunes a viernes de 9 a 17 hs',
    };
  }

  // Mensaje de aviso de vencimiento. Por defecto NO incluye el nombre (a
  // veces no lo tenemos), pero el taller puede sumar {nombre} si quiere.
  function waLink(cliente, tipo) {
    const phone = cleanPhone(cliente.telefono);
    let status, queVence;
    if (tipo === 'oblea') {
      status = statusOf(cliente.fecha_oblea);
      queVence = 'la oblea de GNC';
    } else {
      const phIso = phVencimientoISO(cliente.fecha_crpc, cliente.tipo_cilindro);
      status = statusOf(phIso);
      queVence = 'la revisión periódica del cilindro (Prueba Hidráulica / CRPC)';
    }
    const vencida = status.days !== null && status.days < 0;
    const msg = renderMensaje('vencimiento', {
      ...varsTaller(),
      nombre: cliente.nombre || '',
      patente: cliente.patente || '',
      estado: vencida ? 'venció' : 'este mes vence',
      que: queVence,
    });
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  // Link de WhatsApp genérico (no atado a oblea/prueba) para contactar al
  // cliente por cualquier motivo desde su tarjeta.
  function waLinkGeneral(cliente) {
    const phone = cleanPhone(cliente.telefono);
    const msg = renderMensaje('saludo', { ...varsTaller(), nombre: cliente.nombre || '', patente: cliente.patente || '' });
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  async function loadData() {
    try {
      const res = await window.storage.get(STORAGE_KEY, false);
      clientes = res ? JSON.parse(res.value) : [];
    } catch (e) { clientes = []; }
    try {
      const res2 = await window.storage.get(TALLER_KEY, false);
      tallerNombre = res2 ? JSON.parse(res2.value) : 'Mi Taller GNC';
    } catch (e) { tallerNombre = 'Mi Taller GNC'; }
    try {
      const res3 = await window.storage.get(TALLER_CONFIG_KEY, false);
      tallerConfig = res3 ? { ...TALLER_CONFIG_DEFAULT, ...JSON.parse(res3.value) } : { ...TALLER_CONFIG_DEFAULT };
    } catch (e) { tallerConfig = { ...TALLER_CONFIG_DEFAULT }; }
    migrarPecsConfig(tallerConfig);
    if (migrateClientes()) await saveClientes(false);
    tomarSnapshotClientes();
    syncUltima = localStorage.getItem(SYNC_ULTIMA_KEY);
    try {
      const listado = await window.storage.list('fotos:');
      clientesConFotos = new Set((listado.keys || []).map(k => k.slice('fotos:'.length)));
    } catch (e) { clientesConFotos = new Set(); }
    ready = true;
    render();
    if (syncActiva()) sincronizar('apertura');
    iniciarAvisoPendientesDiario();
    // En segundo plano: saber si hay técnicos vinculados (muestra u oculta
    // el botón "Enviar al técnico" del paso 1).
    consultarTecnicosVinculados().then(() => { if (showForm || editingId) render(); });
    // Revalidar la licencia guardada sin bloquear el arranque: solo un 403
    // explícito del servidor expulsa (código trucho o suscripción dada de
    // baja) — los errores de red no molestan, la app sigue offline.
    revalidarLicencia();
    await procesarCompartidoORestaurar();
  }

  // Aviso simple (no requiere servidor ni push real): mientras la pestaña
  // esté abierta, revisa cada minuto si es de lunes a sábado a partir de
  // las 15hs y todavía no se avisó hoy — si hay trámites pendientes,
  // dispara una notificación del navegador. Si se cierra la app antes de
  // esa hora, ese día no llega el aviso (limitación conocida y aceptada:
  // hace falta push real + servidor propio para avisar con la app cerrada).
  const AVISO_PENDIENTES_KEY = 'gnc_pendientes_notif_fecha';
  let avisoPendientesInterval = null;
  function chequearAvisoPendientesDiario() {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const ahora = new Date();
    if (ahora.getDay() === 0) return; // domingo no
    if (ahora.getHours() < 15) return;
    const hoyISO = ahora.toISOString().slice(0, 10);
    if (localStorage.getItem(AVISO_PENDIENTES_KEY) === hoyISO) return;
    const cantidad = pendientesItems().length;
    const turnosAviso = turnosParaAvisar().length;
    if (cantidad === 0 && turnosAviso === 0) return;
    const partes = [];
    if (cantidad) partes.push(`${cantidad} trámite(s) pendiente(s) de enviar al PEC`);
    if (turnosAviso) partes.push(`${turnosAviso} turno(s) de hoy o mañana sin recordatorio enviado — mandaselo desde el menú Turnos`);
    try {
      new Notification('Estelita', {
        body: 'Tenés ' + partes.join(' y '),
        icon: 'icon-192.png',
      });
    } catch (e) { /* algunos navegadores no soportan "new Notification" directo */ }
    localStorage.setItem(AVISO_PENDIENTES_KEY, hoyISO);
  }
  function iniciarAvisoPendientesDiario() {
    if (avisoPendientesInterval) return;
    chequearAvisoPendientesDiario();
    avisoPendientesInterval = setInterval(chequearAvisoPendientesDiario, 60000);
  }

  // Suma campos nuevos (tramites, ultimoAvisoMes, notas) a clientes guardados
  // con el formato viejo, sin tocar ni borrar nada de lo que ya tenían.
  function migrateClientes() {
    let changed = false;
    clientes.forEach(c => {
      if (!Array.isArray(c.tramites)) { c.tramites = []; changed = true; }
      if (!c.ultimoAvisoMes || typeof c.ultimoAvisoMes !== 'object') { c.ultimoAvisoMes = {}; changed = true; }
      if (typeof c.notas !== 'string') { c.notas = ''; changed = true; }
      if (!Array.isArray(c.turnos)) { c.turnos = []; changed = true; }
      // El estado "incompleto" se eliminó: ahora un trámite es Pendiente
      // (empezado y sin enviar) o Enviado. Los viejos "incompletos" pasan
      // a Pendiente.
      (c.tramites || []).forEach(t => {
        if (t.estadoPec === 'incompleto') { t.estadoPec = 'pendiente'; t.motivoIncompleto = ''; changed = true; }
      });
    });
    return changed;
  }

  // ---- Turnos ----
  // La fecha del día se calcula en hora LOCAL (toISOString es UTC y en
  // Argentina cambia de día a las 21:00 — usarlo acá correría los turnos).
  function fechaLocalISO(d) {
    d = d || new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function mananaISO() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return fechaLocalISO(d);
  }

  // Turnos de hoy en adelante, ordenados por fecha y hora.
  function turnosProximos() {
    const hoy = fechaLocalISO();
    const items = [];
    clientes.forEach(c => (c.turnos || []).forEach(t => {
      if (t.fecha && t.fecha >= hoy && !t.estado) items.push({ cliente: c, turno: t });
    }));
    items.sort((a, b) => (a.turno.fecha + (a.turno.hora || '')).localeCompare(b.turno.fecha + (b.turno.hora || '')));
    return items;
  }
  // El próximo turno de un cliente puntual (para mostrarlo en su tarjeta).
  // Solo turnos futuros sin confirmar — una vez marcado "Asistió"/"No
  // asistió", el turno pasa al historial y ya no cuenta como próximo.
  function proximoTurnoDe(c) {
    const hoy = fechaLocalISO();
    return (c.turnos || []).filter(t => t.fecha && t.fecha >= hoy && !t.estado)
      .sort((a, b) => (a.fecha + (a.hora || '')).localeCompare(b.fecha + (b.hora || '')))[0] || null;
  }
  // Turnos de hoy o mañana a los que todavía no se les mandó el recordatorio.
  function turnosParaAvisar() {
    const hoy = fechaLocalISO(), manana = mananaISO();
    return turnosProximos().filter(({ cliente, turno }) =>
      !turno.avisoEnviado && cliente.telefono && (turno.fecha === hoy || turno.fecha === manana));
  }

  function waLinkTurno(cliente, turno) {
    const phone = cleanPhone(cliente.telefono);
    const cuando = turno.fecha === fechaLocalISO() ? 'HOY ' + fmtDate(turno.fecha)
      : turno.fecha === mananaISO() ? 'mañana ' + fmtDate(turno.fecha)
      : 'el ' + fmtDate(turno.fecha);
    const msg = renderMensaje('turno', {
      ...varsTaller(),
      nombre: cliente.nombre && cliente.nombre !== cliente.patente ? cliente.nombre : '',
      patente: cliente.patente || '',
      fecha: cuando,
      hora: turno.hora ? ' a las ' + turno.hora + ' hs' : '',
      motivo: turno.motivo ? ' por: ' + turno.motivo : '',
    });
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  // Modal para dar/cambiar un turno (calendario nativo + hora + motivo).
  function mostrarModalTurno(valores) {
    valores = valores || {};
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'gnc-modal-overlay';
      overlay.innerHTML = `
        <div class="gnc-modal-box">
          <div class="gnc-modal-title" style="margin-bottom:12px;">${valores.fecha ? 'Cambiar turno' : 'Dar turno'}</div>
          <div class="form-grid">
            <label>Fecha
              <input type="date" id="modal-turno-fecha" value="${escapeHtml(valores.fecha || '')}" min="${fechaLocalISO()}">
            </label>
            <label>Hora (opcional)
              <input type="time" id="modal-turno-hora" value="${escapeHtml(valores.hora || '')}">
            </label>
            <label style="grid-column: 1/-1;">Motivo
              <input type="text" id="modal-turno-motivo" value="${escapeHtml(valores.motivo || '')}" placeholder="Ej: reparación de frenos">
            </label>
          </div>
          <div class="gnc-modal-actions">
            ${valores.fecha ? '<button type="button" class="btn btn-sm btn-danger-outline" id="modal-turno-borrar">Borrar turno</button>' : ''}
            <button type="button" class="btn btn-sm btn-ghost" id="modal-turno-cancelar">Cancelar</button>
            <button type="button" class="btn btn-sm btn-primary" id="modal-turno-guardar">Guardar</button>
          </div>
        </div>`;
      function cerrar(valor) {
        overlay.classList.add('closing');
        setTimeout(() => { overlay.remove(); resolve(valor); }, 150);
      }
      overlay.querySelector('#modal-turno-cancelar').addEventListener('click', () => cerrar(null));
      const btnBorrar = overlay.querySelector('#modal-turno-borrar');
      if (btnBorrar) btnBorrar.addEventListener('click', () => cerrar({ borrar: true }));
      overlay.querySelector('#modal-turno-guardar').addEventListener('click', () => {
        const fecha = overlay.querySelector('#modal-turno-fecha').value;
        if (!fecha) { overlay.querySelector('#modal-turno-fecha').focus(); return; }
        cerrar({
          fecha,
          hora: overlay.querySelector('#modal-turno-hora').value || '',
          motivo: overlay.querySelector('#modal-turno-motivo').value.trim(),
        });
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrar(null); });
      document.body.appendChild(overlay);
    });
  }

  const TRAMITE_TIPOS = [
    { value: 'conversion', label: 'Conversión' },
    { value: 'modificacion', label: 'Modificación' },
    { value: 'revision_anual', label: 'Revisión Anual' },
    { value: 'prueba_hidraulica', label: 'Prueba Hidráulica' },
    { value: 'baja', label: 'Baja' },
    { value: 'desmontaje', label: 'Desmontaje' },
  ];

  function tramiteTipoLabel(tipo) {
    const t = TRAMITE_TIPOS.find(t => t.value === tipo);
    return t ? t.label : tipo;
  }

  const ESTADO_PEC_LABELS = { pendiente: 'Pendiente', enviado: 'Enviado al PEC', incompleto: 'Incompleto' };
  const USO_VEHICULO_OPCIONES = ['Auto', 'Pick Up', 'Moto', 'Taxi', 'Particular', 'Bus', 'Oficial', 'Otros'];
  // Qué se hizo con ese componente en este trámite puntual — se resalta con
  // otro color en el formulario porque hay que completarlo sí o sí y es
  // fácil olvidarse.
  const OPERACION_OPCIONES = [
    { value: '', label: '-- Elegí --' },
    { value: 'montaje', label: 'Montaje' },
    { value: 'sigue', label: 'Sin Cambios' },
    { value: 'desmontaje', label: 'Desmontaje' },
    { value: 'baja', label: 'Baja' },
  ];
  // Centros de reprueba de cilindros (CRPC) de la zona. GNSE es con el que
  // trabaja el taller; MMDP = Matafuegos Mar del Plata. Si un cilindro trae
  // otro valor (de una consulta a ENARGAS), se conserva como opción extra.
  const CRPC_OPCIONES = ['', 'GNSE', 'MMDP'];
  // Centros de reprueba (CRPC) que trabaja el taller — configurables en "Mi
  // taller" (siglas separadas por coma). Se usan en el desplegable del
  // cilindro y para completar solo la prueba hidráulica. Si no hay ninguno
  // configurado, se cae a los históricos GNSE/MMDP.
  function centrosReprueba() {
    const raw = (typeof tallerConfig !== 'undefined' && tallerConfig && tallerConfig.centrosReprueba) || '';
    const arr = String(raw).split(/[,;\n]/).map(s => s.trim()).filter(Boolean);
    return arr.length ? arr : ['GNSE', 'MMDP'];
  }
  // Códigos postales conocidos para autocompletar el CPA según la ciudad —
  // por ahora solo cubre la zona del taller; si la ciudad no está en la
  // lista, el CPA se sigue cargando a mano.
  const CODIGOS_POSTALES = {
    'mar del plata': '7600',
  };
  // Devuelve el CPA de una localidad, o '' si no la conocemos.
  function cpaDeCiudad(ciudad) {
    return CODIGOS_POSTALES[normalizarCiudad(ciudad)] || '';
  }
  // Suma al mapa las localidades de un objeto { provincia: { localidad: cp } }
  // sin pisar las que ya estan (la zona del taller manda).
  function mergeCodigosPostales(data) {
    if (!data || typeof data !== 'object') return;
    Object.keys(data).forEach(function (prov) {
      const m = data[prov];
      if (m && typeof m === 'object') Object.keys(m).forEach(function (loc) { if (!(loc in CODIGOS_POSTALES)) CODIGOS_POSTALES[loc] = m[loc]; });
    });
  }
  const CP_CACHE_KEY = 'gnc_cp_localidades_v1';
  // Carga la base de codigos postales: primero de la cache local (sirve sin
  // internet) y despues la refresca desde el archivo, guardandola en la cache.
  async function cargarCodigosPostales() {
    try { const c = localStorage.getItem(CP_CACHE_KEY); if (c) mergeCodigosPostales(JSON.parse(c)); } catch (e) { /* cache invalida */ }
    try {
      const r = await fetch('cp-localidades.json', { cache: 'no-cache' });
      if (r.ok) { const data = await r.json(); mergeCodigosPostales(data); try { localStorage.setItem(CP_CACHE_KEY, JSON.stringify(data)); } catch (e) {} }
    } catch (e) { /* sin internet: queda lo que habia en la cache */ }
  }
  function normalizarCiudad(s) {
    return (s || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  // Trámite más reciente de un cliente (opcionalmente filtrado por tipo/s).
  function latestTramite(c, tipos) {
    const list = tipos ? c.tramites.filter(t => tipos.includes(t.tipo)) : c.tramites;
    if (!list.length) return null;
    return list.slice().sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''))[0];
  }

  // --- Detección centralizada de cambios para la sincronización ---
  // En vez de perseguir cada lugar que modifica un cliente, saveClientes()
  // compara cada cliente contra una foto del último guardado y les pone
  // fecha de modificación (actualizadoEn) solo a los que cambiaron. La
  // sincronización usa esa fecha para decidir qué versión gana.
  let clientesSnapshot = {};
  function claveComparacion(c) {
    const { actualizadoEn, ...resto } = c;
    return JSON.stringify(resto);
  }
  function tomarSnapshotClientes() {
    clientesSnapshot = {};
    clientes.forEach(c => { clientesSnapshot[c.id] = claveComparacion(c); });
  }
  function marcarClientesModificados() {
    const ahora = new Date().toISOString();
    let alguno = false;
    clientes.forEach(c => {
      if (clientesSnapshot[c.id] !== claveComparacion(c)) {
        c.actualizadoEn = ahora;
        alguno = true;
      }
    });
    if (alguno) tomarSnapshotClientes();
    return alguno;
  }

  async function saveClientes(bumpTs) {
    if (bumpTs !== false) {
      const cambio = marcarClientesModificados();
      if (cambio) programarSync('cambios guardados');
    } else {
      tomarSnapshotClientes();
    }
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(clientes), false); }
    catch (e) { console.error('Error guardando clientes', e); }
  }

  async function saveTaller() {
    try { await window.storage.set(TALLER_KEY, JSON.stringify(tallerNombre), false); }
    catch (e) { console.error('Error guardando nombre del taller', e); }
  }

  async function saveTallerConfig(bumpTs) {
    if (bumpTs !== false) {
      tallerConfig.actualizadoEn = new Date().toISOString();
      programarSync('config guardada');
    }
    try { await window.storage.set(TALLER_CONFIG_KEY, JSON.stringify(tallerConfig), false); }
    catch (e) { console.error('Error guardando configuración del taller', e); }
  }

  // Lápidas de clientes eliminados: sin esto, la sincronización volvería a
  // "resucitar" en este equipo a un cliente borrado en el otro.
  const TOMBSTONES_KEY = 'gnc_eliminados_v1';
  function leerTombstones() {
    try { return JSON.parse(localStorage.getItem(TOMBSTONES_KEY) || '[]'); } catch (e) { return []; }
  }
  function registrarEliminado(id) {
    const t = leerTombstones();
    t.push({ id, en: new Date().toISOString() });
    try { localStorage.setItem(TOMBSTONES_KEY, JSON.stringify(t)); } catch (e) { /* ok */ }
    programarSync('cliente eliminado');
  }

  function computeCounts() {
    const counts = { danger: 0, warn: 0, ok: 0 };
    clientes.forEach(c => {
      const s = worstStatus(c);
      if (s.level === 'danger') counts.danger++;
      else if (s.level === 'warn') counts.warn++;
      else counts.ok++;
    });
    return counts;
  }

  function currentYM() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }

  // Meses de anticipación configurados para avisar los vencimientos (mín. 1).
  function mesesAviso() {
    const n = Number(tallerConfig.avisoAnticipacionMeses);
    return n >= 1 ? Math.min(n, 12) : 2;
  }
  // Meses (YYYY-MM) dentro de la ventana de aviso: el mes en curso y los
  // (mesesAviso - 1) siguientes. Con esto se decide qué vencimientos entran.
  function ventanaAvisoYMs() {
    const out = [];
    const d = new Date(); d.setDate(1);
    for (let i = 0; i < mesesAviso(); i++) {
      out.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
      d.setMonth(d.getMonth() + 1);
    }
    return out;
  }

  function reminderCandidates() {
    const ym = currentYM();
    const ventana = ventanaAvisoYMs();
    const out = [];
    clientes.forEach(c => {
      if (c.fecha_oblea && ventana.includes(c.fecha_oblea.slice(0, 7)) && c.ultimoAvisoMes.oblea !== ym) {
        out.push({ cliente: c, tipo: 'oblea' });
      }
      const phIso = phVencimientoISO(c.fecha_crpc, c.tipo_cilindro);
      if (phIso && ventana.includes(phIso.slice(0, 7)) && c.ultimoAvisoMes.prueba !== ym) {
        out.push({ cliente: c, tipo: 'prueba' });
      }
    });
    return out;
  }

  function reminderBanner() {
    const items = reminderCandidates();
    if (!items.length) return '';
    return `<div class="panel reminder-banner">
      <div class="reminder-header">
        <h2 style="margin:0;">📅 ${items.length} cliente(s) para avisar</h2>
        <button type="button" class="btn btn-ghost btn-sm" id="btn-toggle-reminder">${reminderBannerOpen ? 'Ocultar' : 'Ver'}</button>
      </div>
      ${reminderBannerOpen ? `
        <p class="scan-sub">Vencimientos de Oblea o Prueba Hidráulica ${mesesAviso() > 1 ? 'próximos' : 'de este mes'}. Tocá "Avisar por WhatsApp" para cada uno.</p>
        <div class="docs">
          ${items.map(({ cliente, tipo }) => `
            <div class="doc-row">
              <div>
                <div class="doc-label">${escapeHtml(cliente.nombre)} · ${escapeHtml(cliente.patente || 's/d')}</div>
                <div class="doc-sub">${tipo === 'oblea' ? 'Oblea' : 'Prueba Hidráulica'}</div>
              </div>
              ${cleanPhone(cliente.telefono)
                ? `<a class="btn btn-wa" target="_blank" rel="noopener" data-aviso-mes="${cliente.id}" data-aviso-tipo="${tipo}" href="${waLink(cliente, tipo === 'oblea' ? 'oblea' : 'prueba')}">Avisar por WhatsApp</a>`
                : '<span class="badge badge-warn">Sin teléfono</span>'}
            </div>`).join('')}
        </div>
      ` : ''}
    </div>`;
  }

  // Últimos trámites (uno por cliente) que todavía no quedaron "enviado" —
  // usado tanto para el contador chico del menú como para el panel de
  // "Trámites pendientes".
  function pendientesItems() {
    const items = [];
    clientes.forEach(c => {
      const lt = latestTramite(c);
      if (lt && lt.estadoPec !== 'enviado') items.push({ cliente: c, tramite: lt });
    });
    return items;
  }

  // Encabezado con botón "Volver" común a todos los paneles que se abren
  // desde el menú — cierra el panel y vuelve a la pantalla principal.
  function panelVolver() {
    return `<div class="panel-head"><button type="button" class="btn-volver" data-volver>← Volver</button></div>`;
  }

  // --- Panel "Hoy" (resumen del día) ---
  function nextYM() {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() + 1);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }
  // Turnos agendados para hoy.
  function turnosHoy() {
    const hoy = fechaLocalISO();
    const items = [];
    clientes.forEach(c => (c.turnos || []).forEach(t => { if (t.fecha === hoy) items.push({ cliente: c, turno: t }); }));
    items.sort((a, b) => (a.turno.hora || '').localeCompare(b.turno.hora || ''));
    return items;
  }
  // Vencimientos (oblea + prueba hidráulica) agrupados para avisar: los que
  // vencen este mes, el mes que viene, y los vencidos de los últimos 90 días.
  function vencimientosAgenda() {

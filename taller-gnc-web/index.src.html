    const ym = currentYM();
    const ventana = ventanaAvisoYMs();
    const buckets = { vencidos: [], esteMes: [], proximos: [] };
    clientes.forEach(c => {
      const considerar = (tipo, iso) => {
        if (!iso) return;
        const s = statusOf(iso);
        if (s.days === null) return;
        const avisado = c.ultimoAvisoMes && c.ultimoAvisoMes[tipo] === ym;
        const item = { cliente: c, tipo, status: s, avisado };
        const mo = iso.slice(0, 7);
        if (mo === ym) buckets.esteMes.push(item);
        else if (ventana.includes(mo)) buckets.proximos.push(item);
        else if (s.days < 0 && s.days >= -90) buckets.vencidos.push(item);
      };
      considerar('oblea', c.fecha_oblea || null);
      considerar('prueba', phVencimientoISO(c.fecha_crpc, c.tipo_cilindro));
    });
    const ordenar = arr => arr.sort((a, b) => (a.status.days || 0) - (b.status.days || 0));
    ordenar(buckets.vencidos); ordenar(buckets.esteMes); ordenar(buckets.proximos);
    return buckets;
  }
  // Cantidad de vencimientos "para avisar" (vencidos + dentro de la ventana de
  // anticipación) que todavía no se avisaron este mes — alimenta el badge "Hoy".
  function vencimientosParaAvisarCount() {
    const b = vencimientosAgenda();
    return [...b.vencidos, ...b.esteMes, ...b.proximos].filter(i => !i.avisado).length;
  }

  // Arma la agenda del día para enviar a los técnicos: turnos de hoy y autos
  // por vencer (revisión anual / prueba hidráulica). NUNCA incluye el teléfono
  // del cliente — es solo coordinación interna del equipo.
  function construirAgendaTecnico() {
    const turnos = turnosHoy().map(({ cliente, turno }) => ({
      hora: turno.hora || '',
      patente: cliente.patente || '',
      vehiculo: [cliente.marca, cliente.modelo].filter(Boolean).join(' '),
      cliente: cliente.nombre || '',
      motivo: turno.motivo || '',
    }));
    const v = vencimientosAgenda();
    const revisiones = [...v.vencidos, ...v.esteMes, ...v.proximoMes].map(it => ({
      patente: it.cliente.patente || '',
      vehiculo: [it.cliente.marca, it.cliente.modelo].filter(Boolean).join(' '),
      cliente: it.cliente.nombre || '',
      tipo: it.tipo === 'oblea' ? 'Oblea (revisión anual)' : 'Prueba hidráulica',
      cuando: it.status.label,
    }));
    return { fecha: fechaLocalISO(), tallerNombre: tallerNombre || '', turnos, revisiones };
  }

  function hoyPanel(entrando) {
    const turnos = turnosHoy();
    const v = vencimientosAgenda();
    const pend = pendientesItems();
    const vencItem = (it) => {
      const c = it.cliente;
      const tipoTxt = it.tipo === 'oblea' ? 'Oblea' : 'Prueba Hidráulica';
      return `<div class="doc-row">
        <div>
          <div class="doc-label">${escapeHtml(c.nombre)} · ${escapeHtml(c.patente || 's/d')}</div>
          <div class="doc-sub">${tipoTxt} · ${it.status.label}${it.avisado ? ' · ya avisado' : ''}</div>
        </div>
        ${cleanPhone(c.telefono)
          ? `<a class="btn btn-wa btn-sm" target="_blank" rel="noopener" data-aviso-mes="${c.id}" data-aviso-tipo="${it.tipo}" href="${waLink(c, it.tipo)}">${it.avisado ? 'Avisar de nuevo' : 'Avisar'}</a>`
          : '<span class="badge badge-warn">Sin teléfono</span>'}
      </div>`;
    };
    const seccionVenc = (titulo, arr) => arr.length ? `<h4 class="hoy-sub">${titulo} (${arr.length})</h4><div class="docs">${arr.map(vencItem).join('')}</div>` : '';
    return `<div class="panel ${entrando ? 'panel-entrando' : ''}" id="hoy-panel">
      ${panelVolver()}
      <h2 style="margin-top:0;">📅 Hoy — ${fmtDate(fechaLocalISO())}</h2>

      <h3 style="margin-top:6px;">Turnos de hoy</h3>
      ${turnos.length ? `<div class="docs">${turnos.map(({ cliente, turno }) => `
        <div class="doc-row">
          <div>
            <div class="doc-label">${escapeHtml(cliente.nombre)} · ${escapeHtml(cliente.patente || 's/d')}</div>
            <div class="doc-sub">${turno.hora ? escapeHtml(turno.hora) + ' hs' : 'sin hora'}${turno.motivo ? ' — ' + escapeHtml(turno.motivo) : ''}</div>
          </div>
          ${cleanPhone(cliente.telefono) ? (turno.avisoEnviado
            ? '<button type="button" class="btn btn-ghost btn-sm" disabled>Aviso enviado</button>'
            : `<button type="button" class="btn btn-wa btn-sm" data-aviso-turno-cliente="${cliente.id}" data-aviso-turno-id="${turno.id}">Recordar</button>`) : ''}
        </div>`).join('')}</div>` : '<p class="scan-sub">No hay turnos para hoy.</p>'}

      <h3>Vencimientos para avisar</h3>
      ${(v.vencidos.length || v.esteMes.length || v.proximos.length)
        ? `${seccionVenc('Vencidos (últimos 90 días)', v.vencidos)}${seccionVenc('Vencen este mes', v.esteMes)}${seccionVenc('Próximos vencimientos', v.proximos)}`

  // --- Estadísticas ---
  function computeEstadisticas() {
    const porTipo = {}; TRAMITE_TIPOS.forEach(t => porTipo[t.value] = 0);
    const porMes = {};
    let total = 0, enviados = 0, pendientes = 0;
    clientes.forEach(c => (c.tramites || []).forEach(t => {
      total++;
      if (t.estadoPec === 'enviado') enviados++; else pendientes++;
      porTipo[t.tipo] = (porTipo[t.tipo] || 0) + 1;
      const ym = (t.fecha || '').slice(0, 7);
      if (ym) porMes[ym] = (porMes[ym] || 0) + 1;
    }));
    return { porTipo, porMes, total, enviados, pendientes, clientes: clientes.length };
  }

  function estadisticasPanel(entrando) {
    const e = computeEstadisticas();
    const precios = tallerConfig.precios || {};
    const money = n => '$' + Number(n || 0).toLocaleString('es-AR');
    const bar = (label, val, max, extra) => `<div class="stat-row">
      <div class="stat-label">${label}</div>
      <div class="stat-track"><div class="stat-fill" style="width:${Math.max(2, Math.round(val / max * 100))}%"></div></div>
      <div class="stat-val">${val}${extra || ''}</div>
    </div>`;
    const tiposConDatos = TRAMITE_TIPOS.filter(t => e.porTipo[t.value] > 0);
    const maxTipo = Math.max(1, ...tiposConDatos.map(t => e.porTipo[t.value]));
    // Últimos 12 meses.
    const meses = [];
    const base = new Date(); base.setDate(1);
    for (let i = 11; i >= 0; i--) {
      const d = new Date(base.getFullYear(), base.getMonth() - i, 1);
      meses.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    }
    const maxMes = Math.max(1, ...meses.map(m => e.porMes[m] || 0));
    const ingresoPorTipo = TRAMITE_TIPOS
      .map(t => ({ t, cant: e.porTipo[t.value] || 0, precio: Number(precios[t.value]) || 0 }))
      .filter(x => x.cant > 0 && x.precio > 0);

  // --- Importación masiva ---

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',' || ch === '\t') { row.push(field); field = ''; }
        else if (ch === '\r') { /* se ignora, lo maneja \n */ }
        else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else field += ch;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  function parseDateLenient(str) {
    if (!str) return null;
    str = str.trim();
    let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (m) {
      let [, d, mo, y] = m;
      if (y.length === 2) y = '20' + y;
      if (+mo < 1 || +mo > 12 || +d < 1 || +d > 31) return null;
      return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
    }
    m = str.match(/^(\d{1,2})\/(\d{2,4})$/);
    if (m) {
      let [, mo, y] = m;
      if (y.length === 2) y = '20' + y;
      if (+mo < 1 || +mo > 12) return null;
      return `${y}-${mo.padStart(2, '0')}-01`;
    }
    return null;
  }

  function extractPhoneDigits(raw) {
    const digits = (raw || '').replace(/\D/g, '');
    return (digits.length >= 6 && digits.length <= 15) ? digits : null;
  }

  // Lector de archivos Excel (SheetJS), cargado desde CDN solo la primera
  // vez que alguien importa un .xlsx — mismo patrón que jsPDF/html2canvas.
  let xlsxLibPromise = null;
  function cargarXlsxLib() {
    if (!xlsxLibPromise) {
      xlsxLibPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = resolve;
        s.onerror = () => { xlsxLibPromise = null; reject(new Error('No se pudo descargar el lector de Excel (¿sin internet?) — probá de nuevo o guardá la planilla como CSV.')); };
        document.head.appendChild(s);
      });
    }
    return xlsxLibPromise;
  }

  function normalizeHeader(h) {
    return (h || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]/g, '');
  }

  const HEADER_SYNONYMS = {
    nombre: ['nombre', 'nombreyapellido', 'cliente', 'apellidoynombre'],
    telefono: ['telefono', 'tel', 'celular', 'whatsapp', 'numero'],
    patente: ['patente', 'dominio'],
    fecha: ['fecha', 'vencimiento', 'fechaoblea', 'fechavencimiento'],
    dni: ['dni', 'documento'],
    marca: ['marca'], modelo: ['modelo'],
  };

  function looksLikeHeaderRow(row) {
    return row.some(cell => {
      const n = normalizeHeader(cell);
      return Object.values(HEADER_SYNONYMS).some(syns => syns.includes(n));
    });
  }

  // Cuando no hay fila de encabezados, detecta qué columna es cada cosa
  // mirando el CONTENIDO — los Excel de cada taller vienen con las columnas
  // en cualquier orden. Puntúa cada columna según cuántas celdas parecen
  // patente, teléfono, fecha o nombre, y asigna la mejor a cada campo.
  function detectColumnsByContent(rows) {
    const nCols = Math.max(...rows.map(r => r.length));
    const sample = rows.slice(0, 30);
    const scores = [];
    for (let c = 0; c < nCols; c++) {
      const s = { patente: 0, telefono: 0, fecha: 0, nombre: 0 };
      sample.forEach(r => {
        const v = (r[c] || '').trim();
        if (!v) return;
        const compact = v.toUpperCase().replace(/[\s-]/g, '');
        if (/^[A-Z]{3}\d{3}$/.test(compact) || /^[A-Z]{2}\d{3}[A-Z]{2}$/.test(compact) || /^\d{3}[A-Z]{3}$/.test(compact)) s.patente++;
        if (parseDateLenient(v)) s.fecha++;
        const digits = v.replace(/\D/g, '');
        if (digits.length >= 8 && digits.length <= 15 && !v.includes('/')) s.telefono++;
        if (/^[A-Za-zÁÉÍÓÚÑÜáéíóúñü\s.,']{4,}$/.test(v)) s.nombre++;
      });
      scores.push(s);
    }
    const map = {};
    const usadas = new Set();
    ['patente', 'telefono', 'fecha', 'nombre'].forEach(campo => {
      let best = -1, bestScore = 0;
      scores.forEach((s, c) => {
        if (!usadas.has(c) && s[campo] > bestScore) { bestScore = s[campo]; best = c; }
      });
      if (best !== -1) { map[campo] = best; usadas.add(best); }
    });
    return map;
  }

  function matchColumns(headerRow) {
    const norm = headerRow.map(normalizeHeader);
    const map = {};
    Object.entries(HEADER_SYNONYMS).forEach(([field, syns]) => {
      const idx = norm.findIndex(h => syns.includes(h));
      if (idx !== -1) map[field] = idx;
    });
    return map;
  }

  // Interpreta el texto pegado/subido: con encabezado reconocible usa esas
  // columnas; si no, asume el formato real de la base del taller
  // (patente, teléfono, fecha) sin encabezado.
  function parseBulkImportText(text) {
    const allRows = parseCSV(text);
    if (!allRows.length) return [];
    let dataRows = allRows;
    let colMap = { patente: 0, telefono: 1, fecha: 2 };
    if (looksLikeHeaderRow(allRows[0])) {
      colMap = matchColumns(allRows[0]);
      dataRows = allRows.slice(1);
    } else {
      // Sin encabezados: detectar las columnas por su contenido. Si no se
      // encuentra ninguna columna que parezca patente, se mantiene el
      // formato posicional histórico (patente, teléfono, fecha).
      const detectado = detectColumnsByContent(allRows);
      if (detectado.patente !== undefined) colMap = detectado;
    }
    const parsed = dataRows.map(row => {
      const rawPatente = (colMap.patente !== undefined ? row[colMap.patente] : '') || '';
      const rawTelefono = (colMap.telefono !== undefined ? row[colMap.telefono] : '') || '';
      const rawFecha = (colMap.fecha !== undefined ? row[colMap.fecha] : '') || '';
      const rawNombre = (colMap.nombre !== undefined ? row[colMap.nombre] : '') || '';
      const patente = rawPatente.trim().toUpperCase().replace(/\s+/g, '');
      const telefono = extractPhoneDigits(rawTelefono);
      const fecha_oblea = parseDateLenient(rawFecha);
      return {
        patente,
        nombre: rawNombre.trim(),
        telefono: telefono || '',
        notas: telefono ? '' : (rawTelefono.trim() ? `Teléfono original en planilla: ${rawTelefono.trim()}` : ''),
        fecha_oblea: fecha_oblea || '',
        fechaSinParsear: !fecha_oblea && rawFecha.trim() ? rawFecha.trim() : '',
      };
    }).filter(r => r.patente);

    // Deduplicar por patente: nos quedamos con la fecha parseable más reciente.
    const byPatente = new Map();
    parsed.forEach(r => {
      const prev = byPatente.get(r.patente);
      if (!prev) { byPatente.set(r.patente, r); return; }
      if (r.fecha_oblea && (!prev.fecha_oblea || r.fecha_oblea > prev.fecha_oblea)) {
        byPatente.set(r.patente, { ...r, telefono: r.telefono || prev.telefono, notas: r.notas || prev.notas });
      } else if (!prev.telefono && r.telefono) {
        byPatente.set(r.patente, { ...prev, telefono: r.telefono });
      }
    });
    return Array.from(byPatente.values());
  }

  // Alta rápida de cliente: para registrar cualquier auto que pasa por el
  // taller (aunque hoy venga a reparar, no a renovar la oblea) — con
  // patente y teléfono ya entra al circuito de avisos de vencimiento. La

  function sortedFiltered(query) {
    let list = clientes.slice();
    if (query) {
      const q = query.toLowerCase();
      list = list.filter(c =>
        (c.nombre || '').toLowerCase().includes(q) ||
        (c.patente || '').toLowerCase().includes(q)
      );
    }
    const order = { danger: 0, warn: 1, ok: 2, none: 3 };
    list.sort((a, b) => {
      const sa = worstStatus(a), sb = worstStatus(b);
      if (order[sa.level] !== order[sb.level]) return order[sa.level] - order[sb.level];
      const da = sa.days === null ? 9999 : sa.days;
      const db = sb.days === null ? 9999 : sb.days;
      return da - db;
    });
    return list;
  }

  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // Ícono de información unificado de la app: circulito "i" que muestra u
  // oculta un bloque de ayuda (ayudaBloque con el mismo id). Usar SIEMPRE
  // estos helpers para las ayudas, así toda la app comparte ícono y

  function infoAyuda(id) {

  }
  function ayudaBloque(id, texto) {

  }

  // Modal propio con la estética de la app, para no depender de los
  // alert()/confirm() nativos del navegador (se ven genéricos y no se
  // pueden estilizar). Se monta directo en document.body — no pasa por el
  // render() principal — así no depende del estado de la app ni se pierde
  // si algo dispara un re-render mientras está abierto.
  function mostrarModal({ titulo, mensaje, danger, botones }) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'gnc-modal-overlay';
      overlay.innerHTML = `
        <div class="gnc-modal-box ${danger ? 'danger' : ''}">
          <div class="gnc-modal-head">
            <div class="gnc-modal-icon">${danger ? '!' : 'i'}</div>
            <div>
              <div class="gnc-modal-title">${escapeHtml(titulo)}</div>
              <div class="gnc-modal-msg">${escapeHtml(mensaje)}</div>
            </div>
          </div>
          <div class="gnc-modal-actions"></div>
        </div>`;
      const acciones = overlay.querySelector('.gnc-modal-actions');
      function cerrar(valor) {
        overlay.classList.add('closing');
        setTimeout(() => { overlay.remove(); resolve(valor); }, 150);
      }
      botones.forEach(b => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm ' + (b.variant === 'danger' ? 'btn-danger-solid' : b.variant === 'primary' ? 'btn-primary' : 'btn-ghost');
        btn.textContent = b.label;
        btn.addEventListener('click', () => cerrar(b.value));
        acciones.appendChild(btn);
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrar(false); });
      document.addEventListener('keydown', function onEsc(e) {
        if (e.key === 'Escape') { document.removeEventListener('keydown', onEsc); cerrar(false); }
      });
      document.body.appendChild(overlay);
    });
  }

  // Ventana emergente que pide Tipo de trámite + Fecha ANTES de mostrar el

  function mostrarModalTipoFecha(valoresIniciales) {

            </label>

              <select id="modal-t-pec">
                ${pecs.map((p, i) => `<option value="${i}" ${pecInicial === i ? 'selected' : ''}>${escapeHtml(p.razonSocial || p.codigoPec || ('PEC ' + (i + 1)))}</option>`).join('')}
              </select>
            </label>` : ''}
          </div>
          <div class="gnc-modal-actions">
            <button type="button" class="btn btn-sm btn-ghost" id="modal-t-cancelar">Cancelar</button>
            <button type="button" class="btn btn-sm btn-primary" id="modal-t-continuar">Continuar</button>

    });

  // A partir del tipo elegido, deja precargados los M/S/D/B más comunes
  // para ese trámite (se pueden seguir ajustando a mano en el paso 2):
  // - Revisión Anual ("Renovación"): todo sigue igual (Sin Cambios).
  // - Prueba Hidráulica: la válvula ya cargada se da de baja y se agrega
  //   una válvula nueva en Montaje — sus datos los completa el TdM a mano.
  // Al iniciar un trámite nuevo, el "Revisado" del cilindro arranca con el
  // mes y año en curso (es cuando se hace la revisión / prueba hidráulica).
  function ponerRevisadoEnCurso(eq) {
    const d = new Date();
    const mes = String(d.getMonth() + 1).padStart(2, '0');
    const anio = String(d.getFullYear());
    (eq.cilindros || []).forEach(c => { c.revisadoMes = mes; c.revisadoAnio = anio; });
  }

  function aplicarValoresPorTipoTramite(tipo, eq) {
    if (tipo === 'conversion') {
      // Conversión: se instala el equipo de GNC de cero (el auto no tenía).
      // Todos los elementos van como Montaje.
      eq.regulador.operacion = 'montaje';
      eq.cilindros.forEach(c => { c.msdb = 'montaje'; });
      eq.valvulas.forEach(v => { v.msb = 'montaje'; });
    } else if (tipo === 'revision_anual') {
      eq.regulador.operacion = 'sigue';
      eq.cilindros.forEach(c => { c.msdb = 'sigue'; });
      eq.valvulas.forEach(v => { v.msb = 'sigue'; });
    } else if (tipo === 'prueba_hidraulica') {
      // El cilindro y el regulador no se cambian en una prueba hidráulica:
      // operación "Sin Cambios" (SC) por defecto. La válvula sí se reemplaza.
      eq.regulador.operacion = 'sigue';
      eq.cilindros.forEach(c => { c.msdb = 'sigue'; });
      if (eq.valvulas.length > 0) eq.valvulas[0].msb = 'baja';
      eq.valvulas.push({ codigo: '', serie: '', msb: 'montaje' });
    }
  }

  // En una Baja o Desmontaje, el titular de la cédula del vehículo debe
  // coincidir con la persona del DNI: solo el titular está habilitado
  // legalmente para desmontar o dar de baja el equipo. Se pide confirmar antes
  // de finalizar. Devuelve true si se puede continuar.
  async function confirmarTitularBaja(tipo) {
    if (tipo !== 'baja' && tipo !== 'desmontaje') return true;
    return await customConfirm('Para una Baja o Desmontaje, el titular de la cédula del vehículo debe coincidir con la persona del DNI (solo el titular está habilitado para desmontar o dar de baja el equipo). ¿El titular de la cédula coincide con el DNI presentado?', { titulo: 'Titular del vehículo', okLabel: 'Sí, coinciden', cancelLabel: 'No', danger: true });
  }

  // Escapa un valor para CSV: neutraliza caracteres que Excel/Sheets podría
  // interpretar como el inicio de una fórmula, y entrecomilla si hace falta.
  function csvEscape(val) {
    let s = (val === null || val === undefined) ? '' : String(val);
    if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
    if (/[",\n\r]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function exportClientesCSV() {
    const headers = [
      'Nombre', 'Tipo de documento', 'N° Documento', 'Calle', 'N°', 'Piso/Depto', 'CPA', 'Provincia', 'Ciudad', 'Teléfono',
      'Patente', 'Marca', 'Modelo', 'Año', 'Inyección', 'Uso',
      'Vencimiento Oblea', 'Última revisión CRPC', 'Periodicidad cilindro',
      'Último trámite (tipo)', 'Último trámite (fecha)', 'Estado último trámite', 'Notas'
    ];
    const rows = clientes.map(c => {
      const lt = latestTramite(c);
      return [
        c.nombre, c.tipo_documento || 'DNI', c.dni, c.domicilio, c.numero, c.piso, c.cpa, c.provincia, c.ciudad, c.telefono,
        c.patente, c.marca, c.modelo, c.anio, c.inyeccion === 'si' ? 'Sí' : 'No', c.uso,
        fmtDate(c.fecha_oblea), fmtMonthYear(c.fecha_crpc),
        c.tipo_cilindro === '3' ? '3 años' : '5 años',
        lt ? tramiteTipoLabel(lt.tipo) : '', lt ? fmtDate(lt.fecha) : '', lt ? ESTADO_PEC_LABELS[lt.estadoPec] : '',
        c.notas || ''
      ].map(csvEscape).join(',');
    });
    const csv = [headers.map(csvEscape).join(','), ...rows].join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clientes_${(tallerNombre || 'taller').replace(/[^a-z0-9]+/gi, '_')}_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function parseAgentText(text) {
    const out = {
      fecha_oblea: null, fecha_crpc: null,
      nombre: null, dni: null, domicilio: null, provincia: null, ciudad: null,
      patente: null, marca: null, modelo: null, tipo_vehiculo: null, uso: null,
      found: []
    };

    // Fecha de vencimiento de la Oblea: dd/mm/aaaa (o aa)
    const mVenc = text.match(/fecha\s*de\s*vencimiento[^\d]{0,15}(\d{1,2})\/(\d{1,2})\/(\d{2,4})/i);
    if (mVenc) {
      let [, d, m, y] = mVenc;
      if (y.length === 2) y = '20' + y;
      out.fecha_oblea = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      out.found.push(`Vencimiento Oblea: ${d}/${m}/${y}`);
    }

    // Fecha CRPC: m/aa o mm/aaaa
    const mCrpc = text.match(/crpc[^\d]{0,15}(\d{1,2})\/(\d{2,4})/i);
    if (mCrpc) {
      let [, m, y] = mCrpc;
      if (y.length === 2) y = '20' + y;
      out.fecha_crpc = `${y}-${m.padStart(2,'0')}`;
      out.found.push(`Fecha CRPC: ${m}/${y}`);
    }

    // Nombre: el DNI trae "Apellido" y "Nombre" como campos separados.
    // Los combinamos en un nombre completo; si viene como "Nombre y apellido"
    // en una sola línea, usamos eso directamente.
    const mApellido = text.match(/apellido[:\s]+([^\n,;]{2,40})/i);
    const apellido = mApellido ? mApellido[1].trim() : null;
    const mNombreLine = text.match(/nombre(?:\s*y\s*apellido)?[:\s]+([^\n,;]{2,60})/i);
    if (mNombreLine) {
      const esCombinado = /nombre\s*y\s*apellido/i.test(mNombreLine[0]);
      if (esCombinado || !apellido) {
        out.nombre = mNombreLine[1].trim();
      } else {
        out.nombre = `${mNombreLine[1].trim()} ${apellido}`.trim();
      }
      out.found.push(`Nombre: ${out.nombre}`);
    } else if (apellido) {
      out.nombre = apellido;
      out.found.push(`Nombre: ${out.nombre}`);
    }

    // DNI (numero de documento) - acepta "DNI", "Documento", "N° de Documento"
    const mDni = text.match(/(?:dni|n[°º]?\s*de\s*documento|documento)[:\s]+([\d.]{6,12})/i);
    if (mDni) { out.dni = mDni[1].replace(/\./g,''); out.found.push(`DNI: ${out.dni}`); }

    // Domicilio
    const mDom = text.match(/domicilio[:\s]+([^\n,;]{3,80})/i);
    if (mDom) { out.domicilio = mDom[1].trim(); out.found.push(`Domicilio: ${out.domicilio}`); }

    // Provincia
    const mProv = text.match(/provincia[:\s]+([^\n,;]{3,40})/i);
    if (mProv) { out.provincia = mProv[1].trim(); out.found.push(`Provincia: ${out.provincia}`); }

    // Ciudad / Localidad
    const mCiudad = text.match(/(?:ciudad|localidad)[:\s]+([^\n,;]{3,40})/i);
    if (mCiudad) { out.ciudad = mCiudad[1].trim(); out.found.push(`Ciudad: ${out.ciudad}`); }

    // Patente / Dominio (espacio literal, no \s, para no comerse el
    // renglón/sección siguiente cuando el texto pegado tiene líneas en blanco)
    const mPatente = text.match(/(?:patente|dominio)[:\s]+([A-Za-z0-9 -]{5,10})/i);
    if (mPatente) { out.patente = mPatente[1].replace(/\s|-/g,'').toUpperCase(); out.found.push(`Patente: ${out.patente}`); }

    // Marca
    const mMarca = text.match(/marca[:\s]+([^\n,;]{2,40})/i);
    if (mMarca) { out.marca = mMarca[1].trim(); out.found.push(`Marca: ${out.marca}`); }

    // Modelo
    const mModelo = text.match(/modelo[:\s]+([^\n,;]{1,40})/i);
    if (mModelo) { out.modelo = mModelo[1].trim(); out.found.push(`Modelo: ${out.modelo}`); }

    // Tipo (de vehiculo)
    const mTipo = text.match(/tipo(?:\s*de\s*veh[ií]culo)?[:\s]+([^\n,;]{2,30})/i);
    if (mTipo) { out.tipo_vehiculo = mTipo[1].trim(); out.found.push(`Tipo: ${out.tipo_vehiculo}`); }

    // Uso
    const mUso = text.match(/uso[:\s]+([^\n,;]{2,30})/i);
    if (mUso) { out.uso = mUso[1].trim(); out.found.push(`Uso: ${out.uso}`); }

    return out;
  }

  // Ajustado con un ejemplo real del "Detalle de la operación" del SIC de
  // ENARGAS (pantalla a la que se llega tras la consulta por dominio):
  // trae Marca/Modelo/Año/Uso/Dominio del vehículo, "Fecha Vencimiento" de
  // la Oblea, y tablas de Regulador/Cilindro/Válvula con Código
  // Homologación + Número de Serie (+ Fecha Fab./CRPC/Fecha CRPC en el
  // cilindro). Como no sabemos todavía cómo queda el texto exacto al
  // copiar y pegar esa pantalla (recién vimos una captura), esto puede
  // necesitar un ajuste fino la primera vez que alguien lo use de verdad.
  function parseEnargasText(text) {
    // OJO: no reusamos los campos nombre/dni/domicilio/provincia/ciudad de
    // parseAgentText acá — el "Detalle de la operación" del SIC también
    // muestra Domicilio/Provincia/Ciudad del PEC y del Taller, y esos
    // patrones genéricos terminaban aplicándole esa dirección al cliente
    // (que es el dueño del auto, no el PEC ni el taller). Solo tomamos lo
    // que es inequívocamente del vehículo: patente, marca, modelo, uso.
    const generic = parseAgentText(text);
    const out = {
      fecha_oblea: null, fecha_crpc: null, anio: null, obleaActual: null,
      nombre: null, dni: null, domicilio: null, provincia: null, ciudad: null, tipo_vehiculo: null,
      patente: generic.patente, marca: generic.marca, modelo: generic.modelo, uso: generic.uso,
      found: [], rawText: text,
    };
    if (out.patente) out.found.push(`Patente: ${out.patente}`);
    if (out.marca) out.found.push(`Marca: ${out.marca}`);
    if (out.modelo) out.found.push(`Modelo: ${out.modelo}`);
    if (out.uso) out.found.push(`Uso: ${out.uso}`);

    const mVenc = text.match(/fecha\s*vencimiento[:\s]*\n?\s*(\d{1,2})\/(\d{1,2})\/(\d{2,4})/i);
    if (mVenc) {
      let [, d, m, y] = mVenc;
      if (y.length === 2) y = '20' + y;
      out.fecha_oblea = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
      out.found.push(`Vencimiento Oblea: ${d}/${m}/${y}`);
    }

    // Formato asumido — todavía no vimos un pegado real con este campo, así
    // que si no matchea, se puede seguir cargando a mano sin problema.
    const mOblea = text.match(/oblea\s*actual\D{0,10}(\d{4,9})/i) || text.match(/n[uú]mero\s*de\s*oblea\D{0,10}(\d{4,9})/i);
    if (mOblea) { out.obleaActual = mOblea[1]; out.found.push(`Oblea actual: ${mOblea[1]}`); }

    const mAnio = text.match(/a[nñ]o[:\s]*\n?\s*(\d{4})/i);
    if (mAnio) { out.anio = mAnio[1]; out.found.push(`Año: ${mAnio[1]}`); }

    out.equipo = parseEnargasEquipo(text);
    return out;
  }

  // Lee los equipos del "Detalle de la operación" del SIC. El SIC muestra
  // cada sección (Regulador / Cilindros / Válvulas) como una TABLA: una fila
  // de títulos ("Código Homologación", "Número de Serie", "Operación",
  // "Fecha Fab.", "CRPC", "Fecha CRPC", ...) y DEBAJO una fila por cada
  // equipo, con las columnas separadas por tabulaciones. Por eso, cuando hay
  // dos cilindros, aparecen dos filas bajo un mismo "Datos Cilindros" (el
  // título "Código Homologación" figura una sola vez). Leemos fila por fila.
  function parseEnargasEquipo(text) {
    const lineas = text.split(/\r?\n/);

    // Separa una fila de la tabla en columnas: primero por tabulaciones (el
    // caso normal al copiar del SIC); si no hay tabs, por 2+ espacios.
    function columnas(linea) {
      let partes = linea.split(/\t+/).map(s => s.trim()).filter(s => s !== '');
      if (partes.length <= 1) partes = linea.split(/\s{2,}/).map(s => s.trim()).filter(s => s !== '');
      return partes;
    }
    const esCodigoHom = (v) => /^[A-Za-z]{1,3}\d{1,4}[A-Za-z]?$/.test((v || '').trim());
    function mesAnioDe(v) {
      const m = (v || '').match(/(\d{1,2})\s*\/\s*(\d{2,4})/);
      if (!m) return null;
      return { mes: m[1].padStart(2, '0'), anio: m[2].length <= 2 ? '20' + m[2].padStart(2, '0') : m[2] };
    }
    // A partir de la fila de títulos, ubica en qué columna está cada dato.
    function mapaColumnas(titulos) {
      const idx = { codigo: -1, serie: -1, operacion: -1, fechaFab: -1, crpc: -1, fechaCrpc: -1 };
      titulos.forEach((t, i) => {
        const s = t.toLowerCase();
        if (/fecha\s*fab/.test(s)) idx.fechaFab = i;
        else if (/fecha\s*crpc/.test(s)) idx.fechaCrpc = i;
        else if (/crpc/.test(s)) idx.crpc = i;
        else if (/c[oó]digo/.test(s)) idx.codigo = i;
        else if (/n[uú]mero\s*de\s*serie|serie/.test(s)) idx.serie = i;
        else if (/operaci/.test(s)) idx.operacion = i;
      });
      return idx;
    }

    // Formato "pegado" del celular: al copiar el SIC desde el teléfono, la
    // tabla llega toda en un renglón con la etiqueta pegada a su valor, ej:
    // "Código HomologaciónTY02Número de SeriePPA1188474OperaciónSin Cambios".
    // No hay tabs ni columnas, así que se ubican las etiquetas conocidas EN
    // ORDEN y el valor de cada una es el texto hasta la etiqueta siguiente.
    // Ojo: "CRPC" va antes que "Fecha CRPC" (y esta lo contiene), por eso el
    // recorrido es secuencial: la primera "CRPC" que aparece es la suelta.
    const ETIQUETAS_PEGADO = [
      ['codigo', 'código homologación'],
      ['serie', 'número de serie'],
      ['operacion', 'operación'],
      ['fechaFab', 'fecha fab.'],
      ['crpc', 'crpc'],
      ['fechaCrpc', 'fecha crpc'],
      ['resultado', 'resultado'],
      ['certificado', 'nro. certificado'],
    ];
    function filaPegada(l) {
      const low = l.toLowerCase();
      const hallados = [];
      let pos = 0;
      for (const [key, lab] of ETIQUETAS_PEGADO) {
        const idx = low.indexOf(lab, pos);
        if (idx === -1) continue;
        hallados.push({ key, end: idx + lab.length, next: idx });
        pos = idx + lab.length;
      }
      if (hallados.length < 2) return null; // al menos código + serie
      const out = {};
      for (let i = 0; i < hallados.length; i++) {
        const fin = i + 1 < hallados.length ? hallados[i + 1].next : l.length;
        out[hallados[i].key] = l.substring(hallados[i].end, fin).trim();
      }
      return out;
    }
    // ¿Es una fila "pegada" del celular? Tiene la etiqueta "Código
    // Homologación" seguida de contenido (el valor), no de otra etiqueta. En la
    // compu la fila de títulos también tiene esa etiqueta, pero seguida de un
    // tab hacia "Número de Serie" (sin valor en el medio), así que no dispara.
    function esFilaPegada(l) {
      const low = l.toLowerCase();
      const iCod = low.indexOf('código homologación');
      if (iCod === -1) return false;
      const tras = iCod + 'código homologación'.length;
      const iSerie = low.indexOf('número de serie', tras);
      const entre = (iSerie === -1 ? l.slice(tras) : l.slice(tras, iSerie)).trim();
      return entre !== '';
    }

    const regulador = { codigo: '', serie: '' };
    const cilindros = [];
    const valvulas = [];
    let seccion = null;   // 'regulador' | 'cilindro' | 'valvula' | null
    let mapa = null;      // índice de columnas de la sección actual

    for (const linea of lineas) {
      const l = linea.trim();
      if (!l) continue;
      // Fin de la zona de equipos.
      if (/informaci[oó]n\s*desplegada|declaraci[oó]n\s*jurada|^la\s*informaci[oó]n/i.test(l)) break;
      // ¿Encabezado de sección? El SIC es inconsistente con el singular/plural:
      // con dos cilindros dice "Datos Cilindros" / "Datos Válvulas del
      // Cilindro", pero con UNO dice "Datos Cilindro" / "Dato Válvula del
      // Cilindro" (¡"Dato" sin s!). Por eso la s de "datos" es opcional. Ojo:
      // "Válvula del Cilindro" tiene las dos palabras, por eso se prueba
      // válvula PRIMERO.
      const mh = l.match(/^datos?\s+(.*)$/i);
      if (mh) {
        const resto = mh[1].toLowerCase();
        mapa = null;
        if (/v[aá]lvula/.test(resto)) seccion = 'valvula';
        else if (/cilindro/.test(resto)) seccion = 'cilindro';
        else if (/regulador/.test(resto)) seccion = 'regulador';
        else seccion = null; // "Datos del PEC", "Datos del Vehículo", etc.
        continue;
      }
      if (!seccion) continue;

      // Camino del celular: la fila viene "pegada" (etiqueta+valor sin tabs).
      if (esFilaPegada(l)) {
        const f = filaPegada(l);
        if (f) {
          const codigo = (f.codigo || '').trim();
          const serie = (f.serie || '').trim();
          if (esCodigoHom(codigo)) {
            if (seccion === 'regulador') {
              if (!regulador.codigo && !regulador.serie) { regulador.codigo = codigo; regulador.serie = serie; }
            } else if (seccion === 'cilindro') {
              const cil = { codigo, serie };
              if (f.crpc && !/^\d/.test(f.crpc)) cil.crpc = f.crpc.trim();
              const ff = mesAnioDe(f.fechaFab);
              if (ff) { cil.fabricadoMes = ff.mes; cil.fabricadoAnio = ff.anio; }
              const fc = mesAnioDe(f.fechaCrpc);
              if (fc) { cil.revisadoMes = fc.mes; cil.revisadoAnio = fc.anio; }
              cilindros.push(cil);
            } else if (seccion === 'valvula') {
              valvulas.push({ codigo, serie });
            }
          }
        }
        continue;
      }

      const c = columnas(l);
      if (!c.length) continue;
      // Fila de títulos de la tabla: contiene "Código Homologación".
      if (c.some(x => /c[oó]digo\s*homologaci/i.test(x))) { mapa = mapaColumnas(c); continue; }

      // Fila de datos. Tomamos código y serie por la posición que indican los
      // títulos; si no hay títulos, asumimos las dos primeras columnas.
      const col = (key, def) => (mapa && mapa[key] >= 0 && mapa[key] < c.length) ? c[mapa[key]] : def;
      let codigo = col('codigo', c[0]);
      let serie = col('serie', c[1]);
      if (!esCodigoHom(codigo)) {
        const cand = c.find(esCodigoHom);
        if (!cand) continue; // no es una fila de equipo (texto suelto)
        codigo = cand;
        if (!serie || serie === codigo) { const s = c.find(x => /^\d{3,10}$/.test(x)); if (s) serie = s; }
      }
      codigo = (codigo || '').trim();
      serie = (serie || '').trim();

      if (seccion === 'regulador') {
        if (!regulador.codigo && !regulador.serie) { regulador.codigo = codigo; regulador.serie = serie; }
      } else if (seccion === 'cilindro') {
        const cil = { codigo, serie };
        const crpcMat = col('crpc', '');
        if (crpcMat && !/^\d/.test(crpcMat)) cil.crpc = crpcMat.trim();
        const ff = mesAnioDe(col('fechaFab', ''));
        if (ff) { cil.fabricadoMes = ff.mes; cil.fabricadoAnio = ff.anio; }
        const fc = mesAnioDe(col('fechaCrpc', ''));
        if (fc) { cil.revisadoMes = fc.mes; cil.revisadoAnio = fc.anio; }
        cilindros.push(cil);
      } else if (seccion === 'valvula') {
        valvulas.push({ codigo, serie });
      }
    }

    // Compatibilidad: se mantienen los campos singulares (primer cilindro /
    // primera válvula) además de los arrays con todos.
    const cilindro = cilindros[0] || { codigo: '', serie: '' };
    const valvula = valvulas[0] || { codigo: '', serie: '' };

    const hayAlgo = [regulador, ...cilindros, ...valvulas].some(e => e && (e.codigo || e.serie));
    return hayAlgo ? { regulador, cilindro, valvula, cilindros, valvulas } : null;
  }

  // Estado del permiso de lectura del portapapeles: 'granted' (activado),
  // 'prompt' (Chrome va a preguntar al usarlo), 'denied' (bloqueado a nivel
  // sitio/app) o 'desconocido' si el navegador no deja consultarlo.
  async function estadoPermisoPortapapeles() {
    if (!navigator.clipboard || !navigator.clipboard.readText) return 'nodisponible';
    try { return (await navigator.permissions.query({ name: 'clipboard-read' })).state; }
    catch (e) { return 'desconocido'; }
  }
  const PORTAPAPELES_AYUDA_BLOQUEADO = 'El permiso del portapapeles está bloqueado para Estelita. Para activarlo: mantené apretado el ícono de Estelita en la pantalla de inicio → "Información de la app" → Permisos → Portapapeles → Permitir. (Si usás Estelita dentro de Chrome, tocá el candado junto a la dirección → Permisos.) Mientras tanto, pegar a mano funciona igual.';

  function enargasPasteBox(entrando) {
    // El recuadro de pegar queda SIEMPRE visible: en el celular, leer el
    // portapapeles solo casi nunca funciona (Android lo bloquea), así que la
    // forma segura es pegar a mano acá (dispara la carga automática igual). El
    // botón de abajo es un atajo para la computadora, donde sí se puede leer.
    return `<div class="agent-box ${entrando ? 'panel-entrando' : ''}" style="grid-column: 1/-1;">
      <div class="agent-hint" style="margin-top:0; margin-bottom:6px;"><b>Pegá acá el resultado de ENARGAS:</b> tocá el recuadro, mantené apretado y elegí "Pegar". Se carga solo.</div>
      <textarea id="enargas-paste-text" placeholder="Pegá acá lo que copiaste en ENARGAS..." style="margin-bottom:6px;"></textarea>
      <button type="button" class="btn btn-ghost btn-sm" id="btn-pegar-enargas" style="width:100%;">O pegar automáticamente (computadora)</button>
      <div id="pegado-rapido-estado" class="agent-hint" style="margin-top:6px;"></div>
      <div id="enargas-paste-result"></div>
    </div>`;
  }

  // Galería de solo lectura de las fotos ya guardadas de un cliente —
  // botón "Documentación" en la tarjeta. Separado del asistente de trámite:
  // acá solo se mira lo que ya está guardado, no se edita nada.
  function fotosPanel(cliente, entrando) {
    if (!cliente) return '';
    const slots = [
      { key: 'foto1', label: 'Frente' },
      { key: 'foto2', label: 'Dorso' },
    ];
    return `<div class="panel ${entrando ? 'panel-entrando' : ''}" id="fotos-panel">
      <h2 class="panel-h2-sticky">Documentación — ${escapeHtml(cliente.nombre)}</h2>
      <div class="scan-grid scan-grid-2">
        ${slots.map(s => `
        <div class="scan-slot">
          <label>${s.label}</label>
          ${scanFiles[s.key]
            ? `<img class="scan-thumb" style="height:240px; display:block;" src="${scanFiles[s.key]}">`
            : '<p class="scan-sub">Todavía no hay foto guardada.</p>'}
        </div>`).join('')}
      </div>
      <div class="form-actions">
        ${(scanFiles.foto1 || scanFiles.foto2) ? '<button type="button" class="btn btn-primary" id="btn-descargar-fotos">Descargar / Compartir</button>' : ''}
        <button type="button" class="btn btn-ghost" id="btn-close-fotos">Cerrar</button>
      </div>
    </div>`;
  }

  // Descarga (compu) o comparte (celular) las fotos del cliente abierto. En el
  // celular abre el menú de Android (Google Fotos, Archivos, WhatsApp...); en la
  // compu las baja a la carpeta Descargas.
  async function descargarFotosCliente(cliente) {
    const base = (cliente && (cliente.patente || cliente.nombre) || 'cliente').toString().trim().replace(/\s+/g, '_').replace(/[^\w\-]/g, '') || 'cliente';
    const items = [];
    if (scanFiles.foto1) items.push({ nombre: base + '_Frente.jpg', dataUrl: scanFiles.foto1 });
    if (scanFiles.foto2) items.push({ nombre: base + '_Dorso.jpg', dataUrl: scanFiles.foto2 });
    if (!items.length) { await customAlert('Este cliente no tiene fotos guardadas.'); return; }
    const files = [];
    for (const it of items) {
      try { const blob = await (await fetch(it.dataUrl)).blob(); files.push(new File([blob], it.nombre, { type: blob.type || 'image/jpeg' })); } catch (e) { /* se saltea */ }
    }
    if (!files.length) { await customAlert('No se pudieron preparar las fotos.'); return; }
    if (navigator.canShare && navigator.canShare({ files })) {
      try { await navigator.share({ files, title: 'Fotos ' + (cliente.patente || cliente.nombre || '') }); return; }
      catch (e) { if (e && e.name === 'AbortError') return; /* si no se pudo compartir, cae a descarga */ }
    }
    for (const f of files) {
      const url = URL.createObjectURL(f);
      const a = document.createElement('a');
      a.href = url; a.download = f.name; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }
  }

        <span class="scan-status" id="scan-status"></span>
      </div>
    </div>`;
  }

    const secPec = `

        </div>

            <input type="text" id="tc-pec-codigo-${i}" value="${escapeHtml(p.codigoPec)}" placeholder="Ej: 3441">

  // Vuelca lo tipeado en el panel de configuración al objeto en memoria —
  // necesario antes de cualquier render() con el panel abierto (agregar o
  // quitar un PEC redibuja el formulario y sin esto pisaría lo tipeado).
  function syncTallerConfigFromDOM() {
    const el = id => root.querySelector('#' + id);
    if (!el('taller-config-panel')) return; // el panel no está en pantalla
    // Con la configuración por ítems (acordeón) solo hay una sección visible a
    // la vez: cada campo se lee solo si está presente (los demás conservan su
    // valor en memoria, capturado al abrir/cerrar su sección).
    const setStr = (id, key) => { const e = el(id); if (e) tallerConfig[key] = e.value; };
    const setNum = (id, key) => { const e = el(id); if (e) tallerConfig[key] = Number(e.value) || 0; };
    setStr('tc-razon-social', 'razonSocial');
    setStr('tc-direccion', 'direccion');
    setStr('tc-horario', 'horario');
    setStr('tc-cuit', 'cuit');
    setStr('tc-tecnico-nombre', 'tecnicoNombre');
    setStr('tc-tecnico-matricula', 'tecnicoMatricula');
    setStr('tc-codigo-taller', 'codigoTaller');
    setStr('tc-centros-reprueba', 'centrosReprueba');
    setNum('tc-aviso-anticipacion', 'avisoAnticipacionMeses');
    setNum('tc-ajuste-x', 'impresionAjusteX');
    setNum('tc-ajuste-y', 'impresionAjusteY');
    if (el('tc-precio-' + TRAMITE_TIPOS[0].value)) {
      tallerConfig.precios = tallerConfig.precios || {};
      TRAMITE_TIPOS.forEach(t => {
        const e = el('tc-precio-' + t.value);
        if (!e) return;
        const v = Number(e.value);
        if (v > 0) tallerConfig.precios[t.value] = v; else delete tallerConfig.precios[t.value];
      });
    }
    (tallerConfig.pecs || []).forEach((p, i) => {
      if (!el(`tc-pec-codigo-${i}`)) return;
      p.codigoPec = el(`tc-pec-codigo-${i}`).value;
      p.razonSocial = el(`tc-pec-razon-social-${i}`).value;
      p.direccion = el(`tc-pec-direccion-${i}`).value;
      p.telefono = el(`tc-pec-telefono-${i}`).value;
      p.ingeniero = el(`tc-pec-ingeniero-${i}`).value;
      p.matriculaCipba = el(`tc-pec-matricula-${i}`).value;
    });
    // Mensajes editables: se guarda el texto solo si difiere del original.
    if (el('tc-msg-vencimiento')) {
      tallerConfig.mensajes = tallerConfig.mensajes || {};
      Object.keys(MENSAJES_DEFAULT).forEach(key => {
        const ta = el('tc-msg-' + key);
        if (!ta) return;
        const val = ta.value;
        if (val.trim() && val !== MENSAJES_DEFAULT[key].texto) tallerConfig.mensajes[key] = val;
        else delete tallerConfig.mensajes[key];
      });
    }
  }

  // garantiza que cada sección quede completa antes de avanzar, en vez de
  // tener todos los campos sueltos en una sola pantalla larga.
  function tramiteWizardPanel(existing, entrando, entrandoPaso, enargasEntrando) {
    if (!clienteDraft) clienteDraft = existing ? { ...existing } : blankClienteBase();
    const c = clienteDraft;
    if (!tramiteDraftEquipo) tramiteDraftEquipo = blankEquipo(existing ? existing.ultimoEquipoConocido : null);
    if (!tramiteDraftCampos) tramiteDraftCampos = blankTramiteCampos(editingTramiteId && existing ? existing.tramites.find(t => t.id === editingTramiteId) : null);
    const titulo = existing ? escapeHtml(c.nombre || existing.nombre || 'cliente') : 'Nuevo cliente';
    return `<div class="panel ${entrando ? 'panel-entrando' : ''}" id="form-panel">

  function equipoResumen(eq) {
    if (!eq) return '';
    const partes = [];
    if (eq.regulador && (eq.regulador.codigo || eq.regulador.serie)) {
      partes.push(`Regulador ${[eq.regulador.codigo, eq.regulador.serie].filter(Boolean).join('/')}`);
    }
    if (eq.reguladorBaja && (eq.reguladorBaja.codigo || eq.reguladorBaja.serie)) {
      partes.push(`Regulador BAJA ${[eq.reguladorBaja.codigo, eq.reguladorBaja.serie].filter(Boolean).join('/')}`);
    }
    (eq.cilindros || []).forEach(cil => {
      if (cil.codigo || cil.serie) partes.push(`Cilindro ${[cil.codigo, cil.serie].filter(Boolean).join('/')}`);
    });
    (eq.valvulas || []).forEach(v => {
      if (v.codigo || v.serie) partes.push(`Válvula ${[v.codigo, v.serie].filter(Boolean).join('/')}`);
    });
    return partes.join(' · ');
  }

  // --- Generación del PDF de la planilla PEC (réplica de la ficha técnica en papel) ---

  // Carga jsPDF y html2canvas desde un CDN solo la primera vez que hacen
  // falta (al tocar "Enviar al PEC"), para no pesar el arranque de la app
  // con estas dos librerías si nunca se llega a usar esa función.
  let pecLibsPromise = null;
  function cargarLibreriasPec() {
    if (pecLibsPromise) return pecLibsPromise;
    function cargarScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('No se pudo cargar ' + src));
        document.head.appendChild(s);
      });
    }
    pecLibsPromise = Promise.all([
      cargarScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
      cargarScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
    ]);
    return pecLibsPromise;
  }

  function pecFechaMasUnAnio(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return '';
    d.setFullYear(d.getFullYear() + 1);
    return d.toISOString().slice(0, 10);
  }

  function pecPartesFecha(iso) {
    if (!iso) return { d: '', m: '', a: '' };
    const [y, m, d] = iso.split('-');
    return { d: d || '', m: m || '', a: y ? y.slice(2) : '' };
  }

  // La clase "pec-valor" marca los DATOS cargados (en oposición a las
  // etiquetas y bordes fijos de la planilla): el modo "solo datos" para

  // no tenga esta clase.
  function pecCasilla(marcada) {
    return `<span ${marcada ? 'class="pec-valor"' : ''} style="display:inline-block;width:12px;height:12px;border:1px solid #000;text-align:center;line-height:11px;font-size:10px;margin-right:4px;vertical-align:middle;font-weight:bold;">${marcada ? '✕' : ''}</span>`;
  }

  function pecCasillaConLabel(marcada, label) {
    return `<span style="display:inline-flex; align-items:center; margin-right:8px; font-size:9px; white-space:nowrap;">${pecCasilla(marcada)}${escapeHtml(label)}</span>`;
  }

  function pecCampo(valor, etiqueta, flex) {
    return `<div style="flex:${flex || 1}; min-width:0; padding:0 5px; box-sizing:border-box;">
      <div class="pec-valor" style="border-bottom:1px solid #000; min-height:15px; font-size:11px; font-weight:600; padding-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(valor || '')}</div>
      <div style="font-size:7px; color:#333; margin-top:1px;">${etiqueta}</div>
    </div>`;
  }

  // Bloque "Código / N° Serie" de un accesorio de la grilla de equipos
  // (Manómetro, Electroválvula, etc.) — replica el recuadro chico de la
  // planilla real con el nombre del accesorio arriba y dos líneas abajo.
  function pecAccesorio(label, codigo, serie, flex) {
    return `<div style="flex:${flex || 1}; min-width:0; padding:2px 5px; box-sizing:border-box; border-left:1px solid #000;">
      <div style="font-size:7.5px; font-weight:600;">${escapeHtml(label)}</div>
      <div class="pec-valor" style="border-bottom:1px solid #000; min-height:13px; font-size:10px; font-weight:600;">${escapeHtml(codigo || '')}</div>
      <div style="font-size:6.5px; color:#333;">Código</div>
      <div class="pec-valor" style="border-bottom:1px solid #000; min-height:13px; font-size:10px; font-weight:600;">${escapeHtml(serie || '')}</div>
      <div style="font-size:6.5px; color:#333;">N° Serie</div>
    </div>`;
  }

  function pecOperacionLetra(valor) {
    return { montaje: 'M', sigue: 'S/C', desmontaje: 'D', baja: 'B' }[valor] || '';
  }

  // Arma el HTML de la ficha técnica (una réplica visual de la planilla del

         técnico) NO se imprimen: quedan transparentes como las etiquetas. */

  // --- Impresión "solo datos" sobre la planilla PREIMPRESA de PecMar ---

  // Grilla de calibración: una regla en milímetros para imprimir SOBRE una
  // planilla en blanco. Con la regla encima de los casilleros, se puede leer
  // la coordenada exacta de cada campo directamente de la foto, sin importar
  // el ángulo — así se calibra el mapa en una sola pasada.
  async function generarGrillaCalibracion() {
    await cargarLibreriasPec();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const ajX = Number(tallerConfig.impresionAjusteX) || 0;
    const ajY = Number(tallerConfig.impresionAjusteY) || 0;
    const W = 210, H = 297;
    // Líneas cada 5 mm (las de 10 más marcadas, las de 50 aún más). Todo en
    // escala de grises — el rojo salía casi invisible en muchas impresoras.
    for (let x = 0; x <= W; x += 5) {
      const g = x % 50 === 0 ? 60 : x % 10 === 0 ? 110 : 190;
      doc.setDrawColor(g);
      doc.setLineWidth(x % 50 === 0 ? 0.3 : x % 10 === 0 ? 0.2 : 0.1);
      doc.line(x + ajX, ajY, x + ajX, H + ajY);
    }
    for (let y = 0; y <= H; y += 5) {
      const g = y % 50 === 0 ? 60 : y % 10 === 0 ? 110 : 190;
      doc.setDrawColor(g);
      doc.setLineWidth(y % 50 === 0 ? 0.3 : y % 10 === 0 ? 0.2 : 0.1);
      doc.line(ajX, y + ajY, W + ajX, y + ajY);
    }
    // Números de mm cada 10, en NEGRO y bien visibles, repetidos en varias
    // columnas/filas para leerlos en cualquier zona aunque el formulario los
    // tape en parte.
    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    const colsX = [2, 104, 200];   // números "y" (mm verticales)
    for (let y = 10; y < H; y += 10) {
      colsX.forEach(cx => doc.text(String(y), cx + ajX, y + ajY + 2));
    }
    const filasY = [6, 150, 293];  // números "x" (mm horizontales)
    for (let x = 10; x < W; x += 10) {
      filasY.forEach(cy => doc.text(String(x), x + ajX - 2, cy + ajY));
    }
    doc.setFontSize(9);
    doc.text('GRILLA DE CALIBRACIÓN — imprimir sobre planilla en blanco al 100%', 24 + ajX, 4 + ajY);
    return doc.output('blob');
  }

  // Comprobante para el cliente: documento propio del taller (NO la ficha
  // oficial del PEC), con los datos del trámite para que el cliente se lo
  // lleve. Es un PDF autocontenido (no va sobre planilla preimpresa).
  async function generarComprobante(cliente, tramite) {
    await cargarLibreriasPec();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const tc = tallerConfig;
    const L = 20, R = 190;
    let y = 22;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(18);
    doc.text(tallerNombre || 'Taller GNC', L, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(90);
    [tc.razonSocial, tc.direccion, [tc.cuit ? 'CUIT ' + tc.cuit : '', tc.codigoTaller ? 'Cód. Taller ' + tc.codigoTaller : ''].filter(Boolean).join('    ')]
      .filter(Boolean).forEach(l => { doc.text(String(l), L, y); y += 5; });
    doc.setTextColor(0); y += 3;
    doc.setDrawColor(200); doc.line(L, y, R, y); y += 9;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(14);
    doc.text('Comprobante de trámite de GNC', L, y); y += 9;
    doc.setFontSize(11);
    const row = (k, v) => {
      doc.setFont('helvetica', 'bold'); doc.text(k, L, y);
      doc.setFont('helvetica', 'normal'); doc.text(String(v || '—'), L + 42, y, { maxWidth: R - L - 42 });
      y += 7;
    };
    const titulo = (txt) => { y += 2; doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.text(txt, L, y); y += 6; doc.setFontSize(11); };
    row('Fecha:', fmtDate(tramite.fecha));
    row('Trámite:', tramiteTipoLabel(tramite.tipo));
    titulo('Cliente');
    row('Nombre:', cliente.nombre);
    row('Documento:', [cliente.tipo_documento, cliente.dni].filter(Boolean).join(' '));
    row('Teléfono:', cliente.telefono);
    row('Domicilio:', [cliente.domicilio, cliente.ciudad, cliente.provincia].filter(Boolean).join(', '));
    titulo('Vehículo');
    row('Patente:', cliente.patente);
    row('Marca/Modelo:', [cliente.marca, cliente.modelo, cliente.anio].filter(Boolean).join(' '));
    const resumen = equipoResumen(tramite.equipo);
    if (resumen) {
      titulo('Equipo'); doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      const lines = doc.splitTextToSize(resumen.replace(/ · /g, '\n'), R - L);
      doc.text(lines, L, y); y += lines.length * 5 + 1; doc.setFontSize(11);
    }
    if (tramite.obleaAnterior || tramite.obleaNueva) row('N° Oblea:', `${tramite.obleaAnterior || '—'}  ->  ${tramite.obleaNueva || '—'}`);
    if (tramite.detalle) {
      titulo('Observaciones'); doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      const ol = doc.splitTextToSize(tramite.detalle, R - L);
      doc.text(ol, L, y); y += ol.length * 5 + 1; doc.setFontSize(11);
    }
    y += 8;
    if (tramite.firma) { try { doc.addImage(tramite.firma, 'PNG', L, y, 50, 18); } catch (e) { /* firma inválida, se omite */ } }
    y += 20; doc.setDrawColor(150); doc.line(L, y, L + 60, y); y += 5;
    doc.setFontSize(9); doc.setTextColor(90); doc.text('Firma del propietario', L, y); doc.setTextColor(0);
    doc.setTextColor(120); doc.setFontSize(8);
    doc.text('Este comprobante es un resumen emitido por el taller y no reemplaza la documentación oficial de ENARGAS.', L, 288, { maxWidth: R - L });
    return doc.output('blob');
  }

  async function generarPecPdfSoloDatos(cliente, tramite, opts = {}) {
    await cargarLibreriasPec();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const ajX = Number(tallerConfig.impresionAjusteX) || 0;
    const ajY = Number(tallerConfig.impresionAjusteY) || 0;
    doc.setFont('helvetica', 'bold');
    const M = PECMAR_MAPA;
    const T = (texto, x, y, size, maxW) => {
      if (texto === null || texto === undefined || texto === '') return;
      doc.setFontSize(size || 9);
      doc.text(String(texto), x + ajX, y + ajY, maxW ? { maxWidth: maxW } : undefined);
    };
    const XX = (pos) => { if (pos) T('X', pos.x, pos.y, 9); };

    const tc = tallerConfig;
    const eq = tramite.equipo || blankEquipo(null);
    T(tc.razonSocial, M.tallerRazonSocial.x, M.tallerRazonSocial.y);
    T(tc.direccion, M.tallerDireccion.x, M.tallerDireccion.y);
    T(tc.cuit, M.tallerCuit.x, M.tallerCuit.y);
    T(tc.codigoTaller, M.codigoTaller.x, M.codigoTaller.y, M.codigoTaller.size);

    const fHab = pecPartesFecha(tramite.fecha);
    const fVenc = pecPartesFecha(pecFechaMasUnAnio(tramite.fecha));
    [fHab.d, fHab.m, fHab.a].forEach((v, i) => T(v, M.fechaHab.xs[i], M.fechaHab.y));
    [fVenc.d, fVenc.m, fVenc.a].forEach((v, i) => T(v, M.fechaVenc.xs[i], M.fechaVenc.y));
    T(tramite.obleaAnterior, M.obleaAnterior.x, M.obleaAnterior.y);
    T(tramite.obleaNueva, M.obleaNueva.x, M.obleaNueva.y);

    T(cliente.marca, M.marca.x, M.marca.y);
    T(cliente.modelo, M.modelo.x, M.modelo.y);
    T(cliente.anio, M.anio.x, M.anio.y);
    T((cliente.patente || '').toUpperCase(), M.dominio.x, M.dominio.y, 10);
    XX((cliente.inyeccion || '').toLowerCase().startsWith('s') ? M.inyeccionSi : M.inyeccionNo);
    const usoNorm = (cliente.uso || '').toLowerCase();
    const usoX = M.tipoVehiculo.xs[usoNorm] !== undefined ? M.tipoVehiculo.xs[usoNorm] : (usoNorm ? M.tipoVehiculo.xs.otros : null);
    if (usoX !== null && usoNorm) T('X', usoX, M.tipoVehiculo.y, 9);
    XX(M.tipoOperacion[tramite.tipo]);

    T(cliente.nombre, M.propNombre.x, M.propNombre.y);
    T(cliente.domicilio, M.propCalle.x, M.propCalle.y);
    T(cliente.cpa, M.propCpa.x, M.propCpa.y);
    T(cliente.ciudad, M.propLocalidad.x, M.propLocalidad.y);
    T(cliente.provincia, M.propProvincia.x, M.propProvincia.y);
    // El teléfono del cliente NO se imprime ni se envía (queda solo en Estelita).
    T([cliente.tipo_documento, cliente.dni].filter(Boolean).join(' '), M.propDocumento.x, M.propDocumento.y);

    // Regulador principal en la columna de su operación (+ Nuevo/Usado)
    const opReg = eq.regulador.operacion || 'sigue';
    if (eq.regulador.codigo || eq.regulador.serie) {
      const colX = M.reguladorColX[opReg] !== undefined ? M.reguladorColX[opReg] : M.reguladorColX.sigue;
      T(eq.regulador.codigo, colX, M.reguladorCodigoY, 8);
      T(eq.regulador.serie, colX, M.reguladorSerieY, 8);
      XX(eq.regulador.nuevoUsado === 'nuevo' ? M.reguladorNuevo : M.reguladorUsado);
    }
    // Regulador dado de baja (reemplazo): columna Baja
    if (eq.reguladorBaja && (eq.reguladorBaja.codigo || eq.reguladorBaja.serie)) {
      T(eq.reguladorBaja.codigo, M.reguladorColX.baja, M.reguladorCodigoY, 8);
      T(eq.reguladorBaja.serie, M.reguladorColX.baja, M.reguladorSerieY, 8);
    }
    const otrosDatos = eq.otros || {};
    ['manometro', 'accesorioTuberia', 'tuberiaAltaPresion'].forEach(k => {
      const o = otrosDatos[k];
      if (!o) return;
      T(o.codigo, M[k].codX, M[k].codY, 8);
      T(o.serie, M[k].serieX, M[k].serieY, 8);
    });

    (eq.cilindros || []).slice(0, M.cilindroYs.length).forEach((c, i) => {
      const y = M.cilindroYs[i];
      const col = M.cilindroCols;
      T(c.codigo, col.codigo, y, 8);
      T(c.serie, col.serie, y, 8);
      if (c.codigo || c.serie) T('X', c.nuevoUsado === 'nuevo' ? col.nuevo : col.usado, y, 8);
      T(c.fabricadoMes, col.fabMes, y, 8);
      T(c.fabricadoAnio ? String(c.fabricadoAnio).slice(-2) : '', col.fabAnio, y, 8);
      T(c.revisadoMes, col.revMes, y, 8);
      T(c.revisadoAnio ? String(c.revisadoAnio).slice(-2) : '', col.revAnio, y, 8);
      T(c.crpc, col.crpc, y, 8);
      T(pecOperacionLetra(c.msdb), col.op, y, 8);
    });
    (eq.valvulas || []).slice(0, M.cilindroYs.length).forEach((v, i) => {
      const y = M.cilindroYs[i];
      T(v.codigo, M.valvulaCols.codigo, y, 8);
      T(v.serie, M.valvulaCols.serie, y, 8);
      T(pecOperacionLetra(v.msb), M.valvulaCols.op, y, 8);
    });

    [M.otrosFila1, M.otrosFila2].forEach(fila => {
      fila.keys.forEach((k, i) => {
        const o = otrosDatos[k];
        if (!o) return;
        T(o.codigo, fila.codXs[i], fila.codY, 8);
        T(o.serie, fila.serieXs[i], fila.serieY, 8);
      });
    });

    T(tramite.detalle, M.observaciones.x, M.observaciones.y, 8, M.observaciones.maxW);
    // Aclaración del propietario en una sola línea (la del formulario):
    // "NOMBRE — DNI 12345678". La firma la hace el cliente a mano.
    const acl = [cliente.nombre, [cliente.tipo_documento, cliente.dni].filter(Boolean).join(' ')].filter(Boolean).join(' — ');
    T(acl, M.aclNombre.x, M.aclNombre.y, 8);

    // Para el envío al PEC: se adjuntan las fotos de la documentación como
    // páginas siguientes (la del taller no las lleva, imprime solo la hoja).
    if (opts.conFotos) {
      const fotos = await fotosGuardadas(cliente.id);
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const paginas = [
        { titulo: 'Documentación (lado A)', dataUrl: fotos.foto1 },
        { titulo: 'Documentación (lado B)', dataUrl: fotos.foto2 },
      ].filter(f => f.dataUrl);
      for (const f of paginas) {
        let img;
        try { img = await pecCargarImagen(f.dataUrl); } catch (e) { continue; }
        doc.addPage();
        const margen = 12;
        doc.setFont('helvetica', 'normal'); doc.setFontSize(11);
        doc.text(`${f.titulo} — ${[cliente.nombre, cliente.patente].filter(Boolean).join(' · ')}`, margen, margen);
        const maxW = pageW - margen * 2, maxH = pageH - margen * 2 - 6;
        const r = img.height / img.width;
        let fw = maxW, fh = maxW * r; if (fh > maxH) { fh = maxH; fw = maxH / r; }
        const formato = f.dataUrl.slice(0, 20).includes('png') ? 'PNG' : 'JPEG';
        doc.addImage(f.dataUrl, formato, (pageW - fw) / 2, margen + 4, fw, fh);
      }
    }

    return doc.output('blob');
  }

  // Planilla del centro de reprueba GNC SEGURGAS (Carta Compromiso de
  // Conformidad). Coordenadas en mm sobre A4 — PRIMERA VERSIÓN estimada,
  // se calibra imprimiéndola sobre el formulario en blanco. El teléfono del
  // cliente NO se imprime (queda solo en Estelita).
  // Calibrado con la impresión del usuario (07/07/2026). arriba=-y, izq=-x.
  const SEGURGAS_MAPA = {
    lugarFecha: { x: 78, y: 52 },   // sin calibrar todavía
    tallerEncab: { x: 92, y: 62 },  // sin calibrar todavía
    cil: {

  async function generarCrpcPdfSoloDatos(cliente, tramite) {
    await cargarLibreriasPec();
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const ajX = Number(tallerConfig.crpcAjusteX) || 0;
    const ajY = Number(tallerConfig.crpcAjusteY) || 0;
    doc.setFont('helvetica', 'bold');
    const M = SEGURGAS_MAPA;
    const T = (texto, x, y, size) => {
      if (texto === null || texto === undefined || texto === '') return;
      doc.setFontSize(size || 9);
      doc.text(String(texto), x + ajX, y + ajY);
    };
    const tc = tallerConfig;
    const pec = pecDeTramite(tramite);
    const eq = tramite.equipo || blankEquipo(null);

    T(`Mar del Plata, ${fmtDate(tramite.fecha)}`, M.lugarFecha.x, M.lugarFecha.y, 9);
    T(tc.razonSocial || tallerNombre, M.tallerEncab.x, M.tallerEncab.y, 9);

    // Cilindros (todos los que entren en la tabla). Marca, Capacidad y
    // Observación no se cargan en la app: van a mano.
    // Válvula de cada cilindro: la que está montada HOY (la que va a reprueba),
    // no las nuevas de "Montaje". En prueba hidráulica la lista queda
    // intercalada (baja, montaje, baja, montaje), así que nos quedamos solo
    // con las reales que no son montaje para emparejar 1 por cilindro.
    const valvParaCil = (eq.valvulas || []).filter(v => (v.codigo || v.serie) && v.msb !== 'montaje');
    const fuenteValv = valvParaCil.length ? valvParaCil : (eq.valvulas || []);
    (eq.cilindros || []).slice(0, M.cil.ys.length).forEach((c, i) => {
      const yy = M.cil.ys[i] + M.cil.dy;
      T(c.codigo, M.cil.codigo, yy, 8);
      T(c.serie, M.cil.serie, yy, 8);
      T([c.fabricadoMes, c.fabricadoAnio].filter(Boolean).join('/'), M.cil.fechaFab, yy, 8);
      const v = fuenteValv[i];
      if (v) T([v.codigo, v.serie].filter(Boolean).join(' '), M.cil.valvula, yy, 8);
    });

    // Propietario / vehículo (SIN teléfono del cliente).
    T(cliente.nombre, M.nombre.x, M.nombre.y);
    T([cliente.tipo_documento, cliente.dni].filter(Boolean).join(' '), M.documento.x, M.documento.y);
    T([cliente.domicilio, cliente.cpa].filter(Boolean).join(' '), M.direccion.x, M.direccion.y);
    T(cliente.provincia, M.provincia.x, M.provincia.y);
    T(cliente.ciudad, M.localidad.x, M.localidad.y);
    T(cliente.patente, M.patente.x, M.patente.y);
    T(tramite.obleaNueva || tramite.obleaAnterior, M.oblea.x, M.oblea.y);

    // Taller de montaje y PEC.
    T(tc.razonSocial || tallerNombre, M.tallerMontaje.x, M.tallerMontaje.y, 8);
    T(pec.razonSocial, M.nombrePec.x, M.nombrePec.y, 8);
    T(tc.codigoTaller, M.codigoTdm.x, M.codigoTdm.y, 8);
    T(pec.codigoPec, M.codigoPec.x, M.codigoPec.y, 8);
    T(tc.direccion, M.direccionTdm.x, M.direccionTdm.y, 8);
    T(pec.direccion, M.direccionPec.x, M.direccionPec.y, 8);
    T(pec.telefono, M.telPec.x, M.telPec.y, 8);

    // Aclaración del propietario (la firma la hace a mano).
    T([cliente.nombre, [cliente.tipo_documento, cliente.dni].filter(Boolean).join(' ')].filter(Boolean).join(' — '), M.aclNombre.x, M.aclNombre.y, 8);

    return doc.output('blob');
  }

  function pecCargarImagen(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error('No se pudo cargar una foto de la documentación'));
      img.src = src;
    });
  }

  // Renderiza pecFormHtml() off-screen, lo rasteriza y arma el PDF final.
  // Después de la ficha, agrega una página por cada foto de documentación
  // guardada del cliente — el PEC recibe todo en un solo archivo.
  async function generarPecPdf(cliente, tramite, firmaDataUrl) {
    await cargarLibreriasPec();
    const cont = document.createElement('div');
    cont.style.position = 'fixed';
    cont.style.left = '-99999px';
    cont.style.top = '0';
    cont.innerHTML = pecFormHtml(cliente, tramite, firmaDataUrl);
    document.body.appendChild(cont);
    let blob;
    let fotosIncluidas = 0;
    try {
      const canvas = await window.html2canvas(cont.firstElementChild, { scale: 2, backgroundColor: '#ffffff' });
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const ratio = canvas.height / canvas.width;
      let w = pageW, h = pageW * ratio;
      if (h > pageH) { h = pageH; w = pageH / ratio; }
      const x = (pageW - w) / 2, y = (pageH - h) / 2;
      doc.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', x, y, w, h);

      const fotos = await fotosGuardadas(cliente.id);
      const paginasFotos = [
        { titulo: 'Documentación (lado A)', dataUrl: fotos.foto1 },
        { titulo: 'Documentación (lado B)', dataUrl: fotos.foto2 },
      ].filter(f => f.dataUrl);
      for (const f of paginasFotos) {
        let img;
        try {
          img = await pecCargarImagen(f.dataUrl);
        } catch (e) {
          console.error(e);
          continue; // una foto ilegible no debe frenar el envío de la ficha
        }
        doc.addPage();
        const margen = 12;
        doc.setFontSize(11);
        doc.text(`${f.titulo} — ${[cliente.nombre, cliente.patente].filter(Boolean).join(' · ')}`, margen, margen);
        const maxW = pageW - margen * 2;
        const maxH = pageH - margen * 2 - 6;
        const r = img.height / img.width;
        let fw = maxW, fh = maxW * r;
        if (fh > maxH) { fh = maxH; fw = maxH / r; }
        const formato = f.dataUrl.slice(0, 20).includes('png') ? 'PNG' : 'JPEG';
        doc.addImage(f.dataUrl, formato, (pageW - fw) / 2, margen + 4, fw, fh);
        fotosIncluidas++;
      }

      blob = doc.output('blob');
    } finally {
      document.body.removeChild(cont);
    }
    const filename = `PEC_${(cliente.patente || cliente.nombre || 'tramite').replace(/\s+/g, '_')}_${tramite.fecha || ''}.pdf`;
    return { blob, filename, fotosIncluidas };
  }

  // Comparte el PDF por WhatsApp: si el celular soporta el "compartir"
  // nativo con archivos, se abre directo con el PDF adjunto y el contacto
  // se elige ahí mismo. Si no (ej. en escritorio), se descarga el PDF y se
  // abre WhatsApp Web con el mensaje ya armado para adjuntarlo a mano.
  function descargarBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  }

  // Envío del PDF al PEC del trámite. Limitación de WhatsApp que manda acá:
  // un link de WhatsApp (wa.me) puede llevar SOLO texto, nunca un archivo —
  // probado en la vida real: llegaba el mensaje sin la planilla. Por eso en
  // el celular se usa la hoja de compartir del sistema, que SÍ adjunta el
  // PDF: un toque en WhatsApp, se elige el chat del PEC (tras la primera
  // vez queda arriba de la lista) y sale todo junto. El mensaje va con el
  // nombre del PEC para encontrarlo fácil. En escritorio (sin hoja de
  // compartir) se descarga el PDF y se abre el chat directo del PEC.
  async function compartirPecPdf(blob, filename, cliente, fotosIncluidas, pec) {
    const notaFotos = fotosIncluidas ? ' Incluye las fotos de la documentación.' : '';
    const nombrePec = (pec && pec.razonSocial) ? pec.razonSocial : 'el PEC';
    const mensaje = `Hola! Ficha técnica del trámite de GNC de la patente ${cliente.patente || 's/d'} para ${nombrePec}.${notaFotos}`;
    const file = new File([blob], filename, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await customAlert(`Se abre el menú de compartir CON el PDF ya adjunto: elegí WhatsApp y después el chat de ${nombrePec}. El archivo viaja solo, no hay que adjuntar nada.`, 'Enviar al PEC');
      try {
        await navigator.share({ files: [file], title: filename, text: mensaje });
        return;
      } catch (e) {
        if (e && e.name === 'AbortError') return;
      }
    }
    // Escritorio o navegador sin compartir: descarga + chat directo del PEC
    // (acá adjuntar a mano es fácil: arrastrás el PDF a la ventana).
    descargarBlob(blob, filename);
    const pecPhone = cleanPhone(pec && pec.telefono);
    window.open(`https://wa.me/${pecPhone || ''}?text=${encodeURIComponent(mensaje + ' (adjuntá el PDF que se acaba de descargar)')}`, '_blank');
  }

  // para reusarlos al guardar de verdad (sin duplicar) o borrarlos al descartar.
  let autosaveClienteId = null;

  // Carga un texto de ENARGAS por el mismo camino que un pegado manual, si
  // parece un resultado de la consulta (2 o más datos reconocidos — así una
  // patente suelta o cualquier otra cosa copiada no dispara nada).
  function cargarTextoEnargas(texto) {
    if (!texto || !texto.trim()) return false;
    const parsed = parseEnargasText(texto);
    const señales = parsed.found.length + (parsed.equipo ? 1 : 0) + (parsed.obleaActual ? 1 : 0);
    if (señales < 2) return false;
    esperandoEnargas = false;

    syncClienteDraftFromDOM();

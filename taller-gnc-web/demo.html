<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Estelita — Cómo funciona</title>
<style>
  :root{ --azul:#1D5BD8; --azul-osc:#123C8F; --fondo:#EAF1FE; --surface:#fff; --linea:#E3E8F0; --tinta:#16233B; --suave:#5A6B85; --verde:#1E9E5A; --wapp:#25D366; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif; color:var(--tinta);
    background:linear-gradient(160deg,#DCEAFE,#F4F6FA 60%);
    min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:16px 12px 24px; gap:12px;
  }
  .titulo{ text-align:center; }
  .titulo b{ letter-spacing:2.5px; color:var(--azul-osc); font-size:19px; }
  .titulo span{ display:block; color:var(--suave); font-size:13px; margin-top:2px; }

  .barritas{ display:flex; align-items:center; gap:10px; }
  .crono{ display:inline-flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--linea); border-radius:999px; padding:6px 14px; font-weight:800; color:var(--azul-osc); box-shadow:0 4px 12px rgba(18,60,143,.08); }
  .crono .pt{ width:9px; height:9px; border-radius:50%; background:var(--verde); }
  .mute{ width:38px; height:38px; border-radius:50%; border:1px solid var(--linea); background:var(--surface); font-size:16px; cursor:pointer; box-shadow:0 4px 12px rgba(18,60,143,.08); }

  .phone{
    position:relative; width:330px; max-width:92vw; aspect-ratio:330/620;
    background:#0d1b3a; border-radius:34px; padding:12px;
    box-shadow:0 26px 60px rgba(18,60,143,.34), 0 0 0 2px rgba(255,255,255,.06) inset;
  }
  .screen{ position:relative; width:100%; height:100%; background:var(--fondo); border-radius:24px; overflow:hidden; }
  .top{ background:var(--azul); color:#fff; padding:14px 16px 26px; border-radius:0 0 22px 22px; }
  .top .row{ display:flex; align-items:center; gap:10px; }
  .top .burger{ font-size:17px; opacity:.9; }
  .top .brand{ font-weight:800; letter-spacing:2px; font-size:15px; }
  .top .taller{ font-size:11px; opacity:.85; margin-top:3px; }
  .body{ padding:12px 14px; }

  .card{ background:var(--surface); border:1px solid var(--linea); border-radius:14px; padding:11px 12px; box-shadow:0 4px 12px rgba(18,60,143,.06); }
  .lbl{ font-size:9.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--suave); }
  .val{ font-size:13px; font-weight:700; margin-top:2px; min-height:15px; }
  .pill{ display:inline-block; font-size:10px; font-weight:800; color:var(--azul); background:#E7F0FF; border-radius:999px; padding:3px 9px; }
  .btn{ display:flex; align-items:center; justify-content:center; gap:7px; background:var(--azul); color:#fff; font-weight:700; font-size:13px; border-radius:11px; padding:11px; text-align:center; }
  .btn.ghost{ background:#fff; color:var(--azul); border:1.5px solid #C7D8F6; }
  .btn.gris{ background:#c9ccd1; color:#fff; }
  .btn.wapp{ background:var(--wapp); }
  .h{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--suave); margin:2px 0 8px; }

  .fab{ position:absolute; right:16px; bottom:18px; padding:13px 18px; border-radius:999px; background:var(--azul); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(29,91,216,.45); }

  /* onda del toque */
  .tap{ position:absolute; width:34px; height:34px; margin:-17px 0 0 -17px; border-radius:50%; background:rgba(29,91,216,.28); border:2px solid var(--azul); opacity:0; z-index:50; pointer-events:none; }
  @keyframes tapping{ 0%{opacity:0; transform:scale(1.6);} 30%{opacity:1; transform:scale(.7);} 60%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(1.4);} }
  .tap.go{ animation:tapping 1s ease forwards; }
  /* dedito que se mueve y aprieta */
  .finger{ position:absolute; font-size:30px; z-index:60; opacity:0; pointer-events:none;
    transition:left .55s cubic-bezier(.4,0,.2,1), top .55s cubic-bezier(.4,0,.2,1);
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)); }
  @keyframes presiona{ 0%,100%{transform:scale(1) translateY(0);} 45%{transform:scale(.8) translateY(-3px);} }
  .finger.press{ animation:presiona .45s ease; }

  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes pop{ 0%{opacity:0; transform:scale(.9);} 100%{opacity:1; transform:scale(1);} }
  @keyframes shimmer{ 0%{background-position:-160px 0;} 100%{background-position:220px 0;} }
  .fadeUp{ opacity:0; animation:fadeUp .5s ease forwards; }
  .pop{ opacity:0; animation:pop .45s ease forwards; }
  .skeleton{ background:linear-gradient(90deg,#eef2f9 25%,#dde7f7 37%,#eef2f9 63%); background-size:400px 100%; animation:shimmer 1.1s linear infinite; border-radius:6px; }
  .spin{ width:16px; height:16px; border:2.5px solid #cdddfa; border-top-color:var(--azul); border-radius:50%; animation:rot .8s linear infinite; display:inline-block; vertical-align:middle; }
  @keyframes rot{ to{ transform:rotate(360deg);} }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .foto{ height:82px; border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .docimg{ width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:linear-gradient(135deg,#eef4ff,#dfe8fb); color:#4b689e; }
  .docimg b{ font-size:10px; letter-spacing:.5px; }
  .chk{ color:var(--verde); font-weight:800; }

  .enargas{ background:#fff; height:100%; }
  .enargas .eg-top{ background:var(--azul); color:#fff; padding:12px 16px; font-weight:700; font-size:13px; }
  .enargas .eg-body{ padding:16px; }
  .enargas h3{ font-family:Georgia,'Times New Roman',serif; font-size:22px; margin:0 0 10px; color:#111; }
  .enargas .eg-box{ background:#f3f4f6; border-radius:10px; padding:14px; margin-top:14px; }
  .enargas input{ width:100%; padding:10px; border:1px solid #cfd3da; border-radius:8px; font-size:13px; }
  .enargas .eg-btn{ margin-top:12px; background:#111c2e; color:#fff; border-radius:999px; padding:9px 18px; display:inline-block; font-weight:700; font-size:12px; }

  .wa{ height:100%; background:#efe7dd; display:flex; flex-direction:column; }
  .wa-top{ background:#075E54; color:#fff; padding:12px 14px; display:flex; align-items:center; gap:10px; font-weight:700; font-size:14px; }
  .wa-top .av{ width:30px; height:30px; border-radius:50%; background:#cfd8d5; }
  .wa-body{ flex:1; padding:14px 12px; display:flex; flex-direction:column; gap:8px; }
  .wa-msg{ align-self:flex-end; background:#dcf8c6; border-radius:12px 12px 2px 12px; padding:8px 10px; max-width:82%; box-shadow:0 1px 1px rgba(0,0,0,.08); }
  .wa-pdf{ display:flex; align-items:center; gap:8px; }
  .wa-pdf .ic{ width:34px; height:34px; border-radius:7px; background:#ea4d4d; color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; }
  .wa-pdf .nm{ font-size:11px; font-weight:700; color:#111; }
  .wa-pdf .sz{ font-size:10px; color:#5a6b85; }
  .wa-tick{ font-size:10px; color:#4a9; text-align:right; margin-top:3px; }

  .caption{ width:330px; max-width:92vw; min-height:56px; background:var(--surface); border:1px solid var(--linea); border-left:5px solid var(--azul); border-radius:14px; padding:12px 15px; font-size:15px; line-height:1.4; box-shadow:0 8px 22px rgba(18,60,143,.10); }
  .caption b{ color:var(--azul-osc); }

  .barra{ width:330px; max-width:92vw; height:5px; background:#d7e2f5; border-radius:999px; overflow:hidden; }
  .barra i{ display:block; height:100%; width:0; background:var(--azul); }

  .overlay{ position:absolute; inset:0; background:rgba(13,27,58,.55); border-radius:24px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:80; color:#fff; }
  .play{ width:74px; height:74px; border-radius:50%; background:#fff; color:var(--azul); font-size:30px; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 26px rgba(0,0,0,.3); cursor:pointer; padding-left:5px; }
  .overlay p{ margin:0; font-size:13px; opacity:.95; }
</style>
</head>
<body>
  <div class="titulo"><b>ESTELITA</b><span>Un trámite de GNC completo, de principio a fin</span></div>
  <div class="barritas">
    <div class="crono"><span class="pt"></span>Tiempo del trámite: <span id="crono">0:00</span></div>
    <button class="mute" id="mute" title="Silenciar / activar música">🔊</button>
  </div>
  <div class="barra"><i id="barra"></i></div>

  <div class="phone">
    <div class="screen" id="screen"></div>
    <div class="tap" id="tap"></div>
    <div class="finger" id="finger"><svg viewBox="0 0 40 48" width="36" height="44" aria-hidden="true"><path d="M16 26 V10 a4 4 0 0 1 8 0 v10 a3 3 0 0 1 6 0 v3 a3 3 0 0 1 5.5 1.6 v6.4 a10 10 0 0 1 -10 10 h-3.5 a10 10 0 0 1 -7.4 -3.3 l-6.2 -6.8 a3.1 3.1 0 0 1 4.6 -4.2 L16 27.5 Z" fill="#ffffff" stroke="#2b3652" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg></div>
    <div class="overlay" id="overlay">
      <div class="play" id="play">▶</div>
      <p>Tocá para ver cómo funciona</p>
    </div>
  </div>

  <div class="caption" id="caption">Estelita: menos tiempo con los papeles, más autos.</div>

<script>
  const screen = document.getElementById('screen');
  const caption = document.getElementById('caption');
  const barra = document.getElementById('barra');
  const tap = document.getElementById('tap');
  const finger = document.getElementById('finger');
  const overlay = document.getElementById('overlay');
  const cronoEl = document.getElementById('crono');

  function shell(bodyHtml) {
    return `<div class="top"><div class="row"><span class="burger">☰</span><span class="brand">ESTELITA</span></div><div class="taller">Taller GNC (demo)</div></div><div class="body">${bodyHtml}</div>`;
  }
  // Mueve el dedito hasta (x,y) dentro de la pantalla y hace el "toque".
  function tapAt(x, y) {
    const ph = document.querySelector('.phone').getBoundingClientRect();
    const sc = screen.getBoundingClientRect();
    const px = sc.left - ph.left + x;
    const py = sc.top - ph.top + y;
    tap.style.left = px + 'px'; tap.style.top = py + 'px';
    tap.classList.remove('go'); void tap.offsetWidth; tap.classList.add('go');
    finger.style.opacity = '1';
    finger.style.left = (px - 18) + 'px';
    finger.style.top = (py - 6) + 'px';
    setTimeout(() => { finger.classList.remove('press'); void finger.offsetWidth; finger.classList.add('press'); }, 480);
  }

  /* ===== Música de fondo original (generada, libre de derechos) ===== */
  let audioCtx = null, musicTimer = null, musicMaster = null, musicMuted = false;
  function startMusic() {
    if (audioCtx || musicMuted) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const master = audioCtx.createGain();
      master.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      master.gain.exponentialRampToValueAtTime(0.055, audioCtx.currentTime + 2);
      master.connect(audioCtx.destination);
      musicMaster = master;
      const base = 261.63; // Do
      const f = s => base * Math.pow(2, s / 12);
      const prog = [[-12, -5, 0], [-5, -1, 2], [-3, 0, 4], [-7, -3, 0]]; // I-V-vi-IV
      const bar = 2.0; let i = 0; // más rápido = más movido
      const tocar = () => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const ch = prog[i % 4];
        // pad pulsante (dos pulsos por compás)
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.0001, t); g.connect(master);
        g.gain.linearRampToValueAtTime(0.5, t + 0.12);
        g.gain.linearRampToValueAtTime(0.16, t + bar / 2 - 0.1);
        g.gain.linearRampToValueAtTime(0.5, t + bar / 2 + 0.1);
        g.gain.linearRampToValueAtTime(0.0001, t + bar);
        ch.forEach(s => { const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f(s); o.connect(g); o.start(t); o.stop(t + bar + 0.05); });
        // bajo con pluck, dos por compás (le da ritmo)
        [0, bar / 2].forEach(off => {
          const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f(ch[0] - 12);
          const bg = audioCtx.createGain(); bg.gain.setValueAtTime(0.0001, t + off); bg.connect(master);
          bg.gain.linearRampToValueAtTime(0.5, t + off + 0.03); bg.gain.exponentialRampToValueAtTime(0.001, t + off + 0.4);
          o.connect(bg); o.start(t + off); o.stop(t + off + 0.45);
        });
        // arpegio movido: 4 notas por compás
        [ch[0] + 12, ch[1] + 12, ch[2] + 12, ch[1] + 12].forEach((s, k) => {
          const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f(s);
          const ag = audioCtx.createGain(); const st = t + k * (bar / 4);
          ag.gain.setValueAtTime(0.0001, st); ag.connect(master);
          ag.gain.linearRampToValueAtTime(0.16, st + 0.02); ag.gain.exponentialRampToValueAtTime(0.001, st + 0.28);
          o.connect(ag); o.start(st); o.stop(st + 0.3);
        });
        i++;
      };
      tocar(); musicTimer = setInterval(tocar, bar * 1000);
    } catch (e) { /* sin audio, la demo anda igual */ }
  }
  function stopMusic() {
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    if (audioCtx) { try { musicMaster.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8); } catch (e) {} const c = audioCtx; audioCtx = null; setTimeout(() => { try { c.close(); } catch (e) {} }, 1000); }
  }
  document.getElementById('mute').addEventListener('click', () => {
    musicMuted = !musicMuted;
    document.getElementById('mute').textContent = musicMuted ? '🔇' : '🔊';
    if (musicMuted) { stopMusic(); stopVoz(); } else if (running) startMusic();
  });

  // ---- Escenas (datos INVENTADOS) ----
  const scenes = [

        screen.innerHTML = shell(`
          <div style="text-align:center; margin-top:60px;" class="fadeUp">
            <div style="font-size:40px; letter-spacing:5px; font-weight:800; color:var(--azul-osc);">ESTELITA</div>
            <div style="color:var(--suave); margin-top:10px; font-size:13px;">Gestión para talleres de GNC</div>
            <div class="pill" style="margin-top:22px;">Cliente nuevo · Revisión · Ficha al PEC</div>

      }},

    { dur: 4600, cap: 'Toco <b>Nuevo trámite</b>.',
      render() {
        screen.innerHTML = shell(`
          <div style="display:flex; gap:8px; margin-bottom:12px;">
            <div class="card" style="flex:1; text-align:center; padding:9px;"><div style="color:#D93B2B; font-weight:800; font-size:18px;">2</div><div class="lbl">Vencidos</div></div>
            <div class="card" style="flex:1; text-align:center; padding:9px;"><div style="color:#DF8B00; font-weight:800; font-size:18px;">0</div><div class="lbl">Por vencer</div></div>
            <div class="card" style="flex:1; text-align:center; padding:9px;"><div style="color:var(--verde); font-weight:800; font-size:18px;">41</div><div class="lbl">Al día</div></div>
          </div>

          <div class="fab pop" style="animation-delay:.3s">+ Nuevo trámite</div>`);

          <div class="lbl" style="margin:2px 0 10px;">Paso 1 de 3</div>
          <div class="h">Fotos del cliente</div>

            <div class="foto pop"><div class="docimg"><span style="font-size:20px;">🪪</span><b>Frente</b></div></div>

    { dur: 5200, cap: 'Toco <b>Leer datos</b>: la inteligencia artificial lee la documentación.',

          <div class="h">Datos personales</div>

          <div class="card" style="margin-top:7px;"><div class="lbl">Documento</div><div class="val" id="v2"><span class="skeleton" style="display:block;height:12px;width:45%"></span></div></div>
          <div class="card" style="margin-top:7px;"><div class="lbl">Domicilio</div><div class="val" id="v3"><span class="skeleton" style="display:block;height:12px;width:66%"></span></div></div>

        const set = (id, txt) => { const e = document.getElementById(id); if (e) e.innerHTML = '<span class="fadeUp chk">✓</span> ' + txt; };

    { dur: 5600, cap: 'Consulto la patente en <b>ENARGAS</b>.',
      render() {
        screen.innerHTML = `<div class="enargas">
          <div class="eg-top">✕&nbsp;&nbsp;ENARGAS · enargas.gob.ar</div>
          <div class="eg-body">
            <h3 class="fadeUp">Gas Natural Vehicular</h3>

            <div class="eg-box pop" style="animation-delay:.25s">
              <div style="font-size:12px; color:#444; margin-bottom:6px;">Dominio *</div>

    { dur: 7200, cap: 'Pego el resultado y se carga <b>todo el equipo</b>: cilindros, válvulas y fechas.',
      render() {
        screen.innerHTML = shell(`
          <div class="h">Vehículo</div>
          <div class="grid2">
            <div class="card"><div class="lbl">Patente</div><div class="val">AD456BX</div></div>
            <div class="card"><div class="lbl">Marca</div><div class="val">Ford</div></div>
          </div>

          <div id="eq"></div>`);

            <div class="card fadeUp" style="margin-top:7px; animation-delay:.3s"><div class="lbl">Válvula</div><div class="val">TT18 · 092870</div></div>`;
          const peg = document.getElementById('peg');
          if (peg) { peg.style.cssText = 'margin-top:9px;color:var(--verde);font-weight:700;font-size:13px;text-align:center;'; peg.innerHTML = '✓ Equipo cargado sin tipear nada'; }
        }, 2900);
      }},

    { dur: 5000, cap: 'Reviso, firma el cliente, y listo el trámite.',
      render() {
        screen.innerHTML = shell(`
          <div class="h">Paso 3 · Trámite</div>
          <div class="card pop" style="text-align:center; padding:18px 12px;">
            <div style="font-size:34px;">📄</div>
            <div style="font-weight:800; margin-top:6px; font-size:14px;">Ficha técnica lista</div>
            <div class="lbl" style="margin-top:3px; letter-spacing:.3px;">AD456BX · Revisión</div>
          </div>
          <div class="btn wapp fadeUp" id="env" style="margin-top:12px; animation-delay:.3s">Enviar al PEC por WhatsApp</div>`);
        setTimeout(() => tapAt(165, 300), 2600);
      }},

    { dur: 6000, cap: 'La ficha sale <b>por WhatsApp al PEC</b>, ya armada. El PDF viaja solo.',
      render() {
        screen.innerHTML = `<div class="wa">
          <div class="wa-top"><span style="font-size:18px;">←</span><div class="av"></div><span>PEC · Movil Gas</span></div>
          <div class="wa-body">
            <div class="wa-msg fadeUp" style="max-width:70%;">Ficha del trámite AD456BX ✅<div class="wa-tick">22:59 ✓✓</div></div>
            <div class="wa-msg pop" style="animation-delay:.5s">
              <div class="wa-pdf"><div class="ic">PDF</div><div><div class="nm">PEC_AD456BX_2026-07-09.pdf</div><div class="sz">3 páginas · 368 kB</div></div></div>
              <div class="wa-tick">23:00 ✓✓</div>
            </div>
          </div></div>`;
      }},

    { dur: 5200, cap: 'Trámite completo en <b>1 minuto y medio</b>. Menos papeles, más autos.',
      render() {
        screen.innerHTML = shell(`
          <div style="text-align:center; margin-top:40px;" class="fadeUp">
            <div style="font-size:38px; letter-spacing:5px; font-weight:800; color:var(--azul-osc);">ESTELITA</div>
            <div class="pill pop" style="margin-top:16px; font-size:12px; padding:6px 14px; animation-delay:.2s">⏱ Trámite completo en 1:30</div>
            <div style="color:var(--tinta); margin-top:16px; font-size:14px; font-weight:600;">Más tiempo, mejor atención,<br>más clientes.</div>
            <div class="pill pop" style="margin-top:16px; font-size:12px; padding:6px 14px; animation-delay:.4s; background:#E3F6EC; color:var(--verde);">🎁 Probala gratis 14 días</div>
          </div>`);
      }},
  ];

  // Cada escena dura lo que dura su frase de voz (+ un respiro), para que la
  // locutora quede sincronizada con lo que se ve.
  const VOZ_DUR = [9000, 6400, 4200, 4200, 8400, 4000, 8000, 5200, 8000, 9200];
  scenes.forEach((s, i) => { s.dur = VOZ_DUR[i]; });
  const vozAudios = VOZ_DUR.map((_, i) => { const a = new Audio('voz/e' + (i + 1) + '.mp3'); a.preload = 'auto'; return a; });
  let vozActual = null;
  function playVoz(i) {
    if (musicMuted) return;
    try { if (vozActual) vozActual.pause(); vozActual = vozAudios[i]; vozActual.currentTime = 0; vozActual.play().catch(() => {}); } catch (e) {}
  }
  function stopVoz() { if (vozActual) { try { vozActual.pause(); vozActual.currentTime = 0; } catch (e) {} } }

  const total = scenes.reduce((a, s) => a + s.dur, 0);
  let timer = null, running = false, cronoInt = null, t0 = 0;
  const CRONO_FINAL = 90;
  function fmt(seg) { const m = Math.floor(seg / 60); const s = Math.floor(seg % 60); return m + ':' + String(s).padStart(2, '0'); }
  function tickCrono() { if (!running) return; const prog = Math.min(1, (performance.now() - t0) / total); cronoEl.textContent = fmt(prog * CRONO_FINAL); }

  function playScene(i) {
    const s = scenes[i];
    finger.style.opacity = '0';
    s.render();
    caption.innerHTML = s.cap;
    playVoz(i);
    let acc = 0; for (let k = 0; k < i; k++) acc += scenes[k].dur;
    barra.style.transition = 'none';
    barra.style.width = (acc / total * 100) + '%';
    void barra.offsetWidth;
    barra.style.transition = 'width ' + s.dur + 'ms linear';
    barra.style.width = ((acc + s.dur) / total * 100) + '%';
    timer = setTimeout(() => { if (i + 1 < scenes.length) playScene(i + 1); else finalizar(); }, s.dur);
  }

  function empezar() {
    overlay.style.display = 'none';
    running = true;
    t0 = performance.now();
    cronoInt = setInterval(tickCrono, 200);
    startMusic();
    playScene(0);
  }
  function finalizar() {
    running = false;
    clearInterval(cronoInt);
    stopMusic();
    stopVoz();
    finger.style.opacity = '0';
    barra.style.width = '100%';
    cronoEl.textContent = fmt(CRONO_FINAL);
    overlay.querySelector('p').textContent = 'Ver de nuevo';
    overlay.querySelector('.play').textContent = '⟳';
    overlay.style.display = 'flex';
  }

  document.getElementById('play').addEventListener('click', () => {
    clearTimeout(timer); clearInterval(cronoInt); stopMusic(); stopVoz();
    cronoEl.textContent = '0:00';
    empezar();
  });
</script>

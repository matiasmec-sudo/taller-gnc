<script>
// Reemplazo de window.storage (que solo existe dentro de Claude.ai) por una
// version basada en localStorage del navegador, para que la app funcione
// de forma totalmente independiente. Misma interfaz (get/set/delete/list),
// asi que el resto del codigo no necesita cambios.
window.storage = {
  async get(key) {
    const raw = localStorage.getItem(key);
    if (raw === null) return null;
    return { key, value: raw, shared: false };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    const existed = localStorage.getItem(key) !== null;
    localStorage.removeItem(key);
    return existed ? { key, deleted: true, shared: false } : null;
  },
  async list(prefix) {
    const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
    return { keys, prefix, shared: false };
  }
};
</script>
<div id="gnc-app"></div>
<style>
#gnc-app {
  --bg: #F4F6FA;
  --surface: #FFFFFF;
  --surface-alt: #EEF2F9;
  --line: #E3E8F0;
  --flame: #1D5BD8;
  --flame-dim: #7FA3E8;
  --warn: #DF8B00;
  --danger: #D93B2B;
  --ok: #1E9E5A;
  --text: #1A2333;
  --text-muted: #6B7688;
  --sombra: 0 2px 10px rgba(20,40,90,0.07);
  --mono: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  --sans: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  --display: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;

  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  padding: 0;
  box-sizing: border-box;
  line-height: 1.5;
}
#gnc-app *, #gnc-app *::before, #gnc-app *::after { box-sizing: border-box; }

#gnc-app .wrap { max-width: 980px; margin: 0 auto; padding: 24px 20px 60px; }

/* HEADER — banner azul con puntas redondeadas (estilo La Caja) */
#gnc-app .topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  background: var(--flame); color: #fff;
  margin: -24px -20px 0; padding: 22px 20px 52px;
  border-radius: 0 0 28px 28px;
}
#gnc-app .brand { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; min-width: 0; }
#gnc-app .menu-wrap { position: relative; align-self: center; }
#gnc-app .menu-dropdown {
  position: absolute; top: 100%; left: 0; margin-top: 6px; z-index: 20;
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  padding: 8px; display: flex; flex-direction: column; gap: 6px; min-width: 190px;
  box-shadow: 0 8px 24px rgba(20,40,90,0.18);
}
#gnc-app .menu-dropdown .btn { width: 100%; text-align: left; justify-content: flex-start; color: var(--text); border-color: transparent; }
#gnc-app .menu-badge {
  position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff;
  border-radius: 999px; font-size: 10px; line-height: 1; padding: 3px 5px; font-weight: 700;
  min-width: 15px; text-align: center;
}
#gnc-app .menu-badge-inline {
  background: var(--danger); color: #fff; border-radius: 999px; font-size: 10px;
  padding: 1px 6px; font-weight: 700; margin-left: 4px;
}
#gnc-app .brand .tag {
  font-family: var(--sans); font-size: 11px; letter-spacing: 3px; font-weight: 700;
  color: #fff; border: none; background: rgba(255,255,255,0.18);
  padding: 4px 12px; border-radius: 999px; text-transform: uppercase;
}
#gnc-app h1 {
  font-family: var(--display); font-weight: 700; font-size: 24px;
  letter-spacing: 0.2px; margin: 0;
}
#gnc-app .taller-name-input {
  background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,0.45);
  color: #fff; font-family: var(--display); font-weight: 700; font-size: 24px;
  letter-spacing: 0.2px; padding: 2px 0;
  width: 260px; max-width: 100%; outline: none;
}
#gnc-app .taller-name-input:focus { border-bottom-color: #fff; }
@media (max-width: 480px) {
  #gnc-app .taller-name-input { flex: 1 1 100%; font-size: 20px; }
}
/* Botones y links dentro del banner azul, en blanco */
#gnc-app .topbar .btn-ghost { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.4); }
#gnc-app .topbar .btn-ghost:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.12); }
#gnc-app .topbar .menu-dropdown .btn-ghost { color: var(--text); border-color: transparent; }
#gnc-app .topbar .menu-dropdown .btn-ghost:hover { color: var(--flame); background: var(--surface-alt); }
#gnc-app .topbar .license-link { color: rgba(255,255,255,0.75); }
#gnc-app .topbar .license-link:hover { color: #fff; }

/* RESUMEN — tarjetas flotantes que pisan el banner azul */
#gnc-app .resumen-chips {
  display: flex; gap: 10px; margin: -32px 0 18px; position: relative; z-index: 2;
}
#gnc-app .chip {
  flex: 1; background: var(--surface); border-radius: 16px; padding: 12px 8px;
  text-align: center; box-shadow: 0 4px 14px rgba(20,40,90,0.10);
}
#gnc-app .chip .chip-num { font-size: 22px; font-weight: 800; line-height: 1.2; }
#gnc-app .chip .chip-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
#gnc-app .chip-danger .chip-num { color: var(--danger); }
#gnc-app .chip-warn .chip-num { color: var(--warn); }
#gnc-app .chip-ok .chip-num { color: var(--ok); }

/* CONTROLS */
#gnc-app .controls {
  display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
}
#gnc-app input[type="text"], #gnc-app input[type="tel"], #gnc-app input[type="date"],
#gnc-app input[type="month"], #gnc-app select, #gnc-app textarea {
  background: var(--surface); border: 1px solid var(--line); color: var(--text);
  border-radius: 12px; padding: 9px 13px; font-family: var(--sans); font-size: 14px;
  outline: none; transition: border-color .15s ease, box-shadow .15s ease;
}
#gnc-app textarea { width: 100%; resize: vertical; min-height: 90px; font-family: var(--mono); font-size: 12.5px; }
#gnc-app input:focus, #gnc-app select:focus, #gnc-app textarea:focus {
  border-color: var(--flame); box-shadow: 0 0 0 3px rgba(29,91,216,0.15);
}
#gnc-app .search-input { flex: 1; min-width: 180px; border-radius: 14px; box-shadow: 0 2px 8px rgba(20,40,90,0.06); }
#gnc-app .btn {
  font-family: var(--sans); font-weight: 700; font-size: 13px; letter-spacing: 0.2px;
  border-radius: 12px; padding: 10px 16px; border: 1px solid transparent; cursor: pointer;
  min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: transform .08s ease, filter .12s ease, background-color .15s ease, border-color .15s ease;
}
#gnc-app .btn:active { transform: scale(0.96); filter: brightness(0.9); }
#gnc-app .btn-primary { background: var(--flame); color: #fff; box-shadow: 0 4px 12px rgba(29,91,216,0.30); }
#gnc-app .btn-primary:hover { filter: brightness(1.08); }
#gnc-app .btn-primary:active { filter: brightness(0.9); }
#gnc-app .btn-ghost { background: transparent; border-color: var(--line); color: var(--text-muted); }
#gnc-app .btn-ghost:hover { color: var(--flame); border-color: var(--flame-dim); background: rgba(29,91,216,0.06); }
#gnc-app .btn-ghost:active { background: rgba(29,91,216,0.12); }
#gnc-app .btn-wa { background: #E1F5EA; color: #157A44; border-color: transparent; font-size: 12px; padding: 7px 10px; }
#gnc-app .btn-wa:hover { filter: brightness(0.97); }
#gnc-app .btn-danger-outline { background: #FDE8E5; color: #C0281A; border-color: transparent; font-size: 12px; padding: 7px 10px; }
#gnc-app .btn-danger-solid { background: var(--danger); color: #fff; border-color: var(--danger); font-size: 13px; }
#gnc-app .btn-danger-solid:hover { filter: brightness(1.1); }
#gnc-app .btn-danger-solid:active { filter: brightness(0.9); }
#gnc-app .btn-agent { background: var(--flame); color: #fff; border-color: transparent; font-size: 12px; padding: 7px 10px; }
#gnc-app .btn-agent:hover { filter: brightness(1.08); }
#gnc-app .btn-sm { font-size: 12px; padding: 7px 10px; }
#gnc-app #btn-toggle-menu { min-width: 44px; }
#gnc-app input[type="text"], #gnc-app input[type="tel"],
#gnc-app input[type="date"], #gnc-app input[type="month"],
#gnc-app select { min-height: 44px; }
/* Sin esto, un <select> con una opción de texto largo (ej. "Prueba
   Hidráulica", "Operación (M/S/D/B)") no se achica por debajo de su ancho
   de contenido — ni él ni el <label> que lo envuelve, aunque estén en un
   grid de columnas angostas — y termina saliéndose del recuadro en
   pantallas chicas en vez de ajustarse. */
#gnc-app input, #gnc-app select { min-width: 0; width: 100%; box-sizing: border-box; }
#gnc-app input[type="checkbox"] { width: 20px; height: 20px; }

/* FORM PANEL */
#gnc-app .panel {
  background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
  padding: 20px; margin-bottom: 20px; box-shadow: var(--sombra);
}
#gnc-app .panel h2 {
  font-family: var(--display); font-size: 16px; font-weight: 800;
  letter-spacing: 0.3px; margin: 0 0 14px; color: var(--flame);
}
#gnc-app .panel h2.panel-h2-sticky {
  position: sticky; top: 0; z-index: 5; background: var(--surface);
  margin: -20px -20px 14px; padding: 16px 20px 10px; border-bottom: 1px solid var(--line);
}
#gnc-app .wizard-pasos {
  font-family: var(--mono); font-size: 11px; text-transform: none; letter-spacing: normal;
  color: var(--text-muted); margin-top: 4px;
}
#gnc-app .panel h3 {
  font-family: var(--display); font-size: 13px; text-transform: uppercase; font-weight: 700;
  letter-spacing: 1px; margin: 18px 0 10px; color: var(--text-muted);
  border-top: 1px solid var(--line); padding-top: 14px;
}
#gnc-app .panel h3.vehiculo-heading {
  font-size: 16px; color: var(--flame); border-top: 2px solid var(--flame-dim);
}
#gnc-app .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
#gnc-app .form-grid label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--text-muted); font-family: var(--mono); min-width: 0; }
#gnc-app .form-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
@media (max-width: 640px) { #gnc-app .form-grid { grid-template-columns: 1fr; } }

/* AGENT PASTE BOX */
#gnc-app .agent-box {
  background: var(--surface-alt); border: 1px dashed var(--flame-dim); border-radius: 8px;
  padding: 14px; margin-top: 14px;
}
#gnc-app .agent-box label { display: block; font-family: var(--mono); font-size: 11px; color: var(--flame); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#gnc-app .agent-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
#gnc-app .agent-result { font-family: var(--mono); font-size: 12px; margin-top: 10px; padding: 10px; border-radius: 12px; background: rgba(29,91,216,0.06); border: 1px solid var(--flame-dim); }
#gnc-app .agent-result.err { background: #FDE8E5; border-color: #F0B4AB; color: #C0281A; }

/* SCAN BOX (fotos DNI / Cedula) */
#gnc-app .scan-box {
  background: var(--surface-alt); border: 1px dashed var(--flame-dim); border-radius: 8px;
  padding: 16px; margin-bottom: 18px;
}
#gnc-app .scan-box h3 { margin: 0 0 4px; border: none; padding: 0; }
#gnc-app .scan-sub { font-size: 12px; color: var(--text-muted); margin: 0 0 12px; }
#gnc-app .scan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (max-width: 640px) { #gnc-app .scan-grid { grid-template-columns: 1fr; } }
#gnc-app .scan-slot { display: flex; flex-direction: column; gap: 6px; }
#gnc-app .scan-slot label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
#gnc-app .scan-slot input[type="file"] {
  font-size: 11px; color: var(--text-muted); background: var(--surface);
  border: 1px solid var(--line); border-radius: 6px; padding: 8px; width: 100%;
}
#gnc-app .scan-thumb { width: 100%; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid var(--line); display: none; }
#gnc-app .scan-slot-buttons { display: flex; gap: 6px; }
#gnc-app .scan-slot-buttons label.btn {
  flex: 1; text-align: center; justify-content: center; cursor: pointer;
  font-family: inherit; font-size: 12px; text-transform: none; letter-spacing: normal; color: inherit;
}
#gnc-app .scan-actions { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
#gnc-app .scan-status { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
#gnc-app .scan-status.ok { color: var(--ok); }
#gnc-app .scan-status.err { color: var(--danger); }
#gnc-app .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

/* LIST */
#gnc-app .empty {
  text-align: center; padding: 50px 20px; color: var(--text-muted);
  border: 1px dashed var(--line); border-radius: 10px; font-family: var(--mono); font-size: 13px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
#gnc-app .empty svg { opacity: 0.55; }

/* ANIMACION DE ENTRADA — solo se aplica cuando un panel recién se abre (ver
   prevPanelState en render()), no en cada re-render mientras sigue abierto,
   para no repetir la animación por cambios chicos adentro. */
@keyframes gncPanelIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
#gnc-app .panel-entrando { animation: gncPanelIn 190ms ease-out; }

/* CARGA */
@keyframes gncSpin { to { transform: rotate(360deg); } }
#gnc-app .gnc-spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 3px solid var(--line); border-top-color: var(--flame);
  animation: gncSpin 0.8s linear infinite; flex-shrink: 0;
}
#gnc-app .gnc-loading-row { display: flex; align-items: center; gap: 10px; }

/* MODAL PROPIO (reemplaza alert/confirm nativos) */
@keyframes gncModalFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes gncModalPop { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.gnc-modal-overlay {
  position: fixed; inset: 0; background: rgba(20,35,60,0.45); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: gncModalFade 150ms ease-out; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
}
.gnc-modal-overlay.closing { animation: gncModalFade 150ms ease-in reverse; }
.gnc-modal-box {
  width: 100%; max-width: 320px; background: #FFFFFF;
  border: 1px solid #E3E8F0; border-radius: 18px; padding: 18px;
  box-shadow: 0 12px 32px rgba(20,40,90,0.22); animation: gncModalPop 180ms ease-out;
  color: #1A2333;
}
.gnc-modal-overlay.closing .gnc-modal-box { animation: gncModalPop 150ms ease-in reverse; }
.gnc-modal-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
.gnc-modal-icon {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; font-size: 15px; font-weight: 700;
  background: rgba(29,91,216,0.12); color: #1D5BD8;
}
.gnc-modal-box.danger .gnc-modal-icon { background: #FDE8E5; color: #C0281A; }
.gnc-modal-title {
  font-family: inherit; font-size: 14px; font-weight: 800;
  letter-spacing: 0.2px; margin-bottom: 4px;
}
.gnc-modal-msg { font-size: 12.5px; color: #6B7688; line-height: 1.5; }
.gnc-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
/* Los modales viven fuera de #gnc-app, así que sus botones necesitan
   estilos propios (si no, quedan con el look gris nativo del navegador). */
.gnc-modal-box .btn {
  font-family: inherit; font-weight: 700; font-size: 13px; letter-spacing: 0.2px;
  border-radius: 12px; padding: 9px 16px; border: 1px solid transparent;
  cursor: pointer; min-height: 40px; background: transparent;
}
.gnc-modal-box .btn:active { transform: scale(0.96); }
.gnc-modal-box .btn-primary { background: #1D5BD8; color: #fff; }
.gnc-modal-box .btn-danger-solid { background: #D93B2B; color: #fff; }
.gnc-modal-box .btn-ghost { border-color: #E3E8F0; color: #6B7688; }
.gnc-modal-box .btn-ghost:hover { color: #1D5BD8; border-color: #7FA3E8; }
.gnc-modal-box select, .gnc-modal-box input {
  background: #fff; border: 1px solid #E3E8F0; color: #1A2333;
  border-radius: 12px; padding: 9px 13px; font-family: inherit; font-size: 14px;
  width: 100%; min-height: 44px; box-sizing: border-box; outline: none;
}
.gnc-modal-box select:focus, .gnc-modal-box input:focus {
  border-color: #1D5BD8; box-shadow: 0 0 0 3px rgba(29,91,216,0.15);
}
.gnc-modal-box .form-grid { display: grid; gap: 12px; }
.gnc-modal-box .form-grid label {
  display: flex; flex-direction: column; gap: 5px;
  font-size: 12px; color: #6B7688; font-weight: 600;
}

/* BOTON FLOTANTE (FAB) — solo en mobile, alternativa al boton de arriba */
#gnc-app .fab-nuevo-tramite { display: none; }
@media (max-width: 720px) {
  #gnc-app .fab-nuevo-tramite {
    display: flex; align-items: center; justify-content: center;
    position: fixed; bottom: 20px; right: 20px; width: 58px; height: 58px;
    border-radius: 50%; background: var(--flame); color: #fff; font-size: 28px;
    font-weight: 400; border: none; box-shadow: 0 6px 18px rgba(29,91,216,0.40);
    z-index: 40; cursor: pointer; line-height: 1;
  }
  #gnc-app .fab-nuevo-tramite:active { transform: scale(0.92); filter: brightness(0.85); }
}

/* BARRA DE NAVEGACION INFERIOR — solo en mobile (estilo app) */
#gnc-app .bottom-nav { display: none; }
@media (max-width: 720px) {
  #gnc-app .bottom-nav {
    display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 45;
    background: var(--surface); border-top: 1px solid var(--line);
    padding: 6px 0 max(10px, env(safe-area-inset-bottom));
    box-shadow: 0 -2px 10px rgba(20,40,90,0.06);
  }
  #gnc-app .bottom-nav .bn-item {
    flex: 1; background: none; border: none; cursor: pointer; padding: 4px 0;
    font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 2px; position: relative;
  }
  #gnc-app .bottom-nav .bn-item.activo { color: var(--flame); }
  #gnc-app .bottom-nav .bn-ico { font-size: 19px; line-height: 1.2; }
  #gnc-app .bottom-nav .bn-badge {
    position: absolute; top: -2px; right: calc(50% - 24px);
    background: var(--danger); color: #fff; font-size: 10px; font-weight: 800;
    border-radius: 999px; padding: 1px 6px;
  }
  #gnc-app .wrap { padding-bottom: 120px; }
  #gnc-app .fab-nuevo-tramite { bottom: 86px; }
}
#gnc-app .client-card-wrap { position: relative; margin-bottom: 14px; border-radius: 18px; overflow: hidden; }
#gnc-app .client-card {
  background: var(--surface); border: 1px solid var(--line); border-left: 5px solid var(--line);
  border-radius: 18px; padding: 16px 18px; position: relative; z-index: 1;
  box-shadow: var(--sombra); transition: box-shadow .15s ease;
  touch-action: pan-y;
}
#gnc-app .client-card:hover { box-shadow: 0 6px 18px rgba(20,40,90,0.13); }
#gnc-app .client-swipe-delete {
  position: absolute; inset: 0; z-index: 0; border: none; border-radius: 18px;
  background: var(--danger); color: #fff; font-family: var(--sans); font-weight: 700; font-size: 13px;
  display: flex; align-items: center; justify-content: flex-end; padding-right: 24px; cursor: pointer;
}
#gnc-app .client-card.st-danger { border-left-color: var(--danger); }
#gnc-app .client-card.st-warn { border-left-color: var(--warn); }
#gnc-app .client-card.st-ok { border-left-color: var(--ok); }
#gnc-app .client-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
#gnc-app .client-patente { font-family: var(--display); font-weight: 800; font-size: 21px; letter-spacing: 1px; }
#gnc-app .client-modelo { font-family: var(--sans); font-size: 13px; color: var(--text-muted); margin-top: 2px; }
#gnc-app .client-name { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text); margin-top: 4px; }
#gnc-app .client-actions { display: flex; gap: 8px; flex-wrap: wrap; }
#gnc-app .client-detalle { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
#gnc-app .client-detalle-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 16px; font-size: 12px; margin-bottom: 10px;
}
@media (max-width: 640px) { #gnc-app .client-detalle-grid { grid-template-columns: 1fr; } }
#gnc-app .client-detalle-grid .doc-label { display: block; margin-bottom: 2px; }
#gnc-app .docs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
@media (max-width: 640px) { #gnc-app .docs { grid-template-columns: 1fr; } }
#gnc-app .doc-row {
  background: var(--surface-alt); border-radius: 12px; padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
  transition: background-color .15s ease;
}
#gnc-app .doc-row:hover { background: #E4EBF7; }
#gnc-app .doc-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
#gnc-app .doc-date { font-family: var(--mono); font-size: 13px; }
#gnc-app .doc-sub { font-family: var(--mono); font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
#gnc-app .badge {
  font-family: var(--sans); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 3px 9px; border-radius: 999px; font-weight: 700;
}
#gnc-app .badge-danger { background: #FDE8E5; color: #C0281A; }
#gnc-app .badge-warn { background: #FCF1DC; color: #B36F00; }
#gnc-app .badge-ok { background: #E1F5EA; color: #157A44; }

#gnc-app .hidden { display: none !important; }
#gnc-app .loading {
  text-align: center; padding: 40px; color: var(--text-muted); font-family: var(--mono); font-size: 12px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

#gnc-app .activation-wrap { max-width: 420px; padding-top: 80px; }
#gnc-app .activation-panel #activation-input { width: 100%; margin-bottom: 4px; }

#gnc-app .license-link {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0;
}
#gnc-app .license-link:hover { color: var(--flame); }

/* TRAMITES */
#gnc-app .tramites-list { display: flex; flex-direction: column; gap: 8px; }
#gnc-app .tramite-row {
  background: var(--surface-alt); border-radius: 12px; padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
}
#gnc-app .tramite-row select { font-size: 11px; padding: 5px 7px; }
#gnc-app .tramite-motivo { font-family: var(--mono); font-size: 11px; color: var(--danger); margin-top: 2px; width: 100%; }

/* FIRMA ELECTRONICA */
#gnc-app .signature-box canvas {
  width: 100%; height: 160px; touch-action: none; display: block;
  background: var(--surface-alt); border: 1px solid var(--line); border-radius: 8px;
}

/* IMPORTACION MASIVA */
#gnc-app .import-preview { max-height: 320px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; margin: 12px 0; }
#gnc-app .import-preview table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11.5px; }
#gnc-app .import-preview th, #gnc-app .import-preview td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--line); }
#gnc-app .import-preview th { position: sticky; top: 0; background: var(--surface); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; }
#gnc-app .import-summary { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-top: 8px; }

/* BANNERS */
#gnc-app .reminder-banner, #gnc-app .incompletos-banner { border-color: var(--flame-dim); }
#gnc-app .reminder-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

/* EQUIPO (grilla del tramite) */
#gnc-app .equipo-fila { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; align-items: end; }
#gnc-app .equipo-fila label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); display: flex; flex-direction: column; gap: 4px; min-width: 0; }
@media (max-width: 900px) { #gnc-app .equipo-fila { grid-template-columns: 1fr 1fr; } }
@media (max-width: 480px) { #gnc-app .equipo-fila { grid-template-columns: 1fr; } }
#gnc-app .equipo-grupo { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px dashed var(--line); }
#gnc-app .equipo-grupo:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
#gnc-app .equipo-operacion { color: var(--warn) !important; }
#gnc-app .equipo-operacion select {
  border-color: var(--warn); background: rgba(242,169,59,0.1); color: var(--warn); font-weight: 600;
}
#gnc-app .campo-obligatorio { color: var(--warn) !important; }
#gnc-app .campo-obligatorio input {
  border-color: var(--warn); background: rgba(242,169,59,0.08);
}
#gnc-app details.otros-equipos { margin-top: 14px; border: 1px dashed var(--line); border-radius: 8px; padding: 10px 14px; }
#gnc-app details.otros-equipos summary { cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--flame); text-transform: uppercase; letter-spacing: 1px; }
#gnc-app details.otros-equipos .form-grid { margin-top: 12px; }
</style>

<script>
(function(){
  const root = document.getElementById('gnc-app');
  const WARN_DAYS = 5;
  const STORAGE_KEY = 'gnc_clientes_v2';
  const TALLER_KEY = 'gnc_taller_nombre_v1';
  const LICENSE_KEY = 'gnc_license_code';
  const TALLER_CONFIG_KEY = 'gnc_taller_config_v1';

  // Chrome/Android dispara este evento cuando la app cumple los requisitos
  // para instalarse (manifest + service worker ya están OK) — lo guardamos
  // para poder mostrar un botón propio "Instalar app" en vez de depender de
  // que el usuario encuentre la opción en el menú del navegador. En iPhone
  // Safari no existe este evento — ahí instalar es siempre manual (Compartir
  // → Agregar a pantalla de inicio).
  let deferredInstallPrompt = null;
  let showInstallButton = false;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    showInstallButton = true;
    if (typeof render === 'function' && ready) render();
  });

  // Tocar en cualquier lado fuera de la tarjeta deslizada (swipe para
  // eliminar) la cierra — mismo patrón que las apps de mail en el celular.
  // Se registra una sola vez acá (no en cada render) para no acumular
  // listeners iguales.
  document.addEventListener('click', (e) => {
    if (swipeAbiertoId === null) return;
    const abierta = root.querySelector(`.client-card-wrap[data-client-id="${swipeAbiertoId}"]`);
    if (abierta && abierta.contains(e.target)) return;
    swipeAbiertoId = null;
    if (typeof render === 'function' && ready) render();
  });

  const TALLER_CONFIG_DEFAULT = {
    razonSocial: '', direccion: '', cuit: '',
    tecnicoNombre: '', tecnicoMatricula: '',
    codigoPec: '', codigoTaller: '',
    pecRazonSocial: '', pecDireccion: '', pecTelefono: '', pecIngeniero: '', pecMatriculaCipba: ''
  };

  let clientes = [];
  let tallerNombre = 'Mi Taller GNC';
  let tallerConfig = { ...TALLER_CONFIG_DEFAULT };
  let showTallerConfig = false;
  // Id del cliente para el que está abierto el asistente "Inicio de trámite"
  // (null = todavía no se abrió ninguno, o se está dando de alta uno nuevo
  // vía showForm).
  let editingId = null;
  let ready = false;
  // Ids de clientes cuya tarjeta tiene el detalle (datos + historial de
  // trámites) desplegado — no hace falta entrar a editar solo para mirar.
  const clientesExpandidos = new Set();
  // Snapshot del estado de los paneles en el render anterior — se usa para
  // saber si un panel "recién se abrió" (y animarlo) o si sigue abierto
  // desde antes (y no repetir la animación).
  let prevPanelState = {};
  // Id del cliente cuya tarjeta quedó deslizada (swipe para eliminar) en
  // mobile — null si ninguna está abierta.
  let swipeAbiertoId = null;

  root.innerHTML = '<div class="loading"><span class="gnc-spinner"></span> Cargando datos del taller...</div>';

  function showActivationScreen() {
    root.innerHTML = `
      <div class="wrap activation-wrap">
        <div class="panel activation-panel">
          <h2>Activar Taller GNC</h2>
          <p class="activation-hint">Ingresá el código de licencia que te dieron para habilitar la lectura de fotos con IA.</p>
          <form id="activation-form">
            <input type="text" id="activation-input" placeholder="Ej: GNC-0001" autocomplete="off">
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Activar</button>
            </div>
          </form>
        </div>
      </div>
    `;
    const form = root.querySelector('#activation-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const input = root.querySelector('#activation-input');
      const code = input.value.trim();
      if (!code) return;
      localStorage.setItem(LICENSE_KEY, code);
      boot();
    });
  }

  function boot() {
    if (!localStorage.getItem(LICENSE_KEY)) {
      showActivationScreen();
    } else {
      loadData();
    }
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function fmtMonthYear(ym) {
    if (!ym) return '—';
    const [y,m] = ym.split('-');
    return `${m}/${y}`;
  }

  function daysUntil(iso) {
    if (!iso) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(iso + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function statusOf(iso) {
    const d = daysUntil(iso);
    if (d === null) return { level: 'none', label: 'Sin fecha', days: null };
    if (d < 0) return { level: 'danger', label: `Vencido hace ${Math.abs(d)}d`, days: d };
    if (d <= WARN_DAYS) return { level: 'warn', label: d === 0 ? 'Vence hoy' : `Vence en ${d}d`, days: d };
    return { level: 'ok', label: `Vence en ${d}d`, days: d };
  }

  // Deriva el vencimiento de la Prueba Hidráulica (CRPC) a partir de la fecha
  // de revisión (mes/año) + la periodicidad del cilindro (3 o 5 años).
  // Se aproxima al primer día del mes de vencimiento, ya que ENARGAS solo
  // informa mes/año, no el día exacto.
  function phVencimientoISO(fecha_crpc, tipo_cilindro) {
    if (!fecha_crpc) return null;
    const [y, m] = fecha_crpc.split('-').map(Number);
    const years = tipo_cilindro === '3' ? 3 : 5;
    const vencY = y + years;
    return `${vencY}-${String(m).padStart(2,'0')}-01`;
  }

  function worstStatus(cliente) {
    const a = statusOf(cliente.fecha_oblea);
    const phIso = phVencimientoISO(cliente.fecha_crpc, cliente.tipo_cilindro);
    const b = statusOf(phIso);
    const order = { danger: 0, warn: 1, ok: 2, none: 3 };
    return order[a.level] <= order[b.level] ? a : b;
  }

  function cleanPhone(p) { return (p || '').replace(/\D/g, ''); }

  function waLink(cliente, tipo) {
    const phone = cleanPhone(cliente.telefono);
    let doc, fecha, status;
    if (tipo === 'oblea') {
      doc = 'Oblea';
      fecha = fmtDate(cliente.fecha_oblea);
      status = statusOf(cliente.fecha_oblea);
    } else {
      doc = 'revisión periódica del cilindro (Prueba Hidráulica / CRPC)';
      const phIso = phVencimientoISO(cliente.fecha_crpc, cliente.tipo_cilindro);
      fecha = phIso ? fmtMonthYear(cliente.fecha_crpc ? `${phIso.slice(0,4)}-${phIso.slice(5,7)}` : '') : '—';
      status = statusOf(phIso);
    }
    const venceTexto = status.days !== null && status.days < 0 ? `venció (${fecha})` : `vence (${fecha})`;
    const msg = `Hola ${cliente.nombre}! Te escribimos de ${tallerNombre} para recordarte que la ${doc} de tu vehículo (patente ${cliente.patente || 's/d'}) ${venceTexto}. Te esperamos para renovarla. Cualquier consulta, escribinos por acá. Saludos!`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  // Link de WhatsApp genérico (no atado a oblea/prueba) para contactar al
  // cliente por cualquier motivo desde su tarjeta.
  function waLinkGeneral(cliente) {
    const phone = cleanPhone(cliente.telefono);
    const msg = `Hola ${cliente.nombre}! Te escribimos de ${tallerNombre}.`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  async function loadData() {
    try {
      const res = await window.storage.get(STORAGE_KEY, false);
      clientes = res ? JSON.parse(res.value) : [];
    } catch (e) { clientes = []; }
    try {
      const res2 = await window.storage.get(TALLER_KEY, false);
      tallerNombre = res2 ? JSON.parse(res2.value) : 'Mi Taller GNC';
    } catch (e) { tallerNombre = 'Mi Taller GNC'; }
    try {
      const res3 = await window.storage.get(TALLER_CONFIG_KEY, false);
      tallerConfig = res3 ? { ...TALLER_CONFIG_DEFAULT, ...JSON.parse(res3.value) } : { ...TALLER_CONFIG_DEFAULT };
    } catch (e) { tallerConfig = { ...TALLER_CONFIG_DEFAULT }; }
    if (migrateClientes()) await saveClientes();
    ready = true;
    render();
    iniciarAvisoPendientesDiario();
  }

  // Aviso simple (no requiere servidor ni push real): mientras la pestaña
  // esté abierta, revisa cada minuto si es de lunes a sábado a partir de
  // las 15hs y todavía no se avisó hoy — si hay trámites pendientes,
  // dispara una notificación del navegador. Si se cierra la app antes de
  // esa hora, ese día no llega el aviso (limitación conocida y aceptada:
  // hace falta push real + servidor propio para avisar con la app cerrada).
  const AVISO_PENDIENTES_KEY = 'gnc_pendientes_notif_fecha';
  let avisoPendientesInterval = null;
  function chequearAvisoPendientesDiario() {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const ahora = new Date();
    if (ahora.getDay() === 0) return; // domingo no
    if (ahora.getHours() < 15) return;
    const hoyISO = ahora.toISOString().slice(0, 10);
    if (localStorage.getItem(AVISO_PENDIENTES_KEY) === hoyISO) return;
    const cantidad = pendientesItems().length;
    if (cantidad === 0) return;
    try {
      new Notification('Estelita', {
        body: `Tenés ${cantidad} trámite(s) pendiente(s) de enviar al PEC.`,
        icon: 'icon-192.png',
      });
    } catch (e) { /* algunos navegadores no soportan "new Notification" directo */ }
    localStorage.setItem(AVISO_PENDIENTES_KEY, hoyISO);
  }
  function iniciarAvisoPendientesDiario() {
    if (avisoPendientesInterval) return;
    chequearAvisoPendientesDiario();
    avisoPendientesInterval = setInterval(chequearAvisoPendientesDiario, 60000);
  }

  // Suma campos nuevos (tramites, ultimoAvisoMes, notas) a clientes guardados
  // con el formato viejo, sin tocar ni borrar nada de lo que ya tenían.
  function migrateClientes() {
    let changed = false;
    clientes.forEach(c => {
      if (!Array.isArray(c.tramites)) { c.tramites = []; changed = true; }
      if (!c.ultimoAvisoMes || typeof c.ultimoAvisoMes !== 'object') { c.ultimoAvisoMes = {}; changed = true; }
      if (typeof c.notas !== 'string') { c.notas = ''; changed = true; }
    });
    return changed;
  }

  const TRAMITE_TIPOS = [
    { value: 'conversion', label: 'Conversión' },
    { value: 'modificacion', label: 'Modificación' },
    { value: 'revision_anual', label: 'Revisión Anual' },
    { value: 'prueba_hidraulica', label: 'Prueba Hidráulica' },
    { value: 'baja', label: 'Baja' },
    { value: 'desmontaje', label: 'Desmontaje' },
  ];

  function tramiteTipoLabel(tipo) {
    const t = TRAMITE_TIPOS.find(t => t.value === tipo);
    return t ? t.label : tipo;
  }

  const ESTADO_PEC_LABELS = { pendiente: 'Pendiente', enviado: 'Enviado al PEC', incompleto: 'Incompleto' };
  const USO_VEHICULO_OPCIONES = ['Auto', 'Pick Up', 'Moto', 'Taxi', 'Particular', 'Bus', 'Oficial', 'Otros'];
  // Qué se hizo con ese componente en este trámite puntual — se resalta con
  // otro color en el formulario porque hay que completarlo sí o sí y es
  // fácil olvidarse.
  const OPERACION_OPCIONES = [
    { value: '', label: '-- Elegí --' },
    { value: 'montaje', label: 'Montaje' },
    { value: 'sigue', label: 'Sin Cambios' },
    { value: 'desmontaje', label: 'Desmontaje' },
    { value: 'baja', label: 'Baja' },
  ];
  // Códigos postales conocidos para autocompletar el CPA según la ciudad —
  // por ahora solo cubre la zona del taller; si la ciudad no está en la
  // lista, el CPA se sigue cargando a mano.
  const CODIGOS_POSTALES = {
    'mar del plata': '7600',
  };
  function normalizarCiudad(s) {
    return (s || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  // Trámite más reciente de un cliente (opcionalmente filtrado por tipo/s).
  function latestTramite(c, tipos) {
    const list = tipos ? c.tramites.filter(t => tipos.includes(t.tipo)) : c.tramites;
    if (!list.length) return null;
    return list.slice().sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''))[0];
  }

  async function saveClientes() {
    try { await window.storage.set(STORAGE_KEY, JSON.stringify(clientes), false); }
    catch (e) { console.error('Error guardando clientes', e); }
  }

  async function saveTaller() {
    try { await window.storage.set(TALLER_KEY, JSON.stringify(tallerNombre), false); }
    catch (e) { console.error('Error guardando nombre del taller', e); }
  }

  async function saveTallerConfig() {
    try { await window.storage.set(TALLER_CONFIG_KEY, JSON.stringify(tallerConfig), false); }
    catch (e) { console.error('Error guardando configuración del taller', e); }
  }

  function computeCounts() {
    const counts = { danger: 0, warn: 0, ok: 0 };
    clientes.forEach(c => {
      const s = worstStatus(c);
      if (s.level === 'danger') counts.danger++;
      else if (s.level === 'warn') counts.warn++;
      else counts.ok++;
    });
    return counts;
  }

  function currentYM() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }

  function reminderCandidates() {
    const ym = currentYM();
    const out = [];
    clientes.forEach(c => {
      if (c.fecha_oblea && c.fecha_oblea.slice(0, 7) === ym && c.ultimoAvisoMes.oblea !== ym) {
        out.push({ cliente: c, tipo: 'oblea' });
      }
      const phIso = phVencimientoISO(c.fecha_crpc, c.tipo_cilindro);
      if (phIso && phIso.slice(0, 7) === ym && c.ultimoAvisoMes.prueba !== ym) {
        out.push({ cliente: c, tipo: 'prueba' });
      }
    });
    return out;
  }

  function reminderBanner() {
    const items = reminderCandidates();
    if (!items.length) return '';
    return `<div class="panel reminder-banner">
      <div class="reminder-header">
        <h2 style="margin:0;">📅 ${items.length} cliente(s) para avisar este mes</h2>
        <button type="button" class="btn btn-ghost btn-sm" id="btn-toggle-reminder">${reminderBannerOpen ? 'Ocultar' : 'Ver'}</button>
      </div>
      ${reminderBannerOpen ? `
        <p class="scan-sub">Venc. de Oblea o Prueba Hidráulica este mes. Tocá "Avisar por WhatsApp" para cada uno.</p>
        <div class="docs">
          ${items.map(({ cliente, tipo }) => `
            <div class="doc-row">
              <div>
                <div class="doc-label">${escapeHtml(cliente.nombre)} · ${escapeHtml(cliente.patente || 's/d')}</div>
                <div class="doc-sub">${tipo === 'oblea' ? 'Oblea' : 'Prueba Hidráulica'}</div>
              </div>
              ${cleanPhone(cliente.telefono)
                ? `<a class="btn btn-wa" target="_blank" rel="noopener" data-aviso-mes="${cliente.id}" data-aviso-tipo="${tipo}" href="${waLink(cliente, tipo === 'oblea' ? 'oblea' : 'prueba')}">Avisar por WhatsApp</a>`
                : '<span class="badge badge-warn">Sin teléfono</span>'}
            </div>`).join('')}
        </div>
      ` : ''}
    </div>`;
  }

  // Últimos trámites (uno por cliente) que todavía no quedaron "enviado" —
  // usado tanto para el contador chico del menú como para el panel de
  // "Trámites pendientes".
  function pendientesItems() {
    const items = [];
    clientes.forEach(c => {
      const lt = latestTramite(c);
      if (lt && lt.estadoPec !== 'enviado') items.push({ cliente: c, tramite: lt });
    });
    return items;
  }

  function pendientesPanel(entrando) {
    const items = pendientesItems();
    const notifSoportado = typeof Notification !== 'undefined';
    const notifPermiso = notifSoportado ? Notification.permission : 'unsupported';
    return `<div class="panel incompletos-banner ${entrando ? 'panel-entrando' : ''}" id="pendientes-panel">
      <h2 style="margin-top:0;">⚠ ${items.length} trámite(s) sin enviar o incompletos</h2>

  // --- Importación masiva ---

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',' || ch === '\t') { row.push(field); field = ''; }
        else if (ch === '\r') { /* se ignora, lo maneja \n */ }
        else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else field += ch;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  function parseDateLenient(str) {
    if (!str) return null;
    str = str.trim();
    let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (m) {
      let [, d, mo, y] = m;
      if (y.length === 2) y = '20' + y;
      if (+mo < 1 || +mo > 12 || +d < 1 || +d > 31) return null;
      return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
    }
    m = str.match(/^(\d{1,2})\/(\d{2,4})$/);
    if (m) {
      let [, mo, y] = m;
      if (y.length === 2) y = '20' + y;
      if (+mo < 1 || +mo > 12) return null;
      return `${y}-${mo.padStart(2, '0')}-01`;
    }
    return null;
  }

  function extractPhoneDigits(raw) {
    const digits = (raw || '').replace(/\D/g, '');
    return (digits.length >= 6 && digits.length <= 15) ? digits : null;
  }

  function normalizeHeader(h) {
    return (h || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]/g, '');
  }

  const HEADER_SYNONYMS = {
    nombre: ['nombre', 'nombreyapellido', 'cliente', 'apellidoynombre'],
    telefono: ['telefono', 'tel', 'celular', 'whatsapp', 'numero'],
    patente: ['patente', 'dominio'],
    fecha: ['fecha', 'vencimiento', 'fechaoblea', 'fechavencimiento'],
    dni: ['dni', 'documento'],
    marca: ['marca'], modelo: ['modelo'],
  };

  function looksLikeHeaderRow(row) {
    return row.some(cell => {
      const n = normalizeHeader(cell);
      return Object.values(HEADER_SYNONYMS).some(syns => syns.includes(n));
    });
  }

  function matchColumns(headerRow) {
    const norm = headerRow.map(normalizeHeader);
    const map = {};
    Object.entries(HEADER_SYNONYMS).forEach(([field, syns]) => {
      const idx = norm.findIndex(h => syns.includes(h));
      if (idx !== -1) map[field] = idx;
    });
    return map;
  }

  // Interpreta el texto pegado/subido: con encabezado reconocible usa esas
  // columnas; si no, asume el formato real de la base del taller
  // (patente, teléfono, fecha) sin encabezado.
  function parseBulkImportText(text) {
    const allRows = parseCSV(text);
    if (!allRows.length) return [];
    let dataRows = allRows;
    let colMap = { patente: 0, telefono: 1, fecha: 2 };
    if (looksLikeHeaderRow(allRows[0])) {
      colMap = matchColumns(allRows[0]);
      dataRows = allRows.slice(1);
    }
    const parsed = dataRows.map(row => {
      const rawPatente = (colMap.patente !== undefined ? row[colMap.patente] : '') || '';
      const rawTelefono = (colMap.telefono !== undefined ? row[colMap.telefono] : '') || '';
      const rawFecha = (colMap.fecha !== undefined ? row[colMap.fecha] : '') || '';
      const rawNombre = (colMap.nombre !== undefined ? row[colMap.nombre] : '') || '';
      const patente = rawPatente.trim().toUpperCase().replace(/\s+/g, '');
      const telefono = extractPhoneDigits(rawTelefono);
      const fecha_oblea = parseDateLenient(rawFecha);
      return {
        patente,
        nombre: rawNombre.trim(),
        telefono: telefono || '',
        notas: telefono ? '' : (rawTelefono.trim() ? `Teléfono original en planilla: ${rawTelefono.trim()}` : ''),
        fecha_oblea: fecha_oblea || '',
        fechaSinParsear: !fecha_oblea && rawFecha.trim() ? rawFecha.trim() : '',
      };
    }).filter(r => r.patente);

    // Deduplicar por patente: nos quedamos con la fecha parseable más reciente.
    const byPatente = new Map();
    parsed.forEach(r => {
      const prev = byPatente.get(r.patente);
      if (!prev) { byPatente.set(r.patente, r); return; }
      if (r.fecha_oblea && (!prev.fecha_oblea || r.fecha_oblea > prev.fecha_oblea)) {
        byPatente.set(r.patente, { ...r, telefono: r.telefono || prev.telefono, notas: r.notas || prev.notas });
      } else if (!prev.telefono && r.telefono) {
        byPatente.set(r.patente, { ...prev, telefono: r.telefono });
      }
    });
    return Array.from(byPatente.values());
  }

  function sortedFiltered(query) {
    let list = clientes.slice();
    if (query) {
      const q = query.toLowerCase();
      list = list.filter(c =>
        (c.nombre || '').toLowerCase().includes(q) ||
        (c.patente || '').toLowerCase().includes(q)
      );
    }
    const order = { danger: 0, warn: 1, ok: 2, none: 3 };
    list.sort((a, b) => {
      const sa = worstStatus(a), sb = worstStatus(b);
      if (order[sa.level] !== order[sb.level]) return order[sa.level] - order[sb.level];
      const da = sa.days === null ? 9999 : sa.days;
      const db = sb.days === null ? 9999 : sb.days;
      return da - db;
    });
    return list;
  }

  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // Modal propio con la estética de la app, para no depender de los
  // alert()/confirm() nativos del navegador (se ven genéricos y no se
  // pueden estilizar). Se monta directo en document.body — no pasa por el
  // render() principal — así no depende del estado de la app ni se pierde
  // si algo dispara un re-render mientras está abierto.
  function mostrarModal({ titulo, mensaje, danger, botones }) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'gnc-modal-overlay';
      overlay.innerHTML = `
        <div class="gnc-modal-box ${danger ? 'danger' : ''}">
          <div class="gnc-modal-head">
            <div class="gnc-modal-icon">${danger ? '!' : 'i'}</div>
            <div>
              <div class="gnc-modal-title">${escapeHtml(titulo)}</div>
              <div class="gnc-modal-msg">${escapeHtml(mensaje)}</div>
            </div>
          </div>
          <div class="gnc-modal-actions"></div>
        </div>`;
      const acciones = overlay.querySelector('.gnc-modal-actions');
      function cerrar(valor) {
        overlay.classList.add('closing');
        setTimeout(() => { overlay.remove(); resolve(valor); }, 150);
      }
      botones.forEach(b => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm ' + (b.variant === 'danger' ? 'btn-danger-solid' : b.variant === 'primary' ? 'btn-primary' : 'btn-ghost');
        btn.textContent = b.label;
        btn.addEventListener('click', () => cerrar(b.value));
        acciones.appendChild(btn);
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrar(false); });
      document.addEventListener('keydown', function onEsc(e) {
        if (e.key === 'Escape') { document.removeEventListener('keydown', onEsc); cerrar(false); }
      });
      document.body.appendChild(overlay);
    });
  }

  // Ventana emergente que pide Tipo de trámite + Fecha ANTES de mostrar el
  // resto del paso 1 — el usuario pidió que esto sea lo primero que se
  // completa (se sacó del paso 3). Devuelve {tipo, fecha} o null si se
  // cancela (en ese caso no se abre el asistente).
  function mostrarModalTipoFecha(valoresIniciales) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'gnc-modal-overlay';
      overlay.innerHTML = `
        <div class="gnc-modal-box">
          <div class="gnc-modal-title" style="margin-bottom:12px;">Tipo de trámite</div>
          <div class="form-grid">
            <label>Tipo
              <select id="modal-t-tipo">
                ${TRAMITE_TIPOS.map(opt => `<option value="${opt.value}" ${valoresIniciales.tipo === opt.value ? 'selected' : ''}>${opt.label}</option>`).join('')}
              </select>
            </label>
            <label>Fecha
              <input type="date" id="modal-t-fecha" value="${escapeHtml(valoresIniciales.fecha)}">
            </label>
          </div>
          <div class="gnc-modal-actions">
            <button type="button" class="btn btn-sm btn-ghost" id="modal-t-cancelar">Cancelar</button>
            <button type="button" class="btn btn-sm btn-primary" id="modal-t-continuar">Continuar</button>
          </div>
        </div>`;
      function cerrar(valor) {
        overlay.classList.add('closing');
        setTimeout(() => { overlay.remove(); resolve(valor); }, 150);
      }
      overlay.querySelector('#modal-t-cancelar').addEventListener('click', () => cerrar(null));
      overlay.querySelector('#modal-t-continuar').addEventListener('click', () => {
        const tipo = overlay.querySelector('#modal-t-tipo').value;
        const fecha = overlay.querySelector('#modal-t-fecha').value || valoresIniciales.fecha;
        cerrar({ tipo, fecha });
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrar(null); });
      document.body.appendChild(overlay);
    });
  }

  // A partir del tipo elegido, deja precargados los M/S/D/B más comunes
  // para ese trámite (se pueden seguir ajustando a mano en el paso 2):
  // - Revisión Anual ("Renovación"): todo sigue igual (Sin Cambios).
  // - Prueba Hidráulica: la válvula ya cargada se da de baja y se agrega
  //   una válvula nueva en Montaje — sus datos los completa el TdM a mano.
  function aplicarValoresPorTipoTramite(tipo, eq) {
    if (tipo === 'revision_anual') {
      eq.regulador.operacion = 'sigue';
      eq.cilindros.forEach(c => { c.msdb = 'sigue'; });
      eq.valvulas.forEach(v => { v.msb = 'sigue'; });
    } else if (tipo === 'prueba_hidraulica') {
      if (eq.valvulas.length > 0) eq.valvulas[0].msb = 'baja';
      eq.valvulas.push({ codigo: '', serie: '', msb: 'montaje' });
    }
  }

  // Ícono simple (tanque + manómetro) para que los estados vacíos no sean
  // solo texto — usado en la lista de clientes, historial y pendientes.
  function emptyIconSvg() {
    return `<svg width="56" height="56" viewBox="0 0 56 56" fill="none" aria-hidden="true">
      <rect x="10" y="20" width="30" height="20" rx="3" stroke="#1D5BD8" stroke-width="2"/>
      <circle cx="41" cy="30" r="6" stroke="#DF8B00" stroke-width="2"/>
      <path d="M15 20V15a5 5 0 0 1 5-5h6a5 5 0 0 1 5 5v5" stroke="#1D5BD8" stroke-width="2"/>

  // Escapa un valor para CSV: neutraliza caracteres que Excel/Sheets podría
  // interpretar como el inicio de una fórmula, y entrecomilla si hace falta.
  function csvEscape(val) {
    let s = (val === null || val === undefined) ? '' : String(val);
    if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
    if (/[",\n\r]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function exportClientesCSV() {
    const headers = [
      'Nombre', 'Tipo de documento', 'N° Documento', 'Calle', 'N°', 'Piso/Depto', 'CPA', 'Provincia', 'Ciudad', 'Teléfono',
      'Patente', 'Marca', 'Modelo', 'Año', 'Inyección', 'Uso',
      'Vencimiento Oblea', 'Última revisión CRPC', 'Periodicidad cilindro',
      'Último trámite (tipo)', 'Último trámite (fecha)', 'Estado último trámite', 'Notas'
    ];
    const rows = clientes.map(c => {
      const lt = latestTramite(c);
      return [
        c.nombre, c.tipo_documento || 'DNI', c.dni, c.domicilio, c.numero, c.piso, c.cpa, c.provincia, c.ciudad, c.telefono,
        c.patente, c.marca, c.modelo, c.anio, c.inyeccion === 'si' ? 'Sí' : 'No', c.uso,
        fmtDate(c.fecha_oblea), fmtMonthYear(c.fecha_crpc),
        c.tipo_cilindro === '3' ? '3 años' : '5 años',
        lt ? tramiteTipoLabel(lt.tipo) : '', lt ? fmtDate(lt.fecha) : '', lt ? ESTADO_PEC_LABELS[lt.estadoPec] : '',
        c.notas || ''
      ].map(csvEscape).join(',');
    });
    const csv = [headers.map(csvEscape).join(','), ...rows].join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clientes_${(tallerNombre || 'taller').replace(/[^a-z0-9]+/gi, '_')}_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // render()) y lo que contiene la franja roja de "swipe para eliminar" —

  // Vista de solo lectura de los datos personales/vehículo + historial de
  // trámites, desplegable desde la tarjeta sin tener que entrar a editar.

  function parseAgentText(text) {
    const out = {
      fecha_oblea: null, fecha_crpc: null,
      nombre: null, dni: null, domicilio: null, provincia: null, ciudad: null,
      patente: null, marca: null, modelo: null, tipo_vehiculo: null, uso: null,
      found: []
    };

    // Fecha de vencimiento de la Oblea: dd/mm/aaaa (o aa)
    const mVenc = text.match(/fecha\s*de\s*vencimiento[^\d]{0,15}(\d{1,2})\/(\d{1,2})\/(\d{2,4})/i);
    if (mVenc) {
      let [, d, m, y] = mVenc;
      if (y.length === 2) y = '20' + y;
      out.fecha_oblea = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      out.found.push(`Vencimiento Oblea: ${d}/${m}/${y}`);
    }

    // Fecha CRPC: m/aa o mm/aaaa
    const mCrpc = text.match(/crpc[^\d]{0,15}(\d{1,2})\/(\d{2,4})/i);
    if (mCrpc) {
      let [, m, y] = mCrpc;
      if (y.length === 2) y = '20' + y;
      out.fecha_crpc = `${y}-${m.padStart(2,'0')}`;
      out.found.push(`Fecha CRPC: ${m}/${y}`);
    }

    // Nombre: el DNI trae "Apellido" y "Nombre" como campos separados.
    // Los combinamos en un nombre completo; si viene como "Nombre y apellido"
    // en una sola línea, usamos eso directamente.
    const mApellido = text.match(/apellido[:\s]+([^\n,;]{2,40})/i);
    const apellido = mApellido ? mApellido[1].trim() : null;
    const mNombreLine = text.match(/nombre(?:\s*y\s*apellido)?[:\s]+([^\n,;]{2,60})/i);
    if (mNombreLine) {
      const esCombinado = /nombre\s*y\s*apellido/i.test(mNombreLine[0]);
      if (esCombinado || !apellido) {
        out.nombre = mNombreLine[1].trim();
      } else {
        out.nombre = `${mNombreLine[1].trim()} ${apellido}`.trim();
      }
      out.found.push(`Nombre: ${out.nombre}`);
    } else if (apellido) {
      out.nombre = apellido;
      out.found.push(`Nombre: ${out.nombre}`);
    }

    // DNI (numero de documento) - acepta "DNI", "Documento", "N° de Documento"
    const mDni = text.match(/(?:dni|n[°º]?\s*de\s*documento|documento)[:\s]+([\d.]{6,12})/i);
    if (mDni) { out.dni = mDni[1].replace(/\./g,''); out.found.push(`DNI: ${out.dni}`); }

    // Domicilio
    const mDom = text.match(/domicilio[:\s]+([^\n,;]{3,80})/i);
    if (mDom) { out.domicilio = mDom[1].trim(); out.found.push(`Domicilio: ${out.domicilio}`); }

    // Provincia
    const mProv = text.match(/provincia[:\s]+([^\n,;]{3,40})/i);
    if (mProv) { out.provincia = mProv[1].trim(); out.found.push(`Provincia: ${out.provincia}`); }

    // Ciudad / Localidad
    const mCiudad = text.match(/(?:ciudad|localidad)[:\s]+([^\n,;]{3,40})/i);
    if (mCiudad) { out.ciudad = mCiudad[1].trim(); out.found.push(`Ciudad: ${out.ciudad}`); }

    // Patente / Dominio (espacio literal, no \s, para no comerse el
    // renglón/sección siguiente cuando el texto pegado tiene líneas en blanco)
    const mPatente = text.match(/(?:patente|dominio)[:\s]+([A-Za-z0-9 -]{5,10})/i);
    if (mPatente) { out.patente = mPatente[1].replace(/\s|-/g,'').toUpperCase(); out.found.push(`Patente: ${out.patente}`); }

    // Marca
    const mMarca = text.match(/marca[:\s]+([^\n,;]{2,40})/i);
    if (mMarca) { out.marca = mMarca[1].trim(); out.found.push(`Marca: ${out.marca}`); }

    // Modelo
    const mModelo = text.match(/modelo[:\s]+([^\n,;]{1,40})/i);
    if (mModelo) { out.modelo = mModelo[1].trim(); out.found.push(`Modelo: ${out.modelo}`); }

    // Tipo (de vehiculo)
    const mTipo = text.match(/tipo(?:\s*de\s*veh[ií]culo)?[:\s]+([^\n,;]{2,30})/i);
    if (mTipo) { out.tipo_vehiculo = mTipo[1].trim(); out.found.push(`Tipo: ${out.tipo_vehiculo}`); }

    // Uso
    const mUso = text.match(/uso[:\s]+([^\n,;]{2,30})/i);
    if (mUso) { out.uso = mUso[1].trim(); out.found.push(`Uso: ${out.uso}`); }

    return out;
  }

  // Ajustado con un ejemplo real del "Detalle de la operación" del SIC de
  // ENARGAS (pantalla a la que se llega tras la consulta por dominio):
  // trae Marca/Modelo/Año/Uso/Dominio del vehículo, "Fecha Vencimiento" de
  // la Oblea, y tablas de Regulador/Cilindro/Válvula con Código
  // Homologación + Número de Serie (+ Fecha Fab./CRPC/Fecha CRPC en el
  // cilindro). Como no sabemos todavía cómo queda el texto exacto al
  // copiar y pegar esa pantalla (recién vimos una captura), esto puede
  // necesitar un ajuste fino la primera vez que alguien lo use de verdad.
  function parseEnargasText(text) {
    // OJO: no reusamos los campos nombre/dni/domicilio/provincia/ciudad de
    // parseAgentText acá — el "Detalle de la operación" del SIC también
    // muestra Domicilio/Provincia/Ciudad del PEC y del Taller, y esos
    // patrones genéricos terminaban aplicándole esa dirección al cliente
    // (que es el dueño del auto, no el PEC ni el taller). Solo tomamos lo
    // que es inequívocamente del vehículo: patente, marca, modelo, uso.
    const generic = parseAgentText(text);
    const out = {
      fecha_oblea: null, fecha_crpc: null, anio: null, obleaActual: null,
      nombre: null, dni: null, domicilio: null, provincia: null, ciudad: null, tipo_vehiculo: null,
      patente: generic.patente, marca: generic.marca, modelo: generic.modelo, uso: generic.uso,
      found: [], rawText: text,
    };
    if (out.patente) out.found.push(`Patente: ${out.patente}`);
    if (out.marca) out.found.push(`Marca: ${out.marca}`);
    if (out.modelo) out.found.push(`Modelo: ${out.modelo}`);
    if (out.uso) out.found.push(`Uso: ${out.uso}`);

    const mVenc = text.match(/fecha\s*vencimiento[:\s]*\n?\s*(\d{1,2})\/(\d{1,2})\/(\d{2,4})/i);
    if (mVenc) {
      let [, d, m, y] = mVenc;
      if (y.length === 2) y = '20' + y;
      out.fecha_oblea = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
      out.found.push(`Vencimiento Oblea: ${d}/${m}/${y}`);
    }

    // Formato asumido — todavía no vimos un pegado real con este campo, así
    // que si no matchea, se puede seguir cargando a mano sin problema.
    const mOblea = text.match(/oblea\s*actual\D{0,10}(\d{4,9})/i) || text.match(/n[uú]mero\s*de\s*oblea\D{0,10}(\d{4,9})/i);
    if (mOblea) { out.obleaActual = mOblea[1]; out.found.push(`Oblea actual: ${mOblea[1]}`); }

    const mAnio = text.match(/a[nñ]o[:\s]*\n?\s*(\d{4})/i);
    if (mAnio) { out.anio = mAnio[1]; out.found.push(`Año: ${mAnio[1]}`); }

    out.equipo = parseEnargasEquipo(text);
    return out;
  }

  // Recorta el texto a partir de cada encabezado de sección conocido y
  // busca dentro un código de homologación (2 letras + 2/3 números, ej.
  // "TT01", "CC35") y un número de serie (una tira larga de dígitos).
  function parseEnargasEquipo(text) {
    function seccion(patronInicio, patronFin) {
      const iniMatch = text.match(patronInicio);
      if (!iniMatch) return '';
      const desde = iniMatch.index + iniMatch[0].length;
      const resto = text.slice(desde);
      const finMatch = patronFin ? resto.match(patronFin) : null;
      return finMatch ? resto.slice(0, finMatch.index) : resto.slice(0, 300);
    }
    // El SIC pega la etiqueta y el valor de cada celda de la tabla sin
    // ningún separador (ej: "Código HomologaciónTT01Número de
    // Serie156824OperaciónSin Cambios", todo seguido) — así que en vez de
    // buscar un valor "suelto" con límites de palabra, recortamos el texto
    // entre una etiqueta y la siguiente.
    function entre(bloque, etiquetaInicio, etiquetaFin) {
      const mIni = bloque.match(etiquetaInicio);
      if (!mIni) return '';
      const desde = mIni.index + mIni[0].length;
      const resto = bloque.slice(desde);
      const mFin = etiquetaFin ? resto.match(etiquetaFin) : null;
      return (mFin ? resto.slice(0, mFin.index) : resto).trim();
    }
    function codigoYSerie(bloque) {
      let codigo = entre(bloque, /c[oó]digo\s*homologaci[oó]n/i, /n[uú]mero\s*de\s*serie/i);
      let serie = entre(bloque, /n[uú]mero\s*de\s*serie/i, /operaci[oó]n/i);
      // Si no hay etiquetas (formato distinto, con espacios normales),
      // probamos el modo anterior como respaldo.
      if (!codigo) { const m = bloque.match(/\b([A-Z]{2}\d{2,3})\b/); if (m) codigo = m[1]; }
      if (!serie) { const m = bloque.match(/\b(\d{4,10})\b/); if (m) serie = m[1]; }
      return { codigo, serie };
    }

    const regBloque = seccion(/datos\s*(?:del\s*)?regulador/i, /datos\s*(?:del\s*)?cilindro/i);
    const cilBloque = seccion(/datos\s*(?:del\s*)?cilindro(?!.*v[aá]lvula)/i, /datos?\s*v[aá]lvula/i);
    const valBloque = seccion(/datos?\s*v[aá]lvula/i, /informaci[oó]n\s*desplegada|declaraci[oó]n\s*jurada/i);

    const regulador = codigoYSerie(regBloque);
    const cilindro = codigoYSerie(cilBloque);
    const valvula = codigoYSerie(valBloque);
    const crpcMaterial = entre(cilBloque, /(?<!fecha\s)crpc/i, /fecha\s*crpc/i);
    if (crpcMaterial) cilindro.crpc = crpcMaterial;

    // En la tabla del SIC los encabezados ("Fecha Fab.", "Fecha CRPC") van
    // en una fila y los valores en la siguiente, lejos uno del otro — así
    // que en vez de buscar el valor pegado a la etiqueta, tomamos las
    // fechas tipo mes/año en el orden en que aparecen: la primera es
    // Fecha Fab. y la segunda, si existe, es Fecha CRPC.
    const fechasNN = [...cilBloque.matchAll(/(\d{1,2})\s*\/\s*(\d{1,2})(?!\d)/g)];
    function mesAnio(m) {
      return { mes: m[1], anio: m[2].length <= 2 ? '20' + m[2].padStart(2, '0') : m[2] };
    }
    if (fechasNN[0]) { const f = mesAnio(fechasNN[0]); cilindro.fabricadoMes = f.mes; cilindro.fabricadoAnio = f.anio; }
    if (fechasNN[1]) { const f = mesAnio(fechasNN[1]); cilindro.revisadoMes = f.mes; cilindro.revisadoAnio = f.anio; }

    const hayAlgo = [regulador, cilindro, valvula].some(e => e.codigo || e.serie);
    return hayAlgo ? { regulador, cilindro, valvula } : null;
  }

  // Panel único (fusiona lo que antes eran "Documentación" y "Trámite") que
  // arma todo el alta/edición como un asistente de 3 pasos — así se
  // garantiza que cada sección quede completa antes de avanzar, en vez de
  // tener todos los campos sueltos en una sola pantalla larga.
  function tramiteWizardPanel(existing, entrando, entrandoPaso, enargasEntrando) {
    if (!clienteDraft) clienteDraft = existing ? { ...existing } : blankClienteBase();
    const c = clienteDraft;
    if (!tramiteDraftEquipo) tramiteDraftEquipo = blankEquipo(existing ? existing.ultimoEquipoConocido : null);
    if (!tramiteDraftCampos) tramiteDraftCampos = blankTramiteCampos(editingTramiteId && existing ? existing.tramites.find(t => t.id === editingTramiteId) : null);
    const titulo = existing ? escapeHtml(c.nombre || existing.nombre || 'cliente') : 'Nuevo cliente';
    return `<div class="panel ${entrando ? 'panel-entrando' : ''}" id="form-panel">
      <h2 class="panel-h2-sticky">Inicio de trámite — ${titulo}
        <div class="wizard-pasos">Paso ${wizardStep} de 3 — ${WIZARD_PASOS[wizardStep - 1]}</div>
      </h2>
      <div class="${entrandoPaso ? 'panel-entrando' : ''}">
      ${wizardStep === 1 ? wizardPaso1(c, enargasEntrando) : ''}
      ${wizardStep === 2 ? wizardPaso2(tramiteDraftEquipo, c) : ''}
      ${wizardStep === 3 ? wizardPaso3(c) : ''}
      </div>
    </div>`;
  }

  function equipoResumen(eq) {
    if (!eq) return '';
    const partes = [];
    if (eq.regulador && (eq.regulador.codigo || eq.regulador.serie)) {
      partes.push(`Regulador ${[eq.regulador.codigo, eq.regulador.serie].filter(Boolean).join('/')}`);
    }
    (eq.cilindros || []).forEach(cil => {
      if (cil.codigo || cil.serie) partes.push(`Cilindro ${[cil.codigo, cil.serie].filter(Boolean).join('/')}`);
    });
    (eq.valvulas || []).forEach(v => {
      if (v.codigo || v.serie) partes.push(`Válvula ${[v.codigo, v.serie].filter(Boolean).join('/')}`);
    });
    return partes.join(' · ');
  }

  // --- Generación del PDF de la planilla PEC (réplica de la ficha técnica en papel) ---

  // Carga jsPDF y html2canvas desde un CDN solo la primera vez que hacen
  // falta (al tocar "Enviar al PEC"), para no pesar el arranque de la app
  // con estas dos librerías si nunca se llega a usar esa función.
  let pecLibsPromise = null;
  function cargarLibreriasPec() {
    if (pecLibsPromise) return pecLibsPromise;
    function cargarScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('No se pudo cargar ' + src));
        document.head.appendChild(s);
      });
    }
    pecLibsPromise = Promise.all([
      cargarScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
      cargarScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
    ]);
    return pecLibsPromise;
  }

  function pecFechaMasUnAnio(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d.getTime())) return '';
    d.setFullYear(d.getFullYear() + 1);
    return d.toISOString().slice(0, 10);
  }

  function pecPartesFecha(iso) {
    if (!iso) return { d: '', m: '', a: '' };
    const [y, m, d] = iso.split('-');
    return { d: d || '', m: m || '', a: y ? y.slice(2) : '' };
  }

  function pecCasilla(marcada) {
    return `<span style="display:inline-block;width:12px;height:12px;border:1px solid #000;text-align:center;line-height:11px;font-size:10px;margin-right:4px;vertical-align:middle;font-weight:bold;">${marcada ? '✕' : ''}</span>`;
  }

  function pecCasillaConLabel(marcada, label) {
    return `<span style="display:inline-flex; align-items:center; margin-right:8px; font-size:9px; white-space:nowrap;">${pecCasilla(marcada)}${escapeHtml(label)}</span>`;
  }

  function pecCampo(valor, etiqueta, flex) {
    return `<div style="flex:${flex || 1}; min-width:0; padding:0 5px; box-sizing:border-box;">
      <div style="border-bottom:1px solid #000; min-height:15px; font-size:11px; font-weight:600; padding-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(valor || '')}</div>
      <div style="font-size:7px; color:#333; margin-top:1px;">${etiqueta}</div>
    </div>`;
  }

  // Bloque "Código / N° Serie" de un accesorio de la grilla de equipos
  // (Manómetro, Electroválvula, etc.) — replica el recuadro chico de la
  // planilla real con el nombre del accesorio arriba y dos líneas abajo.
  function pecAccesorio(label, codigo, serie, flex) {
    return `<div style="flex:${flex || 1}; min-width:0; padding:2px 5px; box-sizing:border-box; border-left:1px solid #000;">
      <div style="font-size:7.5px; font-weight:600;">${escapeHtml(label)}</div>
      <div style="border-bottom:1px solid #000; min-height:13px; font-size:10px; font-weight:600;">${escapeHtml(codigo || '')}</div>
      <div style="font-size:6.5px; color:#333;">Código</div>
      <div style="border-bottom:1px solid #000; min-height:13px; font-size:10px; font-weight:600;">${escapeHtml(serie || '')}</div>
      <div style="font-size:6.5px; color:#333;">N° Serie</div>
    </div>`;
  }

  function pecOperacionLetra(valor) {
    return { montaje: 'M', sigue: 'S/C', desmontaje: 'D', baja: 'B' }[valor] || '';
  }

  // Arma el HTML de la ficha técnica (una réplica visual de la planilla del
  // PEC/ENARGAS) para un trámite puntual. Se renderiza off-screen y se
  // rasteriza con html2canvas antes de meterlo en el PDF — así el layout se
  // arma con CSS normal en vez de calcular coordenadas a mano con jsPDF.
  function pecFormHtml(cliente, tramite, firmaDataUrl) {
    const tc = tallerConfig;
    const eq = tramite.equipo || blankEquipo(null);
    const fVenc = pecPartesFecha(pecFechaMasUnAnio(tramite.fecha));
    const fHab = pecPartesFecha(tramite.fecha);
    const usoNorm = (cliente.uso || '').toLowerCase();
    const tipoVehiculoChecks = [
      { label: 'Moto', on: usoNorm === 'moto' },
      { label: 'Taxi', on: usoNorm === 'taxi' },
      { label: 'Pick Up Part.', on: usoNorm === 'pick up' },
      { label: 'Bus', on: usoNorm === 'bus' },
      { label: 'Oficial', on: usoNorm === 'oficial' },
      { label: 'Otros', on: !!usoNorm && !['moto', 'taxi', 'pick up', 'bus', 'oficial'].includes(usoNorm) },
    ];
    const inyeccionSi = (cliente.inyeccion || '').toLowerCase().startsWith('s');
    const cilindroFilas = (eq.cilindros || []).slice(0, 5);
    const valvulaFilas = (eq.valvulas || []).slice(0, 5);
    while (cilindroFilas.length < valvulaFilas.length) cilindroFilas.push({});
    while (valvulaFilas.length < cilindroFilas.length) valvulaFilas.push({});

    return `<div style="width:1000px; min-height:1414px; background:#fff; color:#000; font-family: Arial, Helvetica, sans-serif; box-sizing:border-box; border:2px solid #000; padding:16px; position:relative;">
      <div style="position:absolute; top:2px; right:10px; font-size:10px; font-weight:bold;">F1</div>

      <div style="display:flex; border-bottom:2px solid #000; padding-bottom:8px; margin-bottom:6px;">
        <div style="flex:2; display:flex; gap:8px;">
          <div style="width:46px; height:46px; border-radius:50%; background:#1a1a1a; color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; flex-shrink:0;">e</div>
          <div style="font-size:9px; line-height:1.35;">
            <div style="font-weight:bold; font-size:11px;">${escapeHtml(tc.pecRazonSocial || 'Razón social del PEC')}</div>

            <div>${escapeHtml(tc.pecTelefono || '')}</div>
          </div>
          <div style="font-size:9px; line-height:1.35; border-left:1px solid #000; padding-left:8px;">
            <div style="font-size:7.5px;">REPRESENTANTE TÉCNICO</div>
            <div style="font-weight:bold;">${escapeHtml(tc.pecIngeniero || '')}</div>

            <div>Mat. CIPBA ${escapeHtml(tc.pecMatriculaCipba || '')}</div>
          </div>
        </div>
        <div style="flex:1; border-left:1px solid #000; padding-left:8px;">
          <div style="font-size:8px; text-align:center; font-weight:bold;">Habilitación</div>
          <div style="font-size:7px; text-align:center;">FECHA</div>
          <div style="display:flex; gap:3px; justify-content:center;">${[fHab.d, fHab.m, fHab.a].map(v => `<span style="border:1px solid #000; width:22px; height:16px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:600;">${escapeHtml(v)}</span>`).join('')}</div>
          <div style="font-size:7px; text-align:center; margin-top:3px;">Vencimiento</div>
          <div style="display:flex; gap:3px; justify-content:center;">${[fVenc.d, fVenc.m, fVenc.a].map(v => `<span style="border:1px solid #000; width:22px; height:16px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:600;">${escapeHtml(v)}</span>`).join('')}</div>
        </div>

          <div style="font-size:8px; text-align:center; font-weight:bold;">N° OBLEA</div>

          <div style="border:1px solid #000; text-align:center; padding:2px;">

      <!-- F2-TALLER DE MONTAJE: Regulador + accesorios -->
      <div style="display:flex;">
        <div style="width:14px; writing-mode:vertical-rl; transform:rotate(180deg); font-size:7px; font-weight:bold; text-align:center;">F2-TALLER DE MONTAJE</div>
        <div style="flex:1; padding-left:6px;">

              <div style="font-size:7.5px; font-weight:600;">Regulador</div>

              <div style="font-size:8px; margin-top:2px;">

                ${pecCasillaConLabel(eq.regulador.operacion === 'desmontaje', 'Desmontaje')}
                ${pecCasillaConLabel(eq.regulador.operacion === 'baja', 'Baja')}
              </div>

  // Renderiza pecFormHtml() off-screen, lo rasteriza y arma el PDF final.
  async function generarPecPdf(cliente, tramite, firmaDataUrl) {
    await cargarLibreriasPec();
    const cont = document.createElement('div');
    cont.style.position = 'fixed';
    cont.style.left = '-99999px';
    cont.style.top = '0';
    cont.innerHTML = pecFormHtml(cliente, tramite, firmaDataUrl);
    document.body.appendChild(cont);
    let blob;
    try {
      const canvas = await window.html2canvas(cont.firstElementChild, { scale: 2, backgroundColor: '#ffffff' });
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const ratio = canvas.height / canvas.width;
      let w = pageW, h = pageW * ratio;
      if (h > pageH) { h = pageH; w = pageH / ratio; }
      const x = (pageW - w) / 2, y = (pageH - h) / 2;
      doc.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', x, y, w, h);
      blob = doc.output('blob');
    } finally {
      document.body.removeChild(cont);
    }
    const filename = `PEC_${(cliente.patente || cliente.nombre || 'tramite').replace(/\s+/g, '_')}_${tramite.fecha || ''}.pdf`;
    return { blob, filename };
  }

  // Comparte el PDF por WhatsApp: si el celular soporta el "compartir"
  // nativo con archivos, se abre directo con el PDF adjunto y el contacto
  // se elige ahí mismo. Si no (ej. en escritorio), se descarga el PDF y se
  // abre WhatsApp Web con el mensaje ya armado para adjuntarlo a mano.
  async function compartirPecPdf(blob, filename, cliente) {
    const mensaje = `Hola! Te comparto la ficha técnica del trámite de GNC de la patente ${cliente.patente || 's/d'} para el PEC.`;
    const file = new File([blob], filename, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: filename, text: mensaje });
        return;
      } catch (e) {
        if (e && e.name === 'AbortError') return;
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 30000);
    const pecPhone = cleanPhone(tallerConfig.pecTelefono);
    window.open(`https://wa.me/${pecPhone}?text=${encodeURIComponent(mensaje + ' (adjuntá el PDF que se acaba de descargar)')}`, '_blank');
  }

  function normalizarEquipoOtros(eq) {
    if (!eq.otros) eq.otros = {};
    OTROS_EQUIPOS_CAMPOS.forEach(o => {
      if (!eq.otros[o.key]) eq.otros[o.key] = { codigo: '', serie: '' };
    });
    return eq;
  }

  // Si se pasa `seed` (el último equipo conocido del cliente, cargado por
  // ENARGAS alguna vez), arranca el trámite con esos códigos/series ya
  // completos — así con una sola consulta al SIC alcanza. La Operación
  // (Montaje/Sigue/Desmontaje/Baja) nunca se hereda: es específica de cada
  // trámite y hay que elegirla sí o sí cada vez.
  function blankEquipo(seed) {
    const otros = {};
    OTROS_EQUIPOS_CAMPOS.forEach(o => {
      const s = seed && seed.otros && seed.otros[o.key];
      otros[o.key] = { codigo: (s && s.codigo) || '', serie: (s && s.serie) || '' };
    });
    const reg = seed && seed.regulador;
    const cils = (seed && seed.cilindros && seed.cilindros.length) ? seed.cilindros : [{}];
    const vals = (seed && seed.valvulas && seed.valvulas.length) ? seed.valvulas : [{}];
    return {
      regulador: { codigo: (reg && reg.codigo) || '', serie: (reg && reg.serie) || '', nuevoUsado: (reg && reg.nuevoUsado) || 'usado', operacion: '' },
      cilindros: cils.map(c => ({
        codigo: c.codigo || '', serie: c.serie || '', periodicidad: c.periodicidad || '5',
        nuevoUsado: c.nuevoUsado || 'usado', fabricadoMes: c.fabricadoMes || '', fabricadoAnio: c.fabricadoAnio || '',
        revisadoMes: c.revisadoMes || '', revisadoAnio: c.revisadoAnio || '', crpc: c.crpc || '', msdb: '',
      })),
      valvulas: vals.map(v => ({ codigo: v.codigo || '', serie: v.serie || '', msb: '' })),
      otros,
    };
  }

  // Devuelve true si algún componente del equipo quedó marcado como "Baja".
  function equipoTieneBaja(eq) {
    if (!eq) return false;
    if (eq.regulador.operacion === 'baja') return true;
    if (eq.cilindros.some(c => c.msdb === 'baja')) return true;
    if (eq.valvulas.some(v => v.msb === 'baja')) return true;
    return false;
  }

  // Lee del DOM los valores actuales del equipo antes de agregar/quitar una
  // fila o de guardar el trámite, para no perder lo ya tipeado cuando se
  // vuelve a dibujar todo con render().
  function syncEquipoFromDOM() {
    if (!tramiteDraftEquipo) return;
    // Si los campos del equipo no están en pantalla (ej. ya se avanzó al
    // paso 3 del asistente), no hay nada que leer — sin este corte se
    // pisaba lo ya cargado con valores vacíos.
    if (!root.querySelector('#eq-regulador-codigo')) return;
    const val = (sel) => { const el = root.querySelector(sel); return el ? el.value : ''; };
    tramiteDraftEquipo.regulador = {
      codigo: val('#eq-regulador-codigo'), serie: val('#eq-regulador-serie'), nuevoUsado: val('#eq-regulador-nuevousado') || 'usado',
      operacion: val('#eq-regulador-operacion'),
    };
    tramiteDraftEquipo.cilindros = tramiteDraftEquipo.cilindros.map((_, i) => ({
      codigo: val(`#eq-cil-codigo-${i}`), serie: val(`#eq-cil-serie-${i}`), periodicidad: val(`#eq-cil-periodicidad-${i}`) || '5',
      nuevoUsado: val(`#eq-cil-nuevousado-${i}`) || 'usado',
      fabricadoMes: val(`#eq-cil-fabmes-${i}`), fabricadoAnio: val(`#eq-cil-fabanio-${i}`),
      revisadoMes: val(`#eq-cil-revmes-${i}`), revisadoAnio: val(`#eq-cil-revanio-${i}`),
      crpc: val(`#eq-cil-crpc-${i}`), msdb: val(`#eq-cil-msdb-${i}`),
    }));
    tramiteDraftEquipo.valvulas = tramiteDraftEquipo.valvulas.map((_, i) => ({
      codigo: val(`#eq-val-codigo-${i}`), serie: val(`#eq-val-serie-${i}`), msb: val(`#eq-val-msb-${i}`),
    }));
    OTROS_EQUIPOS_CAMPOS.forEach(o => {
      tramiteDraftEquipo.otros[o.key] = { codigo: val(`#eq-otro-${o.key}-codigo`), serie: val(`#eq-otro-${o.key}-serie`) };
    });
  }

  // Comprime y redimensiona la foto en el navegador antes de guardarla,
  // para que no pese demasiado (las fotos de celular sin comprimir son
  // varios MB y no entran cómodas en el almacenamiento del navegador).
  function compressImageFile(file, maxDim = 1280, quality = 0.72) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
      reader.readAsDataURL(file);
    });
  }

  function dataUrlParts(dataUrl) {
    const m = dataUrl.match(/^data:(.+);base64,(.*)$/);
    return m ? { mediaType: m[1], base64: m[2] } : null;
  }

  // Firma electrónica: canvas con soporte mouse y touch. Como render()
  // reconstruye todo el DOM, el trazo se guarda en `currentSignature` en
  // cada fin de trazo y se restaura acá mismo si ya había algo dibujado.
  function attachSignaturePad(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#1A2333';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    let drawing = false, last = null;

    if (currentSignature) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = currentSignature;
    }

    function posFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
      const point = e.touches ? e.touches[0] : e;
      return { x: (point.clientX - rect.left) * scaleX, y: (point.clientY - rect.top) * scaleY };
    }
    function start(e) { e.preventDefault(); drawing = true; last = posFromEvent(e); }
    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = posFromEvent(e);
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      last = p;
    }
    function end() {
      if (!drawing) return;
      drawing = false;
      currentSignature = canvas.toDataURL('image/png');
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
    canvas.addEventListener('touchcancel', end);
  }

  function setupScanBox() {
    const slots = ['foto1', 'foto2'];
    slots.forEach(slot => {
      // Dos inputs por slot — "Tomar foto" (con capture, abre la cámara
      // directo) y "Galería" (sin capture, para elegir una foto ya
      // existente) — comparten el mismo manejo una vez elegido el archivo.
      ['', '-galeria'].forEach(sufijo => {
        const input = root.querySelector(`#scan-${slot}${sufijo}`);
        if (!input) return;
        input.addEventListener('change', async () => {
          const file = input.files[0];
          if (!file) return;
          try {
            const dataUrl = await compressImageFile(file);
            scanFiles[slot] = dataUrl;
          } catch (e) {
            await customAlert('No se pudo procesar esa foto, probá con otra.');
            return;
          }
          syncClienteDraftFromDOM();
          render();
        });
      });
    });
    const btnScan = root.querySelector('#btn-scan');
    if (btnScan) btnScan.addEventListener('click', runScan);
    root.querySelectorAll('[data-remove-photo]').forEach(btn => {
      btn.addEventListener('click', () => {
        scanFiles[btn.getAttribute('data-remove-photo')] = null;
        syncClienteDraftFromDOM();
        render();
      });
    });
  }

  async function runScan() {
    const btnScan = root.querySelector('#btn-scan');
    const statusEl = root.querySelector('#scan-status');
    btnScan.disabled = true;
    statusEl.className = 'scan-status';
    statusEl.innerHTML = '<span class="gnc-loading-row"><span class="gnc-spinner"></span> Leyendo documentos...</span>';

    try {
      const content = [];
      const readableSlots = ['foto1', 'foto2'];
      for (const slot of readableSlots) {
        const dataUrl = scanFiles[slot];
        if (!dataUrl) continue;
        const parts = dataUrlParts(dataUrl);
        if (!parts) continue;
        content.push({
          type: 'image',
          source: { type: 'base64', media_type: parts.mediaType, data: parts.base64 }
        });
      }
      content.push({
        type: 'text',
        text: `Estas imágenes muestran varios documentos argentinos fotografiados juntos sobre una mesa (probablemente DNI, Cédula Verde, y a veces una Tarjeta de Identificación de Equipo de GNC), una foto de un lado y otra del lado opuesto. Del DNI extraé los datos personales. De la Cédula Verde extraé SOLO la patente/dominio del vehículo — no extraigas marca, modelo, tipo ni uso, esos datos se completan después con una consulta aparte. Si aparece una Tarjeta de GNC, ignorala por completo — no extraigas nada de ella. Respondé SOLO con un objeto JSON válido, sin texto adicional, sin markdown, con esta forma exacta:
{"nombre": "nombre y apellido o null", "dni": "numero de documento sin puntos o null", "domicilio": "calle y numero o null", "provincia": "provincia o null", "ciudad": "ciudad o localidad o null", "patente": "dominio/patente del vehiculo o null"}
El domicilio del DNI suele venir junto con ciudad y provincia separados por guiones; separalos en los campos correspondientes. Si algún dato no aparece en las imágenes o no se puede leer con confianza, poné null en ese campo. No inventes datos.`
      });

      const response = await fetch('/api/read-docs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content }],
          license: localStorage.getItem(LICENSE_KEY)
        })
      });

      if (response.status === 403) {
        throw new Error('El código de licencia no es válido. Tocá "Cambiar código de licencia" arriba para corregirlo.');
      }

      const data = await response.json();

      if (!response.ok || data.type === 'error') {
        const msg = (data.error && data.error.message) ? data.error.message : JSON.stringify(data).slice(0, 300);
        throw new Error(`API (${response.status}): ${msg}`);
      }

      const textBlock = (data.content || []).find(b => b.type === 'text');
      if (!textBlock) throw new Error('La respuesta no trajo texto: ' + JSON.stringify(data).slice(0, 300));
      const clean = textBlock.text.replace(/```json|```/g, '').trim();
      let parsed;
      try {
        parsed = JSON.parse(clean);
      } catch (e2) {
        throw new Error('No pude interpretar la respuesta como JSON: ' + clean.slice(0, 200));
      }

      const fieldMap = {
        nombre: '#f-nombre', dni: '#f-dni', domicilio: '#f-domicilio',
        provincia: '#f-provincia', ciudad: '#f-ciudad', patente: '#f-patente',
      };
      Object.entries(fieldMap).forEach(([key, sel]) => {
        if (parsed[key]) {
          const el = root.querySelector(sel);
          if (el) el.value = key === 'patente' ? String(parsed[key]).toUpperCase() : parsed[key];
        }
      });

      statusEl.className = 'scan-status ok';
      statusEl.textContent = 'Listo — revisá los datos completados y corregí lo que haga falta antes de guardar.';
    } catch (e) {
      console.error(e);
      statusEl.className = 'scan-status err';
      statusEl.textContent = 'Error: ' + (e.message || 'no se pudo leer los datos') + ' — cargalos a mano.';
    } finally {
      btnScan.disabled = false;
    }
  }

  // Técnica FLIP (First-Last-Invert-Play): como el render reconstruye toda
  // la lista de cero, no hay animación de reacomodo "gratis" como con un
  // diffing con claves — se mide la posición de cada tarjeta ANTES de
  // reescribir el HTML, y después de reescribirlo se calcula cuánto se
  // movió cada una (por id) y se anima desde la posición vieja a la nueva.
  function medirRectsClientes() {
    const rects = {};
    root.querySelectorAll('.client-card-wrap[data-client-id]').forEach(el => {
      rects[el.getAttribute('data-client-id')] = el.getBoundingClientRect();
    });
    return rects;
  }
  function animarReacomodoClientes(oldRects) {
    root.querySelectorAll('.client-card-wrap[data-client-id]').forEach(el => {
      const oldRect = oldRects[el.getAttribute('data-client-id')];
      if (!oldRect) return;
      const newRect = el.getBoundingClientRect();
      const dx = oldRect.left - newRect.left;
      const dy = oldRect.top - newRect.top;
      if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(() => {
        el.style.transition = 'transform 220ms ease';
        el.style.transform = '';
      });
    });
  }

  function render() {
    if (!ready) { root.innerHTML = '<div class="loading"><span class="gnc-spinner"></span> Cargando datos del taller...</div>'; return; }
    const rectsAntes = medirRectsClientes();

    // cualquier campo con eventos "input" en vivo pierde el cursor en cada
    // letra que se escribe y hay que volver a clickearlo.
    const activeEl = document.activeElement;
    const focusInfo = (activeEl && activeEl.id && root.contains(activeEl))
      ? { id: activeEl.id, start: activeEl.selectionStart, end: activeEl.selectionEnd }
      : null;
    const counts = computeCounts();

      pendientes: showPendientes, bulkImport: showBulkImport, tallerConfig: showTallerConfig,
      enargasPaste: enargasPasteOpen,
    };

    root.innerHTML = `
      <div class="wrap">
        <div class="topbar">
          <div class="brand">
            <div class="menu-wrap">
              <button type="button" class="btn btn-ghost btn-sm" id="btn-toggle-menu" style="position:relative;">☰${pendCount ? `<span class="menu-badge">${pendCount}</span>` : ''}</button>
              ${menuOpen ? `<div class="menu-dropdown">
                <button type="button" class="btn btn-ghost btn-sm" id="btn-pendientes">Trámites pendientes${pendCount ? ` <span class="menu-badge-inline">${pendCount}</span>` : ''}</button>
                <button type="button" class="btn btn-ghost btn-sm" id="btn-historial">Historial de trámites</button>
                <button type="button" class="btn btn-ghost btn-sm" id="btn-import">+ Importar clientes</button>
                <button type="button" class="btn btn-ghost btn-sm" id="btn-export-csv">Exportar CSV</button>
                ${showInstallButton ? `<button type="button" class="btn btn-ghost btn-sm" id="btn-install-app">📲 Instalar app</button>` : ''}
              </div>` : ''}
            </div>
            <span class="tag">ESTELITA</span>
            <input class="taller-name-input" id="taller-input" value="${escapeHtml(tallerNombre)}">
            <button type="button" class="license-link" id="btn-toggle-taller-config">Configurar datos del taller</button>
            <button type="button" class="license-link" id="btn-change-license">Cambiar código de licencia</button>
          </div>
        </div>

        <div class="resumen-chips">
          <div class="chip chip-danger"><div class="chip-num">${counts.danger}</div><div class="chip-lbl">Vencidos</div></div>
          <div class="chip chip-warn"><div class="chip-num">${counts.warn}</div><div class="chip-lbl">Por vencer (${WARN_DAYS}d)</div></div>
          <div class="chip chip-ok"><div class="chip-num">${counts.ok}</div><div class="chip-lbl">Al día</div></div>

        ${showTallerConfig ? tallerConfigPanel(entrando.tallerConfig) : ''}

        ${showBulkImport ? bulkImportPanel(entrando.bulkImport) : ''}

        ${showForm || editing ? tramiteWizardPanel(editing, entrando.wizard, entrando.wizardPaso, entrando.enargasPaste) : ''}
        ${showFotosFor ? fotosPanel(clientes.find(c => c.id === showFotosFor), entrando.fotos) : ''}

        ${list.length === 0
          ? `<div class="empty">${emptyIconSvg()}${
              clientes.length === 0
                ? 'Todavía no cargaste clientes. Sumá el primero con "+ Nuevo trámite".'
                : currentQuery.trim()
                  ? 'No se encontraron clientes con esa búsqueda.'

            }</div>`
          : list.map(clientCard).join('')}
      </div>
      ${algunPanelAbierto ? '' : '<button type="button" class="fab-nuevo-tramite" id="btn-fab-nuevo" aria-label="Nuevo trámite">+</button>'}
      <div class="bottom-nav">

        <button type="button" class="bn-item ${showPendientes ? 'activo' : ''}" data-nav="pendientes">${pendCount ? `<span class="bn-badge">${pendCount}</span>` : ''}<span class="bn-ico">📋</span>Pendientes</button>
        <button type="button" class="bn-item ${showHistorial ? 'activo' : ''}" data-nav="historial"><span class="bn-ico">🕓</span>Historial</button>
        <button type="button" class="bn-item ${showTallerConfig ? 'activo' : ''}" data-nav="config"><span class="bn-ico">⚙️</span>Mi taller</button>
      </div>
    `;

    attachEvents();
    setupScanBox();

    if (focusInfo) {

        if (typeof toFocus.setSelectionRange === 'function' && focusInfo.start !== null) {
          try { toFocus.setSelectionRange(focusInfo.start, focusInfo.end); } catch (e) { /* input sin soporte de selección, ok */ }
        }
      }
    }
  }

    // wrap) para revelar la franja roja de atrás; alternativa al botón
    // "Eliminar" de siempre, que sigue funcionando igual.
    const SWIPE_ABRE_PX = 92;
    const SWIPE_UMBRAL_PX = 60;
    root.querySelectorAll('.client-card-wrap[data-client-id]').forEach(wrap => {
      const id = wrap.getAttribute('data-client-id');
      const card = wrap.querySelector('.client-card');
      if (!card) return;
      if (swipeAbiertoId === id) card.style.transform = `translateX(-${SWIPE_ABRE_PX}px)`;

      let startX = 0, startY = 0, dx = 0, dragging = false, decidido = false, esHorizontal = false;

      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        dx = 0; dragging = true; decidido = false; esHorizontal = false;
        card.style.transition = 'none';
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const x = e.touches[0].clientX, y = e.touches[0].clientY;
        const deltaX = x - startX, deltaY = y - startY;
        if (!decidido) {
          if (Math.abs(deltaX) > 8 || Math.abs(deltaY) > 8) {
            decidido = true;
            esHorizontal = Math.abs(deltaX) > Math.abs(deltaY);
          }
        }
        if (!esHorizontal) return;
        e.preventDefault();
        const base = swipeAbiertoId === id ? -SWIPE_ABRE_PX : 0;
        dx = Math.min(0, Math.max(-SWIPE_ABRE_PX - 24, base + deltaX));
        card.style.transform = `translateX(${dx}px)`;
      }, { passive: false });

      card.addEventListener('touchend', (e) => {
        if (!dragging) return;
        dragging = false;
        const eraAbierta = swipeAbiertoId === id;
        card.style.transition = 'transform 180ms ease';
        if (decidido && esHorizontal) {
          if (dx <= -SWIPE_UMBRAL_PX) {
            card.style.transform = `translateX(-${SWIPE_ABRE_PX}px)`;
            swipeAbiertoId = id;
          } else {
            card.style.transform = '';
            if (eraAbierta) swipeAbiertoId = null;
          }
        } else if (eraAbierta && Math.abs(dx) < 4) {
          // Toque simple sobre una tarjeta ya abierta: la cierra en vez de
          // disparar los botones de adentro.
          card.style.transform = '';
          swipeAbiertoId = null;
          e.preventDefault();
        }
      }, { passive: false });
    });

    function aplicarEnargasDocumentacion() {
      const textarea = root.querySelector('#enargas-paste-text');
      if (!textarea || !textarea.value.trim()) return;
      const parsed = parseEnargasText(textarea.value || '');
      const aplicados = parsed.found.slice();

      // Todo se aplica sobre el borrador (nunca directo a los <input> ni al
      // cliente guardado) para no pisar lo que ya se tipeó y todavía no se
      // guardó — se persiste recién cuando se toca "Guardar cambios".
      syncClienteDraftFromDOM();
      if (!clienteDraft) clienteDraft = blankClienteBase();
      const campos = {
        patente: parsed.patente ? String(parsed.patente).toUpperCase() : null,
        marca: parsed.marca, modelo: parsed.modelo, uso: parsed.uso,
        fecha_oblea: parsed.fecha_oblea, anio: parsed.anio,
      };
      Object.entries(campos).forEach(([key, val]) => { if (val) clienteDraft[key] = val; });

      if (!tramiteDraftEquipo) tramiteDraftEquipo = blankEquipo();
      if (!tramiteDraftCampos) tramiteDraftCampos = blankTramiteCampos(null);
      if (parsed.obleaActual) {
        tramiteDraftCampos.obleaAnterior = parsed.obleaActual;
        aplicados.push('N° Oblea anterior');
      }
      if (parsed.equipo) {
        // Se aplica directo al equipo del trámite que se está armando (paso
        // 2) — la consulta al SIC se hace una sola vez acá, en el paso 1.
        if (parsed.equipo.regulador.codigo || parsed.equipo.regulador.serie) {
          Object.assign(tramiteDraftEquipo.regulador, parsed.equipo.regulador);
          aplicados.push('Regulador');
        }
        if (parsed.equipo.cilindro.codigo || parsed.equipo.cilindro.serie) {
          Object.assign(tramiteDraftEquipo.cilindros[0], parsed.equipo.cilindro);
          aplicados.push('Cilindro');
        }
        if (parsed.equipo.valvula.codigo || parsed.equipo.valvula.serie) {
          Object.assign(tramiteDraftEquipo.valvulas[0], parsed.equipo.valvula);
          aplicados.push('Válvula');
        }
        // También se cachea en el cliente para que la próxima vez que se le
        // inicie un trámite, el equipo ya venga precargado sin pegar de nuevo.
        clienteDraft.ultimoEquipoConocido = {
          regulador: { ...tramiteDraftEquipo.regulador },
          cilindros: tramiteDraftEquipo.cilindros.map(c => ({ ...c })),
          valvulas: tramiteDraftEquipo.valvulas.map(v => ({ ...v })),
          otros: JSON.parse(JSON.stringify(tramiteDraftEquipo.otros)),
        };
      }

      if (aplicados.length > 0) {
        // Se reconoció algo: la caja ya cumplió su función, se cierra sola
        // en vez de esperar a que la cierren a mano.
        enargasPasteOpen = false;
        render();
      } else {
        render();
        const nuevoResultBox = root.querySelector('#enargas-paste-result');
        if (nuevoResultBox) {
          nuevoResultBox.className = 'agent-result err';
          nuevoResultBox.textContent = 'No reconocí datos con formato conocido en ese texto — completá a mano lo que falte.';
        }
      }
    }

      });
    });

    const btnAddValvula = root.querySelector('#btn-add-valvula');
    if (btnAddValvula) btnAddValvula.addEventListener('click', () => {
      syncEquipoFromDOM();
      syncTramiteCamposFromDOM();
      tramiteDraftEquipo.valvulas.push({ codigo: '', serie: '', msb: '' });
      render();
    });

    root.querySelectorAll('[data-remove-valvula]').forEach(btn => {
      btn.addEventListener('click', () => {
        syncEquipoFromDOM();
        syncTramiteCamposFromDOM();
        const i = Number(btn.getAttribute('data-remove-valvula'));
        if (tramiteDraftEquipo.valvulas.length > 1) tramiteDraftEquipo.valvulas.splice(i, 1);
        render();
      });
    });

    // Guarda de una sola vez los datos del cliente (pasos 1 y 2 del
    // asistente) y el trámite (paso 3) — antes eran dos guardados separados
    // (Documentación y Trámite); ahora es un único paso final.
    async function guardarClienteYTramite(estadoForzado) {
      if (!clienteDraft) return;
      syncClienteDraftFromDOM();
      syncEquipoFromDOM();

      const nombre = (clienteDraft.nombre || '').trim();
      if (!nombre) { await customAlert('Poné al menos el nombre del cliente.'); wizardStep = 1; render(); return; }
      const telefono = (clienteDraft.telefono || '').trim();
      if (!telefono) { await customAlert('El teléfono es obligatorio para poder guardar.'); wizardStep = 1; render(); return; }
      const patente = (clienteDraft.patente || '').trim().toUpperCase();
      if (!patente) { await customAlert('La patente es obligatoria para poder guardar.'); wizardStep = 1; render(); return; }

      const tipo = tramiteDraftCampos.tipo;
      const fecha = tramiteDraftCampos.fecha;
      if (!fecha) { await customAlert('Poné una fecha para el trámite.'); return; }

      if (equipoTieneBaja(tramiteDraftEquipo)) {
        const partes = [];
        if (tramiteDraftEquipo.regulador.operacion === 'baja') partes.push('Regulador');
        tramiteDraftEquipo.cilindros.forEach((c, i) => { if (c.msdb === 'baja') partes.push(`Cilindro ${i + 1}`); });
        tramiteDraftEquipo.valvulas.forEach((v, i) => { if (v.msb === 'baja') partes.push(`Válvula ${i + 1}`); });
        const ok = await customConfirm(`Atención TDM: vas a dar de BAJA — ${partes.join(', ')}. ¿Confirmás que querés continuar con el trámite?`, { titulo: 'Confirmar baja', danger: true, okLabel: 'Continuar' });
        if (!ok) return;
      }

      const data = {
        nombre, telefono, patente,
        dni: (clienteDraft.dni || '').trim(),
        tipo_documento: clienteDraft.tipo_documento,
        domicilio: (clienteDraft.domicilio || '').trim(),
        cpa: (clienteDraft.cpa || '').trim(),
        provincia: (clienteDraft.provincia || '').trim(),
        ciudad: (clienteDraft.ciudad || '').trim(),
        marca: (clienteDraft.marca || '').trim(),
        modelo: (clienteDraft.modelo || '').trim(),
        anio: (clienteDraft.anio || '').trim(),
        inyeccion: clienteDraft.inyeccion,
        uso: clienteDraft.uso,
      };

      let clientId;
      if (editingId) {
        clientId = editingId;
        const idx0 = clientes.findIndex(c => c.id === editingId);
        if (idx0 === -1) return;
        clientes[idx0] = { ...clientes[idx0], ...data };
      } else {
        clientId = 'c' + Date.now() + Math.random().toString(36).slice(2, 7);
        clientes.push({ id: clientId, ...blankClienteBase(), ...data, tramites: [], ultimoAvisoMes: {}, notas: '' });
      }

      try {
        const anyPhoto = Object.values(scanFiles).some(v => v);
        if (anyPhoto) {
          await window.storage.set(`fotos:${clientId}`, JSON.stringify(scanFiles), false);
        } else {
          try { await window.storage.delete(`fotos:${clientId}`, false); } catch (e) { /* no existía, ok */ }
        }
      } catch (e) {
        console.error('Error guardando fotos', e);
        await customAlert('Los datos se guardaron, pero hubo un problema guardando las fotos (puede que sean muy pesadas). Probá sacándolas de nuevo.');
      }

      const idx = clientes.findIndex(c => c.id === clientId);
      const estadoPec = estadoForzado || root.querySelector('#t-estado').value;
      const detalle = root.querySelector('#t-detalle').value.trim();
      const motivoIncompleto = estadoPec === 'incompleto' ? root.querySelector('#t-motivo').value.trim() : '';
      const obleaAnterior = root.querySelector('#t-oblea-anterior').value.trim();
      const obleaNueva = root.querySelector('#t-oblea-nueva').value.trim();

      let savedTramiteId;
      if (editingTramiteId) {
        const tIdx = clientes[idx].tramites.findIndex(t => t.id === editingTramiteId);
        if (tIdx !== -1) {
          const prev = clientes[idx].tramites[tIdx];
          clientes[idx].tramites[tIdx] = {
            ...prev,
            tipo, fecha, equipo: tramiteDraftEquipo, detalle, estadoPec, motivoIncompleto,
            obleaAnterior, obleaNueva,
            firma: currentSignature || prev.firma,
          };
          savedTramiteId = prev.id;
        }
      } else {
        savedTramiteId = 't' + Date.now() + Math.random().toString(36).slice(2, 7);
        clientes[idx].tramites.push({
          id: savedTramiteId,
          tipo, fecha, equipo: tramiteDraftEquipo, detalle, estadoPec, motivoIncompleto,
          obleaAnterior, obleaNueva,
          firma: currentSignature,
          creadoEn: new Date().toISOString(),
        });
      }
      const primerCilindro = tramiteDraftEquipo.cilindros[0];
      if (tipo === 'prueba_hidraulica') {
        clientes[idx].fecha_crpc = fecha.slice(0, 7);
      } else if (primerCilindro && primerCilindro.revisadoMes && primerCilindro.revisadoAnio) {
        // Si el equipo se cargó por ENARGAS y ya trae una fecha de revisión
        // del cilindro, la usamos para mantener la Prueba Hidráulica al día
        // aunque el trámite de hoy sea de otro tipo.
        clientes[idx].fecha_crpc = `${primerCilindro.revisadoAnio}-${String(primerCilindro.revisadoMes).padStart(2, '0')}`;
      }
      // La Revisión Anual (y una Conversión, que también entrega oblea nueva)
      // renuevan la habilitación por 1 año — antes esto no se reflejaba en la
      // tarjeta del cliente y la fecha de vencimiento de Oblea quedaba vieja.
      if (tipo === 'revision_anual' || tipo === 'conversion') clientes[idx].fecha_oblea = pecFechaMasUnAnio(fecha);
      if (primerCilindro && primerCilindro.periodicidad) clientes[idx].tipo_cilindro = primerCilindro.periodicidad;
      clientes[idx].ultimoEquipoConocido = {
        regulador: { ...tramiteDraftEquipo.regulador },
        cilindros: tramiteDraftEquipo.cilindros.map(c => ({ ...c })),
        valvulas: tramiteDraftEquipo.valvulas.map(v => ({ ...v })),
        otros: JSON.parse(JSON.stringify(tramiteDraftEquipo.otros)),
      };

      await saveClientes();
      cerrarWizard();
      render();
      return { clienteId: clientId, tramiteId: savedTramiteId };
    }

    const btnSaveTramite = root.querySelector('#btn-save-tramite');
    if (btnSaveTramite) btnSaveTramite.addEventListener('click', () => guardarClienteYTramite(null));

    const btnSendPecTramite = root.querySelector('#btn-send-pec-tramite');
    if (btnSendPecTramite) btnSendPecTramite.addEventListener('click', async () => {
      if (!currentSignature) { await customAlert('Falta la firma del propietario antes de enviar al PEC.'); return; }
      const firmaParaPdf = currentSignature;
      const resultado = await guardarClienteYTramite('enviado');
      if (!resultado) return;
      const cliente = clientes.find(c => c.id === resultado.clienteId);
      const tramite = cliente && cliente.tramites.find(t => t.id === resultado.tramiteId);
      if (!cliente || !tramite) return;
      try {
        const { blob, filename } = await generarPecPdf(cliente, tramite, firmaParaPdf);
        await compartirPecPdf(blob, filename, cliente);
      } catch (e) {
        console.error(e);
        await customAlert('El trámite se guardó y se marcó como enviado, pero no se pudo generar el PDF: ' + (e && e.message ? e.message : e));
      }
    });

    root.querySelectorAll('[data-tramite-status]').forEach(sel => {
      sel.addEventListener('change', async () => {
        const clienteId = sel.getAttribute('data-tramite-status');
        const tramiteId = sel.getAttribute('data-tramite-id');
        const c = clientes.find(x => x.id === clienteId);
        if (!c) return;
        const t = c.tramites.find(x => x.id === tramiteId);
        if (!t) return;
        t.estadoPec = sel.value;
        if (t.estadoPec !== 'incompleto') t.motivoIncompleto = '';
        else {
          const motivo = prompt('¿Cuál es el motivo por el que quedó incompleto?', t.motivoIncompleto || '');
          t.motivoIncompleto = motivo || '';
        }
        await saveClientes();
        render();
      });
    });

  }

  boot();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
</body>
</html>

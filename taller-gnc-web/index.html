<script>
// Reemplazo de window.storage (que solo existe dentro de Claude.ai) por una
// version basada en localStorage del navegador, para que la app funcione
// de forma totalmente independiente. Misma interfaz (get/set/delete/list),
// asi que el resto del codigo no necesita cambios.
window.storage = {
  async get(key) {
    const raw = localStorage.getItem(key);
    if (raw === null) return null;
    return { key, value: raw, shared: false };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    const existed = localStorage.getItem(key) !== null;
    localStorage.removeItem(key);
    return existed ? { key, deleted: true, shared: false } : null;
  },
  async list(prefix) {
    const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
    return { keys, prefix, shared: false };
  }
};
</script>

<style>

}
#gnc-app .taller-name-input:focus { border-bottom-color: var(--flame); }

/* GAUGE */

<script>
(function(){
  const root = document.getElementById('gnc-app');
  const WARN_DAYS = 5;
  const STORAGE_KEY = 'gnc_clientes_v2';
  const TALLER_KEY = 'gnc_taller_nombre_v1';
  const LICENSE_KEY = 'gnc_license_code';
  const TALLER_CONFIG_KEY = 'gnc_taller_config_v1';

  const TALLER_CONFIG_DEFAULT = {
    razonSocial: '', direccion: '', cuit: '',
    tecnicoNombre: '', tecnicoMatricula: '',
    codigoPec: '', codigoTaller: '',
    pecRazonSocial: '', pecIngeniero: '', pecMatriculaCipba: ''
  };

  let clientes = [];
  let tallerNombre = 'Mi Taller GNC';
  let tallerConfig = { ...TALLER_CONFIG_DEFAULT };
  let showTallerConfig = false;
  let editingId = null;
  let ready = false;

  root.innerHTML = '<div class="loading">Cargando datos del taller...</div>';

  function showActivationScreen() {
    root.innerHTML = `
      <div class="wrap activation-wrap">
        <div class="panel activation-panel">
          <h2>Activar Taller GNC</h2>
          <p class="activation-hint">Ingresá el código de licencia que te dieron para habilitar la lectura de fotos con IA.</p>
          <form id="activation-form">
            <input type="text" id="activation-input" placeholder="Ej: GNC-0001" autocomplete="off">
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Activar</button>
            </div>
          </form>
        </div>
      </div>
    `;
    const form = root.querySelector('#activation-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const input = root.querySelector('#activation-input');
      const code = input.value.trim();
      if (!code) return;
      localStorage.setItem(LICENSE_KEY, code);
      boot();
    });
  }

  function boot() {
    if (!localStorage.getItem(LICENSE_KEY)) {
      showActivationScreen();
    } else {
      loadData();
    }
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function fmtMonthYear(ym) {
    if (!ym) return '—';
    const [y,m] = ym.split('-');
    return `${m}/${y}`;
  }

  function daysUntil(iso) {
    if (!iso) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(iso + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function statusOf(iso) {
    const d = daysUntil(iso);
    if (d === null) return { level: 'none', label: 'Sin fecha', days: null };
    if (d < 0) return { level: 'danger', label: `Vencido hace ${Math.abs(d)}d`, days: d };
    if (d <= WARN_DAYS) return { level: 'warn', label: d === 0 ? 'Vence hoy' : `Vence en ${d}d`, days: d };
    return { level: 'ok', label: `Vence en ${d}d`, days: d };
  }

  // Deriva el vencimiento de la Prueba Hidráulica (CRPC) a partir de la fecha
  // de revisión (mes/año) + la periodicidad del cilindro (3 o 5 años).
  // Se aproxima al primer día del mes de vencimiento, ya que ENARGAS solo
  // informa mes/año, no el día exacto.
  function phVencimientoISO(fecha_crpc, tipo_cilindro) {
    if (!fecha_crpc) return null;
    const [y, m] = fecha_crpc.split('-').map(Number);
    const years = tipo_cilindro === '3' ? 3 : 5;
    const vencY = y + years;
    return `${vencY}-${String(m).padStart(2,'0')}-01`;
  }

  function worstStatus(cliente) {
    const a = statusOf(cliente.fecha_oblea);
    const phIso = phVencimientoISO(cliente.fecha_crpc, cliente.tipo_cilindro);
    const b = statusOf(phIso);
    const order = { danger: 0, warn: 1, ok: 2, none: 3 };
    return order[a.level] <= order[b.level] ? a : b;
  }

  function cleanPhone(p) { return (p || '').replace(/\D/g, ''); }

  function waLink(cliente, tipo) {
    const phone = cleanPhone(cliente.telefono);
    let doc, fecha, status;
    if (tipo === 'oblea') {
      doc = 'Oblea';
      fecha = fmtDate(cliente.fecha_oblea);
      status = statusOf(cliente.fecha_oblea);
    } else {
      doc = 'revisión periódica del cilindro (Prueba Hidráulica / CRPC)';
      const phIso = phVencimientoISO(cliente.fecha_crpc, cliente.tipo_cilindro);
      fecha = phIso ? fmtMonthYear(cliente.fecha_crpc ? `${phIso.slice(0,4)}-${phIso.slice(5,7)}` : '') : '—';
      status = statusOf(phIso);
    }
    const venceTexto = status.days !== null && status.days < 0 ? `venció (${fecha})` : `vence (${fecha})`;
    const msg = `Hola ${cliente.nombre}! Te escribimos de ${tallerNombre} para recordarte que la ${doc} de tu vehículo (patente ${cliente.patente || 's/d'}) ${venceTexto}. Te esperamos para renovarla. Cualquier consulta, escribinos por acá. Saludos!`;
    return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  }

  async function loadData() {
    try {
      const res = await window.storage.get(STORAGE_KEY, false);
      clientes = res ? JSON.parse(res.value) : [];
    } catch (e) { clientes = []; }
    try {
      const res2 = await window.storage.get(TALLER_KEY, false);
      tallerNombre = res2 ? JSON.parse(res2.value) : 'Mi Taller GNC';
    } catch (e) { tallerNombre = 'Mi Taller GNC'; }
    try {
      const res3 = await window.storage.get(TALLER_CONFIG_KEY, false);
      tallerConfig = res3 ? { ...TALLER_CONFIG_DEFAULT, ...JSON.parse(res3.value) } : { ...TALLER_CONFIG_DEFAULT };
    } catch (e) { tallerConfig = { ...TALLER_CONFIG_DEFAULT }; }
    if (migrateClientes()) await saveClientes();
    ready = true;
    render();
  }

  // Suma campos nuevos (tramites, ultimoAvisoMes, notas) a clientes guardados
  // con el formato viejo, sin tocar ni borrar nada de lo que ya tenían.
  function migrateClientes() {
    let changed = false;
    clientes.forEach(c => {
      if (!Array.isArray(c.tramites)) { c.tramites = []; changed = true; }
      if (!c.ultimoAvisoMes || typeof c.ultimoAvisoMes !== 'object') { c.ultimoAvisoMes = {}; changed = true; }
      if (typeof c.notas !== 'string') { c.notas = ''; changed = true; }
    });

  function gaugeSVG(counts) {
    const total = counts.danger + counts.warn + counts.ok || 1;
    const segs = [
      { val: counts.danger, color: 'var(--danger)' },
      { val: counts.warn, color: 'var(--warn)' },
      { val: counts.ok, color: 'var(--ok)' }
    ];
    const cx = 50, cy = 55, r = 42;
    let startAngle = 180;
    let arcs = '';
    segs.forEach(s => {
      const sweep = (s.val / total) * 180;
      const endAngle = startAngle - sweep;
      const toRad = a => (a * Math.PI) / 180;
      const x1 = cx + r * Math.cos(toRad(startAngle));
      const y1 = cy - r * Math.sin(toRad(startAngle));
      const x2 = cx + r * Math.cos(toRad(endAngle));
      const y2 = cy - r * Math.sin(toRad(endAngle));
      const largeArc = sweep > 180 ? 1 : 0;
      if (s.val > 0) {
        arcs += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 0 ${x2} ${y2}" stroke="${s.color}" stroke-width="10" fill="none" stroke-linecap="butt"/>`;
      }
      startAngle = endAngle;
    });
    return `<svg class="gauge-svg" viewBox="0 0 100 62" xmlns="http://www.w3.org/2000/svg">
      <path d="M 8 55 A 42 42 0 0 1 92 55" stroke="var(--line)" stroke-width="10" fill="none"/>
      ${arcs}
      <text x="50" y="50" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="16" fill="var(--text)">${counts.danger + counts.warn}</text>
      <text x="50" y="60" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="7" fill="var(--text-muted)">A REVISAR</text>
    </svg>`;
  }

  function computeCounts() {
    const counts = { danger: 0, warn: 0, ok: 0 };
    clientes.forEach(c => {
      const s = worstStatus(c);
      if (s.level === 'danger') counts.danger++;
      else if (s.level === 'warn') counts.warn++;
      else counts.ok++;
    });
    return counts;
  }

  // --- Importación masiva ---

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',' || ch === '\t') { row.push(field); field = ''; }
        else if (ch === '\r') { /* se ignora, lo maneja \n */ }
        else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else field += ch;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  function parseDateLenient(str) {
    if (!str) return null;
    str = str.trim();
    let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (m) {
      let [, d, mo, y] = m;
      if (y.length === 2) y = '20' + y;
      if (+mo < 1 || +mo > 12 || +d < 1 || +d > 31) return null;
      return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
    }
    m = str.match(/^(\d{1,2})\/(\d{2,4})$/);
    if (m) {
      let [, mo, y] = m;
      if (y.length === 2) y = '20' + y;
      if (+mo < 1 || +mo > 12) return null;
      return `${y}-${mo.padStart(2, '0')}-01`;
    }
    return null;
  }

  function extractPhoneDigits(raw) {
    const digits = (raw || '').replace(/\D/g, '');
    return (digits.length >= 6 && digits.length <= 15) ? digits : null;
  }

  function normalizeHeader(h) {
    return (h || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]/g, '');
  }

  const HEADER_SYNONYMS = {
    nombre: ['nombre', 'nombreyapellido', 'cliente', 'apellidoynombre'],
    telefono: ['telefono', 'tel', 'celular', 'whatsapp', 'numero'],
    patente: ['patente', 'dominio'],
    fecha: ['fecha', 'vencimiento', 'fechaoblea', 'fechavencimiento'],
    dni: ['dni', 'documento'],
    marca: ['marca'], modelo: ['modelo'],
  };

  function looksLikeHeaderRow(row) {
    return row.some(cell => {
      const n = normalizeHeader(cell);
      return Object.values(HEADER_SYNONYMS).some(syns => syns.includes(n));
    });
  }

  function matchColumns(headerRow) {
    const norm = headerRow.map(normalizeHeader);
    const map = {};
    Object.entries(HEADER_SYNONYMS).forEach(([field, syns]) => {
      const idx = norm.findIndex(h => syns.includes(h));
      if (idx !== -1) map[field] = idx;
    });
    return map;
  }

  // Interpreta el texto pegado/subido: con encabezado reconocible usa esas
  // columnas; si no, asume el formato real de la base del taller
  // (patente, teléfono, fecha) sin encabezado.
  function parseBulkImportText(text) {
    const allRows = parseCSV(text);
    if (!allRows.length) return [];
    let dataRows = allRows;
    let colMap = { patente: 0, telefono: 1, fecha: 2 };
    if (looksLikeHeaderRow(allRows[0])) {
      colMap = matchColumns(allRows[0]);
      dataRows = allRows.slice(1);
    }
    const parsed = dataRows.map(row => {
      const rawPatente = (colMap.patente !== undefined ? row[colMap.patente] : '') || '';
      const rawTelefono = (colMap.telefono !== undefined ? row[colMap.telefono] : '') || '';
      const rawFecha = (colMap.fecha !== undefined ? row[colMap.fecha] : '') || '';
      const rawNombre = (colMap.nombre !== undefined ? row[colMap.nombre] : '') || '';
      const patente = rawPatente.trim().toUpperCase().replace(/\s+/g, '');
      const telefono = extractPhoneDigits(rawTelefono);
      const fecha_oblea = parseDateLenient(rawFecha);
      return {
        patente,
        nombre: rawNombre.trim(),
        telefono: telefono || '',
        notas: telefono ? '' : (rawTelefono.trim() ? `Teléfono original en planilla: ${rawTelefono.trim()}` : ''),
        fecha_oblea: fecha_oblea || '',
        fechaSinParsear: !fecha_oblea && rawFecha.trim() ? rawFecha.trim() : '',
      };
    }).filter(r => r.patente);

    // Deduplicar por patente: nos quedamos con la fecha parseable más reciente.
    const byPatente = new Map();
    parsed.forEach(r => {
      const prev = byPatente.get(r.patente);
      if (!prev) { byPatente.set(r.patente, r); return; }
      if (r.fecha_oblea && (!prev.fecha_oblea || r.fecha_oblea > prev.fecha_oblea)) {
        byPatente.set(r.patente, { ...r, telefono: r.telefono || prev.telefono, notas: r.notas || prev.notas });
      } else if (!prev.telefono && r.telefono) {
        byPatente.set(r.patente, { ...prev, telefono: r.telefono });
      }
    });
    return Array.from(byPatente.values());
  }

  function sortedFiltered(query) {
    let list = clientes.slice();
    if (query) {
      const q = query.toLowerCase();
      list = list.filter(c =>
        (c.nombre || '').toLowerCase().includes(q) ||
        (c.patente || '').toLowerCase().includes(q)
      );
    }
    const order = { danger: 0, warn: 1, ok: 2, none: 3 };
    list.sort((a, b) => {
      const sa = worstStatus(a), sb = worstStatus(b);
      if (order[sa.level] !== order[sb.level]) return order[sa.level] - order[sb.level];
      const da = sa.days === null ? 9999 : sa.days;
      const db = sb.days === null ? 9999 : sb.days;
      return da - db;
    });
    return list;
  }

  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // Escapa un valor para CSV: neutraliza caracteres que Excel/Sheets podría
  // interpretar como el inicio de una fórmula, y entrecomilla si hace falta.
  function csvEscape(val) {
    let s = (val === null || val === undefined) ? '' : String(val);
    if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
    if (/[",\n\r]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function exportClientesCSV() {
    const headers = [

      return [
        c.nombre, c.tipo_documento || 'DNI', c.dni, c.domicilio, c.numero, c.piso, c.cpa, c.provincia, c.ciudad, c.telefono,
        c.patente, c.marca, c.modelo, c.anio, c.inyeccion === 'si' ? 'Sí' : 'No', c.uso,

        c.notas || ''
      ].map(csvEscape).join(',');
    });
    const csv = [headers.map(csvEscape).join(','), ...rows].join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);

  function parseAgentText(text) {
    const out = {
      fecha_oblea: null, fecha_crpc: null,
      nombre: null, dni: null, domicilio: null, provincia: null, ciudad: null,
      patente: null, marca: null, modelo: null, tipo_vehiculo: null, uso: null,
      found: []
    };

    // Fecha de vencimiento de la Oblea: dd/mm/aaaa (o aa)
    const mVenc = text.match(/fecha\s*de\s*vencimiento[^\d]{0,15}(\d{1,2})\/(\d{1,2})\/(\d{2,4})/i);
    if (mVenc) {
      let [, d, m, y] = mVenc;
      if (y.length === 2) y = '20' + y;
      out.fecha_oblea = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      out.found.push(`Vencimiento Oblea: ${d}/${m}/${y}`);
    }

    // Fecha CRPC: m/aa o mm/aaaa
    const mCrpc = text.match(/crpc[^\d]{0,15}(\d{1,2})\/(\d{2,4})/i);
    if (mCrpc) {
      let [, m, y] = mCrpc;
      if (y.length === 2) y = '20' + y;
      out.fecha_crpc = `${y}-${m.padStart(2,'0')}`;
      out.found.push(`Fecha CRPC: ${m}/${y}`);
    }

    // Nombre: el DNI trae "Apellido" y "Nombre" como campos separados.
    // Los combinamos en un nombre completo; si viene como "Nombre y apellido"
    // en una sola línea, usamos eso directamente.
    const mApellido = text.match(/apellido[:\s]+([^\n,;]{2,40})/i);
    const apellido = mApellido ? mApellido[1].trim() : null;
    const mNombreLine = text.match(/nombre(?:\s*y\s*apellido)?[:\s]+([^\n,;]{2,60})/i);
    if (mNombreLine) {
      const esCombinado = /nombre\s*y\s*apellido/i.test(mNombreLine[0]);
      if (esCombinado || !apellido) {
        out.nombre = mNombreLine[1].trim();
      } else {
        out.nombre = `${mNombreLine[1].trim()} ${apellido}`.trim();
      }
      out.found.push(`Nombre: ${out.nombre}`);
    } else if (apellido) {
      out.nombre = apellido;
      out.found.push(`Nombre: ${out.nombre}`);
    }

    // DNI (numero de documento) - acepta "DNI", "Documento", "N° de Documento"
    const mDni = text.match(/(?:dni|n[°º]?\s*de\s*documento|documento)[:\s]+([\d.]{6,12})/i);
    if (mDni) { out.dni = mDni[1].replace(/\./g,''); out.found.push(`DNI: ${out.dni}`); }

    // Domicilio
    const mDom = text.match(/domicilio[:\s]+([^\n,;]{3,80})/i);
    if (mDom) { out.domicilio = mDom[1].trim(); out.found.push(`Domicilio: ${out.domicilio}`); }

    // Provincia
    const mProv = text.match(/provincia[:\s]+([^\n,;]{3,40})/i);
    if (mProv) { out.provincia = mProv[1].trim(); out.found.push(`Provincia: ${out.provincia}`); }

    // Ciudad / Localidad
    const mCiudad = text.match(/(?:ciudad|localidad)[:\s]+([^\n,;]{3,40})/i);
    if (mCiudad) { out.ciudad = mCiudad[1].trim(); out.found.push(`Ciudad: ${out.ciudad}`); }

    // Patente / Dominio (espacio literal, no \s, para no comerse el
    // renglón/sección siguiente cuando el texto pegado tiene líneas en blanco)
    const mPatente = text.match(/(?:patente|dominio)[:\s]+([A-Za-z0-9 -]{5,10})/i);
    if (mPatente) { out.patente = mPatente[1].replace(/\s|-/g,'').toUpperCase(); out.found.push(`Patente: ${out.patente}`); }

    // Marca
    const mMarca = text.match(/marca[:\s]+([^\n,;]{2,40})/i);
    if (mMarca) { out.marca = mMarca[1].trim(); out.found.push(`Marca: ${out.marca}`); }

    // Modelo
    const mModelo = text.match(/modelo[:\s]+([^\n,;]{1,40})/i);
    if (mModelo) { out.modelo = mModelo[1].trim(); out.found.push(`Modelo: ${out.modelo}`); }

    // Tipo (de vehiculo)
    const mTipo = text.match(/tipo(?:\s*de\s*veh[ií]culo)?[:\s]+([^\n,;]{2,30})/i);
    if (mTipo) { out.tipo_vehiculo = mTipo[1].trim(); out.found.push(`Tipo: ${out.tipo_vehiculo}`); }

    // Uso
    const mUso = text.match(/uso[:\s]+([^\n,;]{2,30})/i);
    if (mUso) { out.uso = mUso[1].trim(); out.found.push(`Uso: ${out.uso}`); }

    return out;
  }

  // Ajustado con un ejemplo real del "Detalle de la operación" del SIC de
  // ENARGAS (pantalla a la que se llega tras la consulta por dominio):
  // trae Marca/Modelo/Año/Uso/Dominio del vehículo, "Fecha Vencimiento" de
  // la Oblea, y tablas de Regulador/Cilindro/Válvula con Código
  // Homologación + Número de Serie (+ Fecha Fab./CRPC/Fecha CRPC en el
  // cilindro). Como no sabemos todavía cómo queda el texto exacto al
  // copiar y pegar esa pantalla (recién vimos una captura), esto puede
  // necesitar un ajuste fino la primera vez que alguien lo use de verdad.
  function parseEnargasText(text) {
    // OJO: no reusamos los campos nombre/dni/domicilio/provincia/ciudad de
    // parseAgentText acá — el "Detalle de la operación" del SIC también
    // muestra Domicilio/Provincia/Ciudad del PEC y del Taller, y esos
    // patrones genéricos terminaban aplicándole esa dirección al cliente
    // (que es el dueño del auto, no el PEC ni el taller). Solo tomamos lo
    // que es inequívocamente del vehículo: patente, marca, modelo, uso.
    const generic = parseAgentText(text);
    const out = {
      fecha_oblea: null, fecha_crpc: null, anio: null,
      nombre: null, dni: null, domicilio: null, provincia: null, ciudad: null, tipo_vehiculo: null,
      patente: generic.patente, marca: generic.marca, modelo: generic.modelo, uso: generic.uso,
      found: [], rawText: text,
    };
    if (out.patente) out.found.push(`Patente: ${out.patente}`);
    if (out.marca) out.found.push(`Marca: ${out.marca}`);
    if (out.modelo) out.found.push(`Modelo: ${out.modelo}`);
    if (out.uso) out.found.push(`Uso: ${out.uso}`);

    const mVenc = text.match(/fecha\s*vencimiento[:\s]*\n?\s*(\d{1,2})\/(\d{1,2})\/(\d{2,4})/i);
    if (mVenc) {
      let [, d, m, y] = mVenc;
      if (y.length === 2) y = '20' + y;
      out.fecha_oblea = `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
      out.found.push(`Vencimiento Oblea: ${d}/${m}/${y}`);
    }

    const mAnio = text.match(/a[nñ]o[:\s]*\n?\s*(\d{4})/i);
    if (mAnio) { out.anio = mAnio[1]; out.found.push(`Año: ${mAnio[1]}`); }

    out.equipo = parseEnargasEquipo(text);
    return out;
  }

  // Recorta el texto a partir de cada encabezado de sección conocido y
  // busca dentro un código de homologación (2 letras + 2/3 números, ej.
  // "TT01", "CC35") y un número de serie (una tira larga de dígitos).
  function parseEnargasEquipo(text) {
    function seccion(patronInicio, patronFin) {
      const iniMatch = text.match(patronInicio);
      if (!iniMatch) return '';
      const desde = iniMatch.index + iniMatch[0].length;
      const resto = text.slice(desde);
      const finMatch = patronFin ? resto.match(patronFin) : null;
      return finMatch ? resto.slice(0, finMatch.index) : resto.slice(0, 300);
    }
    // El SIC pega la etiqueta y el valor de cada celda de la tabla sin
    // ningún separador (ej: "Código HomologaciónTT01Número de
    // Serie156824OperaciónSin Cambios", todo seguido) — así que en vez de
    // buscar un valor "suelto" con límites de palabra, recortamos el texto
    // entre una etiqueta y la siguiente.
    function entre(bloque, etiquetaInicio, etiquetaFin) {
      const mIni = bloque.match(etiquetaInicio);
      if (!mIni) return '';
      const desde = mIni.index + mIni[0].length;
      const resto = bloque.slice(desde);
      const mFin = etiquetaFin ? resto.match(etiquetaFin) : null;
      return (mFin ? resto.slice(0, mFin.index) : resto).trim();
    }
    function codigoYSerie(bloque) {
      let codigo = entre(bloque, /c[oó]digo\s*homologaci[oó]n/i, /n[uú]mero\s*de\s*serie/i);
      let serie = entre(bloque, /n[uú]mero\s*de\s*serie/i, /operaci[oó]n/i);
      // Si no hay etiquetas (formato distinto, con espacios normales),
      // probamos el modo anterior como respaldo.
      if (!codigo) { const m = bloque.match(/\b([A-Z]{2}\d{2,3})\b/); if (m) codigo = m[1]; }
      if (!serie) { const m = bloque.match(/\b(\d{4,10})\b/); if (m) serie = m[1]; }
      return { codigo, serie };
    }

    const regBloque = seccion(/datos\s*(?:del\s*)?regulador/i, /datos\s*(?:del\s*)?cilindro/i);
    const cilBloque = seccion(/datos\s*(?:del\s*)?cilindro(?!.*v[aá]lvula)/i, /datos?\s*v[aá]lvula/i);
    const valBloque = seccion(/datos?\s*v[aá]lvula/i, /informaci[oó]n\s*desplegada|declaraci[oó]n\s*jurada/i);

    const regulador = codigoYSerie(regBloque);
    const cilindro = codigoYSerie(cilBloque);
    const valvula = codigoYSerie(valBloque);
    const crpcMaterial = entre(cilBloque, /(?<!fecha\s)crpc/i, /fecha\s*crpc/i);
    if (crpcMaterial) cilindro.crpc = crpcMaterial;

    // En la tabla del SIC los encabezados ("Fecha Fab.", "Fecha CRPC") van
    // en una fila y los valores en la siguiente, lejos uno del otro — así
    // que en vez de buscar el valor pegado a la etiqueta, tomamos las
    // fechas tipo mes/año en el orden en que aparecen: la primera es
    // Fecha Fab. y la segunda, si existe, es Fecha CRPC.
    const fechasNN = [...cilBloque.matchAll(/(\d{1,2})\s*\/\s*(\d{1,2})(?!\d)/g)];
    function mesAnio(m) {
      return { mes: m[1], anio: m[2].length <= 2 ? '20' + m[2].padStart(2, '0') : m[2] };
    }
    if (fechasNN[0]) { const f = mesAnio(fechasNN[0]); cilindro.fabricadoMes = f.mes; cilindro.fabricadoAnio = f.anio; }
    if (fechasNN[1]) { const f = mesAnio(fechasNN[1]); cilindro.revisadoMes = f.mes; cilindro.revisadoAnio = f.anio; }

    const hayAlgo = [regulador, cilindro, valvula].some(e => e.codigo || e.serie);
    return hayAlgo ? { regulador, cilindro, valvula } : null;
  }

  function equipoResumen(eq) {
    if (!eq) return '';
    const partes = [];
    if (eq.regulador && (eq.regulador.codigo || eq.regulador.serie)) {
      partes.push(`Regulador ${[eq.regulador.codigo, eq.regulador.serie].filter(Boolean).join('/')}`);
    }
    (eq.cilindros || []).forEach(cil => {
      if (cil.codigo || cil.serie) partes.push(`Cilindro ${[cil.codigo, cil.serie].filter(Boolean).join('/')}`);
    });
    (eq.valvulas || []).forEach(v => {
      if (v.codigo || v.serie) partes.push(`Válvula ${[v.codigo, v.serie].filter(Boolean).join('/')}`);
    });
    return partes.join(' · ');
  }

  // Comprime y redimensiona la foto en el navegador antes de guardarla,
  // para que no pese demasiado (las fotos de celular sin comprimir son
  // varios MB y no entran cómodas en el almacenamiento del navegador).
  function compressImageFile(file, maxDim = 1280, quality = 0.72) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
      reader.readAsDataURL(file);
    });
  }

  function dataUrlParts(dataUrl) {
    const m = dataUrl.match(/^data:(.+);base64,(.*)$/);
    return m ? { mediaType: m[1], base64: m[2] } : null;
  }

  // Firma electrónica: canvas con soporte mouse y touch. Como render()
  // reconstruye todo el DOM, el trazo se guarda en `currentSignature` en
  // cada fin de trazo y se restaura acá mismo si ya había algo dibujado.
  function attachSignaturePad(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#E9F1F6';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    let drawing = false, last = null;

    if (currentSignature) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = currentSignature;
    }

    function posFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
      const point = e.touches ? e.touches[0] : e;
      return { x: (point.clientX - rect.left) * scaleX, y: (point.clientY - rect.top) * scaleY };
    }
    function start(e) { e.preventDefault(); drawing = true; last = posFromEvent(e); }
    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = posFromEvent(e);
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      last = p;
    }
    function end() {
      if (!drawing) return;
      drawing = false;
      currentSignature = canvas.toDataURL('image/png');
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
    canvas.addEventListener('touchcancel', end);
  }

  async function runScan() {
    const btnScan = root.querySelector('#btn-scan');
    const statusEl = root.querySelector('#scan-status');
    btnScan.disabled = true;
    statusEl.className = 'scan-status';
    statusEl.textContent = 'Leyendo documentos...';

    try {
      const content = [];
      const readableSlots = ['foto1', 'foto2'];
      for (const slot of readableSlots) {
        const dataUrl = scanFiles[slot];
        if (!dataUrl) continue;
        const parts = dataUrlParts(dataUrl);
        if (!parts) continue;
        content.push({
          type: 'image',
          source: { type: 'base64', media_type: parts.mediaType, data: parts.base64 }
        });
      }
      content.push({
        type: 'text',
        text: `Estas imágenes muestran varios documentos argentinos fotografiados juntos sobre una mesa (probablemente DNI, Cédula Verde, y a veces una Tarjeta de Identificación de Equipo de GNC), una foto de un lado y otra del lado opuesto. Del DNI extraé los datos personales. De la Cédula Verde extraé SOLO la patente/dominio del vehículo — no extraigas marca, modelo, tipo ni uso, esos datos se completan después con una consulta aparte. Si aparece una Tarjeta de GNC, ignorala por completo — no extraigas nada de ella. Respondé SOLO con un objeto JSON válido, sin texto adicional, sin markdown, con esta forma exacta:
{"nombre": "nombre y apellido o null", "dni": "numero de documento sin puntos o null", "domicilio": "calle y numero o null", "provincia": "provincia o null", "ciudad": "ciudad o localidad o null", "patente": "dominio/patente del vehiculo o null"}
El domicilio del DNI suele venir junto con ciudad y provincia separados por guiones; separalos en los campos correspondientes. Si algún dato no aparece en las imágenes o no se puede leer con confianza, poné null en ese campo. No inventes datos.`
      });

      const response = await fetch('/api/read-docs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content }],
          license: localStorage.getItem(LICENSE_KEY)
        })
      });

      if (response.status === 403) {
        throw new Error('El código de licencia no es válido. Tocá "Cambiar código de licencia" arriba para corregirlo.');
      }

      const data = await response.json();

      if (!response.ok || data.type === 'error') {
        const msg = (data.error && data.error.message) ? data.error.message : JSON.stringify(data).slice(0, 300);
        throw new Error(`API (${response.status}): ${msg}`);
      }

      const textBlock = (data.content || []).find(b => b.type === 'text');
      if (!textBlock) throw new Error('La respuesta no trajo texto: ' + JSON.stringify(data).slice(0, 300));
      const clean = textBlock.text.replace(/```json|```/g, '').trim();
      let parsed;
      try {
        parsed = JSON.parse(clean);
      } catch (e2) {
        throw new Error('No pude interpretar la respuesta como JSON: ' + clean.slice(0, 200));
      }

      const fieldMap = {
        nombre: '#f-nombre', dni: '#f-dni', domicilio: '#f-domicilio',
        provincia: '#f-provincia', ciudad: '#f-ciudad', patente: '#f-patente',
      };
      Object.entries(fieldMap).forEach(([key, sel]) => {
        if (parsed[key]) {
          const el = root.querySelector(sel);
          if (el) el.value = key === 'patente' ? String(parsed[key]).toUpperCase() : parsed[key];
        }
      });

      statusEl.className = 'scan-status ok';
      statusEl.textContent = 'Listo — revisá los datos completados y corregí lo que haga falta antes de guardar.';
    } catch (e) {
      console.error(e);
      statusEl.className = 'scan-status err';
      statusEl.textContent = 'Error: ' + (e.message || 'no se pudo leer los datos') + ' — cargalos a mano.';
    } finally {
      btnScan.disabled = false;
    }
  }

      showTallerConfig = false;
      render();
    });

    const btnSaveTallerConfig = root.querySelector('#btn-save-taller-config');
    if (btnSaveTallerConfig) btnSaveTallerConfig.addEventListener('click', async () => {
      tallerConfig = {
        razonSocial: root.querySelector('#tc-razon-social').value.trim(),
        direccion: root.querySelector('#tc-direccion').value.trim(),
        cuit: root.querySelector('#tc-cuit').value.trim(),
        tecnicoNombre: root.querySelector('#tc-tecnico-nombre').value.trim(),
        tecnicoMatricula: root.querySelector('#tc-tecnico-matricula').value.trim(),
        codigoPec: root.querySelector('#tc-codigo-pec').value.trim(),
        codigoTaller: root.querySelector('#tc-codigo-taller').value.trim(),
        pecRazonSocial: root.querySelector('#tc-pec-razon-social').value.trim(),
        pecIngeniero: root.querySelector('#tc-pec-ingeniero').value.trim(),
        pecMatriculaCipba: root.querySelector('#tc-pec-matricula').value.trim(),
      };
      await saveTallerConfig();
      showTallerConfig = false;
      render();
    });

    const btnChangeLicense = root.querySelector('#btn-change-license');
    if (btnChangeLicense) {
      btnChangeLicense.addEventListener('click', () => {
        if (confirm('¿Cambiar el código de licencia? Vas a tener que ingresar un código nuevo para poder usar la lectura de fotos con IA de nuevo. Los clientes y fotos guardados no se van a borrar.')) {
          localStorage.removeItem(LICENSE_KEY);
          boot();
        }
      });
    }
    const searchInput = root.querySelector('#search-input');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        currentQuery = e.target.value;
        render();
      });
    }
    const btnNew = root.querySelector('#btn-new');
    if (btnNew) btnNew.addEventListener('click', () => {
      editingId = null; showForm = true;
      showBulkImport = false;
      enargasPasteOpen = false;
      Object.keys(scanFiles).forEach(k => scanFiles[k] = null);
      render();
    });

    const btnExportCsv = root.querySelector('#btn-export-csv');
    if (btnExportCsv) btnExportCsv.addEventListener('click', exportClientesCSV);

    const btnImport = root.querySelector('#btn-import');
    if (btnImport) btnImport.addEventListener('click', () => {
      showForm = false; editingId = null;
      showBulkImport = !showBulkImport;
      bulkImportRows = []; bulkImportSkip = new Set();
      render();
    });

    function applyBulkParsedRows(rows) {
      bulkImportRows = rows;
      const existentes = new Set(clientes.map(c => (c.patente || '').toUpperCase()));
      bulkImportSkip = new Set();
      rows.forEach((r, i) => { if (existentes.has(r.patente)) bulkImportSkip.add(i); });
      render();
    }

    const bulkFileInput = root.querySelector('#bulk-import-file');
    if (bulkFileInput) bulkFileInput.addEventListener('change', () => {
      const file = bulkFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => applyBulkParsedRows(parseBulkImportText(e.target.result));
      reader.readAsText(file);
    });

    const btnBulkParse = root.querySelector('#btn-bulk-parse');
    if (btnBulkParse) btnBulkParse.addEventListener('click', () => {
      const text = root.querySelector('#bulk-import-text').value || '';
      if (!text.trim()) { alert('Pegá algo de texto o elegí un archivo primero.'); return; }
      applyBulkParsedRows(parseBulkImportText(text));
    });

    root.querySelectorAll('[data-bulk-row]').forEach(chk => {
      chk.addEventListener('change', () => {
        const i = Number(chk.getAttribute('data-bulk-row'));
        if (chk.checked) bulkImportSkip.delete(i); else bulkImportSkip.add(i);
      });
    });

    const btnBulkCancel = root.querySelector('#btn-bulk-cancel');
    if (btnBulkCancel) btnBulkCancel.addEventListener('click', () => {
      showBulkImport = false; bulkImportRows = []; bulkImportSkip = new Set();
      render();
    });

    const btnBulkConfirm = root.querySelector('#btn-bulk-confirm');
    if (btnBulkConfirm) btnBulkConfirm.addEventListener('click', async () => {
      let importados = 0, sinTelefono = 0, sinFecha = 0;
      bulkImportRows.forEach((r, i) => {
        if (bulkImportSkip.has(i)) return;
        clientes.push({
          id: 'c' + Date.now() + Math.random().toString(36).slice(2, 7),
          nombre: r.nombre || r.patente, dni: '', domicilio: '', provincia: '', ciudad: '',
          telefono: r.telefono || '', patente: r.patente, marca: '', modelo: '',
          tipo_vehiculo: '', uso: '', fecha_oblea: r.fecha_oblea || '', fecha_crpc: '',
          tipo_cilindro: '5', notas: r.notas || '', tramites: [], ultimoAvisoMes: {}
        });
        importados++;
        if (!r.telefono) sinTelefono++;
        if (!r.fecha_oblea) sinFecha++;
      });
      await saveClientes();
      showBulkImport = false; bulkImportRows = []; bulkImportSkip = new Set();
      render();
      alert(`Se importaron ${importados} cliente(s). ${sinTelefono} sin teléfono reconocido, ${sinFecha} sin fecha de oblea reconocida — revisalos y completá lo que falte.`);
    });

    root.querySelectorAll('[data-aviso-mes]').forEach(a => {
      a.addEventListener('click', async () => {
        const id = a.getAttribute('data-aviso-mes');
        const tipo = a.getAttribute('data-aviso-tipo');
        const c = clientes.find(x => x.id === id);
        if (!c) return;
        c.ultimoAvisoMes[tipo] = currentYM();
        await saveClientes();
        render();
      });
    });

    const btnCancel = root.querySelector('#btn-cancel');
    if (btnCancel) btnCancel.addEventListener('click', () => {
      showForm = false; editingId = null;
      enargasPasteOpen = false;
      Object.keys(scanFiles).forEach(k => scanFiles[k] = null);
      render();
    });

    const btnSave = root.querySelector('#btn-save');
    if (btnSave) btnSave.addEventListener('click', async () => {
      const nombre = root.querySelector('#f-nombre').value.trim();
      if (!nombre) { alert('Poné al menos el nombre del cliente.'); return; }
      const data = {
        nombre,
        dni: root.querySelector('#f-dni').value.trim(),
        tipo_documento: root.querySelector('#f-tipo-documento').value,
        telefono: root.querySelector('#f-telefono').value.trim(),
        domicilio: root.querySelector('#f-domicilio').value.trim(),
        numero: root.querySelector('#f-numero').value.trim(),
        piso: root.querySelector('#f-piso').value.trim(),
        cpa: root.querySelector('#f-cpa').value.trim(),
        provincia: root.querySelector('#f-provincia').value.trim(),
        ciudad: root.querySelector('#f-ciudad').value.trim(),
        patente: root.querySelector('#f-patente').value.trim().toUpperCase(),
        marca: root.querySelector('#f-marca').value.trim(),
        modelo: root.querySelector('#f-modelo').value.trim(),
        anio: root.querySelector('#f-anio').value.trim(),
        inyeccion: root.querySelector('#f-inyeccion').value,
        uso: root.querySelector('#f-uso').value,
        fecha_oblea: root.querySelector('#f-oblea').value,
        fecha_crpc: root.querySelector('#f-crpc').value,
        tipo_cilindro: root.querySelector('#f-tipo-cilindro').value,
      };
      let clientId;
      if (editingId) {
        clientId = editingId;
        const idx = clientes.findIndex(c => c.id === editingId);
        clientes[idx] = { ...clientes[idx], ...data };
      } else {
        clientId = 'c' + Date.now() + Math.random().toString(36).slice(2,7);
        clientes.push({ id: clientId, ...data, tramites: [], ultimoAvisoMes: {}, notas: '' });
      }
      await saveClientes();

      try {
        const anyPhoto = Object.values(scanFiles).some(v => v);
        if (anyPhoto) {
          await window.storage.set(`fotos:${clientId}`, JSON.stringify(scanFiles), false);
        } else {
          try { await window.storage.delete(`fotos:${clientId}`, false); } catch (e) { /* no existía, ok */ }
        }
      } catch (e) {
        console.error('Error guardando fotos', e);
        alert('El cliente se guardó, pero hubo un problema guardando las fotos (puede que sean muy pesadas). Probá sacándolas de nuevo.');
      }

      showForm = false; editingId = null;
      Object.keys(scanFiles).forEach(k => scanFiles[k] = null);
      render();
    });

    root.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-edit');
        Object.keys(scanFiles).forEach(k => scanFiles[k] = null);
        try {
          const res = await window.storage.get(`fotos:${id}`, false);
          if (res) Object.assign(scanFiles, JSON.parse(res.value));
        } catch (e) { /* este cliente todavía no tiene fotos guardadas */ }
        editingId = id;
        showForm = false;
        addingTramite = true;
        enargasPasteOpen = false;
        currentSignature = null;
        tramiteDraftEquipo = blankEquipo();
        render();
        const panel = root.querySelector('#form-panel');
        if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });

    root.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-delete');
        const c = clientes.find(x => x.id === id);
        if (confirm(`¿Eliminar a ${c ? c.nombre : 'este cliente'}? Esta acción no se puede deshacer.`)) {
          clientes = clientes.filter(x => x.id !== id);
          await saveClientes();
          try { await window.storage.delete(`fotos:${id}`, false); } catch (e) { /* no tenía fotos, ok */ }
          render();
        }
      });
    });

    const btnBuscarEnargas = root.querySelector('#btn-buscar-enargas');
    if (btnBuscarEnargas) btnBuscarEnargas.addEventListener('click', async () => {
      const url = 'https://www.enargas.gob.ar/secciones/gas-natural-comprimido/consulta-dominio.php';
      const patente = btnBuscarEnargas.getAttribute('data-patente');
      const hint = root.querySelector('#enargas-copy-hint');
      // Copiar ANTES de abrir la pestaña nueva: en cuanto se abre la otra
      // ventana esta página puede perder el foco, y navigator.clipboard
      // exige que el documento esté enfocado o falla en silencio.
      if (patente && navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(patente);
          if (hint) { hint.style.display = 'block'; hint.textContent = `Copiamos "${patente}" al portapapeles — pegala (mantené apretado y "Pegar") en el campo Dominio de esa página.`; }
        } catch (e) { console.error('No se pudo copiar la patente', e); }
      }
      // window.open (en vez de un <a target="_blank">) para que abra en una
      // pestaña/ventana nueva de verdad incluso instalado como app en el
      // celular, donde un link común a veces navega en la misma ventana.
      window.open(url, '_blank', 'noopener');
    });

    const btnToggleEnargas = root.querySelector('#btn-toggle-enargas-paste');
    if (btnToggleEnargas) btnToggleEnargas.addEventListener('click', () => {
      enargasPasteOpen = !enargasPasteOpen;
      render();
    });

    const btnApplyEnargas = root.querySelector('#btn-apply-enargas');
    if (btnApplyEnargas) btnApplyEnargas.addEventListener('click', async () => {
      const textarea = root.querySelector('#enargas-paste-text');
      const resultBox = root.querySelector('#enargas-paste-result');
      const parsed = parseEnargasText(textarea.value || '');
      const aplicados = parsed.found.slice();
      const idx = editingId ? clientes.findIndex(x => x.id === editingId) : -1;

      if (idx !== -1) {
        // Cliente ya guardado: escribimos directo en el objeto (no en los
        // <input> en vivo) para que la actualización sobreviva al render()
        // que hace falta para reflejar también el equipo del trámite en curso.
        const campos = {
          nombre: parsed.nombre, dni: parsed.dni, domicilio: parsed.domicilio,
          provincia: parsed.provincia, ciudad: parsed.ciudad,
          patente: parsed.patente ? String(parsed.patente).toUpperCase() : null,
          marca: parsed.marca, modelo: parsed.modelo, uso: parsed.uso,
          fecha_oblea: parsed.fecha_oblea, fecha_crpc: parsed.fecha_crpc, anio: parsed.anio,
        };
        Object.entries(campos).forEach(([key, val]) => { if (val) clientes[idx][key] = val; });

        if (parsed.equipo && tramiteDraftEquipo) {
          syncEquipoFromDOM();
          if (parsed.equipo.regulador.codigo || parsed.equipo.regulador.serie) {
            Object.assign(tramiteDraftEquipo.regulador, parsed.equipo.regulador);
            aplicados.push('Regulador');
          }
          if (parsed.equipo.cilindro.codigo || parsed.equipo.cilindro.serie) {
            Object.assign(tramiteDraftEquipo.cilindros[0], parsed.equipo.cilindro);
            aplicados.push('Cilindro');
          }
          if (parsed.equipo.valvula.codigo || parsed.equipo.valvula.serie) {
            Object.assign(tramiteDraftEquipo.valvulas[0], parsed.equipo.valvula);
            aplicados.push('Válvula');
          }
        }
        await saveClientes();
        render();
        // El render de arriba reconstruye la caja (con los datos del
        // vehículo/equipo ya actualizados) — el mensaje se muestra ahí en
        // vez de un alert(), que bloquearía la pantalla.
        const nuevoResultBox = root.querySelector('#enargas-paste-result');
        if (nuevoResultBox) {
          if (aplicados.length === 0) {
            nuevoResultBox.className = 'agent-result err';
            nuevoResultBox.textContent = 'No reconocí datos con formato conocido en ese texto — completá a mano lo que falte.';
          } else {
            nuevoResultBox.className = 'agent-result';
            nuevoResultBox.textContent = 'Aplicado: ' + aplicados.join(' · ');
          }
        }
        return;
      }

      // Cliente todavía no guardado (alta nueva): no hay objeto en
      // `clientes` para mutar, así que completamos los <input> directamente.
      const map = {
        nombre: '#f-nombre', dni: '#f-dni', domicilio: '#f-domicilio',
        provincia: '#f-provincia', ciudad: '#f-ciudad', patente: '#f-patente',
        marca: '#f-marca', modelo: '#f-modelo',
        uso: '#f-uso', fecha_oblea: '#f-oblea', fecha_crpc: '#f-crpc', anio: '#f-anio'
      };
      Object.entries(map).forEach(([key, sel]) => {
        if (parsed[key]) {
          const el = root.querySelector(sel);
          if (el) el.value = key === 'patente' ? String(parsed[key]).toUpperCase() : parsed[key];
        }
      });
      if (aplicados.length === 0) {
        resultBox.className = 'agent-result err';
        resultBox.textContent = 'No reconocí datos con formato conocido en ese texto — revisá el formulario y completá a mano lo que falte.';
      } else {
        resultBox.className = 'agent-result';
        resultBox.textContent = 'Aplicado: ' + aplicados.join(' · ');
      }
    });

    const btnAddTramite = root.querySelector('#btn-add-tramite');
    if (btnAddTramite) btnAddTramite.addEventListener('click', () => {
      addingTramite = !addingTramite;
      currentSignature = null;
      tramiteDraftEquipo = addingTramite ? blankEquipo() : null;
      render();
    });

    const btnCancelTramite = root.querySelector('#btn-cancel-tramite');
    if (btnCancelTramite) btnCancelTramite.addEventListener('click', () => {
      addingTramite = false;
      currentSignature = null;
      tramiteDraftEquipo = null;
      render();
    });

    const btnAddCilindro = root.querySelector('#btn-add-cilindro');
    if (btnAddCilindro) btnAddCilindro.addEventListener('click', () => {
      syncEquipoFromDOM();
      tramiteDraftEquipo.cilindros.push({ codigo: '', serie: '', capacidad: '', nuevoUsado: 'usado', fabricadoMes: '', fabricadoAnio: '', revisadoMes: '', revisadoAnio: '', crpc: '', msdb: '' });
      render();
    });

    root.querySelectorAll('[data-remove-cilindro]').forEach(btn => {
      btn.addEventListener('click', () => {
        syncEquipoFromDOM();
        const i = Number(btn.getAttribute('data-remove-cilindro'));
        if (tramiteDraftEquipo.cilindros.length > 1) tramiteDraftEquipo.cilindros.splice(i, 1);
        render();
      });
    });

    const btnAddValvula = root.querySelector('#btn-add-valvula');
    if (btnAddValvula) btnAddValvula.addEventListener('click', () => {
      syncEquipoFromDOM();
      tramiteDraftEquipo.valvulas.push({ codigo: '', serie: '', msb: '' });
      render();
    });

    root.querySelectorAll('[data-remove-valvula]').forEach(btn => {
      btn.addEventListener('click', () => {
        syncEquipoFromDOM();
        const i = Number(btn.getAttribute('data-remove-valvula'));
        if (tramiteDraftEquipo.valvulas.length > 1) tramiteDraftEquipo.valvulas.splice(i, 1);
        render();
      });
    });

    const btnSaveTramite = root.querySelector('#btn-save-tramite');
    if (btnSaveTramite) btnSaveTramite.addEventListener('click', async () => {
      if (!editingId) return;
      const idx = clientes.findIndex(c => c.id === editingId);
      if (idx === -1) return;
      const tipo = root.querySelector('#t-tipo').value;
      const fecha = root.querySelector('#t-fecha').value;
      if (!fecha) { alert('Poné una fecha para el trámite.'); return; }
      const estadoPec = root.querySelector('#t-estado').value;
      syncEquipoFromDOM();
      const tramite = {
        id: 't' + Date.now() + Math.random().toString(36).slice(2, 7),
        tipo,
        fecha,
        equipo: tramiteDraftEquipo,
        detalle: root.querySelector('#t-detalle').value.trim(),
        estadoPec,
        motivoIncompleto: estadoPec === 'incompleto' ? root.querySelector('#t-motivo').value.trim() : '',
        firma: currentSignature,
        creadoEn: new Date().toISOString(),
      };
      clientes[idx].tramites.push(tramite);
      if (tipo === 'prueba_hidraulica') clientes[idx].fecha_crpc = fecha.slice(0, 7);
      await saveClientes();
      addingTramite = false;
      currentSignature = null;
      tramiteDraftEquipo = null;
      render();
    });

    root.querySelectorAll('[data-tramite-status]').forEach(sel => {
      sel.addEventListener('change', async () => {
        const clienteId = sel.getAttribute('data-tramite-status');
        const tramiteId = sel.getAttribute('data-tramite-id');
        const c = clientes.find(x => x.id === clienteId);
        if (!c) return;
        const t = c.tramites.find(x => x.id === tramiteId);
        if (!t) return;
        t.estadoPec = sel.value;
        if (t.estadoPec !== 'incompleto') t.motivoIncompleto = '';
        else {
          const motivo = prompt('¿Cuál es el motivo por el que quedó incompleto?', t.motivoIncompleto || '');
          t.motivoIncompleto = motivo || '';
        }
        await saveClientes();
        render();
      });
    });

  }

  boot();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
</body>
</html>
